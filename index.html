function AddEditModal({ open, editId, preZone, preDate, data, zones, trades, companies, history = [], taskLogs = [], onUpdateStatusNote, onDeleteStatusNote, onClose, onSave, onDelete }) {
  const existing = editId ? data.find(i=>i.id===editId) : null;
  const [form, setForm] = useState({});
  const [attachments, setAttachments] = useState([]);
  const [confirmDel, setConfirmDel] = useState(false);
  const [saving, setSaving] = useState(false);
  const [statusNoteEditId, setStatusNoteEditId] = useState(null);
  const [statusNoteDraft, setStatusNoteDraft] = useState('');
  const [statusNoteBusyId, setStatusNoteBusyId] = useState(null);
  const companyNames = [...new Set((companies&&companies.length?companies:COMPANIES).map(c=>c.name))].sort();

  useEffect(()=>{
    if (open) {
      setForm(existing ? {
        zone: existing.zone||'', start: existing.start||'', end: existing.end||'',
        trade: existing.trade||'', company: existing.company||'', task: existing.task||'',
        priority: existing.priority||3, prereq: existing.prereq||'', prereq_company: existing.prereq_company||'', impact: existing.impact||'', notes: existing.notes||'',
        predecessor_id: existing.predecessor_id||'', predecessor_ids: normalizeTaskLinkIds(existing.predecessor_ids || existing.predecessor_id), successor_ids: normalizeTaskLinkIds(existing.successor_ids), status: existing.status||'arealis',
        company_edit_allowed: !!existing.company_edit_allowed,
        company_edit_start_min: existing.company_edit_start_min || '',
        company_edit_end_max: existing.company_edit_end_max || '',
        _expected_updated_at: existing.updated_at||'',
      } : {
        zone: preZone||'', start: preDate||dateStr(new Date()),
        end: preDate||dateStr(new Date()), trade:'', company:'', task:'',
        priority:3, prereq:'', prereq_company:'', impact:'', notes:'', predecessor_id:'', predecessor_ids:[], successor_ids:[], status:'arealis',
        company_edit_allowed:false, company_edit_start_min:'', company_edit_end_max:'',
      });
      setAttachments(existing?.attachments||[]);
      setStatusNoteEditId(null);
      setStatusNoteDraft('');
      setStatusNoteBusyId(null);
    }
  }, [open, editId, preZone, preDate]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function getCompanyNameForTrade(tradeId) {
    if (!tradeId) return '';
    var sourceCompanies = companies && companies.length ? companies : COMPANIES;
    var match = sourceCompanies.find(function(c){ return (c.tradeId || c.trade_id) === tradeId; });
    return match ? match.name : '';
  }

  function handleTradeChange(tradeId) {
    setForm(function(f) {
      var autoCompany = getCompanyNameForTrade(tradeId);
      return Object.assign({}, f, {
        trade: tradeId,
        company: autoCompany || ''
      });
    });
  }

  // New task default: if a task crosses a weekend, Saturday/Sunday are frozen automatically.
  // Example: Friday → Monday = Saturday + Sunday are excluded from worked days.
  useEffect(()=>{
    if (!open || editId) return;
    setForm(function(f){
      if (!f.start) return f;
      var auto = weekendOffDaysBetween(f.start, f.end||f.start);
      var previousAuto = f._auto_weekend_off_days || [];
      var currentOffs = f.off_days || [];
      var manualOffs = currentOffs.filter(function(ds){return !previousAuto.includes(ds);});
      var merged = Array.from(new Set(manualOffs.concat(auto)));
      if (JSON.stringify(merged) === JSON.stringify(currentOffs) &&
          JSON.stringify(auto) === JSON.stringify(previousAuto)) return f;
      return Object.assign({}, f, {off_days:merged, _auto_weekend_off_days:auto});
    });
  }, [open, editId, form.start, form.end]);

  const PRIOS = [{v:1,l:'Urgente',c:'#DC2626'},{v:2,l:'Haute',c:'#EA580C'},{v:3,l:'Normale',c:'#CA8A04'},{v:4,l:'Basse',c:'#6B7280'},{v:5,l:'À conf.',c:'#9CA3AF'}];

  async function handleSave() {
    if (saving) return;
    if (!form.trade||!form.task) { alert('Corps de métier et description sont requis.'); return; }
    if (form.company_edit_allowed && form.company_edit_start_min && form.company_edit_end_max && form.company_edit_end_max < form.company_edit_start_min) {
      alert('La date limite au plus tard ne peut pas être avant la date au plus tôt.');
      return;
    }
    const tn = existing?.task_number || genTaskNum(data, form.company, form.trade, trades);
    setSaving(true);
    try {
      var cleanForm = Object.assign({}, form);
      delete cleanForm._auto_weekend_off_days;
      cleanForm.predecessor_ids = normalizeTaskLinkIds(cleanForm.predecessor_ids || cleanForm.predecessor_id);
      cleanForm.successor_ids = normalizeTaskLinkIds(cleanForm.successor_ids);
      cleanForm.predecessor_id = cleanForm.predecessor_ids[0] || '';
      if (!String(cleanForm.prereq || '').trim()) cleanForm.prereq_company = '';
      await onSave({
        id: editId||genId(), ...cleanForm,
        priority: form.priority||3, staff:1, progress:0, delay:0,
        task_number:tn, attachments,
        off_days: form.off_days||[],
      });
    } catch(e) {
      alert((e&&e.message)||'Erreur de sauvegarde. Actualisez puis réessayez.');
    } finally {
      setSaving(false);
    }
  }

  const statusNotesForEdit = editId && existing ? taskStatusNoteItems(existing, history, taskLogs) : [];

  function startEditStatusNote(note) {
    setStatusNoteEditId(note.id);
    setStatusNoteDraft(note.note || '');
  }
  function cancelEditStatusNote() {
    setStatusNoteEditId(null);
    setStatusNoteDraft('');
  }
  async function saveStatusNote(note) {
    if (!onUpdateStatusNote || !note) return;
    var nextText = String(statusNoteDraft || '').trim();
    if (!nextText) {
      await removeStatusNote(note);
      return;
    }
    setStatusNoteBusyId(note.id);
    try {
      await onUpdateStatusNote(note, nextText);
      setStatusNoteEditId(null);
      setStatusNoteDraft('');
    } finally {
      setStatusNoteBusyId(null);
    }
  }
  async function removeStatusNote(note) {
    if (!onDeleteStatusNote || !note) return;
    if (!window.confirm('Supprimer cette note de statut ?')) return;
    setStatusNoteBusyId(note.id);
    try {
      await onDeleteStatusNote(note);
      if (statusNoteEditId === note.id) {
        setStatusNoteEditId(null);
        setStatusNoteDraft('');
      }
    } finally {
      setStatusNoteBusyId(null);
    }
  }

  const predecessorList = data.filter(i=>i.id!==editId&&i.task_number)
    .sort((a,b)=>(a.task_number||'').localeCompare(b.task_number||''));

  return (
    <>
      <SheetModal open={open} onClose={onClose} maxH="95vh">
        <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:18}}>
          {editId?'Modifier l\'intervention':'Nouvelle intervention'}
        </div>
        <Field label="Zone *">
          <Select value={form.zone||''} onChange={e=>set('zone',e.target.value)}>
            <option value="">Sélectionner une zone…</option>
            {zones.map(z=><option key={z.id} value={z.id}>{z.name}</option>)}
          </Select>
        </Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:13}}>
          <Field label="Date debut *"><Input type="date" value={form.start||''} onChange={e=>set('start',e.target.value)} /></Field>
          <Field label="Date fin"><Input type="date" value={form.end||''} onChange={e=>set('end',e.target.value)} /></Field>
        </div>
        <FrozenDaysField form={form} set={set} />
        <Field label="Corps de métier *">
          <Select value={form.trade||''} onChange={e=>handleTradeChange(e.target.value)}>
            <option value="">Sélectionner…</option>
            {trades.map(t=><option key={t.id} value={t.id}>{t.short ? t.short+' — '+t.name : t.name}</option>)}
          </Select>
        </Field>
        {form.company && (
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:13,padding:'6px 10px',

/* ============================================================
   ERROR BOUNDARY
=========================================================== */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, info) {
    console.error('[Planify ErrorBoundary]', error, info);
  }

  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: '100vh',
          background: 'var(--bg)',
          color: 'var(--text)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: 20
        }}>
          <div style={{
            maxWidth: 520,
            width: '100%',
            background: 'var(--surface)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: 20,
            boxShadow: 'var(--shadow-md)'
          }}>
            <div style={{
              fontSize: 18,
              fontWeight: 700,
              marginBottom: 8,
              color: 'var(--danger)'
            }}>
              Une erreur est survenue
            </div>
            <div style={{
              fontSize: 13,
              color: 'var(--muted)',
              marginBottom: 14,
              lineHeight: 1.5
            }}>
              L’application a rencontré une erreur. Le DOM React reste intact.
            </div>
            <pre style={{
              background: 'var(--surface-2)',
              border: '1px solid var(--border)',
              borderRadius: 8,
              padding: 12,
              fontSize: 11,
              whiteSpace: 'pre-wrap',
              color: 'var(--danger)',
              marginBottom: 14
            }}>
              {String(this.state.error?.message || this.state.error)}
            </pre>
            <button
              onClick={() => window.location.reload()}
              style={{
                width: '100%',
                padding: 12,
                background: 'var(--primary)',
                color: '#fff',
                border: 'none',
                borderRadius: 'var(--r-sm)',
                fontSize: 14,
                fontWeight: 700,
                cursor: 'pointer',
                fontFamily: "'DM Sans', sans-serif"
              }}
            >
              Recharger l’application
            </button>
          </div>
        </div>
      );
    }

    return this.props.children;
  }
}

function HistoryModal({ open, history, session, onClose, onRefresh }) {
  function eventLabel(t) {
    return {
      status_change:'Changement de statut',
      task_created:'Tâche ajoutée',
      task_updated:'Tâche modifiée',
      task_deleted:'Tâche supprimée',
      planning_locked:'Planning verrouillé',
      planning_unlocked:'Planning déverrouillé',
      planning_validated:'Planning validé',
      planning_reindexed:'Planning réindexé'
    }[t] || t || 'Événement';
  }
  function eventColor(t) {
    if (t === 'status_change') return '#2563EB';
    if (t === 'planning_validated') return '#16A34A';
    if (t === 'planning_locked') return '#DC2626';
    if (t === 'planning_reindexed') return '#EA580C';
    return 'var(--muted)';
  }
  function fmtDT(s) {
    if (!s) return '';
    try {
      return new Date(s).toLocaleString('fr-FR', {
        day:'2-digit', month:'2-digit', year:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    } catch(e) { return s; }
  }

  function changeActionLabel(ch) {
    if (!ch) return 'Modification';
    if (ch.action) return ch.action;
    if (ch.label) return ch.label + ' modifié';
    return 'Modification';
  }

  const isAdminHistory = session?.role === 'admin';

  return (
    <SheetModal open={open} onClose={onClose} maxH="92vh">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>Historique détaillé</div>

            Visible par tous les utilisateurs
          </div>
        </div>
        <button onClick={onRefresh} style={{...miniBtn,fontWeight:700}}>Rafraîchir</button>
      </div>

      {(!history || history.length === 0) ? (
        <div style={{padding:'20px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>
          Aucun événement enregistré pour le moment.
        </div>
      ) : (
        <div>
          {history.map(function(ev){
            var c = eventColor(ev.event_type);
            return (
              <div key={ev.id || ev.created_at + ev.message}
                style={{background:'var(--surface)',border:'1px solid var(--border)',
                  borderLeft:'4px solid '+c,borderRadius:'var(--r-sm)',
                  padding:'11px 12px',marginBottom:8,boxShadow:'var(--shadow)'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:5}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>
                    {eventLabel(ev.event_type)}
                  </div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                    {fmtDT(ev.created_at)}
                  </div>
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:5,lineHeight:1.4}}>
                  <b>{ev.actor_name || ev.actor_company || 'Utilisateur'}</b>
                  {ev.actor_role ? ' · '+ev.actor_role : ''}
                  {ev.actor_company && ev.actor_company !== ev.actor_name ? ' · '+ev.actor_company : ''}
                </div>
                {ev.task_number || ev.task_title ? (
                  <div style={{fontSize:12,color:'var(--text)',lineHeight:1.45,marginBottom:5}}>
                    {ev.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                      color:'var(--xmuted)',background:'var(--surface-2)',padding:'1px 5px',
                      borderRadius:3,border:'1px solid var(--border)',marginRight:6}}>{ev.task_number}</span>}
                    {ev.task_company && <b>{ev.task_company} — </b>}
                    {ev.task_title}
                  </div>
                ) : null}
                {(ev.old_status || ev.new_status) && (
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>
                    {ev.old_status || '—'} → <span style={{color:c,fontWeight:800}}>{ev.new_status || '—'}</span>
                  </div>

                {ev.note && (
                  <div style={{fontSize:12,color:'var(--text)',background:'var(--surface-2)',

/* ── Canvas recap helpers ── */
function _cvRoundRect(ctx, x, y, w, h, r, fill, stroke) {
  var rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.lineTo(x+w-rr, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+rr);
  ctx.lineTo(x+w, y+h-rr);
  ctx.quadraticCurveTo(x+w, y+h, x+w-rr, y+h);
  ctx.lineTo(x+rr, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-rr);
  ctx.lineTo(x, y+rr);
  ctx.quadraticCurveTo(x, y, x+rr, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}
function _cvTrunc(str, maxLen) {
  return String(str||'').length > maxLen ? String(str).slice(0, maxLen)+'…' : String(str||'');
}
function _cvFmtD(ds) {
  if (!ds) return '';
  var d = new Date(ds+'T00:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}
function _cvFmtDFull(ds) {
  var MNTHS = ['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
  if (!ds) return '';
  var d = new Date(ds+'T00:00:00');
  return d.getDate()+' '+MNTHS[d.getMonth()];
}

function buildWeekRecapCanvas(data, zones, trades, companies, note, scope, target, extraWeeks) {
  // scope: 'general' | 'company' | 'trade'
  // target: company name string OR trade id string
  scope      = scope      || 'general';
  target     = target     || null;
  extraWeeks = Array.isArray(extraWeeks) ? extraWeeks : [];

  var today = new Date(); today.setHours(0,0,0,0);
  var dow = today.getDay();
  var mon = new Date(today); mon.setDate(today.getDate() - (dow===0?6:dow-1));
  var fri = new Date(mon); fri.setDate(mon.getDate()+4);
  function _ds(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  var monStr = _ds(mon), friStr = _ds(fri), todayStr = _ds(today);
  var FR_DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

        // Task name
        ctx.fillStyle=sg.key==='termine'?'#9CA3AF':'#1A1A1A';
        ctx.font='10px '+FONT;
        ctx.fillText(_cvTrunc(iv.task||'',46), PAD+22, y+13);

        // Zone label (company mode only)
        if(tableMode!=='zone'){
          var ivZn=(zones||[]).find(function(z){return z.id===iv.zone;})||{};
          if(ivZn.short){
            ctx.fillStyle='#C4C0B8'; ctx.font='7.5px '+MONO;
            ctx.fillText(_cvTrunc(ivZn.short,10), PAD+340, y+12);
          }
        }

        // Right: contextual date info
        ctx.textAlign='right';
        if(sg.key==='encours'||sg.key==='en_retard'){
          var dRem=_cvDaysRemaining(iv);
          if(dRem!==null){
            var dRemColor=dRem<0?'#DC2626':dRem<=3?'#EA580C':'#2563EB';
            var dRemStr=dRem<0?('+'+Math.abs(dRem)+'j retard'):dRem===0?'finit auj.':(dRem+'j restants');
            ctx.fillStyle=dRemColor; ctx.font='bold 9px '+MONO;
            ctx.fillText(dRemStr, W-PAD-8, y+13);
            if(iv.start&&iv.end){
              ctx.font='bold 9px '+MONO;
              var drw=ctx.measureText(dRemStr).width;
              ctx.fillStyle='#9CA3AF'; ctx.font='7.5px '+MONO;
              ctx.fillText(_cvFmtD(iv.start)+'→'+_cvFmtD(iv.end), W-PAD-8-drw-10, y+13);
            }
          } else if(iv.end){
            ctx.fillStyle='#6B6860'; ctx.font='9px '+MONO;
            ctx.fillText(_cvFmtD(iv.end), W-PAD-8, y+13);
          }
        } else if(sg.key==='arealis'){
          if(iv.start){
            ctx.fillStyle='#9CA3AF'; ctx.font='8px '+MONO;
            ctx.fillText('dém. '+_cvFmtD(iv.start), W-PAD-8, y+13);
          }
        } else if(sg.key==='bloque'){
          if(iv.end){
            ctx.fillStyle='#DC2626'; ctx.font='9px '+MONO;
            ctx.fillText(_cvFmtD(iv.end), W-PAD-8, y+13);
          }
        } else if(sg.key==='termine'){
          if(iv.end){
            ctx.fillStyle='#16A34A'; ctx.font='9px '+MONO;
            ctx.fillText(_cvFmtD(iv.end), W-PAD-8, y+13);
          }
        }
        ctx.textAlign='left';
        y += TASK_H;
      });
    });

    y += GROUP_GAP;
  });

  // ── ZONES À RISQUE (propagation de dérive) ──
  if (riskBanner && health.riskyZones.length > 0) {
    y += GAP;
    var displayRisk = health.riskyZones.slice(0, 2);
    var RISK_ROW = 32;
    ctx.fillStyle='rgba(220,38,38,.06)'; _cvRoundRect(ctx, PAD, y, W-PAD*2, RISK_H, 8, true, false);
    ctx.strokeStyle='#DC2626'; ctx.lineWidth=0.8; _cvRoundRect(ctx, PAD, y, W-PAD*2, RISK_H, 8, false, true);
    ctx.fillStyle='#991B1B'; ctx.font='bold 9px '+MONO;
    ctx.fillText('\u26d4 ZONES \u00c0 RISQUE \u2014 PROPAGATION DE D\u00c9RIVE', PAD+12, y+14);
    displayRisk.forEach(function(rz, ri) {
      var ry = y + 18 + ri * RISK_ROW;
      ctx.fillStyle='#1A1A1A'; ctx.font='bold 10px '+FONT;
      ctx.fillText(rz.zone.short, PAD+12, ry+16);
      ctx.fillStyle='#6B6860'; ctx.font='9px '+FONT;
      ctx.fillText(rz.zone.name.split('\u2014').pop().trim(), PAD+65, ry+16);
      if (rz.blocked>0) {
        ctx.fillStyle='#DC2626'; ctx.font='bold 9px '+MONO;
        ctx.fillText(rz.blocked+' BLOQ.', PAD+300, ry+16);
      }
      if (rz.late>0) {
        ctx.fillStyle='#EA580C'; ctx.font='bold 9px '+MONO;
        ctx.fillText(rz.late+' RETARD', PAD+360, ry+16);
      }
      var derStr = (rz.derive>0?'+':'')+rz.derive+'%';
      ctx.fillStyle=rz.derive<0?'#DC2626':'#16A34A'; ctx.font='bold 9px '+MONO; ctx.textAlign='right';
      ctx.fillText('D\u00c9RIVE '+derStr, W-PAD-8, ry+16);
      ctx.textAlign='left';
    });
    y += RISK_H;
  }

  // ── ALERTES CRITIQUES ──
  if (alertBanner) {
    y += GAP;
    ctx.fillStyle='#FFFBEB'; _cvRoundRect(ctx, PAD, y, W-PAD*2, ALERT_H, 8, true, false);
    ctx.strokeStyle='#D97706'; ctx.lineWidth=0.8; _cvRoundRect(ctx, PAD, y, W-PAD*2, ALERT_H, 8, false, true);
    ctx.fillStyle='#92400E'; ctx.font='bold 9px '+MONO;
    ctx.fillText('\u26a0 ALERTES CRITIQUES', PAD+12, y+14);
    health.alertes.forEach(function(a, ai) {
      var aly = y + 14 + (ai+1)*20;
      ctx.fillStyle = a.type==='danger' ? '#DC2626' : '#EA580C';
      ctx.font = 'bold 10px '+FONT;
      ctx.fillText((a.type==='danger'?'\u25cf ':'\u25b2 ') + _cvTrunc(a.msg, 68), PAD+12, aly);
    });
    y += ALERT_H;
  }

  // ── NOTE ──
  if (noteStr) {
    y += GAP;
    ctx.fillStyle='#EFF6FF'; _cvRoundRect(ctx, PAD, y, W-PAD*2, NOTE_H, 8, true, false);
    ctx.strokeStyle='#2152C8'; ctx.lineWidth=0.8; _cvRoundRect(ctx, PAD, y, W-PAD*2, NOTE_H, 8, false, true);
    ctx.fillStyle='#1E3A8A'; ctx.font='bold 9px '+MONO; ctx.fillText('NOTE', PAD+12, y+14);
    ctx.fillStyle='#1A1A1A'; ctx.font='11px '+FONT;
    var words=noteStr.split(' '), line='', maxW=W-PAD*2-24, lineY=y+28;
    words.forEach(function(word){ var test=line?line+' '+word:word; if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,PAD+12,lineY); lineY+=14; line=word; }else{ line=test; } });
    if(line) ctx.fillText(line,PAD+12,lineY);
    y += NOTE_H;
  }

  // ── À VENIR (S+1/S+2) ──
  var FR_MONTHS_CV=['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  extraWeeksData.forEach(function(ew){
    if (!ew.tasks.length) return;
    y += GAP;
    var ewLabel = 'À VENIR — S+'+(ew.off)+' — '+ew.mon.getDate()+' '+FR_MONTHS_CV[ew.mon.getMonth()].toUpperCase()+' → '+ew.fri.getDate()+' '+FR_MONTHS_CV[ew.fri.getMonth()].toUpperCase();
    // Header bar blue
    ctx.fillStyle='#1E3A8A';
    _cvRoundRect(ctx, PAD, y, W-PAD*2, 24, 4, true, false);
    ctx.fillStyle='#FFFFFF'; ctx.font='bold 9px '+MONO; ctx.textAlign='left';
    ctx.fillText(ewLabel, PAD+10, y+15.5);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='8px '+MONO;
    ctx.fillText(ew.tasks.length+' tâche'+(ew.tasks.length>1?'s':''), W-PAD-8, y+15.5);
    ctx.textAlign='left'; y += 24;
    // Split: span=started before S+1, new=starts in S+1
    var ewSpan = ew.tasks.filter(function(iv){ return (iv.start||'')<ew.monStr; });
    var ewNew  = ew.tasks.filter(function(iv){ return (iv.start||'')>=ew.monStr; });
    function drawEwSubGroup(subLabel, subColor, subTasks) {
      if(!subTasks.length) return;
      ctx.fillStyle='rgba(30,58,138,.07)';
      ctx.fillRect(PAD, y, W-PAD*2, 14);
      ctx.fillStyle=subColor; ctx.font='bold 7.5px '+MONO;
      ctx.fillText(subLabel+' ('+subTasks.length+')', PAD+10, y+10);
      y += 14;
      var sorted=subTasks.slice().sort(function(a,b){
        var ord={bloque:0,en_retard:1,encours:2,arealis:3,termine:4};
        return (ord[effectiveStatus(a)]||5)-(ord[effectiveStatus(b)]||5);
      });
      sorted.forEach(function(iv,ti){
        var st=effectiveStatus(iv);
        var stIcon=st==='bloque'?'⛔':st==='en_retard'?'⏱':st==='encours'?'▶':st==='arealis'?'○':'✓';
        var stCol=st==='bloque'?'#DC2626':st==='en_retard'?'#EA580C':st==='encours'?'#2563EB':st==='arealis'?'#6B7280':'#16A34A';
        var zObj=(zones||[]).find(function(z){return z.id===iv.zone;})||{};
        var zShort=zObj.short||iv.zone||'';
        ctx.fillStyle=ti%2===0?'rgba(0,0,0,.018)':'transparent';
        ctx.fillRect(PAD, y, W-PAD*2, 17);
        ctx.fillStyle=stCol; ctx.font='bold 8.5px '+MONO;
        ctx.fillText(stIcon, PAD+8, y+12);
        ctx.fillStyle=st==='termine'?'#9CA3AF':'#1A1A1A'; ctx.font='9.5px '+FONT;
        ctx.fillText(_cvTrunc((iv.task||''),42), PAD+22, y+12);
        ctx.textAlign='right';
        ctx.fillStyle='#9CA3AF'; ctx.font='7.5px '+MONO;
        ctx.fillText(_cvTrunc(zShort+(iv.company?' · '+_cvTrunc(iv.company,12):''),22), W-PAD-8, y+12);
        if(iv.start&&iv.end){
          ctx.fillStyle='#C4C0B8'; ctx.font='6.5px '+MONO;
          ctx.fillText(_cvFmtD(iv.start)+'→'+_cvFmtD(iv.end), W-PAD-8, y+12+8);
        }
        ctx.textAlign='left';
        ctx.strokeStyle='rgba(0,0,0,.05)'; ctx.lineWidth=0.4;
        ctx.beginPath(); ctx.moveTo(PAD+4,y+16.5); ctx.lineTo(W-PAD-4,y+16.5); ctx.stroke();
        y += 17;
      });
    }
    if(ewSpan.length>0) drawEwSubGroup('→ EN COURS DEPUIS S (se poursuit en S+'+(ew.off)+')', '#1D4ED8', ewSpan);
    if(ewNew.length>0)  drawEwSubGroup('▶ À DÉMARRER EN S+'+(ew.off), '#6B7280', ewNew);
    y += 8;
  });

  // ── FOOTER ──
  y += GAP;
  ctx.fillStyle='#E8E4DC'; ctx.fillRect(PAD, y, W-PAD*2, 1); y += 8;
  ctx.fillStyle='#ABA8A0'; ctx.font='9px '+MONO;
  ctx.fillText('Confidentiel chantier \u2014 HSF 66 Av. Marceau, Paris 8', PAD, y+14);
  ctx.fillStyle='#2152C8'; ctx.font='bold 11px '+FONT; ctx.textAlign='right';
  ctx.fillText('Planify', W-PAD, y+14); ctx.textAlign='left';

  return canvas;
}


function shareOrDownloadCanvas(canvas) {
  var filename = 'planify-recap-' + (function(){ var n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); })() + '.png';
  canvas.toBlob(function(blob) {
    if (!blob) return;
    var file = new File([blob], filename, { type:'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      navigator.share({ files:[file], title:'Planify — Récap semaine', text:'Récap hebdomadaire chantier HSF Av. Marceau' })
        .catch(function(){ _cvDownloadBlob(blob, filename); });
    } else {
      _cvDownloadBlob(blob, filename);
    }
  }, 'image/png');
}
function _cvDownloadBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
}

function RecapPreviewModal({ data, zones, trades, companies, note, onNoteChange, onClose, onExportPdf, onExportPng }) {
  var [previewUrl, setPreviewUrl] = React.useState(null);
  var [pdfBusy,   setPdfBusy]   = React.useState(false);
  var [pngBusy,   setPngBusy]   = React.useState(false);
  var [pdfDone,   setPdfDone]   = React.useState(false);
  var [pngDone,   setPngDone]   = React.useState(false);
  var [scope,     setScope]     = React.useState('general');   // 'general' | 'company' | 'trade'
  var [target,    setTarget]    = React.useState(null);        // company name or trade id
  var [inclS1,    setInclS1]    = React.useState(false);
  var [inclS2,    setInclS2]    = React.useState(false);

  // Unique companies with tasks (all time)
  var allCoNames = [];
  (data||[]).forEach(function(iv){ if (allCoNames.indexOf(iv.company)<0 && iv.company) allCoNames.push(iv.company); });
  allCoNames.sort();

  // This-week helper
  var today2 = new Date(); today2.setHours(0,0,0,0);
  var dow2 = today2.getDay();
  var mon2 = new Date(today2); mon2.setDate(today2.getDate()-(dow2===0?6:dow2-1));
  var fri2 = new Date(mon2); fri2.setDate(mon2.getDate()+4);
  function _ds2(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  var monStr2=_ds2(mon2), friStr2=_ds2(fri2);
  function inWeek2(iv){ var s=iv.start||'',e=iv.end||s; return s<=friStr2&&e>=monStr2; }
  var coNamesThisWeek = [];
  (data||[]).filter(inWeek2).forEach(function(iv){ if (coNamesThisWeek.indexOf(iv.company)<0) coNamesThisWeek.push(iv.company); });

  // Regenerate preview on any dependency change
  React.useEffect(function(){
    var timer = setTimeout(function(){
      try {
        var ew = []; if(inclS1) ew.push(1); if(inclS2) ew.push(2);
        var c = buildWeekRecapCanvas(data, zones, trades, companies, note, scope, target, ew);
        setPreviewUrl(c.toDataURL('image/png'));
      } catch(e){ console.error('[Planify] preview error', e); }
    }, 150);
    return function(){ clearTimeout(timer); };
  }, [note, scope, target, inclS1, inclS2]);

  function handleScopeChange(s) {
    setScope(s);
    setTarget(null);
  }

  function doExportPdf() {
    if (pdfBusy) return; setPdfBusy(true);
    var _ew2 = []; if(inclS1) _ew2.push(1); if(inclS2) _ew2.push(2);
    setTimeout(function(){
      try { onExportPdf(scope, target, _ew2); setPdfDone(true); setTimeout(function(){ setPdfDone(false); }, 2500); }
      catch(e){ console.error(e); } finally { setPdfBusy(false); }
    }, 80);
  }
  function doExportPng() {
    if (pngBusy) return; setPngBusy(true);
    setTimeout(function(){
      try { onExportPng(scope, target, _ew2); setPngDone(true); setTimeout(function(){ setPngDone(false); }, 2500); }
      catch(e){ console.error(e); } finally { setPngBusy(false); }
    }, 80);
  }

  var tabStyle = function(active){ return {
    flex:1, padding:'8px 6px', border:'none', borderRadius:8, cursor:'pointer',
    fontSize:12, fontWeight:700, fontFamily:"'DM Sans',sans-serif",
    background: active ? '#2152C8' : 'rgba(255,255,255,.1)',
    color: active ? '#fff' : 'rgba(255,255,255,.6)',
    transition:'all .15s'
  }; };

  var pillStyle = function(active){ return {
    padding:'6px 12px', border:'1px solid', borderRadius:20, cursor:'pointer',
    fontSize:11, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
    borderColor: active ? '#60A5FA' : 'rgba(255,255,255,.2)',
    background:  active ? 'rgba(96,165,250,.2)' : 'transparent',
    color:       active ? '#60A5FA' : 'rgba(255,255,255,.65)',
    display:'inline-flex', alignItems:'center', gap:6, flexShrink:0
  }; };

  // Scope label for export filename
  var scopeLabel2 = scope==='general' ? 'Général'
    : scope==='company' ? (target||'Entreprise')
    : scope==='trade'   ? ((trades||[]).find(function(t){return t.id===target;})||{}).name||'Lot'
    : '';

  return (
    <div style={{position:'fixed',inset:0,zIndex:9500,background:'rgba(0,0,0,.88)',
      display:'flex',flexDirection:'column',overflowY:'auto'}}>

      {/* Sticky bar */}
      <div style={{position:'sticky',top:0,zIndex:2,background:'#111315',
        borderBottom:'1px solid rgba(255,255,255,.1)',padding:'10px 14px',
        display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:'#FFFFFF'}}>Aperçu récap semaine</div>
          <div style={{fontSize:10,color:'#9CA3AF',marginTop:1}}>{scopeLabel2}</div>
        </div>
        <button onClick={onClose}
          style={{background:'rgba(255,255,255,.1)',border:'none',borderRadius:8,
            color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',padding:'8px 14px',
            fontFamily:"'DM Sans',sans-serif"}}>Fermer</button>
      </div>

      <div style={{padding:'14px 14px 50px',display:'flex',flexDirection:'column',gap:14}}>

        {/* ── Scope selector ── */}
        <div style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',
            textTransform:'uppercase',letterSpacing:'.05em',marginBottom:10,
            fontFamily:"'DM Mono',monospace"}}>Portée du récap</div>
          <div style={{display:'flex',gap:8,marginBottom:scope!=='general'?12:0}}>
            {[
              {k:'general', lbl:'Général'},
              {k:'company', lbl:'Par entreprise'},
              {k:'trade',   lbl:'Par corps de métier'},
            ].map(function(t){
              return <button key={t.k} onClick={function(){ handleScopeChange(t.k); }} style={tabStyle(scope===t.k)}>{t.lbl}</button>;

          </div>

          {/* Company picker */}
          {scope==='company'&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:7,maxHeight:160,overflowY:'auto',paddingBottom:4}}>
              {allCoNames.map(function(coName){
                var hasWeekTask = coNamesThisWeek.indexOf(coName)>=0;
                var tr3 = (trades||[]).find(function(t){ return (data||[]).some(function(iv){ return iv.company===coName&&iv.trade===t.id; }); });
                var col3 = tr3 ? (TRADE_COLORS[tr3.color]||TRADE_COLORS.blue).b : '#3B82F6';
                return (
                  <button key={coName} onClick={function(){ setTarget(coName); }} style={Object.assign({},pillStyle(target===coName),{borderColor:target===coName?col3:'rgba(255,255,255,.2)',background:target===coName?col3+'33':'transparent',color:target===coName?col3:'rgba(255,255,255,.65)'})}>
                    <span style={{width:7,height:7,borderRadius:'50%',background:col3,flexShrink:0}}></span>
                    {coName}
                    {!hasWeekTask&&<span style={{fontSize:9,opacity:.5}}>—</span>}

          {/* Trade picker */}
          {scope==='trade'&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:7,maxHeight:160,overflowY:'auto',paddingBottom:4}}>

          {/* Warning if scope set but no target */}
          {scope!=='general'&&!target&&(
            <div style={{marginTop:10,fontSize:11,color:'#FBBF24',fontStyle:'italic'}}>
              Sélectionnez une {scope==='company'?'entreprise':'corps de métier'} ci-dessus pour générer l'aperçu.
            </div>
          )}
        </div>

        {/* ── Semaines incluses ── */}
        <div style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',
            textTransform:'uppercase',letterSpacing:'.05em',marginBottom:10,
            fontFamily:"'DM Mono',monospace"}}>Semaines incluses dans l'export</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <div style={{padding:'8px 14px',borderRadius:8,border:'1px solid #60A5FA',
              background:'rgba(96,165,250,.2)',color:'#60A5FA',fontSize:12,fontWeight:700,
              fontFamily:"'DM Sans',sans-serif"}}>
              ✓ Semaine en cours (S0)
            </div>
            {[{key:'inclS1',label:'+ Semaine suivante (S+1)',val:inclS1,set:setInclS1},
              {key:'inclS2',label:'+ Dans 2 semaines (S+2)',val:inclS2,set:setInclS2}

                    color:item.val?'#34D399':'rgba(255,255,255,.5)',
                    fontSize:12,fontWeight:700,cursor:'pointer',
                    fontFamily:"'DM Sans',sans-serif",transition:'all .15s'}}>

          </div>}
        </div>

        {/* ── Note ── */}
        <div style={{background:'rgba(255,255,255,.07)',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.55)',

          <textarea value={note} onChange={function(e){ onNoteChange(e.target.value); }}

            style={{width:'100%',padding:'10px 12px',borderRadius:8,
              border:'1px solid rgba(255,255,255,.18)',background:'rgba(255,255,255,.06)',
              color:'#FFFFFF',fontSize:13,fontFamily:"'DM Sans',sans-serif",
              resize:'vertical',minHeight:72,outline:'none',boxSizing:'border-box'}}

        {/* ── Export buttons ── */}

/* ============================================================
   TASK QUICK VIEW — Vue rapide des tâches par statut/semaine
============================================================ */
function TaskQuickView({ data, zones, trades, initialStatus, onClose }) {
  var [statusTab, setStatusTab] = React.useState(initialStatus || 'all');
  var [filterMode, setFilterMode] = React.useState('zone');
  var [filterVal, setFilterVal] = React.useState(null);
  var [weekOff, setWeekOff] = React.useState(0);

  var STATUS_TABS = [
    {key:'all',       label:'Toutes',    color:'#374151'},
    {key:'bloque',    label:'Bloquées',  color:'#DC2626', icon:'⛔'},
    {key:'en_retard', label:'En retard', color:'#EA580C', icon:'⏱'},
    {key:'encours',   label:'En cours',  color:'#2563EB', icon:'▶'},
    {key:'arealis',   label:'À réaliser', color:'#6B7280', icon:'○'},
    {key:'termine',   label:'Terminées', color:'#16A34A', icon:'✓'},
  ];

  var today = new Date(); today.setHours(0,0,0,0);
  var dow = today.getDay();
  var baseMon = new Date(today); baseMon.setDate(today.getDate()-(dow===0?6:dow-1));
  var mon = new Date(baseMon); mon.setDate(baseMon.getDate() + weekOff*7);
  var fri = new Date(mon); fri.setDate(mon.getDate()+4);
  function pad2(n){ return String(n).padStart(2,'0'); }
  function ds(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
  var FR_M=['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  function fmtH(d){ return d.getDate()+' '+FR_M[d.getMonth()]; }
  var monStr=ds(mon), friStr=ds(fri);
  var isCurrentWeek = weekOff===0;
  var weekLabel = isCurrentWeek ? 'Cette semaine' : weekOff<0 ? 'S'+weekOff : 'S+'+weekOff;

  var weekTasks = (data||[]).filter(function(iv){
    var s=iv.start||'', e=iv.end||s;
    return s<=friStr && e>=monStr;
  });

  var counts = {all: weekTasks.length};
  ['bloque','en_retard','encours','arealis','termine'].forEach(function(st){
    counts[st] = weekTasks.filter(function(iv){ return effectiveStatus(iv)===st; }).length;
  });

  var statusTasks = statusTab==='all' ? weekTasks : weekTasks.filter(function(iv){ return effectiveStatus(iv)===statusTab; });

  // Unique filter values for current status selection
  var filterVals = [];
  statusTasks.forEach(function(iv){
    var val = filterMode==='zone' ? iv.zone : filterMode==='company' ? iv.company : iv.trade;
    if (val && filterVals.indexOf(val)<0) filterVals.push(val);
  });
  filterVals.sort(function(a,b){
    function lbl(v){ if(filterMode==='zone'){var z=(zones||[]).find(function(z2){return z2.id===v;})||{};return z.short||v;} if(filterMode==='trade'){var t=(trades||[]).find(function(t2){return t2.id===v;})||{};return t.short||v;} return v; }
    return lbl(a).localeCompare(lbl(b));
  });

  var filteredTasks = filterVal
    ? statusTasks.filter(function(iv){
        return filterMode==='zone'?iv.zone===filterVal:filterMode==='company'?iv.company===filterVal:iv.trade===filterVal;
      })
    : statusTasks;

  filteredTasks = filteredTasks.slice().sort(function(a,b){
    var ord={bloque:0,en_retard:1,encours:2,arealis:3,termine:4};
    var oa=ord[effectiveStatus(a)]; if(oa===undefined)oa=5;
    var ob=ord[effectiveStatus(b)]; if(ob===undefined)ob=5;
    if(oa!==ob) return oa-ob;
    return (a.start||'').localeCompare(b.start||'');
  });

  function stBadge(st){
    var cfg={
      bloque:    {bg:'rgba(220,38,38,.12)',   color:'#DC2626', label:'⛔ Bloqué'},
      en_retard: {bg:'rgba(234,88,12,.12)',   color:'#EA580C', label:'⏱ Retard'},
      encours:   {bg:'rgba(37,99,235,.1)',    color:'#2563EB', label:'▶ En cours'},
      arealis:   {bg:'rgba(107,114,128,.08)', color:'#6B7280', label:'○ À réaliser'},
      termine:   {bg:'rgba(22,163,74,.1)',    color:'#16A34A', label:'✓ Terminé'},
    };
    return cfg[st]||{bg:'rgba(107,114,128,.08)',color:'#6B7280',label:st};
  }

  function getLbl(val){
    if (!val) return '';
    if (filterMode==='zone'){ var z=(zones||[]).find(function(z2){return z2.id===val;})||{}; return z.short||val; }
    if (filterMode==='company') return val;
    var tr=(trades||[]).find(function(t2){return t2.id===val;})||{}; return tr.short||val;
  }

  function navWeek(delta){ setWeekOff(weekOff+delta); setFilterVal(null); }

  return (
    <div style={{position:'fixed',inset:0,zIndex:9200,display:'flex',flexDirection:'column',
      background:'var(--bg)',overflowY:'hidden'}}>

      {/* ── HEADER ── */}
      <div style={{background:'var(--hdr)',padding:'12px 14px 10px',flexShrink:0,
        borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={onClose}
            style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:8,
              color:'rgba(255,255,255,.9)',fontSize:18,cursor:'pointer',padding:'4px 10px',
              lineHeight:1,fontFamily:"'DM Sans',sans-serif"}}>{'←'}</button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:'rgba(255,255,255,.45)',fontWeight:700,
              textTransform:'uppercase',letterSpacing:'.07em',fontFamily:"'DM Mono',monospace"}}>
              Vue tâches
            </div>
            <div style={{fontSize:16,fontWeight:800,color:'#fff',lineHeight:1.2}}>
              {weekLabel}
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.55)',marginTop:1}}>
              {'Du '+fmtH(mon)+' au '+fmtH(fri)}
            </div>
          </div>
          {/* Week nav */}
          <div style={{display:'flex',gap:5,alignItems:'center'}}>
            <button onClick={function(){ navWeek(-1); }}
              style={{background:'rgba(255,255,255,.1)',border:'none',borderRadius:8,
                color:'rgba(255,255,255,.8)',fontSize:18,cursor:'pointer',padding:'6px 11px',lineHeight:1}}>
              {'‹'}
            </button>
            {weekOff!==0&&(
              <button onClick={function(){ setWeekOff(0); setFilterVal(null); }}
                style={{background:'rgba(37,99,235,.5)',border:'none',borderRadius:8,
                  color:'#fff',fontSize:10,fontWeight:700,cursor:'pointer',padding:'5px 8px',
                  fontFamily:"'DM Sans',sans-serif"}}>
                Auj.
              </button>
            )}
            <button onClick={function(){ navWeek(1); }}
              style={{background:'rgba(255,255,255,.1)',border:'none',borderRadius:8,
                color:'rgba(255,255,255,.8)',fontSize:18,cursor:'pointer',padding:'6px 11px',lineHeight:1}}>
              {'›'}
            </button>
          </div>
        </div>
      </div>

      {/* ── STATUS TABS ── */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',
        overflowX:'auto',flexShrink:0,WebkitOverflowScrolling:'touch'}}>
        <div style={{display:'flex',minWidth:'max-content',padding:'0 8px'}}>
          {STATUS_TABS.map(function(tab){
            var cnt = counts[tab.key] || 0;
            var active = statusTab===tab.key;
            return (
              <button key={tab.key}
                onClick={function(){ setStatusTab(tab.key); setFilterVal(null); }}
                style={{padding:'10px 10px 8px',border:'none',background:'transparent',
                  cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                  borderBottom:active?'2px solid '+(active?tab.color:'transparent'):'2px solid transparent',
                  fontFamily:"'DM Sans',sans-serif",flexShrink:0,minWidth:62}}>
                <span style={{fontSize:16,fontWeight:900,lineHeight:1,
                  color:active?tab.color:(cnt>0&&tab.key!=='all'?tab.color+'99':'var(--xmuted)')}}>
                  {cnt}
                </span>
                <span style={{fontSize:9.5,fontWeight:active?700:500,whiteSpace:'nowrap',
                  color:active?tab.color:'var(--muted)'}}>
                  {(tab.icon?(tab.icon+' '):'')+tab.label}
                </span>
              </button>
            );
          })}
        </div>
      </div>

      {/* ── FILTER ROW ── */}
      <div style={{background:'var(--surface-2)',borderBottom:'1px solid var(--border)',
        flexShrink:0,padding:'8px 12px 6px'}}>
        <div style={{display:'flex',gap:5,marginBottom:filterVals.length>0?7:0,alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',
            letterSpacing:'.06em',flexShrink:0,fontFamily:"'DM Mono',monospace"}}>Filtrer</span>
          {['zone','company','trade'].map(function(fm){
            var lbl=fm==='zone'?'Zone':fm==='company'?'Entreprise':'Métier';
            var active=filterMode===fm;
            return (
              <button key={fm} onClick={function(){ setFilterMode(fm); setFilterVal(null); }}
                style={{padding:'4px 11px',border:'1px solid',borderRadius:20,cursor:'pointer',
                  fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif",
                  borderColor:active?'var(--primary)':'var(--border)',
                  background:active?'rgba(37,99,235,.1)':'transparent',
                  color:active?'var(--primary)':'var(--muted)'}}>
                {lbl}
              </button>
            );
          })}
          {filterVal&&(
            <button onClick={function(){ setFilterVal(null); }}
              style={{marginLeft:'auto',padding:'3px 8px',border:'1px solid var(--border)',
                borderRadius:20,cursor:'pointer',fontSize:11,color:'var(--muted)',
                background:'transparent',fontFamily:"'DM Sans',sans-serif"}}>
              {'Tout ×'}
            </button>
          )}
        </div>
        {filterVals.length>0&&(
          <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:2,WebkitOverflowScrolling:'touch'}}>
            {filterVals.map(function(val){
              var active=filterVal===val;
              var lbl=getLbl(val);
              return (
                <button key={val} onClick={function(){ setFilterVal(active?null:val); }}
                  style={{padding:'3px 11px',border:'1px solid',borderRadius:20,cursor:'pointer',
                    fontSize:11,fontWeight:600,whiteSpace:'nowrap',fontFamily:"'DM Sans',sans-serif",
                    borderColor:active?'var(--primary)':'var(--border)',
                    background:active?'rgba(37,99,235,.12)':'var(--surface)',
                    color:active?'var(--primary)':'var(--text)',flexShrink:0}}>
                  {lbl}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* ── TASK LIST ── */}
      <div style={{flex:1,overflowY:'auto',padding:'8px 12px 80px',WebkitOverflowScrolling:'touch'}}>
        {filteredTasks.length===0 ? (
          <div style={{padding:'48px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>
            Aucune tâche pour cette sélection
          </div>
        ) : filteredTasks.map(function(iv, idx){
          var st=effectiveStatus(iv);
          var badge=stBadge(st);
          var zone=(zones||[]).find(function(z){return z.id===iv.zone;})||{};
          var trade=(trades||[]).find(function(t){return t.id===iv.trade;})||{};
          var zColor=getZoneFloorColor(zone,zones)||'#2563EB';
          var endStr=iv.end?iv.end.slice(5).replace('-','/'):null;
          var isLate=st==='en_retard', isBloc=st==='bloque';
          return (
            <div key={iv.id||idx} style={{
              background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:8,padding:'10px 12px',marginBottom:5,
              borderLeft:'3px solid '+badge.color,
              background: isBloc?'rgba(220,38,38,.03)':isLate?'rgba(234,88,12,.03)':'var(--surface)'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:4,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {iv.task||iv.name||'—'}
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                    {zone.short&&(
                      <span style={{fontSize:9.5,fontWeight:700,color:zColor,
                        background:zColor+'1A',borderRadius:4,padding:'1px 6px',flexShrink:0}}>
                        {zone.short}
                      </span>
                    )}
                    <span style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {iv.company||'—'}
                    </span>
                    {trade.short&&(
                      <span style={{fontSize:9,color:'var(--muted)',opacity:.6,flexShrink:0}}>
                        {'· '+trade.short}
                      </span>
                    )}
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0}}>
                  <span style={{fontSize:9.5,fontWeight:700,borderRadius:4,padding:'2px 7px',
                    background:badge.bg,color:badge.color}}>{badge.label}</span>
                  {endStr&&(
                    <span style={{fontSize:9,color:isLate?'#EA580C':'var(--muted)',fontWeight:isLate?700:400}}>
                      {'Fin: '+endStr}
                    </span>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BriefingsScreen({ data, zones, trades, companies, session }) {
  const [weekOff,    setWeekOff]    = useState(0);
  const [expanded,   setExpanded]   = useState(null);
  const [copied,     setCopied]     = useState(null);
  const [recapOpen,  setRecapOpen]  = useState(false);
  const [recapCopied,setRecapCopied]= useState(false);
  const [addingSH,   setAddingSH]   = useState(false);
  const [newSH,      setNewSH]      = useState({name:'', phone:''});
  const [recapPngBusy, setRecapPngBusy] = useState(false);
  const [recapPngDone, setRecapPngDone] = useState(false);
  const [recapPreviewOpen, setRecapPreviewOpen] = useState(false);
  const [recapNote, setRecapNote] = useState(function(){
    try { return localStorage.getItem('planify_recap_note') || ''; } catch(e){ return ''; }
  });
  function handleRecapNoteChange(v) {
    setRecapNote(v);
    try { localStorage.setItem('planify_recap_note', v); } catch(e) {}
  }
  const [taskViewOpen, setTaskViewOpen] = useState(false);
  const [taskViewInitStatus, setTaskViewInitStatus] = useState('all');
  const [recapFilter, setRecapFilter] = useState('zone');
  const [stakeholders, setStakeholders] = useState(function() {
    try { return JSON.parse(localStorage.getItem('planify_stakeholders') || '[]'); }
    catch(e) { return []; }
  });
  const [sentStatus, setSentStatus] = useState(function() {
    try { return JSON.parse(localStorage.getItem('planify_briefings_sent') || '{}'); }
    catch(e) { return {}; }
  });

  const [annotations, setAnnotations] = useState(function() {
    try { return JSON.parse(localStorage.getItem('planify_annotations') || '{}'); }
    catch(e) { return {}; }
  });
  const [editingAnnotation, setEditingAnnotation] = useState(null);
  const [expandedRow, setExpandedRow] = useState(null);
  const [annotationDraft, setAnnotationDraft] = useState('');

  function saveAnnotation(key) {
    var next = Object.assign({}, annotations);
    if (annotationDraft.trim()) { next[key] = annotationDraft.trim(); } else { delete next[key]; }
    setAnnotations(next);
    try { localStorage.setItem('planify_annotations', JSON.stringify(next)); } catch(e) {}
    setEditingAnnotation(null);
    setAnnotationDraft('');
  }
  function startEditAnnotation(key) {
    setAnnotationDraft(annotations[key] || '');
    setEditingAnnotation(key);
  }
  function cancelAnnotation() {
    setEditingAnnotation(null);
    setAnnotationDraft('');
  }

  function handleRecapPng() {
    if (recapPngBusy) return;
    setRecapPngBusy(true);
    setTimeout(function() {
      try {
        var canvas = buildWeekRecapCanvas(data, zones, trades, companies, recapNote);
        shareOrDownloadCanvas(canvas);
        setRecapPngDone(true);
        setTimeout(function(){ setRecapPngDone(false); }, 3000);
      } catch(e) {
        console.error('[Planify] Recap PNG error:', e);
      } finally {
        setRecapPngBusy(false);
      }
    }, 80);
  }

  function handleRecapPdf(note, scope, target, ew) {
    try {
      var canvas = buildWeekRecapCanvas(data, zones, trades, companies, note||recapNote, scope||'general', target||null, ew||[]);
      var JSPDF = window.jspdf && window.jspdf.jsPDF;
      if (!JSPDF) { alert('jsPDF non chargé.'); return; }
      var imgData = canvas.toDataURL('image/png');
      var doc = new JSPDF({ orientation:'portrait', unit:'pt', format:'a4' });
      var pgW = doc.internal.pageSize.getWidth();
      var pgH = doc.internal.pageSize.getHeight();
      var ratio = canvas.height / canvas.width;
      var imgW = pgW - 40, imgH = imgW * ratio;
      if (imgH > pgH - 40) { imgH = pgH - 40; imgW = imgH / ratio; }
      doc.addImage(imgData, 'PNG', (pgW-imgW)/2, 20, imgW, imgH);
      var suffix = scope==='company'&&target ? '-'+target.replace(/\s+/g,'-')
                 : scope==='trade'&&target   ? '-'+target
                 : '';
      var filename = 'planify-recap'+suffix+'-' + (function(){ var n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0'); })() + '.pdf';
      doc.save(filename);
    } catch(e) {
      console.error('[Planify] Recap PDF error:', e);
    }
  }

  const FR_DAYS      = ['\u0044im','\u004cun','\u004dar','\u004der','\u004aeu','\u0056en','\u0053am'];
  const FR_DAYS_FULL = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const FR_MNTHS     = ['jan.','f\u00e9v.','mar.','avr.','mai','juin','juil.','ao\u00fb.','sep.','oct.','nov.','d\u00e9c.'];
  const FR_MNTHS_FULL= ['janvier','f\u00e9vrier','mars','avril','mai','juin','juillet','ao\u00fbt','septembre','octobre','novembre','d\u00e9cembre'];

  function fmtShort(ds) {
    if (!ds) return '';
    var d = new Date(ds + 'T00:00:00');
    return d.getDate() + ' ' + FR_MNTHS[d.getMonth()];
  }
  function fmtDayShort(ds) {
    if (!ds) return '';
    var d = new Date(ds + 'T00:00:00');
    return FR_DAYS[d.getDay()] + ' ' + d.getDate();
  }
  function fmtFull(ds) {
    if (!ds) return '';
    var d = new Date(ds + 'T00:00:00');
    return FR_DAYS_FULL[d.getDay()] + ' ' + d.getDate() + ' ' + FR_MNTHS_FULL[d.getMonth()];
  }
  function getWeek(offset) {
    var today = new Date(), dow = today.getDay();
    var mon = new Date(today);
    mon.setDate(today.getDate() - (dow===0?6:dow-1) + offset*7);
    mon.setHours(0,0,0,0);
    var fri = new Date(mon); fri.setDate(mon.getDate()+4);
    function ds(d){
      return d.getFullYear()+'-'
        +String(d.getMonth()+1).padStart(2,'0')+'-'
        +String(d.getDate()).padStart(2,'0');
    }
    return {start:ds(mon), end:ds(fri)};
  }
  var week0 = getWeek(0);
  var week1 = getWeek(1);
  var week2 = getWeek(2);
  var activeWeeks = [week0, week1, week2].slice(0, weekOff + 1);
  var week = {start: activeWeeks[0].start, end: activeWeeks[activeWeeks.length-1].end};
  var weekLabel = weekOff===0 ? 'Semaine en cours'
    : weekOff===1 ? 'Sem. en cours + S+1'
    : 'Sem. en cours + S+1 + S+2';

  function overlapsWeek(iv) {
    var s=iv.start||'', e=iv.end||s;
    return activeWeeks.some(function(w){ return s<=w.end && e>=w.start; });
  }
  function overlapsDay(iv, dayStr) {
    var s=iv.start||'', e=iv.end||s;
    return s<=dayStr && e>=dayStr;
  }
  function getZoneName(zoneId) {
    var z=(zones||[]).find(function(z){return z.id===zoneId;});

  function fmtPhoneWA(phone) {
    if (!phone) return '';
    var p=String(phone).replace(/\s/g,'').replace(/[^\d+]/g,'');
    if (p.startsWith('00')) p='+'+p.slice(2);
    else if (p.startsWith('0')) p='+33'+p.slice(1);
    else if (!p.startsWith('+')) p='+33'+p;
    return p.replace('+','');
  }
  function waUrl(phone, msg) {
    var num = fmtPhoneWA(phone);
    if (!num) return null;
    // Array.from iterates by Unicode codepoint, not UTF-16 code units.
    // Emoji (surrogate pairs) become ONE element => encodeURIComponent gets
    // the full char and produces correct UTF-8 percent-encoding:
    // wave emoji => %F0%9F%91%8B, which all WhatsApp versions decode correctly.
    var encoded = Array.from(msg).map(function(ch) {
      return encodeURIComponent(ch);
    }).join('');
    return 'https://wa.me/'+num+'?text='+encoded;
  }

  // ── Message par contact ──────────────────────────────────
  function generateMessage(contact, co, ivs) {

    var L=[];

    if(multiWk){
      activeWeeks.forEach(function(w, wi){
        var wivs=ivs.filter(function(iv){var s=iv.start||'',e=iv.end||s;return s<=w.end&&e>=w.start;});

  // ── Récap projet ─────────────────────────────────────────
  function generateRecap() {
    var E2 = {
      cal: String.fromCodePoint(0x1F4C5),
      pin: String.fromCodePoint(0x1F4CD),
    };
    var multiWk = (weekOff > 0);
    var nWeeks = weekOff + 1;
    function localDs(d) {
      return d.getFullYear()+'-'
        +String(d.getMonth()+1).padStart(2,'0')+'-'
        +String(d.getDate()).padStart(2,'0');
    }
    function pushDay(dayStr, ivIds, coSet) {
      var dayIvs=(data||[]).filter(function(iv){
        return iv.status!=='termine' && overlapsDay(iv,dayStr)
          && !((iv.off_days||[]).includes(dayStr));
      });
      if(!dayIvs.length) return;
      dayIvs.forEach(function(iv){ivIds[iv.id]=true; coSet[iv.company]=true;});
      L.push(E2.cal+' *'+fmtFull(dayStr)+'*');
      var byZone={};
      dayIvs.forEach(function(iv){
        var zn=getZoneName(iv.zone);
        if(!byZone[zn]) byZone[zn]=[];
        byZone[zn].push(iv);
      });
      Object.keys(byZone).sort().forEach(function(zn){
        L.push('  '+E2.pin+' '+zn);
        byZone[zn].forEach(function(iv){
          var num=iv.task_number?'['+iv.task_number+'] ':'';
          var co=(companies||[]).find(function(c){return c.name===iv.company;});
          var ct=co&&co.contact?' ('+co.contact.split(' ')[0]+')':'';
          L.push('    \u2022 '+iv.company+ct+' \u2014 '+num+iv.task);
        });
      });
      L.push('');
    }
    var L=[], ivIds={}, coSet={};
    L.push('*Planify \u2014 HSF Av. Marceau*');
    if(multiWk){
      L.push('R\u00e9cap chantier \u2014 '+(nWeeks===2?'2':'3')+' semaines');
      L.push('Du lundi '+fmtShort(activeWeeks[0].start)+' au vendredi '+fmtShort(activeWeeks[activeWeeks.length-1].end));
    } else {
      L.push('R\u00e9cap chantier');
      L.push('Semaine du '+fmtShort(week.start)+' au '+fmtShort(week.end));
    }
    L.push('');
    activeWeeks.forEach(function(w, wi){
      if(multiWk){
        L.push('*Semaine '+(wi+1)+' \u2014 lundi '+fmtShort(w.start)+' au vendredi '+fmtShort(w.end)+'*');
        L.push('');
      }
      for(var di=0;di<5;di++){
        var dd=new Date(w.start+'T00:00:00');
        dd.setDate(dd.getDate()+di);
        pushDay(localDs(dd), ivIds, coSet);
      }
    });
    var nbCo=Object.keys(coSet).length, nbIv=Object.keys(ivIds).length;
    var sfx=multiWk?' sur '+nWeeks+' semaines':'';
    if(nbIv===0){
      L.push('Aucune intervention planifi\u00e9e'+sfx+'.');
    } else {
      L.push(nbCo+' entreprise'+(nbCo>1?'s':'')+' \u00b7 '+nbIv+' intervention'+(nbIv>1?'s':'')+sfx);
    }
    return L.join('\n');
  }

      {/* ── RÉCAP FILTRABLE — Vue synthèse ── */}
      {(function(){

        var today2 = new Date(); today2.setHours(0,0,0,0);
        var dow2 = today2.getDay();
        var fri2 = new Date(today2); fri2.setDate(today2.getDate()-(dow2===0?0:dow2-1)+4);
        function ds2(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
        var friStr2 = ds2(fri2);
        var mon2 = new Date(today2); mon2.setDate(today2.getDate()-(dow2===0?6:dow2-1));
        var monStr2 = ds2(mon2);

          {key:'trade',   label:'Par métier'},

          var active = tasks.filter(function(iv){ return iv.status!=='termine'; });
          if (!active.length) return null;

          var maxOverrun = 0;
          active.forEach(function(iv){
            if (!iv.end) return;
            var ed=new Date(iv.end+'T00:00:00');
            if (ed < today2) { var ov=Math.round((today2-ed)/86400000); if(ov>maxOverrun) maxOverrun=ov; }
