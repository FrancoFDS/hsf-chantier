                var expandedTasks=(row.tasks||[]).slice().sort(function(a,b){
                  var order={bloque:0,en_retard:1,encours:2,arealis:3,termine:4};
                  return (order[effectiveStatus(a)]||3)-(order[effectiveStatus(b)]||3);
                });
                return (
                  <div key={row.id} style={{
                    borderBottom:ri<rows.length-1?'1px solid var(--border)':'none',
                    borderLeft:weekCount>0&&!isTermine?(row.bloc>0?'3px solid #DC2626':row.late>0?'3px solid #EA580C':'3px solid #2563EB'):'3px solid transparent',
                    background:row.bloc>0?'rgba(220,38,38,.06)':row.late>0?'rgba(234,88,12,.05)':isTermine?'rgba(22,163,74,.02)':weekCount>0?'rgba(37,99,235,.02)':'transparent'}}>

                    {/* ── Ligne principale clicable ── */}
                    <div onClick={function(){setExpandedRow(isExpanded?null:annKey);}}
                      style={{padding:'10px 14px',cursor:'pointer',userSelect:'none'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>

                        {/* Barre couleur latérale */}
                        <div style={{width:3,borderRadius:2,background:row.color,flexShrink:0,
                          alignSelf:'stretch',minHeight:isTermine?14:36}}/>

                        {/* Contenu central */}
                        <div style={{flex:1,minWidth:0}}>

                          {/* Ligne identité */}
                          <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:isTermine?3:5}}>
                            <span style={{fontSize:13,fontWeight:800,letterSpacing:'-.01em',
                              color:isTermine?'var(--muted)':'var(--text)',
                              textDecoration:isTermine?'line-through':undefined}}>
                              {row.label}
                            </span>
                            {row.sub&&<span style={{fontSize:10,color:'var(--xmuted)',overflow:'hidden',
                              textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}}>{row.sub}</span>}
                          </div>

                          {/* ── EN COURS / RETARD / BLOQUÉ ── */}
                          {!isTermine&&(
                            <div>
                              {/* Hero : ratio jours + double barre */}
                              <div style={{display:'flex',alignItems:'center',gap:8}}>
                                {/* J4/10 — élément principal */}
                                {row.tempo&&(
                                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:900,
                                    color:statusColor,flexShrink:0,lineHeight:1,minWidth:64}}>
                                    {row.tempo}
                                  </span>
                                )}
                                {/* Double barre : temporelle (haut) + tâches (bas) */}
                                <div style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
                                  {/* Barre temporelle — où on en est dans le temps */}
                                  <div style={{position:'relative',height:8,borderRadius:4,
                                    background:'var(--border)',overflow:'hidden'}}>
                                    <div style={{position:'absolute',inset:0,width:avtPct+'%',
                                      background:statusColor,borderRadius:4,transition:'width .4s'}}/>
                                    {/* Marqueur cible théorique */}
                                    {theoPct>0&&Math.abs(derive)>=5&&(
                                      <div style={{position:'absolute',top:0,bottom:0,
                                        left:Math.min(theoPct,97)+'%',width:2,
                                        background:'rgba(0,0,0,.4)',borderRadius:1}}/>
                                    )}
                                  </div>
                                  {/* Barre avancement tâches */}
                                  <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden',marginTop:1}}>
                                    <div style={{height:'100%',width:donePct+'%',
                                      background:donePct>=avtPct?'#16A34A':'#CBD5E1',
                                      borderRadius:3,transition:'width .4s'}}/>
                                  </div>
                                </div>
                                {/* Compteur tâches */}
                                <div style={{flexShrink:0,textAlign:'right'}}>
                                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                                    color:'var(--muted)',whiteSpace:'nowrap',display:'block'}}>
                                    {row.done}/{row.total}
                                  </span>
                                  <span style={{fontSize:8,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",display:'block',marginTop:1,lineHeight:1}}>term./total</span>
                                </div>
                              </div>
                              {/* Tags secondaires */}
                              <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>
                                {weekCount>0&&<span style={{fontSize:9,fontWeight:700,
                                  fontFamily:"'DM Mono',monospace",
                                  color:row.bloc>0?'#991B1B':row.late>0?'#9A3412':'#1D4ED8',
                                  background:row.bloc>0?'rgba(220,38,38,.12)':row.late>0?'rgba(234,88,12,.12)':'rgba(37,99,235,.1)',
                                  borderRadius:3,padding:'1px 5px'}}>
                                  {weekCount} tâche{weekCount>1?'s':''} sem. en cours
                                </span>}
                                {row.dj!==null&&<span style={{fontSize:9,fontWeight:700,
                                  fontFamily:"'DM Mono',monospace",
                                  color:row.dj<0?'#DC2626':row.dj<7?'#EA580C':'#D97706',
                                  background:row.dj<0?'rgba(220,38,38,.1)':row.dj<7?'rgba(234,88,12,.1)':'rgba(217,119,6,.1)',
                                  borderRadius:3,padding:'1px 5px'}}>
                                  {row.dj<0?'▲ '+Math.abs(row.dj)+'j dépassé':'J−'+row.dj+' avant fin de chantier'}
                                </span>}
                                {Math.abs(derive)>=5&&theoPct>0&&<span style={{fontSize:9,fontWeight:700,
                                  fontFamily:"'DM Mono',monospace",
                                  color:derive>=0?'#16A34A':'#DC2626',
                                  background:derive>=0?'rgba(22,163,74,.1)':'rgba(220,38,38,.1)',
                                  borderRadius:3,padding:'1px 5px'}}>
                                  {derive>=0?'+':''}{derive}%
                                </span>}
                              </div>
                            </div>
                          )}

                          {/* ── TERMINÉE ── barre pleine compacte */}
                          {isTermine&&(
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <div style={{flex:1,height:3,borderRadius:2,overflow:'hidden',
                                background:'rgba(22,163,74,.15)'}}>
                                <div style={{height:'100%',width:'100%',background:'#16A34A',borderRadius:2}}/>
                              </div>
                              <span style={{fontSize:10,fontWeight:700,color:'#16A34A',
                                fontFamily:"'DM Mono',monospace",flexShrink:0,whiteSpace:'nowrap'}}>
                                {row.total} ✓
                              </span>
                            </div>
                          )}
                        </div>

                        {/* Droite : alertes + chevron + crayon */}
                        <div style={{display:'flex',gap:4,flexShrink:0,alignItems:'center',marginLeft:2}}>
                          {row.bloc>0&&<span style={{fontSize:10,fontWeight:800,
                            fontFamily:"'DM Mono',monospace",color:'#DC2626',
                            background:'rgba(220,38,38,.12)',border:'1px solid rgba(220,38,38,.25)',
                            borderRadius:4,padding:'2px 6px'}}>⛔ {row.bloc}</span>}
                          {row.late>0&&<span style={{fontSize:10,fontWeight:800,
                            fontFamily:"'DM Mono',monospace",color:'#EA580C',
                            background:'rgba(234,88,12,.12)',border:'1px solid rgba(234,88,12,.25)',
                            borderRadius:4,padding:'2px 6px'}}>⏱ {row.late}</span>}
                          <span style={{fontSize:11,color:'var(--xmuted)',flexShrink:0,
                            transform:isExpanded?'rotate(180deg)':'none',transition:'transform .2s'}}>▾</span>
                          <button onClick={function(e){e.stopPropagation();startEditAnnotation(annKey);}}
                            title="Annoter" style={{background:'transparent',border:'none',cursor:'pointer',
                              padding:'3px 2px',flexShrink:0,fontSize:12,lineHeight:1,
                              color:annotations[annKey]?'#D97706':'var(--xmuted)',opacity:.75}}>✏</button>
                        </div>
                      </div>
                    </div>

                    {/* ── Détail tâches (expandable) ── */}
                    {isExpanded&&(function(){
                      var cntBloc=expandedTasks.filter(function(iv){return effectiveStatus(iv)==='bloque';}).length;
                      var cntLate=expandedTasks.filter(function(iv){return effectiveStatus(iv)==='en_retard';}).length;
                      var cntEnc=expandedTasks.filter(function(iv){return effectiveStatus(iv)==='encours';}).length;
                      var cntAreal=expandedTasks.filter(function(iv){return effectiveStatus(iv)==='arealis';}).length;
                      var cntTerm=expandedTasks.filter(function(iv){return effectiveStatus(iv)==='termine';}).length;
                      return (
                      <div style={{borderTop:'1px solid var(--border)',background:'var(--surface-2)'}}>
                        {/* Header résumé statuts */}
                        <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',
                          background:'var(--surface)'}}>
                          <div style={{fontSize:10,fontWeight:800,color:'var(--muted)',
                            fontFamily:"'DM Mono',monospace",textTransform:'uppercase',
                            letterSpacing:'.06em',marginBottom:6}}>
                            {expandedTasks.length} tâche{expandedTasks.length!==1?'s':''} au total
                          </div>
                          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                            {cntBloc>0&&<span style={{fontSize:10,fontWeight:700,
                              color:'#DC2626',background:'rgba(220,38,38,.1)',
                              border:'1px solid rgba(220,38,38,.25)',
                              borderRadius:4,padding:'2px 7px'}}>⛔ {cntBloc} bloquée{cntBloc>1?'s':''}</span>}
                            {cntLate>0&&<span style={{fontSize:10,fontWeight:700,
                              color:'#EA580C',background:'rgba(234,88,12,.1)',
                              border:'1px solid rgba(234,88,12,.25)',
                              borderRadius:4,padding:'2px 7px'}}>⏱ {cntLate} en retard</span>}
                            {cntEnc>0&&<span style={{fontSize:10,fontWeight:700,
                              color:'#2563EB',background:'rgba(37,99,235,.1)',
                              border:'1px solid rgba(37,99,235,.25)',
                              borderRadius:4,padding:'2px 7px'}}>▶ {cntEnc} en cours</span>}
                            {cntAreal>0&&<span style={{fontSize:10,fontWeight:700,
                              color:'#6B7280',background:'var(--surface-2)',
                              border:'1px solid var(--border)',
                              borderRadius:4,padding:'2px 7px'}}>{cntAreal} à réaliser</span>}
                            {cntTerm>0&&<span style={{fontSize:10,fontWeight:700,
                              color:'#16A34A',background:'rgba(22,163,74,.1)',
                              border:'1px solid rgba(22,163,74,.25)',
                              borderRadius:4,padding:'2px 7px'}}>✓ {cntTerm} terminée{cntTerm>1?'s':''}</span>}
                          </div>
                          {/* Barre de progression */}
                          {expandedTasks.length>0&&(
                            <div style={{marginTop:7,height:4,borderRadius:2,
                              background:'var(--border)',overflow:'hidden'}}>
                              <div style={{height:'100%',borderRadius:2,transition:'width .3s',
                                width:Math.round(cntTerm/expandedTasks.length*100)+'%',
                                background:cntBloc>0?'#DC2626':cntLate>0?'#EA580C':'#16A34A'}}/>
                            </div>
                          )}
                        </div>
                        {expandedTasks.map(function(iv,ii){
                          var es=effectiveStatus(iv);
                          var esc={bloque:'#DC2626',en_retard:'#EA580C',encours:'#2563EB',
                            termine:'#16A34A',arealis:'#9CA3AF'}[es]||'#9CA3AF';
                          var esLbl={bloque:'⛔ Bloqué',en_retard:'⏱ Retard',encours:'▶ En cours',
                            termine:'✓ Terminé',arealis:'À réaliser'}[es]||es;
                          var td=computeTaskProgress(iv);
                          var zn=(zones||[]).find(function(z){return z.id===iv.zone;});
                          var znShort=zn?zn.short:(iv.zone||'');
                          return (
                            <div key={iv.id} style={{
                              display:'flex',alignItems:'center',gap:8,
                              padding:'7px 14px 7px 18px',
                              borderTop:ii>0?'1px solid var(--border)':'none',
                              background:es==='bloque'?'rgba(220,38,38,.03)':
                                es==='en_retard'?'rgba(234,88,12,.02)':'transparent'}}>
                              <div style={{width:5,height:5,borderRadius:'50%',
                                background:esc,flexShrink:0}}/>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11,color:es==='termine'?'var(--muted)':'var(--text)',
                                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                                  textDecoration:es==='termine'?'line-through':undefined}}>
                                  {iv.task_number&&<span style={{fontFamily:"'DM Mono',monospace",
                                    fontSize:9,color:'var(--xmuted)',marginRight:4}}>N°{iv.task_number}</span>}
                                  {iv.task}
                                </div>
                                {recapFilter!=='zone'&&zn&&(
                                  <div style={{fontSize:9,color:'var(--xmuted)',
                                    fontFamily:"'DM Mono',monospace",marginTop:1}}>{znShort}</div>
                                )}
                              </div>
                              <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:6}}>
                                {td.pct>0&&td.pct<100&&(
                                  <div style={{width:36,height:3,borderRadius:2,
                                    background:'var(--border)',overflow:'hidden'}}>
                                    <div style={{height:'100%',width:td.pct+'%',
                                      background:esc,borderRadius:2}}/>
                                  </div>
                                )}
                                <span style={{fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",
                                  color:esc,minWidth:42,textAlign:'right'}}>{esLbl}</span>
                                {(function(){
                                  if(es==='arealis') return iv.start?<span style={{fontSize:9,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>{'dém. '+iv.start.slice(5).replace('-','/')}</span>:null;
                                  if(es==='encours'||es==='en_retard') return (iv.start&&iv.end)?<span style={{fontSize:9,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>{iv.start.slice(5).replace('-','/')+'→'+iv.end.slice(5).replace('-','/')}</span>:null;
                                  return iv.end?<span style={{fontSize:9,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>{iv.end.slice(5).replace('-','/')}</span>:null;
                                })()}
                              </div>
                            </div>
                          );
                        })}
                        <div style={{height:4}}/>
                      </div>
                      );
                    })()}

                    {/* ── Zone annotation ── */}
                    <div style={{paddingLeft:'19px',paddingRight:'14px',
                      paddingBottom:(annotations[annKey]||editingAnnotation===annKey)?'8px':0}}>
                      {editingAnnotation===annKey?(
                        <div style={{display:'flex',gap:6,alignItems:'flex-start'}}>
                          <textarea autoFocus value={annotationDraft}
                            onChange={function(e){setAnnotationDraft(e.target.value);}}
                            placeholder="Annotation terrain, point bloquant, observation…"
                            style={{flex:1,fontSize:11,fontFamily:"'DM Sans',sans-serif",
                              padding:'6px 8px',borderRadius:6,border:'1px solid var(--primary)',
                              outline:'none',resize:'vertical',minHeight:52,
                              background:'var(--surface)',color:'var(--text)'}}
                            onKeyDown={function(e){
                              if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))saveAnnotation(annKey);
                              if(e.key==='Escape')cancelAnnotation();}}/>
                          <div style={{display:'flex',flexDirection:'column',gap:4}}>
                            <button onClick={function(){saveAnnotation(annKey);}}
                              style={{padding:'4px 10px',fontSize:11,fontWeight:700,
                                background:'var(--primary)',color:'#fff',border:'none',
                                borderRadius:5,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>✓</button>
                            <button onClick={cancelAnnotation}
                              style={{padding:'4px 10px',fontSize:11,fontWeight:700,
                                background:'transparent',color:'var(--muted)',
                                border:'1px solid var(--border)',borderRadius:5,cursor:'pointer',
                                fontFamily:"'DM Sans',sans-serif"}}>✕</button>
                          </div>
                        </div>
                      ):annotations[annKey]?(
                        <div style={{display:'flex',alignItems:'flex-start',gap:6,
                          background:'rgba(217,119,6,.08)',border:'1px solid rgba(217,119,6,.2)',
                          borderRadius:5,padding:'5px 8px',cursor:'pointer',marginBottom:4}}
                          onClick={function(){startEditAnnotation(annKey);}}>
                          <span style={{fontSize:10,flexShrink:0}}>✏️</span>
                          <span style={{fontSize:11,color:'#92400E',fontStyle:'italic',
                            lineHeight:1.4,flex:1}}>{annotations[annKey]}</span>
                        </div>
                      ):null}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── Preview Modal ── */}
      {recapPreviewOpen && <RecapPreviewModal
        data={data} zones={zones} trades={trades} companies={companies}
        note={recapNote} onNoteChange={setRecapNote}
        onClose={function(){ setRecapPreviewOpen(false); }}
        onExportPdf={function(scope, target, ew){ handleRecapPdf(recapNote, scope, target, ew); }}
        onExportPng={function(scope, target, ew){
          var c = buildWeekRecapCanvas(data, zones, trades, companies, recapNote, scope, target, ew||[]);
          shareOrDownloadCanvas(c);
        }}
      />}

      {/* ── Briefings ── */}
      {/* ── Séparateur Briefings ── */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:18,marginBottom:10}}>
        <div style={{width:3,height:16,borderRadius:2,background:'#16A34A',flexShrink:0}}/>
        <div>
          <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>Briefings entreprises</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>
            Message prêt à envoyer pour chaque intervenante — WhatsApp, SMS ou Email
          </div>
        </div>
      </div>

      {/* ── Semaine ── */}
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[
          {o:0, lbl:'Cette semaine'},
          {o:1, lbl:'Semaine suivante'},
          {o:2, lbl:'Dans 2 semaines'},
        ].map(function(item){
          var active=weekOff===item.o;
          return <button key={item.o} onClick={function(){setWeekOff(item.o);setExpanded(null);}}
            style={{...btnSt,flex:1,justifyContent:'center',fontSize:11,
              background:active?'var(--primary)':'transparent',
              color:active?'#fff':'var(--text)',
              border:active?'1px solid var(--primary)':'1px solid var(--border)'}}>
            {item.lbl}
          </button>;
        })}
      </div>

      {/* ── Stats semaine ── */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'8px 12px',
        background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)'}}>
        <div style={{flex:1,fontSize:11,fontWeight:600,color:'var(--text)'}}>
          {weekLabel} <span style={{color:'var(--muted)',fontWeight:400,marginLeft:4}}>{fmtShort(week.start)} → {fmtShort(week.end)}</span>
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {totalBlocked>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:800,
            color:'#DC2626',background:'rgba(220,38,38,.12)',borderRadius:4,padding:'2px 7px'}}>
            ⛔ {totalBlocked} bloquée{totalBlocked>1?'s':''}
          </span>}
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,
            color:'var(--primary)',background:'var(--primary-l)',borderRadius:4,padding:'2px 7px'}}>
            {totalTasks} tâche{totalTasks!==1?'s':''}
          </span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,
            color:'var(--muted)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 7px'}}>
            {companyCards.length} entreprise{companyCards.length!==1?'s':''}
          </span>
        </div>
      </div>

      {companyCards.length===0&&<div style={{textAlign:'center',padding:'44px 20px',color:'var(--muted)',fontSize:14}}>Aucune intervention planifiée pour cette période.</div>}

      {/* ── Cartes entreprises/contacts ── */}
      {companyCards.map(function(item){
        var co=item.co, ct=item.contact, ivs=item.ivs, cardId=item.cardId;
        var isOpen=expanded===cardId;
        var msg=generateMessage(ct,co,ivs);
        var wLink=waUrl(ct.phone,msg);
        var smsLink=ct.phone?'sms:'+ct.phone.replace(/\s/g,'')+'?body='+encodeURIComponent(msg):null;
        var mLink=ct.email?'mailto:'+ct.email+'?subject='+encodeURIComponent('Planning HSF \u2014 '+weekLabel)+'&body='+encodeURIComponent(msg):null;
        var isSent=!!sentStatus[sentKey(cardId)], sentAt=sentStatus[sentKey(cardId)];
        var tr=(trades||[]).find(function(t){return t.id===co.tradeId;});
        var c=tr?getTC(tr.color):{b:'#3B82F6',bg:'#EFF6FF',t:'#1E3A8A'};
        var lateN    = ivs.filter(function(iv){ return effectiveStatus(iv)==='en_retard'; }).length;
        var blockedN = ivs.filter(function(iv){ return effectiveStatus(iv)==='bloque'; }).length;
        var enCoursN = ivs.filter(function(iv){ return effectiveStatus(iv)==='encours'; }).length;

        return (
          <div key={cardId} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',marginBottom:10,overflow:'hidden',boxShadow:'var(--shadow)'}}>
            <div style={{padding:'12px 14px',cursor:'pointer',userSelect:'none'}} onClick={function(){setExpanded(isOpen?null:cardId);}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:c.b,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{co.name}</span>
                    {tr&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:c.t,background:c.bg,border:'1px solid '+c.b+'40',borderRadius:4,padding:'1px 5px'}}>{tr.short}</span>}
                    {!ct.primary&&<span style={{fontSize:10,color:'var(--muted)',fontStyle:'italic'}}>contact 2è</span>}
                    {isSent&&<span style={{fontSize:10,color:'var(--success)',fontWeight:700}}>\u2713 {sentAt}</span>}
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                    {ct.name&&<span style={{fontWeight:500,color:'var(--text)'}}>{ct.name}</span>}
                    {ct.phone&&<span style={{marginLeft:ct.name?8:0}}>· {ct.phone}</span>}
                    {!ct.name&&!ct.phone&&<span style={{color:'var(--danger)',fontStyle:'italic'}}>Contact à renseigner dans Config</span>}
                  </div>
                  <div style={{display:'flex',gap:5,marginTop:6,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--primary)',background:'var(--primary-l)',borderRadius:4,padding:'1px 6px'}}>{ivs.length} tâche{ivs.length!==1?'s':''}</span>

// ── Date & working-day utilities (module level) ──────────────────
function dateToUtcMs(value) {
  var ds = normalizeDateKey(value || dateStr(new Date()));
  var p = ds.split('-').map(function(n){ return parseInt(n, 10); });
  if (p.length !== 3 || p.some(function(n){ return Number.isNaN(n); })) {
    var fallback = dateStr(new Date()).split('-').map(function(n){ return parseInt(n, 10); });
    return Date.UTC(fallback[0], fallback[1] - 1, fallback[2]);
  }
  return Date.UTC(p[0], p[1] - 1, p[2]);
}
function addDaysStr(baseDate, amount) {
  var ms = dateToUtcMs(baseDate) + Number(amount || 0) * 24 * 3600 * 1000;
  var d = new Date(ms);
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
}
function diffDaysStr(fromDate, toDate) {
  return Math.round((dateToUtcMs(toDate) - dateToUtcMs(fromDate)) / (24 * 3600 * 1000));
}
function dayOfWeekDateStr(ds) {
  var key = normalizeDateKey(ds || dateStr(new Date()));
  var p = key.split('-').map(function(n){ return parseInt(n, 10); });
  if (p.length !== 3 || p.some(function(n){ return Number.isNaN(n); })) return 1;
  return new Date(Date.UTC(p[0], p[1] - 1, p[2])).getUTCDay();
}
function isWeekendDateStr(ds) {
  var dow = dayOfWeekDateStr(ds);
  return !getConfiguredWorkingWeekdays().includes(dow);
}
function isHolidayDateStr(ds) {
  return isHoliday(normalizeDateKey(ds || dateStr(new Date())));
}
function isNonWorkingDateStr(ds) {
  return isWeekendDateStr(ds) || isHolidayDateStr(ds);
}
function isWorkingDateStr(ds) {
  return !isNonWorkingDateStr(ds);
}
function nextWorkingDateStr(ds) {
  var current = normalizeDateKey(ds || dateStr(new Date()));
  var guard = 0;
  while (isNonWorkingDateStr(current) && guard < 90) {
    current = addDaysStr(current, 1);
    guard += 1;
  }
  return current;
}
function addWorkingDaysStr(baseDate, amount) {
  var current = nextWorkingDateStr(baseDate || dateStr(new Date()));
  var remaining = Math.max(0, Number(amount || 0));
  var guard = 0;
  while (remaining > 0 && guard < 500) {
    current = addDaysStr(current, 1);
    if (isWorkingDateStr(current)) remaining -= 1;
    guard += 1;
  }
  return current;
}
function workingOffsetDaysStr(fromDate, toDate) {
  var from = nextWorkingDateStr(fromDate || dateStr(new Date()));
  var to = nextWorkingDateStr(toDate || from);
  if (to <= from) return 0;
  var current = from;
  var count = 0;
  var guard = 0;
  while (current < to && guard < 500) {
    current = addDaysStr(current, 1);
    if (isWorkingDateStr(current)) count += 1;
    guard += 1;
  }
  return count;
}
function workingSpanDaysStr(start, end) {
  var s = nextWorkingDateStr(start || dateStr(new Date()));
  var e = nextWorkingDateStr(end || s);
  if (e < s) e = s;
  var current = s;
  var count = 1;
  var guard = 0;
  while (current < e && guard < 500) {
    current = addDaysStr(current, 1);
    if (isWorkingDateStr(current)) count += 1;
    guard += 1;
  }
  return Math.max(1, count);
}
function daysBetweenStr(start, end) {
  return Math.max(0, diffDaysStr(start || dateStr(new Date()), end || start || dateStr(new Date())));

/* ── NOTIFICATION CENTER ─────────────────────────────────── */
function NotificationCenter({ open, onClose, data, notifications, session, zones, trades, onOpenDetail }) {
  var isAdmin = session && session.role === 'admin';
  var myName = session && session.company ? session.company.name : '';

  // Build unified alert list
  var alerts = [];

  // Unread notifications
  (notifications || []).forEach(function(n) {
    if (!n.read) {
      alerts.push({
        id: 'notif_' + n.id,
        type: /bloquant|bloquée/i.test(n.message) ? 'bloque' : 'info',
        message: n.message || '',
        date: n.created_at || ''
      });
    }
  });

  // Late tasks
  var lateTasks = (data || []).filter(function(iv) {
    if (iv.status === 'termine') return false;
    if (!isAdmin && iv.company !== myName) return false;
    return effectiveStatus(iv) === 'en_retard';
  });
  lateTasks.slice(0, 5).forEach(function(iv) {
    var z = (zones || []).find(function(x){ return x.id === iv.zone; });
    alerts.push({
      id: 'late_' + iv.id,
      type: 'retard',
      message: (iv.task_number ? iv.task_number + ' · ' : '') + iv.task + (z ? ' — ' + z.short : ''),
      taskId: iv.id,
      date: iv.end || iv.start || ''
    });
  });

  // Blocked tasks
  var blockedTasks = (data || []).filter(function(iv) {
    if (!isAdmin && iv.company !== myName) return false;
    return iv.status === 'bloque';
  });
  blockedTasks.slice(0, 5).forEach(function(iv) {
    var z = (zones || []).find(function(x){ return x.id === iv.zone; });
    alerts.push({
      id: 'bloc_' + iv.id,
      type: 'bloque',
      message: (iv.task_number ? iv.task_number + ' · ' : '') + iv.task + (z ? ' — ' + z.short : ''),
      taskId: iv.id,
      date: iv.updated_at || ''
    });
  });

  // Prereq assignments
  var prereqTasks = (data || []).filter(function(iv) {
    if (iv.status === 'termine') return false;
    if (!iv.prereq || !iv.prereq_company) return false;
    if (!isAdmin && iv.prereq_company !== myName) return false;
    return true;
  });
  prereqTasks.slice(0, 5).forEach(function(iv) {
    alerts.push({
      id: 'prereq_' + iv.id,
      type: 'prereq',
      message: 'Prérequis · ' + String(iv.prereq).slice(0, 60) + (iv.prereq_company && isAdmin ? ' → ' + iv.prereq_company : ''),
      taskId: iv.id,
      date: iv.updated_at || ''
    });
  });

  var typeColor = { retard:'#EA580C', bloque:'#DC2626', prereq:'#7C3AED', info:'#2563EB' };
  var typeBg = { retard:'rgba(234,88,12,.10)', bloque:'rgba(220,38,38,.10)', prereq:'rgba(124,58,237,.10)', info:'rgba(37,99,235,.10)' };
  var typeLabel = { retard:'Retard', bloque:'Bloqué', prereq:'Prérequis', info:'Notification' };

  return (
    <SheetModal open={open} onClose={onClose} maxH="85vh">
      <div style={{fontSize:18,fontWeight:800,color:'var(--text)',marginBottom:4}}>Alertes & notifications</div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
        {alerts.length} alerte{alerts.length !== 1 ? 's' : ''} active{alerts.length !== 1 ? 's' : ''}
      </div>
      {alerts.length === 0 && (
        <div style={{textAlign:'center',padding:'32px 0',color:'var(--muted)'}}>
          <div style={{fontSize:32,marginBottom:8}}>✓</div>
          <div style={{fontSize:14,fontWeight:600}}>Aucune alerte active</div>
        </div>
      )}
      <div>
        {alerts.map(function(a) {
          var color = typeColor[a.type] || '#6B7280';
          var bg = typeBg[a.type] || 'var(--surface-2)';
          return (
            <div key={a.id}
              onClick={a.taskId ? function(){ onClose(); onOpenDetail && onOpenDetail(a.taskId); } : undefined}
              style={{
                display:'flex',gap:12,padding:'12px 14px',borderRadius:'var(--r-sm)',
                background:bg,border:'1px solid ' + color + '35',marginBottom:8,
                cursor:a.taskId ? 'pointer' : 'default'
              }}>
              <div style={{width:3,borderRadius:2,background:color,flexShrink:0,alignSelf:'stretch'}}></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,fontWeight:800,color:color,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2,fontFamily:"'DM Mono',monospace"}}>
                  {typeLabel[a.type] || 'Alerte'}
                </div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.35,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
                  {a.message}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={onClose} style={{...btnSecStyle,width:'100%',marginTop:8}}>Fermer</button>
    </SheetModal>
  );
}

/* ── EXPORT SHEET MODAL ──────────────────────────────────── */
function ExportModal({ open, onClose, onExport, weekOffset, zones, viewMode }) {
  var [step, setStep] = useState(1);
  var [startDate, setStartDate] = useState('');
  var [endDate, setEndDate] = useState('');
  var [selectedWeeks, setSelectedWeeks] = useState([0]);
  var [layout, setLayout] = useState('1s');

  var today = new Date();
  today.setHours(0,0,0,0);
  var mon = getMonday(weekOffset);
  var defaultStart = dateStr(mon);

  React.useEffect(function(){
    if (open) {
      setStep(1);
      setStartDate(defaultStart);
      var endD = new Date(mon);
      endD.setDate(endD.getDate() + 25);
      setEndDate(dateStr(endD));
      setSelectedWeeks([0]);
      setLayout('1s');
    }
  }, [open]);

  function weekLabel(offset) {
    var base = startDate ? new Date(startDate + 'T00:00:00') : mon;
    var s = new Date(base); s.setDate(s.getDate() + offset * 7);
    var e = new Date(s); e.setDate(e.getDate() + 4);
    return fmtDate(dateStr(s)) + ' → ' + fmtDate(dateStr(e));
  }

  function maxOffset() {
    var max = 11;
    var base = startDate ? new Date(startDate + 'T00:00:00') : mon;
    (zones || []).forEach(function(z){
      if (!z.deadline) return;
      var d = new Date(z.deadline + 'T00:00:00');
      var off = Math.ceil((d - base) / (7 * 24 * 3600 * 1000));
      if (off > max) max = off;
    });
    return Math.min(Math.max(0, max), 32);
  }

  function toggleWeek(offset) {
    setSelectedWeeks(function(prev){
      var list = prev.includes(offset) ? prev.filter(function(x){ return x !== offset; }) : prev.concat([offset]);
      return list.length ? Array.from(new Set(list)).sort(function(a,b){ return a-b; }) : [offset];
    });
  }

  function runExport(fmt) {
    onClose();
    if (layout === 'global') {
      onExport && onExport(fmt, 'until_date', { startDate: startDate || defaultStart, endDate: endDate, weekOffsets: selectedWeeks });
    } else if (layout === '2s') {
      onExport && onExport(fmt, '2s_page', { startDate: startDate || defaultStart, weekOffsets: selectedWeeks });
    } else if (layout === '3s') {
      onExport && onExport(fmt, '3s_page', { startDate: startDate || defaultStart, weekOffsets: selectedWeeks });
    } else {
      onExport && onExport(fmt, 'selected_weeks', { startDate: startDate || defaultStart, weekOffsets: selectedWeeks });
    }
  }

  var LAYOUTS = [
    { id:'1s', label:'1 sem. / page', desc:'Vue détaillée, 1 semaine par page' },
    { id:'2s', label:'2 sem. / page', desc:'2 semaines côte à côte' },
    { id:'3s', label:'3 sem. / page', desc:'3 semaines côte à côte' },
    { id:'global', label:'Vue globale', desc:'Toutes les semaines, format panoramique' },
  ];

  return (
    <SheetModal open={open} onClose={onClose} maxH="88vh">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>Exporter le planning</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
            Étape {step} sur 3 — {step===1?'Période':step===2?'Semaines':step===3?'Mise en page':''}
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {[1,2,3].map(function(s){
            return (
              <div key={s} style={{width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace",
                background:step===s?'var(--primary)':step>s?'var(--success)':'var(--surface-2)',
                color:step>=s?'#fff':'var(--muted)',
                border:'1px solid '+(step===s?'var(--primary)':step>s?'var(--success)':'var(--border)')}}>
                {step > s ? '✓' : s}
              </div>
            );
          })}
        </div>
      </div>

      {step === 1 && (
        <div>
          <Field label="Date de début">
            <Input type="date" value={startDate || defaultStart} onChange={function(e){ setStartDate(e.target.value); }} />
          </Field>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:16,lineHeight:1.5}}>
            Les semaines sont calculées à partir de ce jour.
          </div>
          <button onClick={function(){ setStep(2); }} style={btnPrimaryStyle}>Suivant →</button>
        </div>
      )}

      {step === 2 && (
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Semaines à inclure</div>
            <button onClick={function(){ setSelectedWeeks(Array.from({length:maxOffset()+1},function(_,i){return i;})); }}
              style={{fontSize:11,fontWeight:700,color:'var(--primary)',background:'none',border:'none',cursor:'pointer'}}>
              Tout sélectionner
            </button>
          </div>
          <div style={{maxHeight:260,overflowY:'auto',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',marginBottom:16}}>
            {Array.from({length:maxOffset()+1},function(_,i){return i;}).map(function(offset){
              var checked = selectedWeeks.includes(offset);
              return (
                <label key={offset} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                  borderBottom:'1px solid var(--border)',cursor:'pointer',
                  background:checked?'var(--primary-l)':'transparent'}}>
                  <input type="checkbox" checked={checked} onChange={function(){ toggleWeek(offset); }} />
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:800,color:checked?'var(--primary)':'var(--muted)',minWidth:28}}>
                    S{offset+1}
                  </span>
                  <span style={{fontSize:12,color:'var(--text)'}}>{weekLabel(offset)}</span>
                </label>
              );
            })}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={function(){ setStep(1); }} style={{...btnSecStyle,flex:'0 0 auto',padding:'13px 16px'}}>← Retour</button>
            <button onClick={function(){ setStep(3); }} style={{...btnPrimaryStyle,flex:1}}>Suivant →</button>
          </div>
        </div>

      {step === 3 && (
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:10}}>Mise en page</div>

                  <div style={{width:20,height:20,borderRadius:'50%',border:'2px solid '+(layout===l.id?'var(--primary)':'var(--border)'),
                    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {layout===l.id && <div style={{width:10,height:10,borderRadius:'50%',background:'var(--primary)'}}></div>}
                  </div>
                  <div>

                    <div style={{fontSize:11,color:'var(--muted)'}}>{l.desc}</div>

                </div>
              );
            })}
          </div>
          {layout === 'global' && (
            <Field label="Date de fin">
              <Input type="date" value={endDate} onChange={function(e){ setEndDate(e.target.value); }} />
            </Field>
          )}
          <div style={{display:'flex',gap:8,marginBottom:8}}>

/* ── COMPANY DASHBOARD ("Mon chantier") ──────────────────── */
function CompanyDashboard({ data, zones, trades, session, notifications, onOpenDetail, onStatusChange, canChangeStatus }) {
  var myName = session && session.company ? session.company.name : '';
  var myData = (data || []).filter(function(i){ return i.company === myName; });
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = dateStr(today);

  var mainTrade = getCompanyMainTrade(myName, data, [], trades);
  var accent = getTC(mainTrade ? mainTrade.color : 'blue');

  var total = myData.length;
  var done = myData.filter(function(i){ return effectiveStatus(i) === 'termine'; }).length;
  var enc = myData.filter(function(i){ return effectiveStatus(i) === 'encours' && !isTaskFrozenToday(i); }).length;
  var late = myData.filter(function(i){ return effectiveStatus(i) === 'en_retard'; }).length;
  var bloc = myData.filter(function(i){ return effectiveStatus(i) === 'bloque'; }).length;
  var progress = total ? Math.round(done / total * 100) : 0;
  var reliability = calcReliability(myData);

  var todayTasks = myData.filter(function(i){ return isTaskActiveOn(i, today); });
  var todoNow = myData.filter(function(i){ return isTaskTodoToday(i); });
  var urgentTasks = myData.filter(function(i){ return i.status !== 'termine' && (isTaskLate(i) || i.status === 'bloque'); });

  var prereqForMe = (data || []).filter(function(iv){
    return iv.prereq_company === myName && iv.prereq && iv.status !== 'termine';
  });

  var unreadNotifs = (notifications || []).filter(function(n){ return !n.read; }).length;

  var [openSection, setOpenSection] = useState(null);
  function toggleSection(k){ setOpenSection(function(s){ return s === k ? null : k; }); }

  function TaskRow({ iv }) {
    var z = (zones || []).find(function(x){ return x.id === iv.zone; });
    var es = effectiveStatus(iv);
    var m = getStatusThemeMeta(es);
    var isLate = es === 'en_retard';
    var isBloc = es === 'bloque';
    var borderColor = isLate ? '#EA580C' : isBloc ? '#DC2626' : accent.b;
    return (
      <div onClick={function(){ onOpenDetail(iv.id); }}
        style={{background:'var(--surface)',border:'1px solid var(--border)',
          borderLeft:'3px solid ' + borderColor,borderRadius:'var(--r-sm)',
          padding:'10px 12px',marginBottom:6,cursor:'pointer',
          boxShadow:'var(--shadow)',transition:'transform .12s'}}
        onMouseEnter={function(e){ e.currentTarget.style.transform='translateX(2px)'; }}
        onMouseLeave={function(e){ e.currentTarget.style.transform=''; }}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:3}}>
              {iv.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)',
                background:'var(--surface-2)',padding:'1px 5px',borderRadius:4,border:'1px solid var(--border)'}}>{iv.task_number}</span>}
              {z && <span style={{fontSize:10,fontWeight:700,color:getZoneFloorColor(z,zones),
                background:getZoneFloorColor(z,zones)+'18',padding:'1px 7px',borderRadius:10}}>{z.short}</span>}
              {isLate && <span style={{fontSize:10,fontWeight:800,color:'#EA580C'}}>⏱ Retard</span>}
              {isBloc && <span style={{fontSize:10,fontWeight:800,color:'#DC2626'}}>⛔ Bloqué</span>}
            </div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',lineHeight:1.35}}>{iv.task}</div>
          </div>
          <StatusBadge status={es} size="sm" />
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',fontSize:11,color:'var(--muted)'}}>
          <span style={{fontFamily:"'DM Mono',monospace"}}>{fmtDate(iv.start)}{iv.end && iv.end !== iv.start ? ' → ' + fmtDate(iv.end) : ''}</span>
          <TaskDependencyBadges iv={iv} data={data} />
        </div>
        {iv.prereq && iv.prereq.trim() && <div style={{fontSize:11,color:'#DC2626',marginTop:5,
          background:'rgba(220,38,38,.08)',borderLeft:'2px solid #DC2626',padding:'3px 7px',borderRadius:'0 4px 4px 0'}}>
          ⚠ {iv.prereq}
        </div>}
      </div>
    );
  }

  function Section({ id, title, count, accentColor, children, defaultOpen }) {
    var isOpen = openSection === id || defaultOpen;
    return (
      <div style={{marginBottom:12}}>
        <div onClick={function(){ toggleSection(id); }}
          style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',
            background:'var(--surface)',border:'1px solid var(--border)',
            borderRadius:isOpen ? 'var(--r-sm) var(--r-sm) 0 0' : 'var(--r-sm)',
            cursor:'pointer',borderLeft:'3px solid ' + (accentColor || 'var(--border)')}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{title}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:900,
              color:accentColor || 'var(--muted)',
              background:(accentColor||'#6B7280')+'18',borderRadius:999,padding:'2px 9px'}}>
              {count}
            </span>
            <span style={{fontSize:12,color:'var(--muted)',transition:'transform .2s',
              transform:isOpen?'rotate(180deg)':'none'}}>▾</span>
          </div>
        </div>
        {isOpen && (
          <div style={{padding:'10px 12px',background:'var(--surface-2)',
            border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--r-sm) var(--r-sm)'}}>
            {children}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
      {/* ── Header card ── */}
      <div style={{background:'var(--hdr)',borderRadius:'var(--r)',padding:'16px',marginBottom:14,
        color:'#fff',boxShadow:'var(--shadow-md)',borderLeft:'5px solid ' + accent.b}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:'.1em',
              textTransform:'uppercase',opacity:.6,marginBottom:4}}>Mon espace chantier</div>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:'-.02em',overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{myName}</div>
            <div style={{fontSize:11,opacity:.6,fontFamily:"'DM Mono',monospace",marginTop:3}}>
              {total} tâche{total!==1?'s':''} · {enc} en cours · fiabilité = tâches dues terminées / dues
            </div>
          </div>
          <div style={{display:'flex',gap:18,alignItems:'flex-start',flexShrink:0,textAlign:'right'}}>
            <div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:900,lineHeight:1,
                color:progress===100?'#4ADE80':'#fff'}}>{progress}%</div>
              <div style={{fontSize:9,opacity:.5,fontFamily:"'DM Mono',monospace",marginTop:2}}>Avancement</div>
            </div>
            <div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:28,fontWeight:900,lineHeight:1,
                color:reliability.value>=85?'#4ADE80':reliability.value>=60?'#FBBF24':'#F87171'}}>
                {reliability.label}</div>
              <div style={{fontSize:9,opacity:.5,fontFamily:"'DM Mono',monospace",marginTop:2}}>Fiabilité</div>
            </div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:5,background:'rgba(255,255,255,.18)',borderRadius:3,overflow:'hidden',marginBottom:12}}>
          <div style={{height:'100%',width:progress+'%',background:'#60A5FA',borderRadius:3,transition:'width .4s ease'}}></div>
        </div>
        {/* Quick stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {[
            {v:todoNow.length, l:"Auj.", c:'#E5E7EB'},
            {v:enc, l:'En cours', c:'#BFDBFE'},
            {v:late, l:'Retard', c:late>0?'#FED7AA':'#E5E7EB'},
            {v:bloc, l:'Bloqué', c:bloc>0?'#FECACA':'#E5E7EB'},
          ].map(function(s,i){
            return (
              <div key={i} style={{textAlign:'center',background:'rgba(255,255,255,.10)',borderRadius:8,padding:'8px 4px'}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:900,lineHeight:1,color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,opacity:.6,marginTop:2}}>{s.l}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Prereq banner */}
      {prereqForMe.length > 0 && (
        <div style={{background:'rgba(124,58,237,.12)',border:'1px solid rgba(124,58,237,.35)',
          borderRadius:'var(--r-sm)',padding:'10px 14px',marginBottom:12,
          display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:'#7C3AED'}}>
              {prereqForMe.length} prérequis assigné{prereqForMe.length>1?'s':''} à votre entreprise
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
              Des tâches dépendent de votre intervention. Voir les détails dans la liste.
            </div>
          </div>
        </div>
      )}

      {/* Sections */}
      <Section id="today" title="Aujourd'hui" count={todayTasks.length} accentColor="#2563EB" defaultOpen={openSection===null && todayTasks.length > 0}>
        {todayTasks.length ? todayTasks.map(function(iv){ return <TaskRow key={iv.id} iv={iv} />; }) :
          <div style={{padding:'12px 0',color:'var(--muted)',fontSize:13,textAlign:'center'}}>Aucune tâche prévue aujourd'hui</div>}
      </Section>

      <Section id="urgent" title="Urgences — retards & blocages" count={urgentTasks.length} accentColor={urgentTasks.length?'#DC2626':'var(--border)'}>
        {urgentTasks.length ? urgentTasks.map(function(iv){ return <TaskRow key={iv.id} iv={iv} />; }) :
          <div style={{padding:'12px 0',color:'var(--muted)',fontSize:13,textAlign:'center'}}>✓ Aucune urgence</div>}
      </Section>

      <Section id="week" title="Cette semaine" count={myData.filter(function(i){ var d=weekDays(0,true); return d.some(function(day){return isTaskActiveOn(i,day);}); }).length} accentColor="#6B7280">
        {myData.filter(function(i){ var d=weekDays(0,true); return d.some(function(day){return isTaskActiveOn(i,day);}); })
          .sort(function(a,b){ return (a.start||'').localeCompare(b.start||''); })
          .map(function(iv){ return <TaskRow key={iv.id} iv={iv} />; })}
      </Section>

      <Section id="all" title="Toutes mes tâches" count={total} accentColor="var(--muted)">
        {myData.sort(function(a,b){
          var rank=function(iv){var es=effectiveStatus(iv);if(es==='bloque')return 0;if(es==='en_retard')return 1;if(es==='encours')return 2;if(es==='arealis')return 3;return 5;};
          return rank(a)-rank(b);
        }).map(function(iv){ return <TaskRow key={iv.id} iv={iv} />; })}
      </Section>
    </div>
  );
}

  // ── Core fetch helper ────────────────────────────────────────────────

      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,

      'Prefer': method==='POST'?'return=representation':'return=minimal'
    };

      .then(function(r){
        if(!r.ok) {
          console.warn('[Planify] Écriture secondaire non enregistrée:', table, method, r.status);
          return null;

      'Authorization': 'Bearer '+SUPA_KEY,

  function valueTextForTaskField(key, value) {
    if (value == null) return '';
    if (key === 'zone') {
      var z = zones.find(function(x){ return x.id === value; });
      return z ? z.name + (z.short ? ' ('+z.short+')' : '') : String(value || '');
    }
    if (key === 'trade') {
      var tr = trades.find(function(x){ return x.id === value; });
      return tr ? tr.name : String(value || '');
    }
    if (key === 'status') {
      var st = STATUS_META[value];
      return st ? st.label : String(value || '');
    }
    if (key === 'priority') {
      return ({1:'Urgente',2:'Haute',3:'Normale',4:'Basse',5:'À confirmer'}[value]) || String(value || '');

    if (key === 'start' || key === 'end' || key === 'company_edit_start_min' || key === 'company_edit_end_max') {

    if (key === 'company_edit_allowed') {

    }
    if (key === 'off_days') {
      var arr = Array.isArray(value) ? value : [];
      return arr.length ? arr.map(function(d){ return fmtDate(d); }).join(', ') : '';
    }
    if (key === 'predecessor_ids' || key === 'successor_ids') {
      return taskCodesForIds(value, data).join(', ');
    }
    return String(value || '').trim();

  function buildTaskChangeDetails(before, after) {
    if (!before || !after) return [];
    var defs = [
      {key:'task', label:'Description'},
      {key:'company', label:'Entreprise'},
      {key:'trade', label:'Corps de métier'},
      {key:'zone', label:'Zone'},
      {key:'start', label:'Date de début'},
      {key:'end', label:'Date de fin'},
      {key:'status', label:'Statut'},
      {key:'priority', label:'Priorité'},
      {key:'company_edit_allowed', label:'Modification entreprise autorisée'},
      {key:'company_edit_start_min', label:'Date modifiable au plus tôt'},
      {key:'company_edit_end_max', label:'Date modifiable au plus tard'},
      {key:'prereq', label:'Prérequis / point bloquant'},
      {key:'prereq_company', label:'Entreprise concernée par le prérequis'},
      {key:'impact', label:'Impact / dépendance'},
      {key:'predecessor_ids', label:'Prédécesseur(s)'},
      {key:'successor_ids', label:'Successeur(s)'},
      {key:'notes', label:'Note'},
      {key:'off_days', label:'Jours gelés'},
    ];
    return defs.map(function(def){
      var oldVal = valueTextForTaskField(def.key, before[def.key]);
      var newVal = valueTextForTaskField(def.key, after[def.key]);
      if (oldVal === newVal) return null;
      var action = def.label + ' modifié';
      if (def.key === 'notes') action = 'Note modifiée';
      if (def.key === 'task') action = 'Description modifiée';
      if (def.key === 'off_days') action = 'Jours gelés modifiés';
      if (!oldVal && newVal) action = def.key === 'notes' ? 'Note ajoutée' : def.label + ' ajouté';
      if (oldVal && !newVal) action = def.key === 'notes' ? 'Note supprimée' : def.label + ' supprimé';
      return {
        field:def.key,
        label:def.label,
        action:action,
        old_value:oldVal,
        new_value:newVal
      };
    }).filter(Boolean);
  }

  function addPlanningEvent(row) {
    var payload = Object.assign({
      event_type:row.event_type,
      actor_name:row.actor_name || actorName(),
      actor_role:row.actor_role || actorRole(),
      actor_company:session&&session.company?session.company.name:(session&&session.role==='admin'?'Admin':''),
      planning_version_id:planningVersion&&planningVersion.id?planningVersion.id:null,

    }, row);
    var fallback = Object.assign({
      id:'local_event_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      created_at:new Date().toISOString()
    }, payload);
    return sbFetchSilent('POST','planning_events',payload)

          return rows && rows[0] ? rows[0] : fallback;

        setHistory(function(prev){
          var list = prev || [];

          return [savedEvent].concat(list).slice(0,300);

        if(historyOpen) return loadHistory().then(function(){ return savedEvent; });
        return savedEvent;

      .catch(function(e){ console.warn('[Planify] event not saved:', e); return fallback; });

    // Les tâches suivantes gardent l'ordre et l'écart en JOURS OUVRÉS par rapport à cette première tâche.

    if (!planningDependencyMode || !planningDependencyMode.type) return;
    if ((selectedPlanningTaskIds || []).includes(targetTaskId)) {
      alert('La tâche cible ne peut pas faire partie de la sélection. Retirez-la de la sélection puis recommencez.');
      return;
    }
    var target = data.find(function(iv){ return iv.id === targetTaskId; });
    if (!target) return;
    setPlanningDependencyMode(function(prev){ return Object.assign({}, prev || {}, {targetTaskId:targetTaskId}); });
    notify('Tâche cible sélectionnée : '+(target.task_number || target.task)+' · cliquez Valider le lien.','info',2600);
  }

  async function validatePlanningDependencyLink() {
    if (!canEditPlanning) { alert('Planning verrouillé ou validé : modification des liens indisponible.'); return; }
    if (!planningDependencyMode || !planningDependencyMode.type) return;
    var targetTaskId = planningDependencyMode.targetTaskId;
    if (!targetTaskId) { alert('Cliquez d’abord sur la tâche cible dans le planning, puis validez.'); return; }
    var cleanIds = uniqueTaskIds((selectedPlanningTaskIds || []).filter(Boolean));
    if (!cleanIds.length) { setPlanningDependencyMode(null); return; }
    if (cleanIds.includes(targetTaskId)) {
      alert('La tâche cible ne peut pas faire partie de la sélection. Retirez-la de la sélection puis recommencez.');
      return;
    }
    var target = data.find(function(iv){ return iv.id === targetTaskId; });
    var selected = cleanIds.map(function(id){ return data.find(function(iv){ return iv.id === id; }); }).filter(Boolean);
    if (!target || !selected.length) return;

    selected.sort(function(a,b){ return planningTaskSort(a,b); });

    var byId = {};
    function draftFor(task) {
      if (!byId[task.id]) byId[task.id] = Object.assign({}, task, {_expected_updated_at:task.updated_at || ''});
      return byId[task.id];
    }
    function addPred(task, predId) {
      var d = draftFor(task);
      d.predecessor_ids = uniqueTaskIds(normalizeTaskLinkIds(d.predecessor_ids || d.predecessor_id).concat([predId]));
      d.predecessor_id = d.predecessor_ids[0] || null;
    }
    function addSucc(task, succId) {
      var d = draftFor(task);
      d.successor_ids = uniqueTaskIds(normalizeTaskLinkIds(d.successor_ids).concat([succId]));
    }

    if (planningDependencyMode.type === 'selection_as_predecessor') {
      selected.forEach(function(src){
        addPred(target, src.id);
        addSucc(src, target.id);
      });
    } else if (planningDependencyMode.type === 'selection_as_successor') {
      selected.forEach(function(src){
        addPred(src, target.id);
        addSucc(target, src.id);
      });
    } else {
      return;
    }

    var nowIso = new Date().toISOString();
    var drafts = Object.keys(byId).map(function(id){
      return Object.assign({}, byId[id], {updated_at:nowIso});
    });

    setBusyKey('planning_dependency', true);
    try {
      var savedRows = [];
      for (var i = 0; i < drafts.length; i += 1) {
        var row = interventionToSupabaseRow(drafts[i], nowIso);
        var rows = await sbFetchRows('PATCH','interventions',row,conflictQuery(drafts[i].id, drafts[i]._expected_updated_at || ''));
        if (drafts[i]._expected_updated_at && (!rows || !rows.length)) {
          await syncAll(false).catch(function(){});
          throw new Error('Une tâche liée a été modifiée par un autre utilisateur. Actualisez puis réessayez.');
        }
        savedRows.push(rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, drafts[i], {updated_at:nowIso}));
      }
      setData(function(prev){
        return (prev || []).map(function(iv){
          var updated = savedRows.find(function(row){ return row.id === iv.id; });
          return updated || iv;
        });
      });
      await addPlanningEvent({
        event_type:'task_dependencies_updated',
        message:(planningDependencyMode.type === 'selection_as_predecessor'
          ? 'Lien planning : '+selected.length+' tâche'+(selected.length>1?'s':'')+' ajoutée'+(selected.length>1?'s':'')+' en prédécesseur de '+(target.task_number || target.task)
          : 'Lien planning : '+selected.length+' tâche'+(selected.length>1?'s':'')+' ajoutée'+(selected.length>1?'s':'')+' en successeur de '+(target.task_number || target.task)),
        payload:{mode:planningDependencyMode.type,target_task_id:target.id,selected_task_ids:selected.map(function(t){ return t.id; })}
      });
      setPlanningDependencyMode(null);
      setSelectedPlanningTaskIds([]);
      setScreen('planning');
      try { window.dispatchEvent(new CustomEvent('planify-force-show-cc')); } catch(e) {}
      notify('Lien enregistré ✓ visible dans le planning','success',3600);
    } catch(e) {
      notify(e.message || 'Erreur lors de la création du lien','error',4600);
    } finally {
      setBusyKey('planning_dependency', false);
    }
  }

  async function moveSelectedPlanningTasks(ids, targetZoneId, targetDate) {
    if (!canEditPlanning) { alert('Planning verrouillé ou validé : déplacement indisponible.'); return; }
    var cleanIds = uniqueTaskIds((ids || []).filter(Boolean));
    if (!cleanIds.length) return;
    var selected = cleanIds.map(function(id){ return data.find(function(iv){ return iv.id === id; }); }).filter(Boolean);
    if (!selected.length) { setSelectedPlanningTaskIds([]); return; }

    selected.sort(function(a,b){
      var as = taskStartKey(a), bs = taskStartKey(b);
      if (as !== bs) return as.localeCompare(bs);
      var ae = taskEndKey(a), be = taskEndKey(b);
      if (ae !== be) return ae.localeCompare(be);
      return planningTaskSort(a,b);
    });

    var anchorStart = taskStartKey(selected[0]);
    var requestedTarget = normalizeDateKey(targetDate || dateStr(new Date()));
    var shiftedCount = 0;
    var nowIso = new Date().toISOString();

    var effectiveTarget = nextWorkingDateStr(requestedTarget);
    if (effectiveTarget !== requestedTarget) shiftedCount += 1;

    var moved = selected.map(function(src){
      var originalStart = nextWorkingDateStr(taskStartKey(src));
      var originalEnd = nextWorkingDateStr(taskEndKey(src));
      var offset = workingOffsetDaysStr(anchorStart, originalStart);
      var workingSpan = workingSpanDaysStr(originalStart, originalEnd);
      var newStart = addWorkingDaysStr(effectiveTarget, offset);
      var newEnd = addWorkingDaysStr(newStart, workingSpan - 1);
      var next = Object.assign({}, src, {
        zone:targetZoneId,
        start:newStart,
        end:newEnd,
        off_days:weekendOffDaysBetween(newStart, newEnd),
        updated_at:nowIso,
        _expected_updated_at:src.updated_at || ''
      });
      return next;
    });

    setBusyKey('planning_move', true);
    try {
      var savedRows = [];
      for (var i = 0; i < moved.length; i += 1) {
        var row = interventionToSupabaseRow(moved[i], nowIso);
        var rows = await sbFetchRows('PATCH','interventions',row,conflictQuery(moved[i].id, moved[i]._expected_updated_at || ''));
        if (moved[i]._expected_updated_at && (!rows || !rows.length)) {
          await syncAll(false).catch(function(){});
          throw new Error('Une tâche sélectionnée a été modifiée par un autre utilisateur. Actualisez puis réessayez.');
        }
        savedRows.push(rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, moved[i], {updated_at:nowIso}));
      }
      setData(function(prev){
        return (prev || []).map(function(iv){
          var s = savedRows.find(function(row){ return row.id === iv.id; });
          return s || iv;
        });
      });
      var targetZone = zones.find(function(z){ return z.id === targetZoneId; });
      await addPlanningEvent({
        event_type:'tasks_moved',
        zone_id:targetZoneId,
        zone_name:targetZone ? targetZone.name : '',
        message:'Déplacement planning : '+savedRows.length+' tâche'+(savedRows.length>1?'s':'')+' vers '+(targetZone ? targetZone.short : targetZoneId)+' à partir du '+fmtDate(effectiveTarget),
        payload:{task_ids:savedRows.map(function(t){ return t.id; }),target_zone_id:targetZoneId,requested_target_date:requestedTarget,target_date:effectiveTarget,shifted_non_working_count:shiftedCount}
      });
      setSelectedPlanningTaskIds([]);
      notify('Tâche'+(savedRows.length>1?'s':'')+' déplacée'+(savedRows.length>1?'s':'')+(shiftedCount?' · jours non ouvrés évités':'')+' ✓','success',3600);
    } catch(e) {
      notify(e.message || 'Erreur lors du déplacement','error',4600);
    } finally {
      setBusyKey('planning_move', false);
    }
  }

  // ── Status change → save to Supabase ────────────────────────────────
  async function handleStatusChange(id, status, noteText) {
    if (!canChangeStatus) {
      alert('Planning validé : les statuts ne peuvent plus être modifiés sur cette version.');
      throw new Error('Planning validé.');
    }
    var iv = data.find(function(i){return i.id===id;});
    if (!iv) throw new Error('Tâche introuvable. Actualisez puis réessayez.');
    var oldStatus = iv.status || '';
    var oldMeta = STATUS_META[oldStatus] || {label:oldStatus || '—'};
    var newMeta = STATUS_META[status] || {label:status || '—'};
    var z = zones.find(function(x){return x.id===iv.zone;}) || null;
    var newUpdatedAt = new Date().toISOString();
    var trimmedStatusNote = noteText && noteText.trim() ? noteText.trim() : '';
    setBusyKey('status_'+id, true);

    try {
      var rows = await sbFetchRows('PATCH','interventions',{
        status:status,
        updated_at:newUpdatedAt
      }, conflictQuery(id, iv.updated_at));
      if (iv.updated_at && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant de réessayer.');
      }
      var saved = rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, iv, {status:status, updated_at:newUpdatedAt});
      setData(function(prev){ return prev.map(function(i){ return i.id===id?saved:i; }); });

      var author = actorName();
      await addPlanningEvent({
        event_type:'status_change',
        task_id:id,
        task_number:iv.task_number||'',
        task_title:iv.task||'',
        task_company:iv.company||'',
        zone_id:iv.zone||'',
        zone_name:z?z.name:'',
        old_status:oldMeta.label,
        new_status:newMeta.label,
        note:trimmedStatusNote,
        message:author+' a modifié le statut de '+(iv.task_number||iv.task)+' : '+oldMeta.label+' → '+newMeta.label,
        payload:{old_status:oldStatus,new_status:status,note:trimmedStatusNote}
      });

      if(trimmedStatusNote) {
        var logRow = {task_id:id,company:author,author:author,type:status,
          message:trimmedStatusNote,photo_url:null,mentioned:['Admin']};
        sbFetchSilent('POST','task_logs',logRow)
          .then(function(r){
            if (!r || !r.json) return [];
            return r.json().catch(function(){ return []; });
          })
          .then(function(rows){
            var savedLog = rows && rows[0] ? rows[0] : Object.assign({
              id:'local_log_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
              created_at:new Date().toISOString()
            }, logRow);
            setTaskLogs(function(prev){
              var list = prev || [];
              if (savedLog && savedLog.id && list.some(function(l){ return l.id === savedLog.id; })) return list;
              return [savedLog].concat(list).slice(0,500);
            });
            var taskRef = iv?iv.task_number||iv.task.slice(0,30):'';
            var msg = author+' · '+newMeta.label+' · '+taskRef;
            return sbFetchSilent('POST','notifications',[{company:'Admin',task_id:id,message:msg,read:false}]);
          }).catch(function(){});
      }
      notify('Statut sauvegardé ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur de sauvegarde','error',4200);
      throw e;
    } finally {
      setBusyKey('status_'+id, false);
    }
  }


  function isPersistedDbId(id) {
    var v = String(id || '');
    return !!v && !v.startsWith('local_') && !v.startsWith('event_') && !v.startsWith('log_');
  }

  async function handleUpdateStatusNote(noteItem, newText) {
    var text = String(newText || '').trim();
    if (!noteItem || !noteItem.id || !text) throw new Error('Note de statut invalide.');
    var oldText = String(noteItem.note || '').trim();
    var oldNorm = normalizeStatusNoteText(oldText);
    var taskId = noteItem.task_id || '';
    setBusyKey('status_note_'+noteItem.id, true);
    try {
      if (noteItem.source === 'planning_events' && isPersistedDbId(noteItem.id)) {
        await sbFetchRows('PATCH','planning_events',{note:text},eqFilter('id', noteItem.id));
      }
      if (noteItem.source === 'task_logs' && isPersistedDbId(noteItem.id)) {
        await sbFetchRows('PATCH','task_logs',{message:text},eqFilter('id', noteItem.id));
      }
      if (taskId && oldText) {
        if (noteItem.source !== 'task_logs') {
          await sbFetchSilent('PATCH','task_logs',{message:text},eqFilter('task_id', taskId)+'&'+eqFilter('message', oldText));
        }
        if (noteItem.source !== 'planning_events') {
          await sbFetchSilent('PATCH','planning_events',{note:text},eqFilter('task_id', taskId)+'&'+eqFilter('note', oldText));
        }
      }
      setHistory(function(prev){
        return (prev || []).map(function(ev){
          var sameId = noteItem.source === 'planning_events' && ev.id === noteItem.id;
          var sameText = taskId && ev.task_id === taskId && normalizeStatusNoteText(ev.note || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, ev, {note:text, payload:Object.assign({}, ev.payload || {}, {note:text})});
          return ev;
        });
      });
      setTaskLogs(function(prev){
        return (prev || []).map(function(log){
          var sameId = noteItem.source === 'task_logs' && log.id === noteItem.id;
          var sameText = taskId && log.task_id === taskId && normalizeStatusNoteText(log.message || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, log, {message:text});
          return log;
        });
      });
      notify('Note de statut modifiée ✓','success');
      return true;
    } catch(e) {
      notify(e.message || 'Erreur modification note','error',4200);
      throw e;
    } finally {
      setBusyKey('status_note_'+noteItem.id, false);
    }
  }

  async function handleSubmitTaskChangeRequest(iv, form) {
    if (planningValidated) {
      throw new Error('Planning validé : réindexez une nouvelle version pour demander une modification.');
    }
    if (!session || session.role !== 'company' || !session.company || session.company.name !== iv.company) {
      throw new Error('Vous ne pouvez modifier que les tâches de votre entreprise.');
    }
    if (!iv.company_edit_allowed) {
      throw new Error('Cette tâche n’a pas été ouverte à modification par l’admin.');
    }
    var pending = changeRequests.find(function(r){ return r.task_id === iv.id && r.status === 'pending_admin'; });
    if (pending) throw new Error('Une demande est déjà en attente sur cette tâche.');

    var changed = TASK_CHANGE_FIELDS.filter(function(f){
      return valuesDiffer(iv[f.key] || '', form[f.key] || '');
    });
    if (!changed.length) throw new Error('Aucune modification détectée.');
    var dateError = validateCompanyDateProposal(iv, form);
    if (dateError) throw new Error(dateError);

    var nowIso = new Date().toISOString();
    var row = {
      task_id: iv.id,
      task_number: iv.task_number || '',
      task_company: iv.company || '',
      requested_by_company: session.company.name,
      requested_by_contact: session.name || session.company.contact || '',
      status: 'pending_admin',
      old_start_date: iv.start || '',
      old_end_date: iv.end || iv.start || '',
      old_task: iv.task || '',
      old_prereq: iv.prereq || '',
      old_notes: iv.notes || '',
      new_start_date: form.start || '',
      new_end_date: form.end || form.start || '',
      new_task: form.task || '',
      new_prereq: form.prereq || '',
      new_notes: form.notes || '',
      created_at: nowIso,
      updated_at: nowIso,
      payload: {
        changed_fields: changed.map(function(f){return f.key;}),
        company_edit_allowed: !!iv.company_edit_allowed,
        company_edit_start_min: iv.company_edit_start_min || null,
        company_edit_end_max: iv.company_edit_end_max || null
      }
    };

    setBusyKey('change_request_'+iv.id, true);
    try {
      var rows = await sbFetchRows('POST','task_change_requests',row);
      var saved = rows && rows[0] ? normalizeChangeRequestRow(rows[0]) : normalizeChangeRequestRow(row);
      setChangeRequests(function(prev){ return [saved].concat(prev || []); });
      await addPlanningEvent({
        event_type:'task_change_requested',

        zone_id:iv.zone||'',
