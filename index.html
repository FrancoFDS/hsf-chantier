function planifyIsDarkTheme() {
  try { return document.documentElement.getAttribute('data-theme') === 'nuit'; }
  catch(e) { return false; }
}
function planifyHexToRgb(hex) {
  var clean = String(hex || '#3B82F6').replace('#','').trim();
  if (clean.length === 3) clean = clean.split('').map(function(ch){ return ch + ch; }).join('');
  if (clean.length !== 6) return {r:59,g:130,b:246};
  return {
    r:parseInt(clean.slice(0,2),16) || 59,
    g:parseInt(clean.slice(2,4),16) || 130,
    b:parseInt(clean.slice(4,6),16) || 246
  };
}
function rgbaCss(hex, alpha) {
  var rgb = planifyHexToRgb(hex);
  return 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
}
function getTC(colorId) {
  var base = TRADE_COLORS[colorId] || TRADE_COLORS.blue;
  if (!planifyIsDarkTheme()) return base;

  // Mode sombre : on garde la couleur métier comme accent, mais on force les textes
  // et les fonds de cartes sur une palette sombre lisible.
  return Object.assign({}, base, {
    bg: rgbaCss(base.b, .18),

    t: '#F8FAFC',
    text: '#F8FAFC',
    mutedText: '#CBD5E1',
    border: rgbaCss(base.b, .58)
  });
}

  const d = new Date(dateStr+'T00:00:00'), now = new Date();
  now.setHours(0,0,0,0);

}

// effectiveStatus: computed display status (uses existing isTaskLate)
// isTaskLate is defined in planify-screens.jsx scope — fallback to string compare here
function effectiveStatus(iv) {
  if (!iv) return 'arealis';
  if (iv.status === 'termine')   return 'termine';
  if (iv.status === 'bloque')    return 'bloque';
  if (iv.status === 'en_retard') return 'en_retard'; // statut manuel posé en base
  var rawDate = iv.end || iv.start;
  if (!rawDate) return iv.status || 'arealis';
  var due = new Date(rawDate + 'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  return due < today ? 'en_retard' : (iv.status || 'arealis'); // calcul auto date dépassée
}

// ══════════════════════════════════════════════════════════════════
// MOTEUR D'AVANCEMENT PROBABILISTE TEMPOREL — v2 (document terrain)
// ══════════════════════════════════════════════════════════════════

/**
 * Calcule l'avancement réel d'une tâche selon le modèle temporel pondéré.
 * Retourne un objet { pct, theoretical, manual, method, confidence }
 */
function computeTaskProgress(iv) {
  if (!iv) return { pct:0, theoretical:0, manual:0, method:'unknown', confidence:0 };

  // Cas 1 — Terminée : 100%
  if (iv.status === 'termine') return { pct:100, theoretical:100, manual:iv.progress_manual||100, method:'done', confidence:1 };

  var today = new Date(); today.setHours(0,0,0,0);
  var startD = iv.start ? new Date(iv.start+'T00:00:00') : null;
  var endD   = iv.end   ? new Date(iv.end+'T00:00:00')   : null;
  if (!endD && startD) endD = new Date(startD);

  // Durée totale en jours (min 1)
  var totalDays = startD && endD ? Math.max(1, Math.round((endD - startD) / 86400000) + 1) : 1;
  // Temps consommé depuis le début
  var elapsed   = startD ? Math.max(0, Math.round((today - startD) / 86400000)) : 0;

  // Avancement théorique temporel
  var theoretical = 0;
  if (startD && today >= startD) {
    theoretical = Math.min(100, Math.round(elapsed / totalDays * 100));
    if (iv.status === 'encours' || effectiveStatus(iv) === 'en_retard') {
      theoretical = Math.max(10, Math.min(95, theoretical)); // 10%-95% sur tâche en cours
    }
  }

  // Avancement manuel optionnel (terrain)
  var manual = (typeof iv.progress_manual === 'number') ? Math.min(100, Math.max(0, iv.progress_manual)) : null;

  // Cas 2 — Bloquée : gèle la progression (ne revient pas à 0)
  if (iv.status === 'bloque') {
    var frozenPct = manual !== null ? manual : Math.max(5, theoretical);
    return { pct: frozenPct, theoretical, manual: manual||0, method:'blocked_frozen', confidence:0.5 };
  }

  // Cas 3 — Non démarrée (future ou arealis sans date passée)
  if (!startD || today < startD) {
    var manualFuture = (manual !== null && manual > 0) ? manual : 0;
    return { pct: manualFuture, theoretical:0, manual: manual||0, method:'not_started', confidence:0.9 };
  }

  // Cas 4 — En cours ou en retard : MAX(theoretical, manual)
  var finalPct = manual !== null ? Math.max(theoretical, manual) : theoretical;
  finalPct = Math.min(95, Math.max(0, finalPct)); // jamais 100% sans validation

  // Confiance : diminue si en retard
  var es = effectiveStatus(iv);
  var confidence = es === 'en_retard' ? 0.6 : es === 'encours' ? 0.85 : 0.75;

  return { pct: finalPct, theoretical, manual: manual||0, method:'temporal', confidence };
}

/**
 * Calcule la santé globale du projet / chantier.
 * Retourne { avancementReel, cadenceCible, derive, fiabilite, projectionDays, riskyZones, alertes }
 */
function computeProjectHealth(data, zones) {
  var today = new Date(); today.setHours(0,0,0,0);
  var allTasks = data || [];

  // 1. Avancement réel pondéré (toutes tâches)
  var totalWeight = 0, weightedProgress = 0;
  allTasks.forEach(function(iv) {
    var p = computeTaskProgress(iv);
    var weight = 1; // on peut pondérer par durée plus tard
    weightedProgress += p.pct * weight;
    totalWeight += weight;
  });
  var avancementReel = totalWeight > 0 ? Math.round(weightedProgress / totalWeight) : 0;

  // 2. Cadence cible théorique : avancement si tout était au rythme prévu
  var totalTheo = 0, theoWeight = 0;
  allTasks.forEach(function(iv) {
    var p = computeTaskProgress(iv);
    var weight = 1;
    totalTheo += p.theoretical * weight;
    theoWeight += weight;
  });
  var cadenceCible = theoWeight > 0 ? Math.round(totalTheo / theoWeight) : 0;

  // 3. Dérive = réel - cible (négatif = retard)
  var derive = avancementReel - cadenceCible;

  // 4. Fiabilité : basée sur le ratio tâches terminées vs théoriquement dues
  var tasksDue    = allTasks.filter(function(iv){ var e=iv.end||iv.start; return e && new Date(e+'T00:00:00') <= today; });
  var tasksDone   = tasksDue.filter(function(iv){ return iv.status === 'termine'; });
  var fiabilite   = tasksDue.length > 0 ? Math.round(tasksDone.length / tasksDue.length * 100) : 100;

  // 5. Projection fin chantier
  // Trouver la deadline la plus éloignée
  var maxDeadline = null;
  (zones||[]).forEach(function(z){ if(z.deadline && (!maxDeadline||z.deadline>maxDeadline)) maxDeadline=z.deadline; });
  var projectionDays = null;
  if (maxDeadline && avancementReel < 100) {
    var deadlineDate = new Date(maxDeadline+'T00:00:00');
    var daysToDeadline = Math.round((deadlineDate - today) / 86400000);
    // Cadence journalière réelle vs nécessaire
    var startProject = allTasks.reduce(function(min, iv){ return iv.start&&iv.start<min?iv.start:min; }, '9999');
    if (startProject !== '9999') {
      var startDate = new Date(startProject+'T00:00:00');
      var totalProjectDays = Math.max(1, Math.round((today - startDate) / 86400000));
      var dailyRate = avancementReel / totalProjectDays; // % par jour réel
      var remaining = 100 - avancementReel;
      var daysNeeded = dailyRate > 0 ? Math.ceil(remaining / dailyRate) : null;
      if (daysNeeded !== null) {
        projectionDays = daysNeeded - daysToDeadline; // >0 = retard projeté
      }
    }
  }

  // 6. Zones à risque (dérive + dépendances)
  var riskyZones = [];
  (zones||[]).forEach(function(z) {
    var zTasks = allTasks.filter(function(iv){ return iv.zone === z.id; });
    var zDue   = zTasks.filter(function(iv){ var e=iv.end||iv.start; return e && new Date(e+'T00:00:00') <= today; });
    var zDone  = zDue.filter(function(iv){ return iv.status==='termine'; });
    var zBloc  = zTasks.filter(function(iv){ return iv.status==='bloque'; });
    var zLate  = zTasks.filter(function(iv){ return effectiveStatus(iv)==='en_retard'; });
    var zFiab  = zDue.length > 0 ? Math.round(zDone.length/zDue.length*100) : 100;
    var zAvt   = 0, zTheo = 0, zW = 0;
    zTasks.forEach(function(iv){ var p=computeTaskProgress(iv); zAvt+=p.pct; zTheo+=p.theoretical; zW++; });
    zAvt  = zW>0 ? Math.round(zAvt/zW) : 0;
    zTheo = zW>0 ? Math.round(zTheo/zW) : 0;
    var zDerive = zAvt - zTheo;
    var risk = 0;
    if (zLate.length > 0)  risk += 40;
    if (zBloc.length > 0)  risk += 30;
    if (zDerive < -15)     risk += 20;
    if (z.deadline) {
      var dl = new Date(z.deadline+'T00:00:00');
      var dj = Math.round((dl - today)/86400000);
      if (dj < 0)  risk += 30;
      else if (dj < 7) risk += 20;
      else if (dj < 14) risk += 10;
    }
    if (risk >= 30) {
      riskyZones.push({
        zone: z,
        risk: Math.min(100, risk),
        derive: zDerive,
        blocked: zBloc.length,
        late: zLate.length,
        avancement: zAvt,
        cadence: zTheo
      });
    }
  });
  riskyZones.sort(function(a,b){ return b.risk - a.risk; });

  // 7. Alertes critiques (max 3)
  var alertes = [];
  if (projectionDays !== null && projectionDays > 7) {
    alertes.push({ type:'danger', msg:'Livraison estimée avec +'+projectionDays+'j de retard au rythme actuel' });
  }
  var critBloc = allTasks.filter(function(iv){ return iv.status==='bloque' && (iv.priority===1||iv.priority===2); });
  if (critBloc.length > 0) {
    alertes.push({ type:'danger', msg: critBloc.length+' tâche(s) critique(s) bloquée(s) — intervention requise' });
  }
  if (derive < -20) {
    alertes.push({ type:'warning', msg:'Dérive planning : cadence en dessous de l\'objectif de '+Math.abs(derive)+'%' });
  }
  if (riskyZones.length > 0 && alertes.length < 3) {
    alertes.push({ type:'warning', msg:'Zone à risque : '+riskyZones[0].zone.short+' ('+riskyZones[0].late+' retard(s), '+riskyZones[0].blocked+' bloquée(s))' });
  }

  return { avancementReel, cadenceCible, derive, fiabilite, projectionDays, riskyZones, alertes };
}

/**
 * Détecte la propagation de dérive dans les chaînes de dépendances.
 * Retourne une liste de { source, affected, delayDays }
 */
function detectRiskPropagation(data) {
  var chains = [];
  var today = new Date(); today.setHours(0,0,0,0);
  var dataMap = {};
  (data||[]).forEach(function(iv){ dataMap[iv.id] = iv; });

  (data||[]).forEach(function(iv) {
    if (!iv.predecessor_id) return;
    var pred = dataMap[iv.predecessor_id];
    if (!pred) return;
    // Si le prédécesseur est en retard ou bloqué, et que le successeur n'est pas terminé
    var predLate = effectiveStatus(pred) === 'en_retard' || pred.status === 'bloque';
    var succNotDone = iv.status !== 'termine';
    if (predLate && succNotDone) {
      var predEnd = pred.end ? new Date(pred.end+'T00:00:00') : null;
      var delay = predEnd ? Math.max(0, Math.round((today - predEnd) / 86400000)) : 0;
      chains.push({ source: pred, affected: iv, delayDays: delay });
    }
  });

  return chains;
}

    en_retard:'rgba(234,88,12,.22)'
  }[status] || base.bg;

  });
}

// ─── UTILITIES ──────────────────────────────────────────────────
function getMonday(offset = 0) {
  const t = new Date(); const d = t.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const m = new Date(t); m.setDate(t.getDate() + diff + offset * 7); m.setHours(0,0,0,0);
  return m;
}
function weekDays(offset = 0, includeWeekends = false) {
  const m = getMonday(offset);
  const length = includeWeekends ? 7 : 5;
  return Array.from({length:length}, (_,i) => { const d = new Date(m); d.setDate(m.getDate()+i); return d; });
}
function multiWeekDays(offset = 0, weeks = 1, includeWeekends = false) {
  return Array.from({length: weeks}, (_, w) => weekDays(offset + w, includeWeekends)).flat();
}
function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateFR(d)    { return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function fmtDate(s)   { if(!s) return ''; const p=s.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }
function isToday(d)   { return d.toDateString() === new Date().toDateString(); }
function inDay(iv,day){ const s=new Date(iv.start+'T00:00:00'),e=new Date((iv.end||iv.start)+'T00:00:00'),dd=new Date(day); dd.setHours(0,0,0,0); return dd>=s&&dd<=e; }
function isTaskFrozenOn(iv, day) {
  if (!iv) return false;
  const ds = typeof day === 'string' ? day : dateStr(day);
  const explicitStart = iv.start === ds;
  const explicitEnd = (iv.end || iv.start) === ds;

  // Un jour gelé exclut la tâche uniquement si la tâche n'est pas explicitement affectée ce jour-là.
  // Exemple :
  // - tâche vendredi → lundi : samedi/dimanche gelés = exclus
  // - tâche créée directement samedi : samedi = visible
  // - tâche qui finit dimanche : dimanche = visible
  if (explicitStart || explicitEnd) return false;

  return Array.isArray(iv.off_days) && iv.off_days.includes(ds);
}
function isTaskActiveOn(iv, day) {
  return inDay(iv, day) && !isTaskFrozenOn(iv, day);
}
function isTaskFrozenToday(iv) {
  const t = new Date(); t.setHours(0,0,0,0);
  return inDay(iv, t) && isTaskFrozenOn(iv, t);
}

  const t = new Date(); t.setHours(0,0,0,0);
  return isTaskActiveOn(iv, t);
}

function genTaskNum(interventions, company, tradeId, tradesList) {
  const list = tradesList || (typeof TRADES !== 'undefined' ? TRADES : []);
  const trade = list.find(t => t.id === tradeId);
  const rawPrefix = trade && trade.short ? trade.short : company;
  const prefix = String(rawPrefix || 'TACHE')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\//g,'-')
    .replace(/[^A-Za-z0-9-]/g,'')
    .slice(0,12)
    .toUpperCase() || 'TACHE';
  const existing = interventions.filter(i => i.trade === tradeId && i.task_number);
  const nums = existing.map(i => parseInt((i.task_number||'').replace(/[^0-9]/g,''))||0);
  return `${prefix}-${String((nums.length?Math.max(...nums):0)+1).padStart(3,'0')}`;
}
function normalizeTaskNumber(num) {
  if (!num) return '';
  return String(num).replace(/^9EM-/i, '9EME-');

const HOLIDAYS_2026 = new Set([
  '2026-01-01','2026-04-06','2026-05-01','2026-05-08',
  '2026-05-14','2026-05-25',
  '2026-07-14', // mardi — Fête nationale
  '2026-08-15', // samedi — Assomption
  '2026-11-01','2026-11-11','2026-12-25'
]);

function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00');

  let count = 0;
  const dir = target >= now ? 1 : -1;
  let cur = new Date(now);
  while (cur.toDateString() !== target.toDateString()) {
    cur.setDate(cur.getDate() + dir);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6 && !HOLIDAYS_2026.has(dateStr(cur))) count += dir;
  }
  return count;
}

function normalizeTaskLinkIds(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value.filter(Boolean).map(String);
  if (typeof value === 'string') {
    var trimmed = value.trim();
    if (!trimmed) return [];
    try {
      var parsed = JSON.parse(trimmed);
      if (Array.isArray(parsed)) return parsed.filter(Boolean).map(String);
    } catch(e) {}
    return trimmed.split(',').map(function(x){ return x.trim(); }).filter(Boolean);
  }
  return [];
}
function uniqueTaskIds(ids) {
  var seen = new Set();
  return (ids || []).filter(function(id){ if(!id || seen.has(id)) return false; seen.add(id); return true; });
}
function taskCodesForIds(ids, data) {
  return normalizeTaskLinkIds(ids).map(function(id){
    var t = (data || []).find(function(x){ return x.id === id; });
    return t ? (t.task_number || t.task || id) : id;
  }).filter(Boolean);
}
function taskDependencyIds(iv, data, type) {
  if (!iv) return [];
  var direct = type === 'predecessor'
    ? normalizeTaskLinkIds(iv.predecessor_ids || iv.predecessor_id)
    : normalizeTaskLinkIds(iv.successor_ids);
  var derived = (data || []).filter(function(other){
    if (!other || other.id === iv.id) return false;
    if (type === 'predecessor') return normalizeTaskLinkIds(other.successor_ids).includes(iv.id);
    return normalizeTaskLinkIds(other.predecessor_ids || other.predecessor_id).includes(iv.id);
  }).map(function(other){ return other.id; });
  return uniqueTaskIds(direct.concat(derived));
}
function TaskDependencyBadges({ iv, data, compact = false }) {
  var predCodes = taskCodesForIds(taskDependencyIds(iv, data, 'predecessor'), data);
  var succCodes = taskCodesForIds(taskDependencyIds(iv, data, 'successor'), data);
  if (!predCodes.length && !succCodes.length) return null;
  var style = {display:'inline-flex',alignItems:'center',gap:4,padding:compact?'1px 5px':'2px 7px',borderRadius:20,background:'rgba(202,138,4,.10)',color:'#92400E',border:'1px solid rgba(202,138,4,.25)',fontSize:compact?8.5:10,fontWeight:800,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis'};
  return (<>{predCodes.length > 0 && <span style={style}>Pred. {predCodes.join(', ')}</span>}{succCodes.length > 0 && <span style={style}>Succ. {succCodes.join(', ')}</span>}</>);
}

const CRITICAL_CHAIN_COLORS = ['#EA580C','#0F766E','#7C3AED','#2563EB','#BE185D','#65A30D','#B45309','#0891B2','#DC2626','#4F46E5'];
function criticalChainColor(index) {
  return CRITICAL_CHAIN_COLORS[index % CRITICAL_CHAIN_COLORS.length];
}
function hexToRgbCss(hex) {
  var clean = String(hex || '').replace('#','').trim();
  if (clean.length === 3) clean = clean.split('').map(function(ch){ return ch + ch; }).join('');
  if (clean.length !== 6) return { r:234, g:88, b:12 };
  return { r:parseInt(clean.slice(0,2),16), g:parseInt(clean.slice(2,4),16), b:parseInt(clean.slice(4,6),16) };
}
function rgbaCss(hex, alpha) {
  var rgb = hexToRgbCss(hex);
  return 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
}
function buildZoneCriticalPathMeta(items) {
  var rows = items || [];
  var byId = new Map(rows.map(function(iv){ return [iv.id, iv]; }));
  var seen = new Set();
  var links = [];
  var roles = {};
  var adjacency = {};
  rows.forEach(function(iv){ adjacency[iv.id] = adjacency[iv.id] || new Set(); });
  rows.forEach(function(target){
    if (!target) return;
    normalizeTaskLinkIds(target.predecessor_ids || target.predecessor_id).forEach(function(predId){
      var source = byId.get(predId);
      if (!source || source.id === target.id) return;
      var key = source.id + '>' + target.id;
      if (seen.has(key)) return;
      seen.add(key);
      var from = source.end || source.start || '';
      var to = target.start || target.end || '';
      var rangeStart = from && to ? (from <= to ? from : to) : (from || to || '');
      var rangeEnd = from && to ? (from <= to ? to : from) : (from || to || '');
      var direction = !from || !to || from <= to ? 'forward' : 'reverse';
      links.push({
        key:key, sourceId:source.id, targetId:target.id,
        sourceZone:source.zone || '', targetZone:target.zone || '',
        sourceCode:source.task_number || source.id, targetCode:target.task_number || target.id,
        from:from, to:to, rangeStart:rangeStart, rangeEnd:rangeEnd, direction:direction,
        crossZone:!!(source.zone && target.zone && source.zone !== target.zone)
      });
      adjacency[source.id].add(target.id);
      adjacency[target.id].add(source.id);
      if (!roles[source.id]) roles[source.id] = { linked:false, source:false, target:false, count:0 };
      if (!roles[target.id]) roles[target.id] = { linked:false, source:false, target:false, count:0 };
      roles[source.id].linked = true; roles[source.id].source = true; roles[source.id].count += 1;
      roles[target.id].linked = true; roles[target.id].target = true; roles[target.id].count += 1;
    });
  });
  var visited = new Set();
  var chainByTask = {};
  var chains = [];
  Object.keys(adjacency).forEach(function(taskId){
    if (visited.has(taskId) || !adjacency[taskId] || adjacency[taskId].size === 0) return;
    var stack = [taskId];
    var comp = [];
    visited.add(taskId);
    while (stack.length) {
      var current = stack.pop();
      comp.push(current);
      adjacency[current].forEach(function(nextId){
        if (!visited.has(nextId)) { visited.add(nextId); stack.push(nextId); }
      });
    }
    comp.sort(function(a,b){
      var ta = byId.get(a), tb = byId.get(b);
      var da = ta ? (ta.start || ta.end || '') : '';
      var db = tb ? (tb.start || tb.end || '') : '';
      if (da !== db) return da.localeCompare(db);
      return String(a).localeCompare(String(b));
    });
    var chainIndex = chains.length;
    var color = criticalChainColor(chainIndex);
    var chainId = 'cc_' + (chainIndex + 1);
    var label = 'CC-' + String(chainIndex + 1).padStart(2, '0');
    var codes = comp.map(function(id){ var task = byId.get(id); return task ? (task.task_number || task.id) : id; });
    var zoneIds = Array.from(new Set(comp.map(function(id){ var task = byId.get(id); return task ? task.zone : ''; }).filter(Boolean)));
    comp.forEach(function(id){
      chainByTask[id] = chainId;
      roles[id] = Object.assign({ linked:true, source:false, target:false, count:0 }, roles[id] || {}, {
        linked:true, chainId:chainId, chainLabel:label, color:color, taskCodes:codes
      });
    });
    chains.push({ id:chainId, label:label, color:color, taskIds:comp.slice(), taskCodes:codes.slice(), zoneIds:zoneIds.slice(), links:[] });
  });
  links = links.map(function(link){
    var chainId = chainByTask[link.sourceId] || chainByTask[link.targetId] || null;
    var chain = chains.find(function(item){ return item.id === chainId; });
    return Object.assign({}, link, { chainId:chainId, chainLabel:chain ? chain.label : 'CC', color:chain ? chain.color : '#EA580C' });
  });
  chains.forEach(function(chain){
    chain.links = links.filter(function(link){ return link.chainId === chain.id; });
    chain.linkCount = chain.links.length;
    chain.taskCount = chain.taskIds.length;
  });
  return { links:links, roles:roles, chains:chains, chainByTask:chainByTask };
}
function criticalPathLinksForDay(links, dayStr) {
  return (links || []).filter(function(link){
    if (!link || !link.rangeStart || !link.rangeEnd) return false;
    return dayStr >= link.rangeStart && dayStr <= link.rangeEnd;
  });
}
function planningTaskVisibleOnDay(iv, day, zoneId) {
  if (!iv || iv.zone !== zoneId) return false;
  if (isHoliday(day)) return false;
  if (!inDay(iv, day)) return false;
  var ds = dateStr(day);
  if ((iv.off_days || []).includes(ds)) return false;
  return true;
}
function planningTaskSort(a, b) {
  var ap = a ? (a.priority || 3) : 3;
  var bp = b ? (b.priority || 3) : 3;
  if (ap !== bp) return ap - bp;
  var as = a ? (a.start || '') : '';
  var bs = b ? (b.start || '') : '';
  if (as !== bs) return as.localeCompare(bs);
  var ae = a ? (a.end || a.start || '') : '';
  var be = b ? (b.end || b.start || '') : '';
  if (ae !== be) return ae.localeCompare(be);
  return String((a && (a.task_number || a.id)) || '').localeCompare(String((b && (b.task_number || b.id)) || ''));
}
function planningSlotHeight(isMulti, weeks) {
  if (isMulti) return weeks === 2 ? 30 : 23;
  return 47;
}
function buildVisibleAlignedCriticalChains(zoneCritical, days, sourceItems, zoneId, activeCriticalChainId) {
  var meta = zoneCritical || { chains:[] };
  var byId = new Map((sourceItems || []).map(function(iv){ return [iv.id, iv]; }));
  var dayStrs = (days || []).map(function(day){ return dateStr(day); });
  return (meta.chains || []).filter(function(chain){
    if (activeCriticalChainId && chain.id !== activeCriticalChainId) return false;
    var hasTaskInWindow = (chain.taskIds || []).some(function(id){
      var iv = byId.get(id);
      return !!iv && (days || []).some(function(day){ return planningTaskVisibleOnDay(iv, day, zoneId); });
    });
    if (hasTaskInWindow) return true;
    return (chain.links || []).some(function(link){
      if (!link || !link.rangeStart || !link.rangeEnd) return false;
      return dayStrs.some(function(ds){ return ds >= link.rangeStart && ds <= link.rangeEnd; });
    });
  });
}
function buildAlignedTaskSlots(cards, zoneCritical, alignedChains, showCriticalPath) {
  var list = (cards || []).slice().sort(planningTaskSort);
  if (!showCriticalPath || !(alignedChains || []).length) {
    return list.map(function(iv){ return { type:'task', key:'task_' + iv.id, tasks:[iv] }; });
  }
  var roles = (zoneCritical && zoneCritical.roles) || {};
  var used = new Set();
  var slots = (alignedChains || []).map(function(chain, laneIndex){
    var tasks = list.filter(function(iv){
      var role = roles[iv.id] || null;
      return role && role.chainId === chain.id;
    }).sort(planningTaskSort);
    tasks.forEach(function(iv){ used.add(iv.id); });
    return { type:'chain', key:'chain_' + chain.id + '_' + laneIndex, chain:chain, laneIndex:laneIndex, tasks:tasks };
  });
  list.forEach(function(iv){
    if (!used.has(iv.id)) slots.push({ type:'task', key:'task_' + iv.id, tasks:[iv] });
  });
  return slots;
}

function AttachmentZone({ files, setFiles }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const accept = (fileList) => {
    const valid = [...fileList].filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
    setFiles(prev => [...prev, ...valid.map(f => ({id:genId(), file:f, name:f.name,
      size:f.size, type:f.type, url:URL.createObjectURL(f)}))]);
  };
  return (
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);accept(e.dataTransfer.files);}}
        onClick={()=>inputRef.current.click()}
        style={{border:`2px dashed ${dragging?'var(--primary)':'var(--border)'}`,borderRadius:'var(--r-sm)',
          padding:'16px',textAlign:'center',cursor:'pointer',transition:'all .15s',
          background:dragging?'var(--primary-l)':'transparent'}}>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}}
          onChange={e=>accept(e.target.files)} />
        <div style={{color:'var(--muted)',fontSize:13}}>
          <AttachIcon />
          <div style={{marginTop:6,fontWeight:500}}>Glisser des fichiers ici</div>
          <div style={{fontSize:11,marginTop:2,color:'var(--xmuted)'}}>PDF ou image · cliquer pour parcourir</div>
        </div>
      </div>
      {files.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
          {files.map(f => (
            <div key={f.id} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px 4px 6px',
              background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',fontSize:12}}>
              <span style={{fontSize:14}}>{f.type==='application/pdf'?'📄':'🖼'}</span>
              <span style={{color:'var(--text)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
              <button onClick={e=>{e.stopPropagation();setFiles(p=>p.filter(x=>x.id!==f.id));}}
                style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:14,lineHeight:1,padding:0}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );

    if (direct) return direct;

    var tradeId = co.tradeId || co.trade_id || '';
    var fallback = (COMPANIES || []).find(function(c) {
      return c.id === co.id || (c.name === co.name && (!tradeId || c.tradeId === tradeId));
    });
    if (fallback && fallback.contact) return fallback.contact;

    var contacts = (COMPANIES || [])
      .filter(function(c) { return c.name === co.name && c.contact; })
      .map(function(c) { return c.contact; });
    contacts = Array.from(new Set(contacts));
    return contacts.length ? contacts.join(' / ') : 'Référent à renseigner';
  }

  function pickCompany(co) { setSelected(co); setPin(''); setError(''); setStep('pin'); }
  function tapDigit(d) {
    if (pin.length >= 4) return;
    const next = pin + d;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === String(selected.code)) {
          const referentName = getCompanyReferentLabel(selected);
          const session = selected.isAdmin
            ? {role:'admin', name:'Responsable de projet', company:null}
            : {role:'company', name:referentName, company:Object.assign({}, selected, {contact:referentName})};
          onLogin(session);
        } else { setError('Code incorrect'); setPin(''); }
      }, 150);
    }
  }
  function tapBack() { setPin(p => p.slice(0,-1)); setError(''); }

  return (
    <div style={{minHeight:'100vh',background:'var(--hdr)',display:'flex',alignItems:'center',
      justifyContent:'center',padding:20,position:'relative'}}>

        <div style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:2}}>Accès chantier</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>
          {step==='pick'?(loadingCompanies?'Synchronisation des entreprises…':'Sélectionnez votre profil'):'Entrez votre code PIN'}
        </div>

        {step === 'pick' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {allEntries.map(co => {
              const referentLabel = getCompanyReferentLabel(co);
              // Find trade color for this company
              var coTrade = null;
              if (!co.isAdmin && co.tradeId) {
                coTrade = TRADES.find(function(t){ return t.id === co.tradeId; });
              }
              var coColor = coTrade ? getTC(coTrade.color) : null;
              var accentB = coColor ? coColor.b : (co.isAdmin ? '#174EA6' : 'var(--primary)');
              var accentBg = coColor ? coColor.bg : 'var(--primary-l)';
              var accentT = coColor ? coColor.t : 'var(--primary)';
              return (
              <button key={co.id} onClick={()=>pickCompany(co)}
                style={{padding:'12px 10px',background:'var(--surface)',border:'2px solid var(--border)',
                  borderRadius:'var(--r-sm)',cursor:'pointer',textAlign:'left',transition:'all .18s',
                  fontFamily:"'DM Sans',sans-serif",borderLeft:'4px solid '+accentB}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=accentB;e.currentTarget.style.background=accentBg;e.currentTarget.style.borderLeftColor=accentB;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface)';e.currentTarget.style.borderLeftColor=accentB;}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:accentB,flexShrink:0,display:'inline-block'}}></span>
                  <div style={{fontSize:12,fontWeight:800,color:'var(--text)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co.name}</div>
                </div>
                {coTrade && <div style={{fontSize:9,color:accentT,background:accentBg,fontFamily:"'DM Mono',monospace",
                  textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4,display:'inline-block',
                  padding:'1px 6px',borderRadius:10,fontWeight:700}}>{coTrade.short}</div>}
                {!coTrade && co.isAdmin && <div style={{fontSize:9,color:'#174EA6',background:'#EEF4FF',fontFamily:"'DM Mono',monospace",
                  textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4,display:'inline-block',
                  padding:'1px 6px',borderRadius:10,fontWeight:700}}>ADMIN</div>}
                {referentLabel && referentLabel !== 'Référent à renseigner' && (
                  <div style={{fontSize:10,color:'var(--muted)',lineHeight:1.3}}>{referentLabel}</div>
                )}
              </button>
              );
            })}
          </div>
        )}

        {step === 'pin' && (
          <div>
            <button onClick={()=>{setStep('pick');setError('');}}
              style={{background:'none',border:'none',color:'var(--primary)',fontSize:13,cursor:'pointer',
                padding:0,marginBottom:16,fontFamily:"'DM Sans',sans-serif",display:'flex',alignItems:'center',gap:4}}>
              ← {selected?.name}
            </button>
            {/* PIN dots */}
            <div style={{display:'flex',justifyContent:'center',gap:14,marginBottom:20}}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{width:14,height:14,borderRadius:'50%',
                  background:pin.length>i?'var(--primary)':'var(--border)',transition:'background .15s'}}></div>
              ))}
            </div>
            {error && <div style={{background:'rgba(220,38,38,.1)',color:'#DC2626',borderRadius:8,
              padding:'8px 12px',fontSize:13,textAlign:'center',marginBottom:12}}>{error}</div>}
            {/* Numpad */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i)=>(
                <button key={i} onClick={()=>d==='⌫'?tapBack():d?tapDigit(d):null}
                  disabled={!d && d!=='0'}
                  style={{height:54,borderRadius:'var(--r-sm)',border:'1px solid var(--border)',
                    background:d?'var(--surface-2)':'transparent',fontSize:d==='⌫'?18:20,
                    fontWeight:600,cursor:d||d==='0'?'pointer':'default',color:'var(--text)',
                    fontFamily:"'DM Mono',monospace",transition:'all .1s',opacity:(!d&&d!=='0')?0:1}}
                  onMouseEnter={e=>{if(d||d==='0')e.currentTarget.style.background='var(--primary-l)';}}
                  onMouseLeave={e=>{if(d||d==='0')e.currentTarget.style.background='var(--surface-2)';}}>
                  {d}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function getCompanyMainTrade(companyName, data, companies, trades) {
  var co = (companies || []).find(function(c){ return c.name === companyName; });
  var tradeId = co && (co.tradeId || co.trade_id) ? (co.tradeId || co.trade_id) : '';
  if (!tradeId) {
    var counts = {};
    (data || []).filter(function(i){ return i.company === companyName; }).forEach(function(i){ counts[i.trade] = (counts[i.trade] || 0) + 1; });
    var top = Object.entries(counts).sort(function(a,b){ return b[1] - a[1]; })[0];
    tradeId = top ? top[0] : '';
  }
  var tr = trades.find(function(t){ return t.id === tradeId; });
  return tr || trades[0] || null;
}
/* ── QUICK STATUS POPOVER ──────────────────────────────────── */
function QuickStatusPopover({ iv, x, y, onStatusChange, onClose, canChangeStatus }) {
  if (!iv) return null;
  var statuses = [
    {id:'arealis', label:'À réaliser', color:'#9CA3AF'},
    {id:'encours', label:'En cours', color:'#2563EB'},
    {id:'termine', label:'Terminé', color:'#16A34A'},
    {id:'bloque', label:'Bloqué', color:'#DC2626'},
  ];
  var current = effectiveStatus(iv);

  React.useEffect(function(){
    var close = function(e){ if(!e.target.closest('.planify-qsp')) onClose(); };
    document.addEventListener('mousedown', close);
    return function(){ document.removeEventListener('mousedown', close); };
  }, [onClose]);

  // Position: keep within viewport
  var popX = Math.min(x, window.innerWidth - 180);
  var popY = Math.min(y + 8, window.innerHeight - 200);

  return (
    <div className="planify-qsp" style={{
      position:'fixed', left:popX, top:popY, zIndex:9100,
      background:'var(--surface)', border:'1px solid var(--border)',
      borderRadius:'var(--r-sm)', boxShadow:'var(--shadow-lg)',
      minWidth:164, overflow:'hidden', animation:'fadeIn .12s'
    }}>
      <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',
        fontSize:10,fontWeight:700,color:'var(--muted)',fontFamily:"'DM Mono',monospace",
        textTransform:'uppercase',letterSpacing:'.05em'}}>
        Changer le statut
      </div>
      {statuses.map(function(s){
        var isActive = current === s.id;
        return (
          <button key={s.id}
            onClick={function(e){
              e.stopPropagation();
              if (!isActive && canChangeStatus) {
                onStatusChange(iv.id, s.id);
              }
              onClose();
            }}
            style={{
              display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 12px',
              border:'none',borderBottom:'1px solid var(--border)',

            <span style={{width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0}}></span>
            {s.label}
            {isActive && <span style={{marginLeft:'auto',fontSize:10,color:'var(--primary)'}}>●</span>}
          </button>
        );
      })}
      <button onClick={onClose}
        style={{display:'block',width:'100%',padding:'8px 12px',border:'none',
          background:'transparent',color:'var(--muted)',fontSize:11,cursor:'pointer',
          fontFamily:"'DM Sans',sans-serif"}}>Annuler</button>
    </div>
  );
}


/* ── ZONE SITUATION BOARD (Admin Dashboard header) ──────────── */
function ZoneSituationBoard({ zones, data, onOpenDetail }) {
  var today = new Date(); today.setHours(0,0,0,0);

  var zoneStats = zones.map(function(z) {
    var zivs = data.filter(function(i){ return i.zone === z.id; });
    var total = zivs.length;
    var done = zivs.filter(function(i){ return i.status === 'termine'; }).length;
    var late = zivs.filter(function(i){ return effectiveStatus(i) === 'en_retard'; }).length;
    var bloc = zivs.filter(function(i){ return i.status === 'bloque'; }).length;
    var enc = zivs.filter(function(i){ return effectiveStatus(i) === 'encours' && !isTaskFrozenToday(i); }).length;
    var pct = total ? Math.round(done / total * 100) : 0;
    var wd = z.deadline ? workingDaysUntil(z.deadline) : null;
    var risk = late > 0 ? 'danger' : bloc > 0 ? 'warning' : (wd !== null && wd <= 5 && wd >= 0) ? 'warning' : 'ok';
    var riskColor = risk === 'danger' ? '#DC2626' : risk === 'warning' ? '#EA580C' : '#16A34A';
    var floorColor = getZoneFloorColor(z, zones);
    return { z, total, done, late, bloc, enc, pct, wd, risk, riskColor, floorColor };
  });

  var riskCount = zoneStats.filter(function(s){ return s.risk !== 'ok'; }).length;

  return (
    <div style={{marginBottom:14}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text)',textTransform:'uppercase',
          letterSpacing:'.06em',fontFamily:"'DM Mono',monospace"}}>Situation des zones</div>
        {riskCount > 0 && <span style={{fontSize:11,fontWeight:700,color:'#DC2626',
          background:'rgba(220,38,38,.10)',border:'1px solid rgba(220,38,38,.3)',
          borderRadius:20,padding:'2px 9px',fontFamily:"'DM Mono',monospace"}}>
          {riskCount} zone{riskCount>1?'s':''} en alerte
        </span>}
      </div>

      {/* Zone rows */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
        {zoneStats.map(function(s, idx) {
          return (
            <div key={s.z.id}
              style={{
                display:'flex',alignItems:'center',gap:10,
                padding:'10px 14px',
                borderBottom:idx < zoneStats.length-1 ? '1px solid var(--border)' : 'none',
                borderLeft:'3px solid ' + (s.risk !== 'ok' ? s.riskColor : s.floorColor),
                background:s.risk==='danger'?'rgba(220,38,38,.025)':s.risk==='warning'?'rgba(234,88,12,.020)':'transparent',
                transition:'background .12s'
              }}>
              {/* Zone name */}
              <div style={{flex:'0 0 auto',minWidth:0,width:130}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text)',overflow:'hidden',
                  textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.z.name}</div>
                <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)',marginTop:1}}>
                  {s.z.short}
                </div>
              </div>

              {/* Progress bar */}
              <div style={{flex:'1 1 auto',minWidth:60}}>
                <div style={{height:6,background:'var(--surface-2)',borderRadius:3,overflow:'hidden',
                  border:'1px solid var(--border)'}}>
                  <div style={{height:'100%',width:s.pct+'%',borderRadius:3,transition:'width .4s',
                    background:s.pct===100?'#16A34A':s.late>0?'#EA580C':s.bloc>0?'#DC2626':'#2563EB'}}></div>
                </div>
                <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--muted)',marginTop:2}}>
                  {s.done}/{s.total} tâches
                </div>
              </div>

              {/* Stats */}
              <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                {s.late > 0 && <span style={{fontSize:10,fontWeight:800,color:'#EA580C',
                  fontFamily:"'DM Mono',monospace"}}>⏱ {s.late}</span>}
                {s.bloc > 0 && <span style={{fontSize:10,fontWeight:800,color:'#DC2626',
                  fontFamily:"'DM Mono',monospace"}}>⚠ {s.bloc}</span>}
                {s.enc > 0 && <span style={{fontSize:10,fontWeight:700,color:'#2563EB',
                  fontFamily:"'DM Mono',monospace"}}>▶ {s.enc}</span>}
                {s.pct === 100 && <span style={{fontSize:10,fontWeight:800,color:'#16A34A',
                  fontFamily:"'DM Mono',monospace"}}>✓</span>}
              </div>

              {/* Deadline */}
              <div style={{flexShrink:0,textAlign:'right',minWidth:48}}>
                {s.z.deadline ? (
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:800,
                    color:s.wd < 0 ? '#DC2626' : s.wd <= 5 ? '#DC2626' : s.wd <= 14 ? '#EA580C' : '#16A34A'}}>
                    {s.wd < 0 ? 'J+' + Math.abs(s.wd) : 'J-' + s.wd}
                  </span>
                ) : (
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)'}}>—</span>
                )}
                {s.z.deadline && <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{fmtDate(s.z.deadline).slice(0,5)}</div>}
              </div>

              {/* % */}
              <div style={{flexShrink:0,fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:900,
                color:s.pct===100?'#16A34A':s.late>0?'#EA580C':s.bloc>0?'#DC2626':'var(--text)',
                minWidth:40,textAlign:'right'}}>
                {s.pct}%
              </div>
            </div>
          );
        })}
        {zoneStats.length === 0 && (
          <div style={{padding:'20px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune zone configurée</div>
        )}
      </div>
    </div>
  );
}

/* ── UNIFIED TASK ITEM (replaces TaskCard2, EnterpriseTaskItem, TaskRowAdmin) ── */

  if (isLate && iv.end) {
    var endD = new Date(iv.end + 'T00:00:00');
    var nowD = new Date(); nowD.setHours(0, 0, 0, 0);

function isTaskLate(iv) {
  if (!iv || iv.status === 'termine') return false;
  const rawDate = iv.end || iv.start;
  if (!rawDate) return false;
  const due = new Date(rawDate + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return due < today;
}

function isTaskTodoToday(iv) {
  return !!iv && iv.status === 'arealis' && isTaskActiveToday(iv);
}

function ZoneTaskList({ items, zones, trades, onOpenDetail, isAdmin, title, emptyLabel }) {
  const ordered = [...items].sort(function(a,b) {
    const rank = function(iv) {
      if (iv.status === 'bloque') return 0;
      if (isTaskLate(iv)) return 1;
      if (iv.status === 'encours') return 2;
      if (iv.status === 'arealis') return 3;
      if (iv.status === 'termine') return 4;
      return 9;
    };
    const ra = rank(a);
    const rb = rank(b);
    if (ra !== rb) return ra - rb;
    return (a.start || '').localeCompare(b.start || '');
  });

  const counts = ordered.reduce(function(acc, iv) {
    if (!(iv.status === 'encours' && isTaskFrozenToday(iv))) {
      var es = effectiveStatus(iv);
      acc[es] = (acc[es] || 0) + 1;
    }
    acc.total += 1;
    return acc;
  }, { total: 0, termine: 0, encours: 0, bloque: 0, arealis: 0, en_retard: 0 });

  const stat = function(label, value, color) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 7px',
        border:'1px solid var(--border)',borderRadius:20,background:'var(--surface)',

        <span style={{fontWeight:700,color:color}}>{value}</span>
        <span>{label}</span>
      </div>
    );
  };

  return (
    <div style={{margin:'8px 0 14px',padding:'10px 12px',
      background:'var(--surface-2)',border:'1px solid var(--border)',
      borderRadius:'var(--r-sm)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        gap:8,marginBottom:9,flexWrap:'wrap'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',
          fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.04em'}}>
          {title || (isAdmin ? 'Toutes les tâches de la zone' : 'Mes tâches dans cette zone')}
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {stat('total', counts.total, 'var(--muted)')}
          {counts.bloque > 0 && stat('bloquée' + (counts.bloque > 1 ? 's' : ''), counts.bloque, '#DC2626')}
          {counts.en_retard > 0 && stat('en retard', counts.en_retard, '#EA580C')}
          {counts.encours > 0 && stat('en cours', counts.encours, '#2563EB')}

      {ordered.length === 0 ? (

function taskActiveDatesInRange(iv) {
  if (!iv || !iv.start) return [];
  var start = new Date(iv.start + 'T00:00:00');
  var end = new Date((iv.end || iv.start) + 'T00:00:00');
  if (end < start) return [];
  var out = [];
  var cur = new Date(start);
  var safety = 0;
  while (cur <= end && safety < 180) {
    if (isTaskActiveOn(iv, cur)) out.push(dateStr(cur));
    cur.setDate(cur.getDate() + 1);
    safety++;
  }
  return out;
}

function effectiveDueDate(iv) {
  var activeDates = taskActiveDatesInRange(iv);
  if (activeDates.length) return activeDates[activeDates.length - 1];
  return iv && (iv.end || iv.start) ? (iv.end || iv.start) : '';
}

function calcReliability(items) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var todayStr = dateStr(today);

  var enriched = (items || []).map(function(iv){
    return Object.assign({}, iv, {
      _effective_due_date: effectiveDueDate(iv),
      _active_dates_count: taskActiveDatesInRange(iv).length
    });
  });

  var due = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date <= todayStr;
  });

  var notDue = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date > todayStr;
  });

  var doneItems = due.filter(function(iv){ return iv.status === 'termine'; });
  var missedItems = due.filter(function(iv){ return iv.status !== 'termine'; });
  var kept = doneItems.length;
  var value = due.length ? Math.round(kept / due.length * 100) : 100;

  var byStatus = due.reduce(function(acc, iv){
    var k = iv.status || 'arealis';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});

  return {
    value: value,
    label: value + '%',
    done: kept,
    total: due.length,
    lostPoints: due.length ? 100 - value : 0,
    missed: missedItems.length,
    notDue: notDue.length,
    dueItems: due,
    doneItems: doneItems,
    missedItems: missedItems,
    notDueItems: notDue,
    byStatus: byStatus
  };
}

                </div>
                <div style={{fontSize:9,opacity:.55,fontFamily:"'DM Mono',monospace"}}>

                  fontFamily:"'DM Mono',monospace",

                  fontWeight:900,
                  lineHeight:1,

                <div style={{fontSize:9,opacity:.55,fontFamily:"'DM Mono',monospace"}}>
                  Fiabilité
                </div>

          </div>

            <div style={{
              height:'100%',
              width:`${pct}%`,
              background:'#60A5FA',
              borderRadius:4,
              transition:'width .5s ease'

          </div>
        </div>

    return (
      <div onClick={()=>toggle('all')}
        style={{background:'var(--hdr)',borderRadius:'var(--r)',padding:'14px 16px',
          marginBottom:12,cursor:'pointer',boxShadow:'var(--shadow)',
          border:drawer==='all'?'1px solid var(--primary)':'1px solid transparent',
          transition:'transform .12s, border-color .12s'}}
        onMouseEnter={function(e){e.currentTarget.style.transform='translateY(-1px)';}}
        onMouseLeave={function(e){e.currentTarget.style.transform='';}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8,gap:12}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:17,fontWeight:800,color:'#fff',marginBottom:2,letterSpacing:'-.01em',
              whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{title}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.55)',fontFamily:"'DM Mono',monospace"}}>
              {subtitle}
            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.45)',fontFamily:"'DM Mono',monospace",marginTop:4}}>
              Cliquer pour voir toutes les tâches · cliquer sur fiabilité pour le détail{mentionTasks.length ? ' · '+mentionTasks.length+' prérequis assigné'+(mentionTasks.length>1?'s':'') : ''}
            </div>
          </div>
          <div style={{display:'flex',gap:14,alignItems:'flex-start',flexShrink:0,textAlign:'right'}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:pct===100?'#4ADE80':'#fff',
                fontFamily:"'DM Mono',monospace",lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
                Avancement
              </div>
            </div>
            <div title="Cliquer pour voir le détail de la fiabilité"
              onClick={function(e){e.stopPropagation();toggle('fiabilite');}}
              style={{cursor:'pointer',padding:'2px 4px',borderRadius:6,
                outline:drawer==='fiabilite'?'1px solid rgba(255,255,255,.35)':'1px solid transparent'}}>
              <div style={{fontSize:26,fontWeight:800,color:reliability.value>=85?'#4ADE80':reliability.value>=60?'#FBBF24':'#F87171',
                fontFamily:"'DM Mono',monospace",lineHeight:1}}>{reliability.label}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
                Fiabilité
              </div>
            </div>
          </div>
        </div>
        <div style={{height:5,background:'rgba(255,255,255,.15)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,borderRadius:3,
            background:pct===100?'#4ADE80':'#60A5FA',transition:'width .5s ease'}}></div>
        </div>
      </div>
    );
  }

  // ── ADMIN VIEW ─────────────────────────────────────────────
  if (isAdmin) {
    const companies = [...new Set(data.map(i => i.company))].sort();
    const companyStats = companies.map(co => ({
      name:    co,
      total:   data.filter(i => i.company===co).length,
      encours: data.filter(i => i.company===co&&effectiveStatus(i)==='encours'&&!isTaskFrozenToday(i)).length,
      bloque:  data.filter(i => i.company===co&&effectiveStatus(i)==='bloque').length,
      retard:  data.filter(i => i.company===co&&effectiveStatus(i)==='en_retard').length,
      termine: data.filter(i => i.company===co&&effectiveStatus(i)==='termine').length,
    }));

    return (
      <div style={{padding:'14px 12px 100px',overflowY:'auto',height:'100%'}}>

          'HSF — Av. Marceau',

        <ZoneSituationBoard zones={zones} data={data} onOpenDetail={onOpenDetail} />

        {renderStatsGrid()}
        {renderDrawer()}

        <SectionCard title="Zones critiques" accent="#EA580C">
          {(() => {
            const criticalZones = zones.map(function(z){
              const zivs = data.filter(function(i){ return i.zone === z.id; });
              const late = zivs.filter(function(i){ return effectiveStatus(i)==='en_retard'; }).length;
              const bloc = zivs.filter(function(i){ return effectiveStatus(i)==='bloque'; }).length;
              const wd = workingDaysUntil(z.deadline);
              const critical = late > 0 || bloc > 0 || (z.deadline && wd <= 5 && wd >= 0);
              return critical ? {z:z, late:late, bloc:bloc, wd:wd} : null;
            }).filter(Boolean);

                    padding:'9px 10px',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
                    background:'var(--surface-2)',marginBottom:7,cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:getZoneFloorColor(item.z, zones),display:'inline-block'}}></span>
                    <span style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{item.z.name}</span>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',fontFamily:"'DM Mono',monospace",fontSize:10,flexShrink:0}}>
                    {item.late>0&&<span style={{color:'#EA580C',fontWeight:800}}>⏱ {item.late}</span>}
                    {item.bloc>0&&<span style={{color:'#DC2626',fontWeight:800}}>⚠ {item.bloc}</span>}
                    {item.z.deadline&&<span style={{color:item.wd<=5?'#DC2626':'var(--muted)',fontWeight:800}}>J-{item.wd<0?'▲':item.wd}</span>}

        </SectionCard>

        {/* Zone progress */}
        <SectionCard title="Avancement par zone">
          {zones.map(z => {
            const zivs=data.filter(i=>i.zone===z.id);
            const done=zivs.filter(i=>effectiveStatus(i)==='termine').length;
            const bloc=zivs.filter(i=>effectiveStatus(i)==='bloque').length;
            const enc=zivs.filter(i=>effectiveStatus(i)==='encours'&&!isTaskFrozenToday(i)).length;
            const late=zivs.filter(i=>effectiveStatus(i)==='en_retard').length;
            const p=zivs.length?Math.round(done/zivs.length*100):0;
            const wd=workingDaysUntil(z.deadline);
            const dc=z.deadline?(wd<0?'#DC2626':wd<5?'#DC2626':wd<15?'#EA580C':'#16A34A'):'var(--xmuted)';
            const isOpen = openZoneId === z.id;
            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div onClick={function(){toggleZoneDetail(z.id);}}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    marginBottom:4,cursor:'pointer',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    transition:'background .12s'}}
                  onMouseEnter={function(e){e.currentTarget.style.background='var(--surface-2)';}}
                  onMouseLeave={function(e){e.currentTarget.style.background='transparent';}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',flexShrink:0,display:'inline-block',
                      background:getZoneFloorColor(z, zones)}}></span>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</span>
                    {enc>0&&<span style={{fontSize:10,color:'#2563EB',fontWeight:700}}>▶ {enc}</span>}
                    {bloc>0&&<span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ {bloc}</span>}
                    {late>0&&<span style={{fontSize:10,color:'#EA580C',fontWeight:700}}>⏱ {late}</span>}
                    {done>0&&<span style={{fontSize:10,color:'#16A34A',fontWeight:700}}>✓ {done}/{zivs.length}</span>}
                    <span style={{fontSize:10,color:'var(--xmuted)',fontWeight:600}}>
                      {isOpen ? 'Masquer' : 'Voir tâches'}
                    </span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{done}/{zivs.length}</span>
                    {z.deadline&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:dc}}>
                      J-{wd<0?'▲':wd}
                    </span>}
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,
                      color:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'var(--muted)'}}>{p}%</span>
                  </div>

                <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${p}%`,borderRadius:3,transition:'width .4s',
                    background:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'#2563EB'}}></div>
                </div>
                {isOpen && (
                  <ZoneTaskList items={zivs} zones={zones} trades={trades}
                    onOpenDetail={onOpenDetail} isAdmin={true}

              </div>
            );
          })}
        </SectionCard>

        {/* Company table */}
        <SectionCard title="Avancement par entreprise">
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--border)'}}>
                  {['Entreprise','Total','Term.','Retard','%','Dernier jalon'].map(h=>(
                    <th key={h} style={{padding:'4px 6px',textAlign:h==='Entreprise'||h==='Dernier jalon'?'left':'center',
                      fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--muted)',fontWeight:700}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {companyStats.map((co,i)=>{
                  const p2=co.total?Math.round(co.termine/co.total*100):0;
                  const tr2=trades.find(t=>data.find(d=>d.company===co.name&&d.trade===t.id));
                  const c2=getTC(tr2?.color||'navy');
                  // Tâche au plus tard (open tasks, latest end date)
                  const coOpen = data.filter(function(d){ return d.company===co.name && effectiveStatus(d)!=='termine'; });
                  const latestT = coOpen.length ? coOpen.reduce(function(acc,iv){ return (iv.end||iv.start)>(acc.end||acc.start)?iv:acc; }) : null;
                  const ltZ = latestT ? zones.find(function(z){ return z.id===latestT.zone; }) : null;
                  return (
                    <tr key={co.name} style={{borderBottom:'1px solid var(--border)',
                      background:i%2?'var(--surface-2)':'transparent'}}>
                      <td style={{padding:'7px 6px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>

                        </div>

                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{co.total}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'#16A34A',fontWeight:co.termine?700:400}}>{co.termine||'-'}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'#EA580C',fontWeight:co.retard?700:400}}>{co.retard||'-'}</td>
                      <td style={{padding:'7px 6px',minWidth:80}}>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${p2}%`,
                              background:p2===100?'#16A34A':co.retard>0?'#EA580C':'#2563EB',borderRadius:2}}></div>
                          </div>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                            color:p2===100?'#16A34A':co.retard>0?'#EA580C':'var(--muted)',
                            minWidth:28,textAlign:'right',fontWeight:p2===100||co.retard>0?700:400}}>{p2}%</span>
                        </div>
                      </td>
                      <td style={{padding:'7px 6px'}}>
                        {latestT ? (
                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                              color:effectiveStatus(latestT)==='en_retard'?'#EA580C':'var(--muted)',fontWeight:600}}>
                              {fmtDate(latestT.end||latestT.start)}
                            </span>
                            {ltZ&&<span style={{fontSize:9,color:'var(--xmuted)',background:'var(--surface-2)',
                              border:'1px solid var(--border)',borderRadius:3,padding:'0 4px'}}>{ltZ.short}</span>}
                          </div>
                        ) : (
                          <span style={{fontSize:10,color:'#16A34A',fontWeight:700}}>✓ Tout terminé</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </SectionCard>
      </div>
    );
  }

  // ── COMPANY VIEW ───────────────────────────────────────────
  const days = weekDays(weekOffset, true);
  const weekIvs = myData.filter(function(i){ return days.some(function(d){ return isTaskActiveOn(i,d); }); });
  const soon = myData.filter(function(i){
    if(i.status==='termine') return false;
    var st=new Date(i.start+'T00:00:00'), now2=new Date(); now2.setHours(0,0,0,0);
    var diff=(st-now2)/(1000*60*60*24);
    return diff>0&&diff<=10;
  }).sort(function(a,b){return a.start.localeCompare(b.start);});

  // Zones where this company has tasks
  var myZoneIds = [...new Set(myData.map(function(i){return i.zone;}))];
  var myZones = zones.filter(function(z){return myZoneIds.includes(z.id);});

  return (
    <div style={{padding:'12px 12px 100px',overflowY:'auto',height:'100%'}}>
      {renderSummaryBanner(
        myName,
        `${total} tâche${total!==1?'s':''} · ${myZones.length} zone${myZones.length!==1?'s':''}`
      )}

      {renderStatsGrid()}
      {renderDrawer()}

      {/* ── Avancement par zone (mes zones uniquement) ── */}
      {myZones.length > 0 && (
        <SectionCard title="Avancement par zone">
          {myZones.map(function(z){
            var zivs=myData.filter(function(i){return i.zone===z.id;});
            var done=zivs.filter(function(i){return effectiveStatus(i)==='termine';}).length;
            var bloc=zivs.filter(function(i){return effectiveStatus(i)==='bloque';}).length;
            var enc=zivs.filter(function(i){return effectiveStatus(i)==='encours'&&!isTaskFrozenToday(i);}).length;
            var late=zivs.filter(function(i){return effectiveStatus(i)==='en_retard';}).length;
            var p=zivs.length?Math.round(done/zivs.length*100):0;
            var wdv=workingDaysUntil(z.deadline);
            var dc=z.deadline?(wdv<0?'#DC2626':wdv<5?'#DC2626':wdv<15?'#EA580C':'#16A34A'):'var(--xmuted)';
            var fc=getZoneFloorColor(z, zones);
            var isOpen = openZoneId === z.id;
            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div onClick={function(){toggleZoneDetail(z.id);}}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    marginBottom:4,cursor:'pointer',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    transition:'background .12s'}}
                  onMouseEnter={function(e){e.currentTarget.style.background='var(--surface-2)';}}
                  onMouseLeave={function(e){e.currentTarget.style.background='transparent';}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0,display:'inline-block'}}></span>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</span>
                    {bloc>0&&<span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ {bloc} bloquée{bloc>1?'s':''}</span>}
                    {late>0&&<span style={{fontSize:10,color:'#EA580C',fontWeight:700}}>⏱ {late}</span>}
                    {enc>0&&<span style={{fontSize:10,color:'#2563EB',fontWeight:600}}>▶ {enc}</span>}
                    {done>0&&<span style={{fontSize:10,color:'#16A34A',fontWeight:700}}>✓ {done}/{zivs.length}</span>}
                    <span style={{fontSize:10,color:'var(--xmuted)',fontWeight:600}}>
                      {isOpen ? 'Masquer' : 'Voir tâches'}
                    </span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{done}/{zivs.length}</span>
                    {z.deadline&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:dc}}>
                      J-{wdv<0?'▲':wdv}
                    </span>}
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,
                      color:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'var(--muted)'}}>{p}%</span>
                  </div>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:3,transition:'width .4s',
                    width:`${p}%`,background:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'#2563EB'}}></div>
                </div>
                {isOpen && (
                  <ZoneTaskList items={zivs} zones={zones} trades={trades}
                    onOpenDetail={onOpenDetail} isAdmin={false}
                    title="Mes tâches dans cette zone" />
                )}
              </div>
            );
          })}
        </SectionCard>
      )}

      {/* ── Tâches cette semaine ── */}
      <SectionCard title={`Cette semaine — ${weekIvs.length} tâche${weekIvs.length!==1?'s':''}`}>
        {weekIvs.length===0
          ? <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Aucune tâche planifiée cette semaine</div>
          : weekIvs.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})
        }
      </SectionCard>

      {/* ── Prochaines tâches à démarrer (10j) ── */}
      {soon.length > 0 && (
        <SectionCard title={`Prochaines échéances — ${soon.length} tâche${soon.length!==1?'s':''}`}>
          {soon.map(function(iv){return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;}) }
        </SectionCard>
      )}

      {/* ── Toutes mes tâches par statut ── */}
      {(function(){
        var lateIvs=myData.filter(function(i){return effectiveStatus(i)==='en_retard';});
        var sections=[
          {key:'bloque', label:'Bloquées', color:'#DC2626'},
          {key:'encours', label:'En cours', color:'#2563EB'},
          {key:'arealis', label:'À réaliser', color:'var(--muted)'},
          {key:'termine', label:'Terminées', color:'#16A34A'},
        ];
        return (
          <>
            {lateIvs.length>0&&(
              <SectionCard title={'En retard (' + lateIvs.length + ')'} accent='#EA580C'>
                {lateIvs.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})}
              </SectionCard>
            )}
            {sections.map(function(st){
              var items=myData.filter(function(i){
                return effectiveStatus(i)===st.key && !(st.key==='encours' && isTaskFrozenToday(i));
              });
              if(!items.length) return null;
              return (
                <SectionCard key={st.key} title={st.label+' ('+items.length+')'} accent={st.color}>
                  {items.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})}
                </SectionCard>
              );
            })}
          </>
        );
      })()}
    </div>
  );
}



/* ============================================================
   PLANNING SCREEN (weekly grid)
=========================================================== */
function DeadlineCell({ zone, isMulti, isAdmin, setZones }) {
  var dc = deadlineColor(zone.deadline);
  var wd = workingDaysUntil(zone.deadline);
  var lbl = wd < 0 ? '▲' : 'J-' + wd;
  var ds2 = zone.deadline ? zone.deadline.slice(5,10).replace('-','/') : '';
  var [editing, setEditing] = React.useState(false);

  if (editing) return (
    <td style={{borderLeft:'2px solid var(--border-s)',verticalAlign:'middle',
      textAlign:'center',height:isMulti?'40px':'56px',
      padding:isMulti?'2px 1px':'4px 3px',background:dc+'18'}}>
      <input type="date" defaultValue={zone.deadline||''} autoFocus
        onBlur={function(e){
          var val=e.target.value;
          if(val&&val!==zone.deadline){
            setZones(function(prev){return prev.map(function(z){
              return z.id===zone.id?Object.assign({},z,{deadline:val}):z;
            });});
            supaWrite('PATCH','zones',{deadline:val},'id=eq.'+zone.id);
          }
          setEditing(false);
        }}
        onKeyDown={function(e){if(e.key==='Escape')setEditing(false);}}
        style={{width:'100%',border:'none',background:'transparent',

function PlanningScreen({ data, zones, setZones, trades, weekOffset, filter, session, onOpenDetail, onOpenAdd, viewMode, showWeekends = false, taskClipboard = null, onPasteTask, onClearTaskClipboard, selectedTaskIds = [], onToggleTaskSelection, onClearTaskSelection, onMoveSelectedTasks, dependencyLinkMode = null, onStartDependencyLinkMode, onCancelDependencyLinkMode, onChooseDependencyTarget, onValidateDependencyLink, onWeekChange, onQuickStatus, canChangeStatus = true }) {

                        background:dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor'?'rgba(234,88,12,.16)':'rgba(124,58,237,.14)',
                        color:dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor'?'#9A3412':'#6D28D9',
                        border:'1px solid '+(dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor'?'rgba(234,88,12,.45)':'rgba(124,58,237,.38)'),flexShrink:0}}>
                        {dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor'?'PRÉDÉCESSEUR':'SUCCESSEUR'}
                      </span>
                      {selectedTaskCodes.map(function(code){
                        var isPred = dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor';
                        return <span key={code} style={{fontSize:10,fontFamily:UX2.mono,fontWeight:900,
                          color:isPred?'#9A3412':'#6D28D9',
                          background:isPred?'rgba(234,88,12,.09)':'rgba(124,58,237,.09)',
                          border:'1px solid '+(isPred?'rgba(234,88,12,.32)':'rgba(124,58,237,.28)'),
                          borderRadius:999,padding:'2px 7px'}}>{code}</span>;
                      })}
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                      <span style={{fontSize:9.5,fontWeight:900,fontFamily:UX2.mono,letterSpacing:'.04em',padding:'2px 7px',borderRadius:999,
                        background:'rgba(37,99,235,.14)',color:'#1E3A8A',border:'1px solid rgba(37,99,235,.35)',flexShrink:0}}>RÉFÉRENCE</span>
                      {dependencyTargetCode
                        ? <span style={{fontSize:10,fontFamily:UX2.mono,fontWeight:900,color:'#1E3A8A',background:'rgba(37,99,235,.09)',border:'1px solid rgba(37,99,235,.28)',borderRadius:999,padding:'2px 7px'}}>{dependencyTargetCode}</span>
                        : <span style={{fontSize:10,fontFamily:UX2.mono,color:'var(--xmuted)',fontStyle:'italic'}}>cliquez une tâche dans le planning…</span>}
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center',marginTop:2}}>
                    <span style={{fontSize:9.5,fontWeight:900,fontFamily:UX2.mono,padding:'2px 7px',borderRadius:999,background:'rgba(33,82,200,.12)',color:'var(--primary)',border:'1px solid rgba(33,82,200,.28)',flexShrink:0}}>SÉLECTION</span>
                    {selectedTaskCodes.map(function(code){ return <span key={code} style={{fontSize:10,fontFamily:UX2.mono,fontWeight:900,color:'var(--primary)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:999,padding:'2px 7px'}}>{code}</span>; })}
                  </div>
                )}
                <div style={{fontSize:10,color:'var(--muted)',marginTop:6,fontWeight:600,lineHeight:1.4}}>
                  {dependencyLinkActive
                    ? (dependencyTargetId ? '✓ Référence choisie — cliquez Valider le lien pour enregistrer.' : 'Cliquez maintenant une tâche dans le planning pour définir la référence.')
                    : 'Déplacement : cliquez sur une cellule zone/date. Ou créez un lien prédécesseur / successeur.'}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                <button onClick={function(e){ e.stopPropagation(); onStartDependencyLinkMode && onStartDependencyLinkMode('selection_as_predecessor'); }}
                  title="La sélection sera ajoutée comme prédécesseur de la tâche référence"
                  style={{padding:'7px 10px',borderRadius:999,border:'1px solid '+(dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor'?'rgba(234,88,12,.72)':'rgba(234,88,12,.38)'),background:(dependencyLinkMode&&dependencyLinkMode.type==='selection_as_predecessor')?'rgba(234,88,12,.18)':'rgba(234,88,12,.10)',color:'#9A3412',fontSize:10.5,fontWeight:900,fontFamily:UX2.mono,cursor:'pointer'}}>
                  Sélection = préd.
                </button>
                <button onClick={function(e){ e.stopPropagation(); onStartDependencyLinkMode && onStartDependencyLinkMode('selection_as_successor'); }}
                  title="La sélection sera ajoutée comme successeur de la tâche référence"
                  style={{padding:'7px 10px',borderRadius:999,border:'1px solid '+(dependencyLinkMode&&dependencyLinkMode.type==='selection_as_successor'?'rgba(124,58,237,.72)':'rgba(124,58,237,.36)'),background:(dependencyLinkMode&&dependencyLinkMode.type==='selection_as_successor')?'rgba(124,58,237,.18)':'rgba(124,58,237,.10)',color:'#6D28D9',fontSize:10.5,fontWeight:900,fontFamily:UX2.mono,cursor:'pointer'}}>
                  Sélection = succ.
                </button>
                {dependencyLinkActive && (
                  <button onClick={function(e){ e.stopPropagation(); onCancelDependencyLinkMode && onCancelDependencyLinkMode(); }}
                    style={{padding:'7px 10px',borderRadius:999,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--muted)',fontSize:10.5,fontWeight:900,fontFamily:UX2.mono,cursor:'pointer'}}>
                    Annuler lien
                  </button>
                )}
                <button onClick={function(e){ e.stopPropagation(); if(dependencyLinkActive && dependencyTargetId){ onValidateDependencyLink && onValidateDependencyLink(); } }}

                  style={{padding:'8px 13px',borderRadius:999,
                    border:'1px solid '+(dependencyLinkActive&&dependencyTargetId?'var(--primary)':'var(--border)'),
                    background:dependencyLinkActive&&dependencyTargetId?'var(--primary)':'var(--surface-2)',
                    color:dependencyLinkActive&&dependencyTargetId?'#fff':'var(--xmuted)',
                    fontSize:11,fontWeight:900,fontFamily:UX2.mono,
                    cursor:dependencyLinkActive&&dependencyTargetId?'pointer':'not-allowed',
                    opacity:dependencyLinkActive&&dependencyTargetId?1:.65,

                <button onClick={function(){ onClearTaskSelection && onClearTaskSelection(); }}
