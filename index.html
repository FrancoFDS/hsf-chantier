function daysUntil(dateStr) {
  const d = new Date(dateStr+'T00:00:00'), now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}
function deadlineColor(dateStr) {
  const d = daysUntil(dateStr);
  if (d < 0)  return '#DC2626';   // past
  if (d < 14) return '#DC2626';   // danger
  if (d < 21) return '#EA580C';   // warning
  return '#16A34A';               // ok
}

function getMonday(offset = 0) {
  const t = new Date(); const d = t.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const m = new Date(t); m.setDate(t.getDate() + diff + offset * 7); m.setHours(0,0,0,0);
  return m;
}
function weekDays(offset = 0) {
  const m = getMonday(offset);
  return Array.from({length:5}, (_,i) => { const d = new Date(m); d.setDate(m.getDate()+i); return d; });
}
function multiWeekDays(offset = 0, weeks = 1) {
  return Array.from({length: weeks}, (_, w) => weekDays(offset + w)).flat();
}
function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateFR(d)    { return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function fmtDate(s)   { if(!s) return ''; const p=s.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }
function isToday(d)   { return d.toDateString() === new Date().toDateString(); }
function inDay(iv,day){ const s=new Date(iv.start+'T00:00:00'),e=new Date((iv.end||iv.start)+'T00:00:00'),dd=new Date(day); dd.setHours(0,0,0,0); return dd>=s&&dd<=e; }

  const prefix = (company||'').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase();

function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  let count = 0;
  const dir = target >= now ? 1 : -1;
  let cur = new Date(now);

}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

      background:m.bg,color:m.text,fontSize:fs,fontWeight:600,fontFamily:"'DM Mono',monospace",
      border:`1px solid ${m.dot}30`,whiteSpace:'nowrap'}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:m.dot,flexShrink:0,display:'block'}}></span>
      {m.label}
    </span>
  );
}

/* ── TRADE BADGE ──────────────────────────────────────────── */
function TradeBadge({ tradeId, trades, size = 'sm' }) {
  const tr = trades.find(t => t.id === tradeId);
  if (!tr) return null;
  const c = getTC(tr.color);
  const pad = size === 'sm' ? '2px 8px' : '3px 11px';
  const fs  = size === 'sm' ? '10px' : '11px';
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:pad,borderRadius:20,
      background:c.bg,color:c.t,border:`1px solid ${c.b}40`,fontSize:fs,fontWeight:600,
      fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap'}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:c.b,flexShrink:0}}></span>
      {tr.short}
    </span>
  );
}

/* ── SHEET MODAL ──────────────────────────────────────────── */
function SheetModal({ open, onClose, children, maxH = '92vh' }) {
  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:200,
      display:'flex',alignItems:'flex-end',animation:'fadeIn .15s'}}>
      <div onClick={e => e.stopPropagation()} style={{background:'var(--surface)',borderRadius:'20px 20px 0 0',
        width:'100%',maxHeight:maxH,overflowY:'auto',WebkitOverflowScrolling:'touch',
        padding:'0 18px 40px',animation:'slideUp .22s cubic-bezier(.32,.72,0,1)'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'var(--border)',margin:'12px auto 18px'}}></div>
        {children}
      </div>
    </div>
  );
}

/* ── CONFIRM DIALOG ───────────────────────────────────────── */
function ConfirmDialog({ open, message, onConfirm, onCancel }) {
  if (!open) return null;
  return (
    <div onClick={onCancel} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:300,
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderRadius:'var(--r)',
        padding:'24px 20px',maxWidth:340,width:'100%',boxShadow:'var(--shadow-lg)'}}>
        <p style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--text)'}}>Confirmation</p>
        <p style={{fontSize:14,color:'var(--muted)',marginBottom:20,lineHeight:1.5}}>{message}</p>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={btnSecStyle}>Annuler</button>
          <button onClick={onConfirm} style={btnDangerStyle}>Supprimer</button>
        </div>
      </div>
    </div>
  );
}

/* ── TASK CARD (planning grid) ────────────────────────────── */
function TaskCard({ iv, trades, isDark, onClick }) {
  const tr = trades.find(t => t.id === iv.trade);
  const c  = getTC(tr?.color || 'blue');
  const m  = STATUS_META[iv.status] || STATUS_META.arealis;
  const bg = isDark ? c.bgD : c.bg;
  const bdr= isDark ? `${c.b}60` : `${c.b}35`;
  return (
    <div onClick={onClick} style={{borderRadius:8,padding:'5px 7px 5px 9px',marginBottom:3,cursor:'pointer',
      background:bg,borderLeft:`3px solid ${c.b}`,border:`1px solid ${bdr}`,borderLeftWidth:3,
      borderLeftColor:c.b,transition:'opacity .1s, transform .1s',userSelect:'none'}}
      onMouseEnter={e=>{e.currentTarget.style.opacity='.82';e.currentTarget.style.transform='scale(1.01)';}}
      onMouseLeave={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='scale(1)';}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8.5px',color:c.t,opacity:.7,fontWeight:600}}>
          {iv.task_number}
        </span>
        <span style={{width:6,height:6,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:c.t,marginBottom:1,lineHeight:1.2}}>{iv.company}</div>
      <div style={{fontSize:10,color:c.t,opacity:.8,lineHeight:1.35,overflow:'hidden',
        display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{iv.task}</div>
      {iv.prereq && <div style={{fontSize:'8.5px',marginTop:2,color:'#DC2626',opacity:.85,display:'flex',gap:3,alignItems:'flex-start'}}>
        <span>⚠</span><span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{iv.prereq.slice(0,40)}</span>
      </div>}

}

/* ── STAT CHIP ────────────────────────────────────────────── */
function StatChip({ value, label, color, bg, onClick }) {
  return (
    <div onClick={onClick} style={{background:'var(--surface)',border:'1px solid var(--border)',
      borderRadius:'var(--r-sm)',padding:'11px 8px',textAlign:'center',cursor:onClick?'pointer':'default',

/* ── FILTER CHIPS ─────────────────────────────────────────── */
function FilterChips({ trades, filter, onFilter }) {
  return (
    <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2,scrollbarWidth:'none'}}>
      {[{id:'all',short:'Tous',color:''},...trades].map(tr => {

/* ── APP HEADER ───────────────────────────────────────────── */
function AppHeader({ session, weekOffset, onWeekChange, onSettings, onUserMenu, filter, trades, onFilter, zones, data, viewMode, onViewMode, onToday, onRefresh, onPrint }) {
  const weeks = viewMode === '3w' ? 3 : 1;
  const days  = multiWeekDays(weekOffset, weeks);
  const start = days[0], end = days[days.length - 1];

  // Dominant trade per zone (most interventions)
  function dominantColor(zone) {
    const counts = {};
    data.filter(i=>i.zone===zone.id).forEach(i=>{counts[i.trade]=(counts[i.trade]||0)+1;});
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    if (!top) return '#9CA3AF';
    const tr = trades.find(t=>t.id===top[0]);
    return tr ? getTC(tr.color).b : '#9CA3AF';
  }

  return (
    <header style={{background:'var(--hdr)',color:'var(--hdr-text)',padding:'10px 14px 0',flexShrink:0,
      boxShadow:'0 2px 12px rgba(0,0,0,.25)'}}>
      {/* Top row */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
        <div style={{minWidth:0,flex:1,marginRight:8}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,.45)',
            letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}}>Chantier actif</div>
          <div style={{fontSize:15,fontWeight:700,letterSpacing:'-.01em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>HSF — Av. Marceau</div>
          {session && <div style={{fontSize:10,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:1,whiteSpace:'nowrap'}}>
            {session.role==='admin'?'Administrateur':session.company?.name}
          </div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {/* View toggle */}
          <div style={{display:'flex',background:'rgba(255,255,255,.1)',borderRadius:6,padding:2,border:'1px solid rgba(255,255,255,.14)'}}>
            {['1s','2s','3s','tout'].map(v=>(
              <button key={v} onClick={()=>onViewMode(v)}
                style={{padding:'3px 8px',borderRadius:4,border:'none',fontSize:10,fontWeight:700,
                  cursor:'pointer',fontFamily:"'DM Mono',monospace",letterSpacing:'.04em',
                  background:viewMode===v?'rgba(255,255,255,.9)':'transparent',
                  color:viewMode===v?'var(--hdr)':'rgba(255,255,255,.65)',transition:'all .15s'}}>
                {v.toUpperCase()}
              </button>
            ))}
          </div>
          {/* Week nav */}
          <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.08)',
            border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'4px 6px'}}>
            <button onClick={()=>onWeekChange(-1)} style={hdrBtnStyle}>‹</button>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,.7)',
              whiteSpace:'nowrap',minWidth:90,textAlign:'center'}}>
              {dateFR(start)} – {dateFR(end)}
            </span>
            <button onClick={()=>onWeekChange(1)} style={hdrBtnStyle}>›</button>
          </div>
          <button onClick={onToday} title="Aujourd'hui"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:26,height:26,fontSize:11}}>◎</button>
          <button onClick={onRefresh} title="Rafraichir"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:26,height:26,fontSize:13}}>↻</button>
          <button onClick={onPrint} title="Imprimer le planning"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:26,height:26,fontSize:13}}>🖨</button>
          {session?.role==='admin'&&
            <button onClick={onSettings} style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:28,height:28,fontSize:14}}>⚙</button>}
          <button onClick={onUserMenu} style={{background:'var(--primary)',border:'none',borderRadius:6,
            width:28,height:28,color:'#fff',fontSize:10,fontWeight:700,cursor:'pointer',
            fontFamily:"'DM Mono',monospace",letterSpacing:'.03em'}}>
            {(session?.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
          </button>
        </div>
      </div>

      {/* Trade filter chips */}
      <FilterChips trades={trades} filter={filter} onFilter={onFilter} />
      <div style={{height:10}}></div>
    </header>
  );
}

/* ── BOTTOM NAV ───────────────────────────────────────────── */
function BottomNav({ screen, onNav, onAdd, isAdmin }) {
  const items = [
    {id:'dashboard', icon: <DashIcon />, label:'Tableau'},
    {id:'planning',  icon: <PlanIcon />, label:'Planning'},
    null, // FAB slot
    {id:'list',      icon: <ListIcon />, label:'Liste'},
    {id:'settings',  icon: <SettIcon />, label:'Config', adminOnly:true},
  ].filter(i => i === null || !i.adminOnly || isAdmin);

  // ensure FAB slot present
  const hasFab = isAdmin;
  const navItems = hasFab ? items : items.filter(i=>i!==null);

  return (
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--surface)',
      borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',
      justifyContent:'space-around',padding:'8px 0',
      paddingBottom:`max(10px, env(safe-area-inset-bottom))`,zIndex:100,
      boxShadow:'0 -1px 0 var(--border)'}}>
      {navItems.map((item, idx) => {
        if (item === null) return (
          <button key="fab" onClick={onAdd} style={{width:46,height:46,borderRadius:'50%',
            background:'var(--primary)',color:'#fff',border:'none',fontSize:22,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',marginTop:-18,
            boxShadow:'0 4px 16px color-mix(in srgb, var(--primary) 45%, transparent)',
            transition:'transform .15s'}}
            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
            onMouseLeave={e=>e.currentTarget.style.transform=''}>
            +
          </button>
        );
        const active = screen === item.id;
        return (
          <button key={item.id} onClick={() => onNav(item.id)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,
              background:'transparent',border:'none',cursor:'pointer',
              color:active?'var(--primary)':'var(--muted)',padding:'4px 0',
              fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:active?600:400,
              transition:'color .15s'}}>
            <span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {item.icon}
            </span>
            {item.label}
          </button>
        );
      })}
    </nav>
  );
}

/* ── ATTACHMENT DROPZONE ──────────────────────────────────── */
function AttachmentZone({ files, setFiles }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const accept = (fileList) => {
    const valid = [...fileList].filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
    setFiles(prev => [...prev, ...valid.map(f => ({id:genId(), file:f, name:f.name,
      size:f.size, type:f.type, url:URL.createObjectURL(f)}))]);
  };
  return (
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);accept(e.dataTransfer.files);}}
        onClick={()=>inputRef.current.click()}
        style={{border:`2px dashed ${dragging?'var(--primary)':'var(--border)'}`,borderRadius:'var(--r-sm)',
          padding:'16px',textAlign:'center',cursor:'pointer',transition:'all .15s',
          background:dragging?'var(--primary-l)':'transparent'}}>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}}
          onChange={e=>accept(e.target.files)} />
        <div style={{color:'var(--muted)',fontSize:13}}>
          <AttachIcon />
          <div style={{marginTop:6,fontWeight:500}}>Glisser des fichiers ici</div>
          <div style={{fontSize:11,marginTop:2,color:'var(--xmuted)'}}>PDF ou image · cliquer pour parcourir</div>
        </div>
      </div>
      {files.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
          {files.map(f => (
            <div key={f.id} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px 4px 6px',
              background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',fontSize:12}}>
              <span style={{fontSize:14}}>{f.type==='application/pdf'?'📄':'🖼'}</span>
              <span style={{color:'var(--text)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
              <button onClick={e=>{e.stopPropagation();setFiles(p=>p.filter(x=>x.id!==f.id));}}
                style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:14,lineHeight:1,padding:0}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── ZONE PROGRESS BAR ────────────────────────────────────── */
function ZoneProgressBar({ zone, interventions }) {
  const zivs = interventions.filter(i => i.zone === zone.id);
  const total = zivs.length;
  const done  = zivs.filter(i => i.status === 'termine').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const blocked = zivs.some(i => i.status === 'bloque');
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{zone.name}</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {blocked && <span style={{fontSize:10,color:'#DC2626',fontWeight:600}}>⚠</span>}
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{pct}%</span>
        </div>
      </div>
      <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:blocked?'#DC2626':'var(--success)',
          borderRadius:3,transition:'width .3s ease'}}></div>
      </div>
    </div>
  );
}

const _HOLIDAYS = new Set([
  '2026-01-01', // Jour de l an
  '2026-05-01', // Fete du Travail
  '2026-05-08', // Victoire 1945
  '2026-05-14', // Ascension

  '2026-07-14', // Fete Nationale

]);
function _ds(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isHoliday(d) { return _HOLIDAYS.has(_ds(d)); }
function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00'), now = new Date(); now.setHours(0,0,0,0);
  let count = 0, dir = target >= now ? 1 : -1, cur = new Date(now);
  while (cur.toDateString() !== target.toDateString()) {
    cur.setDate(cur.getDate() + dir);
    const dow = cur.getDay(), s = _ds(cur);
    if (dow !== 0 && dow !== 6 && !_HOLIDAYS.has(s)) count += dir;
  }
  return count;
}
function multiWeekDays(offset = 0, weeks = 1) {
  return Array.from({length: weeks}, (_, w) => weekDays(offset + w)).flat();
}

  }).sort(function(a,b){return a.start.localeCompare(b.start);});

  // Zones where this company has tasks
  var myZoneIds = [...new Set(myData.map(function(i){return i.zone;}))];
  var myZones = zones.filter(function(z){return myZoneIds.includes(z.id);});

 {
    const z  = zones.find(function(x){return x.id===iv.zone;});
    const tr = trades.find(function(x){return x.id===iv.trade;});
    const c  = getTC(tr?tr.color:'blue');
    const m  = STATUS_META[iv.status]||STATUS_META.arealis;
    return (
      <div onClick={function(){onOpenDetail(iv.id);}}
        style={{padding:'11px 12px',marginBottom:8,borderRadius:'var(--r-sm)',cursor:'pointer',
          background:'var(--surface)',border:'1px solid var(--border)',
          borderLeft:'4px solid '+c.b,boxShadow:'var(--shadow)',transition:'box-shadow .15s'}}
        onMouseEnter={function(e){e.currentTarget.style.boxShadow='var(--shadow-md)';}}
        onMouseLeave={function(e){e.currentTarget.style.boxShadow='var(--shadow)';}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0,flexWrap:'wrap'}}>
            {iv.task_number&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
              color:'var(--xmuted)',background:'var(--surface-2)',padding:'1px 5px',
              borderRadius:3,border:'1px solid var(--border)',flexShrink:0}}>{iv.task_number}</span>}
            {z&&<span style={{fontSize:10,color:c.b,background:c.bg,padding:'1px 6px',
              borderRadius:10,fontWeight:600,flexShrink:0}}>{z.short}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0,marginLeft:6}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
            <span style={{fontSize:11,fontWeight:600,color:m.dot}}>{m.label}</span>
          </div>
        </div>
        <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.45,marginBottom:5}}>{iv.task}</div>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:iv.prereq||iv.notes?5:0}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)'}}>
            {fmtDate(iv.start)}{iv.end&&iv.end!==iv.start?' → '+fmtDate(iv.end):''}
          </span>
          {iv.off_days&&iv.off_days.length>0&&(
            <span style={{fontSize:9,color:'var(--danger)',fontFamily:"'DM Mono',monospace"}}>
              {iv.off_days.length} jour{iv.off_days.length>1?'s':''} gelé{iv.off_days.length>1?'s':''}
            </span>
          )}
        </div>
        {iv.prereq&&iv.prereq.trim()&&(
          <div style={{fontSize:11,color:'#DC2626',background:'#FEF2F2',padding:'4px 8px',
            borderRadius:3,borderLeft:'3px solid #DC2626',marginBottom:4}}>
            ⚠ Prérequis : {iv.prereq}
          </div>
        )}
        {iv.notes&&iv.notes.trim()&&!iv.notes.startsWith('Etage')&&!iv.notes.startsWith('Étage')&&(
          <div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic',marginTop:2}}>
            {iv.notes}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{padding:'12px 12px 100px',overflowY:'auto',height:'100%'}}>

      {/* ── Bandeau identitaire ── */}
      <div style={{background:'var(--hdr)',borderRadius:'var(--r)',padding:'14px 16px',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:'#fff',marginBottom:2,letterSpacing:'-.01em'}}>{myName}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.55)',fontFamily:"'DM Mono',monospace"}}>
              {total} tâche{total!==1?'s':''} · {myZones.length} zone{myZones.length!==1?'s':''}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:26,fontWeight:800,color:pct===100?'#4ADE80':'#fff',
              fontFamily:"'DM Mono',monospace",lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
              terminé
            </div>
          </div>
        </div>
        <div style={{height:5,background:'rgba(255,255,255,.15)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,borderRadius:3,
            background:pct===100?'#4ADE80':'#60A5FA',transition:'width .5s ease'}}></div>
        </div>
      </div>

      {/* ── 2 chips : En cours + Bloquées ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:12}}>
        <StatChip value={encours.length} label="En cours" color="#2563EB"
          onClick={function(){setDrawer(function(d){return d==='encours'?null:'encours';});}} />
        <StatChip value={blocked.length} label="Bloquées" color="#DC2626"
          onClick={function(){setDrawer(function(d){return d==='bloque'?null:'bloque';});}} />
      </div>

      {/* ── Drawer En cours / Bloquées ── */}
      {drawer && (
        <SectionCard
          title={drawer==='encours'?`En cours (${encours.length})`:`Bloquées (${blocked.length})`}
          accent={drawer==='encours'?'#2563EB':'#DC2626'}>
          {(drawer==='encours'?encours:blocked).length===0
            ? <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Aucune tâche</div>
            : (drawer==='encours'?encours:blocked).map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})
          }
        </SectionCard>
      )}

      {/* ── Avancement par zone (mes zones uniquement) ── */}
      {myZones.length > 0 && (
        <SectionCard title="Avancement par zone">
          {myZones.map(function(z){
            var zivs=myData.filter(function(i){return i.zone===z.id;});
            var done=zivs.filter(function(i){return i.status==='termine';}).length;
            var bloc=zivs.filter(function(i){return i.status==='bloque';}).length;
            var enc=zivs.filter(function(i){return i.status==='encours';}).length;
            var p=zivs.length?Math.round(done/zivs.length*100):0;
            var wdv=workingDaysUntil(z.deadline);
            var dc=z.deadline?(wdv<0?'#DC2626':wdv<5?'#DC2626':wdv<15?'#EA580C':'#16A34A'):'var(--xmuted)';
            var fc=FLOOR_COLORS[z.floor]||'#9CA3AF';
            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0,display:'inline-block'}}></span>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</span>
                    {bloc>0&&<span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ {bloc} bloquée{bloc>1?'s':''}</span>}
                    {enc>0&&<span style={{fontSize:10,color:'#2563EB',fontWeight:600}}>▶ {enc}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{done}/{zivs.length}</span>
                    {z.deadline&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:dc}}>
                      J-{wdv<0?'▲':wdv}
                    </span>}
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,
                      color:p===100?'#16A34A':bloc>0?'#DC2626':'var(--muted)'}}>{p}%</span>
                  </div>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:3,transition:'width .4s',
                    width:`${p}%`,background:p===100?'#16A34A':bloc>0?'#DC2626':'#2563EB'}}></div>
                </div>
              </div>
            );
          })}
        </SectionCard>
      )}

      {/* ── Tâches cette semaine ── */}
      <SectionCard title={`Cette semaine — ${weekIvs.length} tâche${weekIvs.length!==1?'s':''}`}>
        {weekIvs.length===0
          ? <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Aucune tâche planifiée cette semaine</div>
          : weekIvs.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})
        }
      </SectionCard>

      {/* ── Prochaines tâches à démarrer (7j) ── */}
      {soon.length > 0 && (
        <SectionCard title={`Prochaines échéances — ${soon.length} tâche${soon.length!==1?'s':''}`}>
          {soon.map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;}) }
        </SectionCard>
      )}

      {/* ── Toutes mes tâches par statut ── */}
      {[
        {key:'bloque', label:'Bloquées', color:'#DC2626'},
        {key:'encours', label:'En cours', color:'#2563EB'},
        {key:'arealis', label:'À réaliser', color:'var(--muted)'},
        {key:'termine', label:'Terminées', color:'#16A34A'},
      ].map(function(st){
        var items=myData.filter(function(i){return i.status===st.key;});
        if(!items.length) return null;
        return (
          <SectionCard key={st.key} title={`${st.label} (${items.length})`} accent={st.color}>
            {items.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;}) }
          </SectionCard>
        );
      })}
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   PLANNING SCREEN (weekly grid)
═══════════════════════════════════════════════════════════ */
function PlanningScreen({ data, zones, trades, weekOffset, filter, session, onOpenDetail, onOpenAdd, viewMode }) {
  // 'tout' = show all weeks from today to the furthest deadline
  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var now = new Date(); now.setHours(0,0,0,0);
    zones.forEach(function(z){
      if(z.deadline){
        var d = new Date(z.deadline+'T00:00:00');
        var w = Math.ceil((d - now)/(7*24*3600*1000)) + 1;
        if(w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16)); // cap at 16 weeks
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const days = multiWeekDays(weekOffset, weeks);
  const isDark = document.documentElement.getAttribute('data-theme') === 'nuit';
  const filtered = filter === 'all' ? data : data.filter(i => i.trade === filter);
  const isAdmin = session?.role === 'admin';
  const isMulti = weeks > 1;
  const is3s = weeks === 3;
  const zoneColW = isMulti ? '40px' : '58px';
  const deadlineColW = isMulti ? '28px' : '50px';
  const dayColW = '1fr';
  const gridCols = `${zoneColW} repeat(${days.length}, ${dayColW}) ${deadlineColW}`;

  const [zoneFilter, setZoneFilter] = useState([]);
  const [dropOpen, setDropOpen] = useState(false);
  const dropRef = useRef();

  useEffect(() => {
    if (!dropOpen) return;
    const handler = e => { if (dropRef.current && !dropRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [dropOpen]);

  function toggleZone(id) {
    setZoneFilter(prev => {
      if (prev.length === 0) return zones.filter(z => z.id !== id).map(z => z.id);
      if (prev.includes(id)) { const next = prev.filter(x => x !== id); return next.length === zones.length ? [] : next; }
      const next = [...prev, id];
      return next.length === zones.length ? [] : next;
    });
  }
  const visibleZones = zoneFilter.length === 0 ? zones : zones.filter(z => zoneFilter.includes(z.id));
  const activeCount = zoneFilter.length;

  // Floor group boundaries for visual separation
  const floorOf = id => zones.find(z=>z.id===id)?.floor||'';

  return (
    <div style={{overflowY:'auto',height:'100%',padding:isMulti?0:'10px 0',paddingBottom:100}}>
      <div style={{background:'var(--surface)',
        border:isMulti?'none':'1px solid var(--border)',
        margin:isMulti?0:'0 8px',
        borderRadius:isMulti?0:'var(--r)',
        boxShadow:isMulti?'none':'var(--shadow)'}}>

        {/* TABLE-LAYOUT for guaranteed column alignment */}
        <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
          <colgroup>
            <col style={{width:isMulti?'40px':'58px'}} />
            {days.map((_,i) => <col key={i} />)}
            <col style={{width:isMulti?'28px':'50px'}} />
          </colgroup>

          {/* ── STICKY HEADER ── */}
          <thead>
            <tr style={{background:'var(--surface-2)',borderBottom:'2px solid var(--border)'}}>

              {/* Zone filter */}
              <th ref={dropRef} style={{padding:'5px 3px',borderRight:'3px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,background:'var(--surface-2)',
                verticalAlign:'middle',textAlign:'center'}}>
                <button onClick={() => setDropOpen(o => !o)}
                  style={{width:'100%',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    border:`1px solid ${dropOpen||activeCount?'var(--primary)':'var(--border)'}`,
                    background:activeCount?'var(--primary-l)':'transparent',
                    color:activeCount?'var(--primary)':'var(--muted)',
                    fontSize:8,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace",
                    letterSpacing:'.04em',textTransform:'uppercase',lineHeight:1.3}}>
                  {activeCount ? 'Zones' : 'Zones'}
                </button>
                {dropOpen && (
                  <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,minWidth:220,
                    background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
                    boxShadow:'var(--shadow-md)',zIndex:50,overflow:'hidden',textAlign:'left'}}>
                    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',
                      display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',
                        fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.05em'}}>Zones</span>
                      <button onClick={()=>{setZoneFilter([]);setDropOpen(false);}}
                        style={{fontSize:10,color:'var(--primary)',background:'none',border:'none',
                          cursor:'pointer',fontWeight:600}}>Toutes</button>
                    </div>
                    {zones.map(z => {
                      const checked = zoneFilter.length===0||zoneFilter.includes(z.id);
                      const fc = FLOOR_COLORS[z.floor]||'#9CA3AF';
                      return (
                        <div key={z.id} onClick={function(e){e.preventDefault();e.stopPropagation();toggleZone(z.id);}}
                          style={{display:'flex',alignItems:'center',gap:10,
                          padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',
                          background:checked?'var(--primary-l)':'transparent',transition:'background .1s'}}>
                          <div style={{width:14,height:14,borderRadius:3,flexShrink:0,
                            border:`2px solid ${checked?'var(--primary)':'var(--border)'}`,
                            background:checked?'var(--primary)':'transparent',
                            display:'flex',alignItems:'center',justifyContent:'center'}}>
                            {checked&&<span style={{color:'#fff',fontSize:9,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0}}></span>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</div>
                            <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{z.short}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </th>

              {/* Day headers */}
              {days.map((d,i) => {
                const isFirstOfWeek = i % 5 === 0 && i > 0;
                const holiday = isHoliday(d);
                return (
                  <th key={i} style={{
                    padding:isMulti?'3px 0':'6px 2px',
                    textAlign:'center',
                    overflow:'hidden',
                    position:'sticky',top:0,zIndex:11,
                    borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                    background:holiday?'#D1D5DB':isToday(d)?'var(--primary-l)':'var(--surface-2)',
                    fontWeight:'normal',
                    verticalAlign:'middle'}}>
                    {!isMulti && <div style={{fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",
                      color:holiday?'#6B7280':isToday(d)?'var(--primary)':'var(--muted)'}}>
                      {DAYS_FR[d.getDay()-1]}
                    </div>}
                    <div style={{fontSize:isMulti?8:10,fontWeight:isMulti?600:400,
                      fontFamily:"'DM Mono',monospace",
                      color:holiday?'#4B5563':isToday(d)?'var(--primary)':'var(--muted)'}}>
                      {isMulti ? d.getDate() : `${d.getDate()}/${d.getMonth()+1}`}
                    </div>
                    {holiday && <div style={{fontSize:7,fontWeight:700,color:'#4B5563',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>JF</div>}
                  </th>
                );
              })}

              {/* FIN header */}
              <th style={{padding:'4px 1px',textAlign:'center',
                borderLeft:'2px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,
                background:'rgba(220,38,38,.07)',
                verticalAlign:'middle'}}>
                <span style={{fontSize:7,fontWeight:800,color:'#DC2626',
                  fontFamily:"'DM Mono',monospace",
                  writingMode:'vertical-rl',transform:'rotate(180deg)',lineHeight:1}}>FIN</span>
              </th>
            </tr>
          </thead>

          {/* ── ZONE ROWS ── */}
          <tbody>
            {visibleZones.map((zone, zi) => {
              const prevZone = visibleZones[zi - 1];
              const floorChange = zi > 0 && prevZone?.floor !== zone.floor;
              const fc  = FLOOR_COLORS[zone.floor] || '#9CA3AF';
              const dc  = deadlineColor(zone.deadline);
              const rowBg = zone.floor==='R+3' ? 'rgba(33,82,200,.025)' :
                            zone.floor==='R+2' ? 'rgba(13,148,136,.025)' : 'rgba(139,92,246,.025)';

              return (
                <tr key={zone.id} style={{
                  borderTop:floorChange?`3px solid ${fc}`:'none',
                  borderBottom:'1px solid var(--border)',
                  background:rowBg}}>

                  {/* Zone label */}
                  <td style={{padding:isMulti?'2px 1px':'5px 3px',
                    borderRight:'3px solid '+fc,
                    verticalAlign:'middle',textAlign:'center',
                    minHeight:isMulti?40:56,
                    height:isMulti?'40px':'56px',
                    background:`${fc}12`}}>
                    <span style={{fontSize:isMulti?5.5:8,fontWeight:800,color:fc,lineHeight:1.2,
                      fontFamily:"'DM Mono',monospace",letterSpacing:'.03em',
                      textTransform:'uppercase',wordBreak:'break-all',display:'block'}}>
                      {zone.short}
                    </span>
                  </td>

                  {/* Day cells */}
                  {days.map((day, di) => {
                    const ds = dateStr(day);
                    const holiday = isHoliday(day);
                    const isFirstOfWeek = di % 5 === 0 && di > 0;
                    const isDeadline = zone.deadline && ds === zone.deadline;
                    const isPast = zone.deadline && ds > zone.deadline;
                    const cellBg = holiday?'#D1D5DB': isPast&&!isDeadline?'rgba(220,38,38,.07)': isDeadline?'rgba(220,38,38,.18)': isToday(day)?'color-mix(in srgb, var(--primary) 5%, transparent)':'transparent';
                    const cards = (()=>{
                      if(holiday) return [];
                      return filtered.filter(function(iv){
                        if(iv.zone!==zone.id) return false;
                        if(!inDay(iv,day)) return false;
                        var offs=iv.off_days||[];
                        if(offs.length){
                          var dstr=day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
                          if(offs.includes(dstr)) return false;
                        }
                        return true;
                      }).sort(function(a,b){return (a.priority||3)-(b.priority||3);});
                    })();
                    const shown = cards;

                    return (
                      <td key={di}
                        onClick={function(){if(isAdmin&&!holiday)onOpenAdd(zone.id,ds);}}
                        style={{
                          padding:isMulti?0:2,
                          height:isMulti?'40px':'56px',
                          verticalAlign:'top',
                          borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                          background:cellBg,
                          cursor:isAdmin&&!holiday?'pointer':'default',
                          transition:'background .1s'}}
                        onMouseEnter={function(e){if(isAdmin&&!holiday)e.currentTarget.style.background='var(--surface-2)';}}
                        onMouseLeave={function(e){e.currentTarget.style.background=cellBg;}}>
                        {shown.map(function(iv){
                          if(isMulti){
                            var _tr=trades.find(function(t){return t.id===iv.trade;});
                            var _c=getTC(_tr?_tr.color:'blue');
                            var _m=STATUS_META[iv.status]||STATUS_META.arealis;
                            return (
                              <div key={iv.id} onClick={function(e){e.stopPropagation();onOpenDetail(iv.id);}}
                                style={{borderRadius:3,padding:'2px 3px',marginBottom:1,cursor:'pointer',
                                  background:_c.bg,borderLeft:'2px solid '+_c.b,overflow:'hidden'}}>
                                <div style={{display:'flex',alignItems:'center',gap:2}}>
                                  <span style={{fontSize:weeks===2?7:6.5,fontWeight:700,color:_c.t,
                                    overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',
                                    lineHeight:1.3,flex:1}}>{iv.company}</span>
                                  <span style={{width:4,height:4,borderRadius:'50%',
                                    background:_m.dot,flexShrink:0}}></span>
                                </div>
                                {weeks===2&&<div style={{fontSize:6.5,color:_c.t,opacity:.7,
                                  lineHeight:1.2,overflow:'hidden',whiteSpace:'nowrap',
                                  textOverflow:'ellipsis'}}>{iv.task}</div>}
                              </div>
                            );
                          }
                          return (
                            <TaskCard key={iv.id} iv={iv} trades={trades} isDark={isDark}
                              onClick={function(e){e.stopPropagation();onOpenDetail(iv.id);}} />
                          );
                        })}
                      </td>
                    );
                  })}

                  {/* FIN cell */}
                  <td style={{borderLeft:'2px solid var(--border-s)',
                    verticalAlign:'middle',textAlign:'center',
                    height:isMulti?'40px':'56px',
                    padding:isMulti?'2px 1px':'4px 3px',
                    background:`${dc}12`}}>
                    {(()=>{
                      const wd=workingDaysUntil(zone.deadline);
                      const lbl=wd<0?'▲':`J-${wd}`;
                      const ds2=zone.deadline?zone.deadline.slice(5,10).replace('-','/') : '';
                      const [editing,setEditing]=React.useState(false);
                      return editing?(
                        <div>
                          <input type="date" defaultValue={zone.deadline||''} autoFocus
                            onBlur={function(e){
                              var val=e.target.value;
                              if(val&&val!==zone.deadline){
                                setZones(function(prev){return prev.map(function(z){return z.id===zone.id?Object.assign({},z,{deadline:val}):z;});});
                                supaWrite('PATCH','zones',{deadline:val},'id=eq.'+zone.id);
                              }
                              setEditing(false);
                            }}
                            onKeyDown={function(e){if(e.key==='Escape')setEditing(false);}}
                            style={{width:'100%',border:'none',background:'transparent',
                              fontSize:7,fontFamily:"'DM Mono',monospace",
                              color:dc,textAlign:'center',outline:'none'}} />
                        </div>
                      ):(
                        <div onClick={isAdmin?function(){setEditing(true);}:undefined}
                          style={{cursor:isAdmin?'pointer':'default'}}>
                          <div style={{fontSize:isMulti?7:8.5,fontWeight:800,color:dc,
                            fontFamily:"'DM Mono',monospace",textAlign:'center',lineHeight:1.15,
                            whiteSpace:'nowrap'}}>
                            {zone.deadline?lbl:'—'}
                          </div>
                          <div style={{fontSize:6.5,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",
                            marginTop:2,textAlign:'center',lineHeight:1,whiteSpace:'nowrap'}}>
                            {ds2||''}
                          </div>
                        </div>
                      );
                    })()}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   LIST SCREEN
═══════════════════════════════════════════════════════════ */
function ListScreen({ data, zones, trades, weekOffset, filter, onOpenDetail }) {
  const days = weekDays(weekOffset);
  const filtered = (filter==='all'?data:data.filter(i=>i.trade===filter))
    .filter(i=>days.some(d=>inDay(i,d)))
    .sort((a,b)=>a.start!==b.start?a.start.localeCompare(b.start):(a.priority||3)-(b.priority||3));

  if (!filtered.length) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      height:'100%',color:'var(--muted)',gap:8}}>
      <div style={{fontSize:36,opacity:.3}}>📋</div>
      <div style={{fontSize:15,fontWeight:600}}>Aucune intervention cette semaine</div>
      <div style={{fontSize:13}}>Changez la semaine ou le filtre</div>
    </div>
  );

  // Group by date
  const grouped = {};
  filtered.forEach(iv => {
    if (!grouped[iv.start]) grouped[iv.start] = [];
    grouped[iv.start].push(iv);
  });

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
      {Object.entries(grouped).map(([date, ivs]) => (
        <div key={date} style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',
            textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8,
            paddingBottom:5,borderBottom:'1px solid var(--border)'}}>
            {fmtDate(date)} — {new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long'})}
          </div>
          {ivs.map(iv=>{
            const z=zones.find(x=>x.id===iv.zone);
            const tr=trades.find(t=>t.id===iv.trade);
            const c=getTC(tr?.color||'blue');
            return (
              <div key={iv.id} onClick={()=>onOpenDetail(iv.id)}
                style={{background:'var(--surface)',border:'1px solid var(--border)',
                  borderLeft:`3px solid ${c.b}`,borderRadius:'var(--r-sm)',padding:'11px 13px',
                  marginBottom:7,cursor:'pointer',boxShadow:'var(--shadow)',transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translateX(2px)';e.currentTarget.style.borderColor=c.b;}}
                onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='var(--border)';}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{iv.company}</div>
                    {iv.task_number&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--muted)',marginTop:1}}>{iv.task_number}</div>}
                  </div>
                  <StatusBadge status={iv.status} size="sm" />
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:4,lineHeight:1.4}}>{iv.task}</div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {z&&<span style={{fontSize:11,color:'var(--xmuted)'}}>{z.name}</span>}
                  <TradeBadge tradeId={iv.trade} trades={trades} />
                  {iv.end&&iv.end!==iv.start&&<span style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>→ {fmtDate(iv.end)}</span>}
                </div>
                {iv.prereq&&<div style={{marginTop:6,fontSize:11,color:'#DC2626',background:'rgba(220,38,38,.08)',
                  borderLeft:'2px solid #DC2626',padding:'4px 7px',borderRadius:'0 4px 4px 0'}}>⚠ {iv.prereq}</div>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function SettingsScreen({ zones, trades, setZones, setTrades }) {

  const [newTrade, setNewTrade] = useState(null);
  const PALETTE = Object.keys(TRADE_COLORS);

  function saveZone(z) {
    setZones(prev => prev.map(x => x.id===z.id ? z : x));
    setEditingZone(null);
    supaWrite('PATCH','zones',{name:z.name,short:z.short,floor:z.floor,deadline:z.deadline||null},'id=eq.'+z.id);
  }
  function saveTrade(t) {
    setTrades(prev => prev.map(x => x.id===t.id ? t : x));
    setEditingTrade(null);
    supaWrite('PATCH','trades',{name:t.name,short:t.short,color:t.color},'id=eq.'+t.id);
  }
  function addZone() {
    if (!newZone?.name||!newZone?.short) return;
    setZones(prev=>[...prev,{id:'z_'+genId(),name:newZone.name,short:newZone.short}]);
    setNewZone(null);
  }
  function addTrade() {
    if (!newTrade?.name||!newTrade?.short) return;
    setTrades(prev=>[...prev,{id:'tr_'+genId(),name:newTrade.name,short:newTrade.short,color:newTrade.color||'blue'}]);

              borderBottom:tab===t?'2px solid var(--primary)':'2px solid transparent',marginBottom:-1}}>
            {t==='zones'?'Zones':'Corps de métier'}

      {tab==='zones' && (
        <div>
          {zones.map((z,i)=>(

              borderRadius:'var(--r-sm)',padding:'11px 13px',marginBottom:7,boxShadow:'var(--shadow)'}}>

                  <input value={editingZone.short} onChange={e=>setEditingZone({...editingZone,short:e.target.value})}

          {newZone ? (

              padding:'11px 13px',marginBottom:7,display:'flex',flexWrap:'wrap',gap:7,alignItems:'center'}}>

          {newTrade ? (
            <div style={{background:'var(--surface)',border:'1px solid var(--primary)',borderRadius:'var(--r-sm)',

function StatusWithNote({ iv, session, onStatusChange }) {
  var [pendingStatus, setPendingStatus] = React.useState(null);
  var [noteText, setNoteText] = React.useState('');
  var [saved, setSaved] = React.useState(false);
  var m2 = pendingStatus ? (STATUS_META[pendingStatus]||STATUS_META.arealis) : null;

  function confirm() {
    onStatusChange(iv.id, pendingStatus, noteText.trim());
    setSaved(true);
    setTimeout(function(){ setSaved(false); setPendingStatus(null); setNoteText(''); }, 1800);
  }
  function cancel() { setPendingStatus(null); setNoteText(''); }

  return (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',

        {Object.entries(STATUS_META).map(function(entry){

              style={{padding:'9px 6px',borderRadius:'var(--r-sm)',

              <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
              {m.label}
            </button>
          );
        })}
      </div>
      {pendingStatus && !saved && (
        <div style={{marginTop:10,padding:'12px',background:'var(--surface-2)',

          <textarea
            value={noteText}

                background:m2?m2.dot:'var(--primary)',color:'#fff',fontSize:13,fontWeight:700,

            <button onClick={cancel}
              style={{padding:'10px 14px',borderRadius:'var(--r-sm)',

                color:'var(--muted)',fontSize:13,cursor:'pointer',
                fontFamily:"'DM Sans',sans-serif"}}>
              Annuler

          </div>

        <div style={{marginTop:8,padding:'8px 12px',background:'var(--success-l)',
          borderRadius:'var(--r-sm)',fontSize:12,color:'var(--success)',fontWeight:600,
          textAlign:'center'}}>Statut mis à jour</div>
      )}
    </div>
  );
}

function FrozenDaysField({ form, set }) {
  // Build list of all dates in the intervention range (excluding weekends)
  var start = form.start, end = form.end||form.start;
  if (!start) return (
    <div style={{fontSize:11,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",padding:'8px 0'}}>
      Saisissez d’abord une date de début
    </div>
  );

  var dates = [];
  var cur = new Date(start+'T00:00:00');
  var endD = new Date((end||start)+'T00:00:00');
  var safety = 0;
  while (cur <= endD && safety < 60) {
    var dow = cur.getDay();
    if (dow !== 0 && dow !== 6) { // exclude weekends
      var ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
      dates.push(ds);
    }
    cur.setDate(cur.getDate()+1);
    safety++;
  }

  if (!dates.length) return null;

  var offs = form.off_days || [];
  var DAY_SHORT = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  var MONTHS_SHORT = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

  function toggle(ds) {
    set('off_days', offs.includes(ds) ? offs.filter(function(x){return x!==ds;}) : [...offs, ds]);
  }

  return (
    <div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
        {dates.map(function(ds) {
          var d = new Date(ds+'T00:00:00');
          var active = offs.includes(ds);
          return (
            <button key={ds} type="button" onClick={function(){toggle(ds);}}
              style={{display:'flex',flexDirection:'column',alignItems:'center',
                padding:'6px 8px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',
                border:'1.5px solid '+(active?'var(--danger)':'var(--border)'),
                background:active?'var(--danger-l)':'var(--surface)',
                color:active?'var(--danger)':'var(--muted)',
                minWidth:36,fontFamily:"'DM Sans',sans-serif",transition:'all .15s'}}>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{DAY_SHORT[d.getDay()]}</span>
              <span>{d.getDate()}</span>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{MONTHS_SHORT[d.getMonth()]}</span>
            </button>
          );
        })}
      </div>
      {offs.length > 0 && (
        <div style={{fontSize:10,color:'var(--danger)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
          {offs.length} jour{offs.length>1?'s':''} gelé{offs.length>1?'s':''}
          {' — '}
          <span style={{cursor:'pointer',textDecoration:'underline'}}
            onClick={function(){set('off_days',[]);}}>tout effacer</span>
        </div>
      )}
      {offs.length === 0 && (
        <div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>
          Cliquez les jours à exclure du planning
        </div>
      )}
    </div>
  );
}

  // ── Core fetch helper ────────────────────────────────────────────────
  function sbFetch(method, table, body, query) {

      .catch(function(e){ console.error('[Planify] Supabase error:',e); });

  // ── Load all data from Supabase ──────────────────────────────────────
  function loadFromSupabase(sess) {

          attachments:[], off_days:r.off_days||[]
        });
      }));

  function handleSave(iv) {

    } else {

  function handleDelete(id) {

  // ── Print planning ───────────────────────────────────────────────────
  function printPlanning() {
    var now = new Date();
    var nowStr = now.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});

    // Build weeks array
    var weeksCount = viewMode==='tout' ? (function(){

    function wd(ds2){if(!ds2)return null; var t=new Date(ds2+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);var c=0,dir=t>=n?1:-1,cur=new Date(n);var hols=['2026-01-01','2026-05-01','2026-05-08','2026-05-14','2026-05-25','2026-07-14'];while(cur.toDateString()!==t.toDateString()){cur.setDate(cur.getDate()+dir);var dow=cur.getDay(),s2=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');if(dow!==0&&dow!==6&&!hols.includes(s2))c+=dir;}return c;}

    html += '<style>';
    html += '*{box-sizing:border-box;margin:0;padding:0;}';

    html += '@page{size:A4 landscape;margin:8mm 8mm 10mm 8mm;}';
    html += '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}';
    html += '.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;border-bottom:2px solid #333;padding-bottom:4px;}';
    html += '.title{font-size:14px;font-weight:bold;color:#1a1a1a;}';
    html += '.subtitle{font-size:9px;color:#555;margin-top:2px;}';
    html += '.meta{text-align:right;font-size:8px;color:#666;font-family:monospace;}';
    html += 'table{width:100%;border-collapse:collapse;table-layout:fixed;}';
    html += 'th{'+thStyle+'}';
    html += 'td{'+colStyle+'font-size:'+(weeksCount>2?'7':'8')+'px;}';
    html += '.zone-cell{font-weight:bold;font-size:'+(weeksCount>2?'7':'8')+'px;background:#f8f8f8;text-align:center;padding:3px 2px;width:42px;word-break:break-all;vertical-align:middle;}';

    html += '.task-card{border-radius:3px;padding:2px 3px;margin-bottom:2px;border-left:3px solid #999;background:#f9f9f9;page-break-inside:avoid;}';
    html += '.task-co{font-weight:bold;font-size:'+(weeksCount>2?'6.5':'8')+'px;}';
    html += '.task-desc{font-size:'+(weeksCount>2?'6':'7.5')+'px;color:#333;margin-top:1px;}';
    html += '.task-prereq{font-size:6.5px;color:#c00;margin-top:1px;border-left:2px solid #c00;padding-left:3px;}';
    html += '.task-num{font-size:6px;color:#999;font-family:monospace;}';
    html += '.holiday{background:#d0d3d8!important;}';
    html += '.today{background:#e8f0ff!important;}';
    html += '.deadline{background:#ffe8e8!important;}';
    html += '.floor-sep{border-top:3px solid #333!important;}';
    html += '.legend{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;font-size:7px;border-top:1px solid #ccc;padding-top:4px;}';
    html += '.leg-item{display:flex;align-items:center;gap:3px;}';
    html += '.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}';
    html += '.zones-legend{margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;font-size:7px;}';
    html += '.zone-leg{display:flex;align-items:center;gap:4px;}';
    html += '.zone-dot{width:8px;height:8px;border-radius:50%;}';
    html += '</style></head><body>';

    // Header
    html += '<div class="header">';
    html += '<div>';
    html += '<div class="title">Planify — HSF 66 Av. Marceau</div>';
    html += '<div class="subtitle">Planning du '+periodStr+' &nbsp;|&nbsp; Vue : '+viewMode.toUpperCase()+' &nbsp;|&nbsp; Imprimé le '+nowStr+'</div>';
    html += '</div>';
    html += '<div class="meta">';
    html += 'Zones affichées : '+zones.length+'<br>';
    html += 'Tâches : '+data.length;
    html += '</div>';
    html += '</div>';

    // Table
    html += '<table><colgroup>';
    html += '<col style="width:42px">';
    allDays.forEach(function(){html += '<col style="width:'+colW+'">';});
    html += '<col style="width:30px">';
    html += '</colgroup><thead><tr>';
    html += '<th style="width:42px;background:#e8e8e8;">Zone</th>';

    allDays.forEach(function(d,i){
      var hol = isHol(d);
      var isFirst = i>0 && i%5===0;
      var bg = hol?'#d0d3d8':'#f0f0f0';
      var border = isFirst?'border-left:2px solid #999;':'';
      html += '<th style="'+border+'background:'+bg+';">';
      html += '<div>'+DAYS_S[d.getDay()-1]+'</div>';
      html += '<div style="font-size:'+(weeksCount>2?'7':'8')+'px;font-weight:bold;">'+d.getDate()+'</div>';
      html += '<div>'+MONTHS[d.getMonth()]+'</div>';
      if(hol) html += '<div style="color:#666;font-size:6px;">JF</div>';
      html += '</th>';
    });
    html += '<th style="background:#ffe8e8;font-size:7px;writing-mode:vertical-rl;transform:rotate(180deg);">FIN</th>';
    html += '</tr></thead><tbody>';

    // Zone rows
    var prevFloor = null;
    zones.forEach(function(zone){
      var floorChange = prevFloor !== null && prevFloor !== zone.floor;
      prevFloor = zone.floor;
      var fc = {R3:'#2152C8',R2:'#0D9488','R+3':'#2152C8','R+2':'#0D9488','R+1':'#8B5CF6'}[zone.floor]||'#9CA3AF';
      var wdVal = wd(zone.deadline);
      var trClass = floorChange?'class="floor-sep"':'';

      html += '<tr '+trClass+'>';
      html += '<td class="zone-cell" style="border-right:3px solid '+fc+';color:'+fc+';">';
      html += '<div>'+zone.short+'</div>';
      if(zone.deadline){
        var wdStr = wdVal===null?'':wdVal<0?'▲':'J-'+wdVal;
        var wdColor = wdVal!==null&&wdVal<5?'#DC2626':'#666';
        html += '<div style="font-size:6px;color:'+wdColor+';margin-top:2px;">'+wdStr+'</div>';
        html += '<div style="font-size:6px;color:#999;">'+zone.deadline.slice(5,10).replace('-','/')+'</div>';
      }
      html += '</td>';

      allDays.forEach(function(day,i){
        var dayStr = ds(day);
        var hol = isHol(day);
        var isFirst = i>0&&i%5===0;
        var isDeadline = zone.deadline && dayStr===zone.deadline;
        var isPast = zone.deadline && dayStr>zone.deadline;
        var bg = hol?'#d0d3d8':isPast&&!isDeadline?'rgba(220,38,38,.07)':isDeadline?'#ffe0e0':'transparent';
        var border = isFirst?'border-left:2px solid #aaa;':'';

        var cards = hol?[]:data.filter(function(iv){
          if(iv.zone!==zone.id) return false;
          if(!inDay(iv,day)) return false;
          var offs=iv.off_days||[];
          if(offs.includes(dayStr)) return false;
          return true;
        });

        html += '<td style="'+border+'background:'+bg+';">';
        cards.forEach(function(iv){
          var tr2 = trades.find(function(t){return t.id===iv.trade;});
          var color = tr2 ? (HEX[tr2.color]||'#999') : '#999';
          html += '<div class="task-card" style="border-left-color:'+color+';background:'+color+'15;">';
          html += '<div class="task-num">'+iv.task_number+'</div>';
          html += '<div class="task-co" style="color:'+color+';">'+iv.company+'</div>';
          html += '<div class="task-desc">'+iv.task+'</div>';
          if(iv.prereq&&iv.prereq.trim()){
            html += '<div class="task-prereq">'+iv.prereq+'</div>';
          }
          if(iv.notes&&iv.notes.trim()&&!iv.notes.startsWith('Etage')&&!iv.notes.startsWith('Étage')){
            html += '<div style="font-size:6px;color:#555;margin-top:1px;font-style:italic;">'+iv.notes+'</div>';
          }
          html += '</div>';
        });
        html += '</td>';
      });

      // FIN cell
      if(zone.deadline){
        var wdVal2=wd(zone.deadline);
        var wdStr2=wdVal2===null?'':wdVal2<0?'▲':'J-'+wdVal2;
        var wdCol2=wdVal2!==null&&wdVal2<5?'#DC2626':'#333';
        html += '<td class="fin-cell"><div style="font-weight:bold;color:'+wdCol2+';">'+wdStr2+'</div>';
        html += '<div style="font-size:6px;color:#999;">'+zone.deadline.slice(5,10).replace('-','/')+'</div></td>';
      } else {
        html += '<td class="fin-cell" style="color:#ccc;">—</td>';
      }

      html += '</tr>';
    });

    html += '</tbody></table>';

    // Legend — trades
    html += '<div class="legend">';
    html += '<strong style="font-size:7px;color:#333;margin-right:4px;">Corps de métier :</strong>';
    Object.values(usedTrades).forEach(function(tr){
      var color = HEX[tr.color]||'#999';
      html += '<div class="leg-item"><div class="leg-dot" style="background:'+color+';"></div><span>'+tr.name+'</span></div>';
    });
    html += '</div>';

    // Legend — zones
    html += '<div class="zones-legend">';
    var floors = {};
    zones.forEach(function(z){if(!floors[z.floor])floors[z.floor]=[];floors[z.floor].push(z);});
    var floorColors={'R+3':'#2152C8','R+2':'#0D9488','R+1':'#8B5CF6'};
    Object.entries(floors).forEach(function(e){
      var floor=e[0], fzones=e[1];
      var fc2=floorColors[floor]||'#9CA3AF';
      html += '<div class="zone-leg"><div class="zone-dot" style="background:'+fc2+';"></div>';
      html += '<strong>'+floor+' :</strong>';
      fzones.forEach(function(z){
        var wdV=wd(z.deadline);
        var wdS=wdV===null?'':' J-'+(wdV<0?'▲':wdV);
        html += '<span style="margin-left:4px;">'+z.name+(wdS?'<span style="color:#c00;">'+wdS+'</span>':'')+'</span>';
      });
      html += '</div>';
    });
    html += '</div>';

    // Status legend
    html += '<div style="margin-top:4px;display:flex;gap:8px;font-size:7px;color:#666;">';
    html += '<span style="background:#d0d3d8;padding:1px 4px;border-radius:2px;">Gris = Jour férié</span>';
    html += '<span style="background:#ffe8e8;padding:1px 4px;border-radius:2px;">Rouge = Après jalon</span>';
    html += '<span style="background:#e8f0ff;padding:1px 4px;border-radius:2px;">Bleu = Aujourd’hui</span>';
    html += '</div>';

    html += '</body></html>';

    var w2 = window.open('','_blank','width=1200,height=800');
    w2.document.write(html);
    w2.document.close();
    setTimeout(function(){w2.print();},800);
  }


  return (
    <>
      <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
        <AppHeader session={session} weekOffset={weekOffset}
          onWeekChange={d=>setWeekOffset(o=>o+d)}
          onSettings={()=>setScreen('settings')}
          onUserMenu={()=>setUserMenu(true)}
          filter={filter} trades={trades} onFilter={setFilter}
          zones={zones} data={data}
          viewMode={viewMode} onViewMode={setViewMode}
          onToday={()=>setWeekOffset(0)}
          onPrint={printPlanning}
          onRefresh={()=>{
            loadFromSupabase(session);
          }} />
        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {mainContent()}
        </div>
        <BottomNav screen={screen} onNav={setScreen}
          onAdd={()=>openAdd()} isAdmin={isAdmin} />
      </div>

      {/* Modals */}
      <DetailModal open={modal?.type==='detail'} ivId={modal?.id}
        data={data} zones={zones} trades={trades} session={session}
        onClose={closeModal} onStatusChange={handleStatusChange} onEdit={openEdit} />
      <AddEditModal open={modal?.type==='add'||modal?.type==='edit'}
        editId={modal?.type==='edit'?modal?.id:null}
        preZone={modal?.zone} preDate={modal?.date}
        data={data} zones={zones} trades={trades}
        onClose={closeModal} onSave={handleSave} onDelete={handleDelete} />
      <UserMenuModal open={userMenu} session={session}
        onClose={()=>setUserMenu(false)} onLogout={handleLogout} />

      <TweaksPanel>
        <TweakSection label="Apparence" />
        <TweakRadio label="Thème" value={tweaks.theme}
          options={['terrain','studio','nuit']}
          onChange={v => setTweak('theme', v)} />
      </TweaksPanel>
    </>
  );
}

</script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<PlanifyApp />);
</script>
</body>
</html>
