function daysUntil(dateStr) {
  const d = new Date(dateStr+'T00:00:00'), now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}
function deadlineColor(dateStr) {
  const d = daysUntil(dateStr);
  if (d < 0)  return '#DC2626';   // past
  if (d < 14) return '#DC2626';   // danger
  if (d < 21) return '#EA580C';   // warning
  return '#16A34A';               // ok
}

// ─── UTILITIES ──────────────────────────────────────────────────
function getMonday(offset = 0) {
  const t = new Date(); const d = t.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const m = new Date(t); m.setDate(t.getDate() + diff + offset * 7); m.setHours(0,0,0,0);
  return m;
}
function weekDays(offset = 0, includeWeekends = false) {
  const m = getMonday(offset);
  const length = includeWeekends ? 7 : 5;
  return Array.from({length:length}, (_,i) => { const d = new Date(m); d.setDate(m.getDate()+i); return d; });
}
function multiWeekDays(offset = 0, weeks = 1, includeWeekends = false) {
  return Array.from({length: weeks}, (_, w) => weekDays(offset + w, includeWeekends)).flat();
}
function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateFR(d)    { return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function fmtDate(s)   { if(!s) return ''; const p=s.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }
function isToday(d)   { return d.toDateString() === new Date().toDateString(); }
function inDay(iv,day){ const s=new Date(iv.start+'T00:00:00'),e=new Date((iv.end||iv.start)+'T00:00:00'),dd=new Date(day); dd.setHours(0,0,0,0); return dd>=s&&dd<=e; }
function isTaskFrozenOn(iv, day) {
  if (!iv) return false;
  const ds = typeof day === 'string' ? day : dateStr(day);
  const explicitStart = iv.start === ds;
  const explicitEnd = (iv.end || iv.start) === ds;

  // Un jour gelé exclut la tâche uniquement si la tâche n'est pas explicitement affectée ce jour-là.
  // Exemple :
  // - tâche vendredi → lundi : samedi/dimanche gelés = exclus
  // - tâche créée directement samedi : samedi = visible
  // - tâche qui finit dimanche : dimanche = visible
  if (explicitStart || explicitEnd) return false;

  return Array.isArray(iv.off_days) && iv.off_days.includes(ds);
}
function isTaskActiveOn(iv, day) {
  return inDay(iv, day) && !isTaskFrozenOn(iv, day);
}
function isTaskFrozenToday(iv) {
  const t = new Date(); t.setHours(0,0,0,0);
  return inDay(iv, t) && isTaskFrozenOn(iv, t);
}
function isTaskActiveToday(iv) {
  const t = new Date(); t.setHours(0,0,0,0);
  return isTaskActiveOn(iv, t);
}
function genId()      { return 'u_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6); }
function genTaskNum(interventions, company) {

function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);

  const dir = target >= now ? 1 : -1;
  let cur = new Date(now);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

/* ── SHEET MODAL ──────────────────────────────────────────── */

/* ── APP HEADER ───────────────────────────────────────────── */
function AppHeader({ session, weekOffset, onWeekChange, onSettings, onUserMenu, filter, trades, onFilter, zones, data, viewMode, onViewMode, onToday, onRefresh, onExport, onHistory, onToggleLock, onValidatePlanning, onReindexPlanning, planningLocked, planningValidated, planningValidUntil, syncing, busyActions = {}, showWeekends = false, onToggleWeekends }) {
  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var nowHdr = new Date(); nowHdr.setHours(0,0,0,0);
    zones.forEach(function(z){
      if(z.deadline){
        var d = new Date(z.deadline+'T00:00:00');
        var w = Math.ceil((d - nowHdr)/(7*24*3600*1000)) + 1;
        if(w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16));
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const fullDaysForWeekend = multiWeekDays(weekOffset, weeks, true);
  const weekendTaskVisible = (data||[]).some(function(iv){
    return fullDaysForWeekend.some(function(d){
      var dow = d.getDay();
      return (dow === 0 || dow === 6) && inDay(iv,d) && !(iv.off_days||[]).includes(dateStr(d));
    });

  const headerIncludeWeekends = !!showWeekends || weekendTaskVisible;
  const days  = multiWeekDays(weekOffset, weeks, headerIncludeWeekends);
  const start = days[0], end = days[days.length - 1];

  // Dominant trade per zone (most interventions)
  function dominantColor(zone) {
    const counts = {};
    data.filter(i=>i.zone===zone.id).forEach(i=>{counts[i.trade]=(counts[i.trade]||0)+1;});
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    if (!top) return '#9CA3AF';
    const tr = trades.find(t=>t.id===top[0]);
    return tr ? getTC(tr.color).b : '#9CA3AF';
  }

  const [exportOpen, setExportOpen] = React.useState(false);
  const exportRef = React.useRef(null);
  React.useEffect(() => {
    if (!exportOpen) return;
    const close = (e) => {
      if (exportRef.current && !exportRef.current.contains(e.target)) setExportOpen(false);

  const exportModes = [

            letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}}>Chantier actif</div>
          <div style={{fontSize:15,fontWeight:700,letterSpacing:'-.01em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>HSF — Av. Marceau</div>

        <div style={{display:'flex',alignItems:'center',gap:6}}>

              <button key={v} onClick={()=>onViewMode(v)}

          <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.08)',
            border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'4px 6px'}}>
            <button onClick={()=>onWeekChange(-1)} style={hdrBtnStyle}>‹</button>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,.7)',
              whiteSpace:'nowrap',minWidth:90,textAlign:'center'}}>
              {dateFR(start)} – {dateFR(end)}
            </span>
            <button onClick={()=>onWeekChange(1)} style={hdrBtnStyle}>›</button>
          </div>
          <button onClick={onToday} title="Aujourd'hui"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:26,height:26,fontSize:11}}>◎</button>
          {session?.role==='admin' && (
            <button onClick={onToggleWeekends} title={showWeekends?'Masquer les samedis / dimanches':'Afficher les samedis / dimanches'}
              style={{...hdrBtnStyle,background:showWeekends?'rgba(96,165,250,.22)':'rgba(255,255,255,.08)',
                border:'1px solid '+(showWeekends?'rgba(147,197,253,.55)':'rgba(255,255,255,.14)'),
                borderRadius:6,minWidth:34,height:26,fontSize:10,fontWeight:800,

            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',

          {statusLabel && (

            </span>
          )}
          <div ref={exportRef} style={{position:'relative'}}>

              style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',

            </button>
            {exportOpen && (
              <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',zIndex:80,
                width:220,background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',
                borderRadius:'var(--r-sm)',boxShadow:'var(--shadow-lg)',overflow:'hidden'}}>
                <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',

                {exportModes.map(m => (
                  <div key={m.key} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,

function _ds(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isBaseHoliday(d) { return _HOLIDAYS.has(_ds(d)); }
function isWorkedHoliday(d) { return !!(window.PLANIFY_WORKED_HOLIDAYS && window.PLANIFY_WORKED_HOLIDAYS.has(_ds(d))); }

function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00'), now = new Date(); now.setHours(0,0,0,0);
  let count = 0, dir = target >= now ? 1 : -1, cur = new Date(now);
  while (cur.toDateString() !== target.toDateString()) {
    cur.setDate(cur.getDate() + dir);
    const dow = cur.getDay(), s = _ds(cur);
    if (dow !== 0 && dow !== 6 && !isHoliday(cur)) count += dir;
  }
  return count;
}

function weekendOffDaysBetween(start, end) {
  if (!start) return [];
  var startD = new Date(start+'T00:00:00');
  var endD = new Date((end||start)+'T00:00:00');
  if (endD < startD) return [];
  var out = [];
  var cur = new Date(startD);
  var safety = 0;
  while (cur <= endD && safety < 180) {
    var ds = _ds(cur);
    var dow = cur.getDay();
    // Default freeze only weekends inside the range.
    // Example: Friday → Monday freezes Saturday and Sunday.
    // A task placed only on Saturday remains visible and worked by default.
    if ((dow === 0 || dow === 6) && ds !== start && ds !== (end||start)) out.push(ds);
    cur.setDate(cur.getDate()+1);
    safety++;
  }
  return out;
}

function getCompanyMainTrade(companyName, data, companies, trades) {
  var co = (companies || []).find(function(c){ return c.name === companyName; });
  var tradeId = co && (co.tradeId || co.trade_id) ? (co.tradeId || co.trade_id) : '';
  if (!tradeId) {
    var counts = {};
    (data || []).filter(function(i){ return i.company === companyName; }).forEach(function(i){ counts[i.trade] = (counts[i.trade] || 0) + 1; });
    var top = Object.entries(counts).sort(function(a,b){ return b[1] - a[1]; })[0];
    tradeId = top ? top[0] : '';
  }
  var tr = trades.find(function(t){ return t.id === tradeId; });
  return tr || trades[0] || null;
}

function isTaskLate(iv) {
  if (!iv || iv.status === 'termine') return false;
  const rawDate = iv.end || iv.start;
  if (!rawDate) return false;
  const due = new Date(rawDate + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return due < today;
}

function ZoneTaskList({ items, zones, trades, onOpenDetail, isAdmin, title, emptyLabel }) {
  const ordered = [...items].sort(function(a,b) {
    const rank = function(iv) {
      if (iv.status === 'bloque') return 0;
      if (isTaskLate(iv)) return 1;
      if (iv.status === 'encours') return 2;
      if (iv.status === 'arealis') return 3;
      if (iv.status === 'termine') return 4;
      return 9;
    };
    const ra = rank(a);
    const rb = rank(b);
    if (ra !== rb) return ra - rb;
    return (a.start || '').localeCompare(b.start || '');
  });

  const counts = ordered.reduce(function(acc, iv) {
    if (!(iv.status === 'encours' && isTaskFrozenToday(iv))) {
      acc[iv.status] = (acc[iv.status] || 0) + 1;
    }
    if (isTaskLate(iv)) acc.retard += 1;
    acc.total += 1;
    return acc;
  }, { total: 0, termine: 0, encours: 0, bloque: 0, arealis: 0, retard: 0 });

  const stat = function(label, value, color) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 7px',
        border:'1px solid var(--border)',borderRadius:20,background:'var(--surface)',
        fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)',whiteSpace:'nowrap'}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:color,display:'inline-block',flexShrink:0}}></span>
        <span style={{fontWeight:700,color:color}}>{value}</span>
        <span>{label}</span>
      </div>
    );
  };

  return (
    <div style={{margin:'8px 0 14px',padding:'10px 12px',
      background:'var(--surface-2)',border:'1px solid var(--border)',
      borderRadius:'var(--r-sm)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        gap:8,marginBottom:9,flexWrap:'wrap'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',
          fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.04em'}}>
          {title || (isAdmin ? 'Toutes les tâches de la zone' : 'Mes tâches dans cette zone')}
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {stat('total', counts.total, 'var(--muted)')}
          {counts.bloque > 0 && stat('bloquée' + (counts.bloque > 1 ? 's' : ''), counts.bloque, '#DC2626')}
          {counts.retard > 0 && stat('en retard', counts.retard, '#EA580C')}
          {counts.encours > 0 && stat('en cours', counts.encours, '#2563EB')}
          {counts.arealis > 0 && stat('à faire', counts.arealis, '#6B7280')}
          {counts.termine > 0 && stat('terminée' + (counts.termine > 1 ? 's' : ''), counts.termine + '/' + counts.total, '#16A34A')}
        </div>
      </div>

      {ordered.length === 0 ? (
        <div style={{padding:'10px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>
          {emptyLabel || 'Aucune tâche à afficher.'}
        </div>
      ) : (
        <div>
          {ordered.map(function(iv) {
            return isAdmin
              ? <TaskRowAdmin key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />
              : <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;
          })}
        </div>
      )}
    </div>
  );
}

function taskActiveDatesInRange(iv) {
  if (!iv || !iv.start) return [];
  var start = new Date(iv.start + 'T00:00:00');
  var end = new Date((iv.end || iv.start) + 'T00:00:00');
  if (end < start) return [];
  var out = [];
  var cur = new Date(start);
  var safety = 0;
  while (cur <= end && safety < 180) {
    if (isTaskActiveOn(iv, cur)) out.push(dateStr(cur));
    cur.setDate(cur.getDate() + 1);
    safety++;
  }
  return out;
}

function effectiveDueDate(iv) {
  var activeDates = taskActiveDatesInRange(iv);
  if (activeDates.length) return activeDates[activeDates.length - 1];
  return iv && (iv.end || iv.start) ? (iv.end || iv.start) : '';
}

function calcReliability(items) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var todayStr = dateStr(today);

  var enriched = (items || []).map(function(iv){
    return Object.assign({}, iv, {
      _effective_due_date: effectiveDueDate(iv),
      _active_dates_count: taskActiveDatesInRange(iv).length
    });
  });

  var due = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date <= todayStr;
  });

  var notDue = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date > todayStr;
  });

  var doneItems = due.filter(function(iv){ return iv.status === 'termine'; });
  var missedItems = due.filter(function(iv){ return iv.status !== 'termine'; });
  var kept = doneItems.length;
  var value = due.length ? Math.round(kept / due.length * 100) : 100;

  var byStatus = due.reduce(function(acc, iv){
    var k = iv.status || 'arealis';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});

  return {
    value: value,
    label: value + '%',
    done: kept,
    total: due.length,
    lostPoints: due.length ? 100 - value : 0,
    missed: missedItems.length,
    notDue: notDue.length,
    dueItems: due,
    doneItems: doneItems,
    missedItems: missedItems,
    notDueItems: notDue,
    byStatus: byStatus
  };
}

    return (

        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8,gap:12}}>

              whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{title}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.55)',fontFamily:"'DM Mono',monospace"}}>

            </div>

            </div>
          </div>
          <div style={{display:'flex',gap:14,alignItems:'flex-start',flexShrink:0,textAlign:'right'}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:pct===100?'#4ADE80':'#fff',

              <div style={{fontSize:9,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
                Avancement
              </div>
            </div>
            <div title="Cliquer pour voir le détail de la fiabilité"
              onClick={function(e){e.stopPropagation();toggle('fiabilite');}}
              style={{cursor:'pointer',padding:'2px 4px',borderRadius:6,

  // ── ADMIN VIEW ─────────────────────────────────────────────
  if (isAdmin) {

      name:    co,

      encours: data.filter(i => i.company===co&&i.status==='encours'&&!isTaskFrozenToday(i)).length,

    return (
      <div style={{padding:'14px 12px 100px',overflowY:'auto',height:'100%'}}>
        {renderSummaryBanner(

        {renderStatsGrid()}
        {renderDrawer()}

        <SectionCard title="Zones critiques" accent="#EA580C">
          {(() => {

              const bloc = zivs.filter(function(i){ return i.status === 'bloque'; }).length;
              const wd = workingDaysUntil(z.deadline);
              const critical = late > 0 || bloc > 0 || (z.deadline && wd <= 5 && wd >= 0);

                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>

                    <span style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{item.z.name}</span>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',fontFamily:"'DM Mono',monospace",fontSize:10,flexShrink:0}}>
                    {item.late>0&&<span style={{color:'#EA580C',fontWeight:800}}>⏱ {item.late}</span>}
                    {item.bloc>0&&<span style={{color:'#DC2626',fontWeight:800}}>⚠ {item.bloc}</span>}
                    {item.z.deadline&&<span style={{color:item.wd<=5?'#DC2626':'var(--muted)',fontWeight:800}}>J-{item.wd<0?'▲':item.wd}</span>}

                </div>

            });

        </SectionCard>

        {/* Zone progress */}
        <SectionCard title="Avancement par zone">
          {zones.map(z => {
            const zivs=data.filter(i=>i.zone===z.id);
            const done=zivs.filter(i=>i.status==='termine').length;
            const bloc=zivs.filter(i=>i.status==='bloque').length;
            const enc=zivs.filter(i=>i.status==='encours'&&!isTaskFrozenToday(i)).length;
            const late=zivs.filter(i=>isTaskLate(i)).length;
            const p=zivs.length?Math.round(done/zivs.length*100):0;
            const wd=workingDaysUntil(z.deadline);
            const dc=z.deadline?(wd<0?'#DC2626':wd<5?'#DC2626':wd<15?'#EA580C':'#16A34A'):'var(--xmuted)';
            const isOpen = openZoneId === z.id;
            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div onClick={function(){toggleZoneDetail(z.id);}}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    marginBottom:4,cursor:'pointer',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    transition:'background .12s'}}

        {/* Company table */}
        <SectionCard title="Avancement par entreprise">

            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>

                {companyStats.map((co,i)=>{
                  const arealis=co.total-co.encours-co.bloque-co.termine;
                  const p2=co.total?Math.round(co.termine/co.total*100):0;
                  const tr2=trades.find(t=>data.find(d=>d.company===co.name&&d.trade===t.id));
                  const c2=getTC(tr2?.color||'navy');
                  return (

                      background:i%2?'var(--surface-2)':'transparent'}}>

                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{arealis||'-'}</td>

  // ── COMPANY VIEW ───────────────────────────────────────────
  const days = weekDays(weekOffset, true);
  const weekIvs = myData.filter(function(i){ return days.some(function(d){ return isTaskActiveOn(i,d); }); });
  const soon = myData.filter(function(i){
    if(i.status==='termine') return false;
    var st=new Date(i.start+'T00:00:00'), now2=new Date(); now2.setHours(0,0,0,0);
    var diff=(st-now2)/(1000*60*60*24);
    return diff>0&&diff<=10;
  }).sort(function(a,b){return a.start.localeCompare(b.start);});

  // Zones where this company has tasks
  var myZoneIds = [...new Set(myData.map(function(i){return i.zone;}))];
  var myZones = zones.filter(function(z){return myZoneIds.includes(z.id);});

  return (
    <div style={{padding:'12px 12px 100px',overflowY:'auto',height:'100%'}}>

        `${total} tâche${total!==1?'s':''} · ${myZones.length} zone${myZones.length!==1?'s':''}`

      {/* ── Avancement par zone (mes zones uniquement) ── */}

          {myZones.map(function(z){
            var zivs=myData.filter(function(i){return i.zone===z.id;});
            var done=zivs.filter(function(i){return i.status==='termine';}).length;
            var bloc=zivs.filter(function(i){return i.status==='bloque';}).length;
            var enc=zivs.filter(function(i){return i.status==='encours'&&!isTaskFrozenToday(i);}).length;

            var p=zivs.length?Math.round(done/zivs.length*100):0;
            var wdv=workingDaysUntil(z.deadline);

            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div onClick={function(){toggleZoneDetail(z.id);}}

                    marginBottom:4,cursor:'pointer',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    transition:'background .12s'}}
                  onMouseEnter={function(e){e.currentTarget.style.background='var(--surface-2)';}}
                  onMouseLeave={function(e){e.currentTarget.style.background='transparent';}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0,display:'inline-block'}}></span>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</span>
                    {bloc>0&&<span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ {bloc} bloquée{bloc>1?'s':''}</span>}
                    {late>0&&<span style={{fontSize:10,color:'#EA580C',fontWeight:700}}>⏱ {late}</span>}
                    {enc>0&&<span style={{fontSize:10,color:'#2563EB',fontWeight:600}}>▶ {enc}</span>}
                    {done>0&&<span style={{fontSize:10,color:'#16A34A',fontWeight:700}}>✓ {done}/{zivs.length}</span>}
                    <span style={{fontSize:10,color:'var(--xmuted)',fontWeight:600}}>
                      {isOpen ? 'Masquer' : 'Voir tâches'}
                    </span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{done}/{zivs.length}</span>
                    {z.deadline&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:dc}}>
                      J-{wdv<0?'▲':wdv}
                    </span>}
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,
                      color:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'var(--muted)'}}>{p}%</span>
                  </div>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:3,transition:'width .4s',
                    width:`${p}%`,background:p===100?'#16A34A':late>0?'#EA580C':bloc>0?'#DC2626':'#2563EB'}}></div>
                </div>
                {isOpen && (
                  <ZoneTaskList items={zivs} zones={zones} trades={trades}
                    onOpenDetail={onOpenDetail} isAdmin={false}
                    title="Mes tâches dans cette zone" />
                )}
              </div>
            );
          })}
        </SectionCard>
      )}

      {/* ── Tâches cette semaine ── */}
      <SectionCard title={`Cette semaine — ${weekIvs.length} tâche${weekIvs.length!==1?'s':''}`}>
        {weekIvs.length===0
          ? <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Aucune tâche planifiée cette semaine</div>
          : weekIvs.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;})
        }
      </SectionCard>

      {/* ── Prochaines tâches à démarrer (10j) ── */}
      {soon.length > 0 && (
        <SectionCard title={`Prochaines échéances — ${soon.length} tâche${soon.length!==1?'s':''}`}>
          {soon.map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;}) }
        </SectionCard>
      )}

      {/* ── Toutes mes tâches par statut ── */}
      {[
        {key:'bloque', label:'Bloquées', color:'#DC2626'},
        {key:'encours', label:'En cours', color:'#2563EB'},
        {key:'arealis', label:'À réaliser', color:'var(--muted)'},
        {key:'termine', label:'Terminées', color:'#16A34A'},
      ].map(function(st){
        var items=myData.filter(function(i){return i.status===st.key && !(st.key==='encours' && isTaskFrozenToday(i));});
        if(!items.length) return null;
        return (
          <SectionCard key={st.key} title={`${st.label} (${items.length})`} accent={st.color}>
            {items.sort(function(a,b){return a.start.localeCompare(b.start);}).map(function(iv){return <TaskCard2 key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />;}) }
          </SectionCard>
        );
      })}
    </div>
  );
}

function DeadlineCell({ zone, isMulti, isAdmin, setZones }) {
  var dc = deadlineColor(zone.deadline);
  var wd = workingDaysUntil(zone.deadline);
  var lbl = wd < 0 ? '▲' : 'J-' + wd;
  var ds2 = zone.deadline ? zone.deadline.slice(5,10).replace('-','/') : '';
  var [editing, setEditing] = React.useState(false);

  if (editing) return (
    <td style={{borderLeft:'2px solid var(--border-s)',verticalAlign:'middle',
      textAlign:'center',height:isMulti?'40px':'56px',
      padding:isMulti?'2px 1px':'4px 3px',background:dc+'18'}}>
      <input type="date" defaultValue={zone.deadline||''} autoFocus
        onBlur={function(e){
          var val=e.target.value;
          if(val&&val!==zone.deadline){
            setZones(function(prev){return prev.map(function(z){
              return z.id===zone.id?Object.assign({},z,{deadline:val}):z;
            });});
            supaWrite('PATCH','zones',{deadline:val},'id=eq.'+zone.id);
          }
          setEditing(false);
        }}
        onKeyDown={function(e){if(e.key==='Escape')setEditing(false);}}
        style={{width:'100%',border:'none',background:'transparent',
          fontSize:7,fontFamily:"'DM Mono',monospace",
          color:dc,textAlign:'center',outline:'none'}} />
    </td>
  );

  return (
    <td onClick={isAdmin?function(){setEditing(true);}:undefined}
      style={{borderLeft:'2px solid var(--border-s)',verticalAlign:'middle',
        textAlign:'center',height:isMulti?'40px':'56px',
        padding:isMulti?'2px 1px':'4px 3px',background:dc+'12',
        cursor:isAdmin?'pointer':'default'}}>
      <div style={{fontSize:isMulti?7:8.5,fontWeight:800,color:dc,
        fontFamily:"'DM Mono',monospace",textAlign:'center',lineHeight:1.15,whiteSpace:'nowrap'}}>
        {zone.deadline?lbl:'—'}
      </div>
      <div style={{fontSize:6.5,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",
        marginTop:2,textAlign:'center',lineHeight:1,whiteSpace:'nowrap'}}>
        {ds2}
      </div>
    </td>
  );
}


function PlanningScreen({ data, zones, setZones, trades, weekOffset, filter, session, onOpenDetail, onOpenAdd, viewMode, showWeekends = false }) {
  // 'tout' = show all weeks from today to the furthest deadline
  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var now = new Date(); now.setHours(0,0,0,0);
    zones.forEach(function(z){
      if(z.deadline){
        var d = new Date(z.deadline+'T00:00:00');
        var w = Math.ceil((d - now)/(7*24*3600*1000)) + 1;
        if(w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16)); // cap at 16 weeks
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const isDark = document.documentElement.getAttribute('data-theme') === 'nuit';
  const filtered = filter === 'all' ? data : data.filter(i => i.trade === filter);
  const isAdmin = session?.role === 'admin';
  const fullWeekDays = multiWeekDays(weekOffset, weeks, true);
  const weekendTaskVisible = filtered.some(function(iv){
    return fullWeekDays.some(function(d){
      var dow = d.getDay();
      return (dow === 0 || dow === 6) && inDay(iv,d) && !(iv.off_days||[]).includes(dateStr(d));
    });
  });
  const includeWeekends = (isAdmin && !!showWeekends) || weekendTaskVisible;
  const days = multiWeekDays(weekOffset, weeks, includeWeekends);
  const daysPerWeek = includeWeekends ? 7 : 5;
  const isMulti = weeks > 1;
  const is3s = weeks === 3;
  const [taskHover, setTaskHover] = useState(null);

  function compactTaskHoverPayload(ev, iv, zone, statusMeta) {
    return {
      x: ev.clientX,
      y: ev.clientY,
      company: iv.company || '',
      task: iv.task || '',
      status: statusMeta?.label || '',
      zone: zone?.name || '',
      dates: fmtDate(iv.start) + (iv.end && iv.end !== iv.start ? ' → ' + fmtDate(iv.end) : ''),
      prereq: iv.prereq || '',
      notes: iv.notes || '',
      taskNumber: iv.task_number || ''
    };
  }

  const zoneColW = isMulti ? '40px' : '58px';
  const deadlineColW = isMulti ? '28px' : '50px';
  const dayColW = '1fr';
  const gridCols = `${zoneColW} repeat(${days.length}, ${dayColW}) ${deadlineColW}`;

  const [zoneFilter, setZoneFilter] = useState([]);
  const [dropOpen, setDropOpen] = useState(false);
  const dropRef = useRef();

  useEffect(() => {
    if (!dropOpen) return;
    const handler = e => { if (dropRef.current && !dropRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [dropOpen]);

  function toggleZone(id) {
    setZoneFilter(prev => {
      if (prev.length === 0) return zones.filter(z => z.id !== id).map(z => z.id);
      if (prev.includes(id)) { const next = prev.filter(x => x !== id); return next.length === zones.length ? [] : next; }
      const next = [...prev, id];
      return next.length === zones.length ? [] : next;
    });
  }
  const visibleZones = zoneFilter.length === 0 ? zones : zones.filter(z => zoneFilter.includes(z.id));
  const activeCount = zoneFilter.length;

  // Floor group boundaries for visual separation
  const floorOf = id => zones.find(z=>z.id===id)?.floor||'';

  return (
    <div style={{overflowY:'auto',height:'100%',padding:isMulti?0:'10px 0',paddingBottom:100}}>
      <div style={{background:'var(--surface)',
        border:isMulti?'none':'1px solid var(--border)',
        margin:isMulti?0:'0 8px',
        borderRadius:isMulti?0:'var(--r)',
        boxShadow:isMulti?'none':'var(--shadow)'}}>

        {/* TABLE-LAYOUT for guaranteed column alignment */}
        <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
          <colgroup>
            <col style={{width:isMulti?'40px':'58px'}} />
            {days.map((_,i) => <col key={i} />)}
            <col style={{width:isMulti?'28px':'50px'}} />
          </colgroup>

          {/* ── STICKY HEADER ── */}
          <thead>
            <tr style={{background:'var(--surface-2)',borderBottom:'2px solid var(--border)'}}>

              {/* Zone filter */}
              <th ref={dropRef} style={{padding:'5px 3px',borderRight:'3px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,background:'var(--surface-2)',
                verticalAlign:'middle',textAlign:'center'}}>
                <button onClick={() => setDropOpen(o => !o)}
                  style={{width:'100%',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    border:`1px solid ${dropOpen||activeCount?'var(--primary)':'var(--border)'}`,
                    background:activeCount?'var(--primary-l)':'transparent',
                    color:activeCount?'var(--primary)':'var(--muted)',
                    fontSize:8,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace",
                    letterSpacing:'.04em',textTransform:'uppercase',lineHeight:1.3}}>
                  {activeCount ? 'Zones' : 'Zones'}
                </button>
                {dropOpen && (
                  <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,minWidth:220,
                    background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
                    boxShadow:'var(--shadow-md)',zIndex:50,overflow:'hidden',textAlign:'left'}}>
                    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',
                      display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',
                        fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.05em'}}>Zones</span>
                      <button onClick={()=>{setZoneFilter([]);setDropOpen(false);}}
                        style={{fontSize:10,color:'var(--primary)',background:'none',border:'none',
                          cursor:'pointer',fontWeight:600}}>Toutes</button>
                    </div>
                    {zones.map(z => {
                      const checked = zoneFilter.length===0||zoneFilter.includes(z.id);
                      const fc = FLOOR_COLORS[z.floor]||'#9CA3AF';
                      return (
                        <div key={z.id} onClick={function(e){e.preventDefault();e.stopPropagation();toggleZone(z.id);}}
                          style={{display:'flex',alignItems:'center',gap:10,
                          padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',
                          background:checked?'var(--primary-l)':'transparent',transition:'background .1s'}}>
                          <div style={{width:14,height:14,borderRadius:3,flexShrink:0,
                            border:`2px solid ${checked?'var(--primary)':'var(--border)'}`,
                            background:checked?'var(--primary)':'transparent',
                            display:'flex',alignItems:'center',justifyContent:'center'}}>
                            {checked&&<span style={{color:'#fff',fontSize:9,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0}}></span>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</div>
                            <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{z.short}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </th>

              {/* Day headers */}
              {days.map((d,i) => {
                const isFirstOfWeek = i % daysPerWeek === 0 && i > 0;
                const holiday = isHoliday(d);
                const workedHoliday = isWorkedHoliday(d);
                return (
                  <th key={i} style={{
                    padding:isMulti?'3px 0':'6px 2px',
                    textAlign:'center',
                    overflow:'hidden',
                    position:'sticky',top:0,zIndex:11,
                    borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                    background:holiday?'#D1D5DB':isToday(d)?'var(--primary-l)':'var(--surface-2)',
                    fontWeight:'normal',
                    verticalAlign:'middle'}}>
                    <div style={{fontSize:isMulti?(weeks>3?5.5:weeks===3?6:7):9,
                      fontWeight:700,fontFamily:"'DM Mono',monospace",
                      color:holiday?'#6B7280':isToday(d)?'var(--primary)':'var(--muted)',
                      lineHeight:1.05,whiteSpace:'nowrap'}}>
                      {['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()]}
                    </div>
                    <div style={{fontSize:isMulti?(weeks>3?6:weeks===3?7:8):10,
                      fontWeight:isMulti?700:400,
                      fontFamily:"'DM Mono',monospace",
                      color:holiday?'#4B5563':isToday(d)?'var(--primary)':'var(--muted)',
                      lineHeight:1.05,whiteSpace:'nowrap',marginTop:isMulti?1:0}}>
                      {`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`}
                    </div>
                    {holiday && <div style={{fontSize:7,fontWeight:700,color:'#4B5563',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>JF</div>}
                    {workedHoliday && <div style={{fontSize:6.5,fontWeight:700,color:'#16A34A',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>ouvré</div>}
                  </th>
                );
              })}

              {/* FIN header */}
              <th style={{padding:'4px 1px',textAlign:'center',
                borderLeft:'2px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,
                background:'rgba(220,38,38,.07)',
                verticalAlign:'middle'}}>
                <span style={{fontSize:7,fontWeight:800,color:'#DC2626',
                  fontFamily:"'DM Mono',monospace",
                  writingMode:'vertical-rl',transform:'rotate(180deg)',lineHeight:1}}>FIN</span>
              </th>
            </tr>
          </thead>

          {/* ── ZONE ROWS ── */}
          <tbody>
            {visibleZones.map((zone, zi) => {
              const prevZone = visibleZones[zi - 1];
              const floorChange = zi > 0 && prevZone?.floor !== zone.floor;
              const fc  = FLOOR_COLORS[zone.floor] || '#9CA3AF';
              const dc  = deadlineColor(zone.deadline);
              const rowBg = zone.floor==='R+3' ? 'rgba(33,82,200,.025)' :
                            zone.floor==='R+2' ? 'rgba(13,148,136,.025)' : 'rgba(139,92,246,.025)';

              return (
                <tr key={zone.id} style={{
                  borderTop:floorChange?`3px solid ${fc}`:'none',
                  borderBottom:'1px solid var(--border)',
                  background:rowBg}}>

                  {/* Zone label */}
                  <td style={{padding:isMulti?'2px 1px':'5px 3px',
                    borderRight:'3px solid '+fc,
                    verticalAlign:'middle',textAlign:'center',
                    minHeight:isMulti?40:56,
                    height:isMulti?'40px':'56px',
                    background:`${fc}12`}}>
                    <span style={{fontSize:isMulti?5.5:8,fontWeight:800,color:fc,lineHeight:1.2,
                      fontFamily:"'DM Mono',monospace",letterSpacing:'.03em',
                      textTransform:'uppercase',wordBreak:'break-all',display:'block'}}>
                      {zone.short}
                    </span>
                  </td>

                  {/* Day cells */}
                  {days.map((day, di) => {
                    const ds = dateStr(day);
                    const holiday = isHoliday(day);
                    const workedHoliday = isWorkedHoliday(day);
                    const isFirstOfWeek = di % daysPerWeek === 0 && di > 0;
                    const isDeadline = zone.deadline && ds === zone.deadline;
                    const isPast = zone.deadline && ds > zone.deadline;
                    const cellBg = holiday?'#D1D5DB': isDeadline?'rgba(220,38,38,.18)': isToday(day)?'color-mix(in srgb, var(--primary) 5%, transparent)':'transparent';
                    const cards = (()=>{
                      if(holiday) return [];
                      return filtered.filter(function(iv){
                        if(iv.zone!==zone.id) return false;
                        if(!inDay(iv,day)) return false;
                        var offs=iv.off_days||[];
                        if(offs.length){
                          var dstr=day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
                          if(offs.includes(dstr)) return false;
                        }
                        return true;
                      }).sort(function(a,b){return (a.priority||3)-(b.priority||3);});
                    })();
                    const shown = cards;

                    return (
                      <td key={di}
                        onClick={function(){if(isAdmin&&!holiday)onOpenAdd(zone.id,ds);}}
                        style={{
                          padding:isMulti?0:2,
                          height:isMulti?'40px':'56px',
                          verticalAlign:'top',
                          borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                          background:cellBg,
                          cursor:isAdmin&&!holiday?'pointer':'default',
                          transition:'background .1s'}}>
                        {shown.map(function(iv){
                          if(isMulti){
                            var _tr=trades.find(function(t){return t.id===iv.trade;});
                            var _c=getTC(_tr?_tr.color:'blue');
                            var _m=STATUS_META[iv.status]||STATUS_META.arealis;
                            return (
                              <div key={iv.id}
                                onMouseEnter={function(e){setTaskHover(compactTaskHoverPayload(e, iv, zone, _m));}}
                                onMouseMove={function(e){setTaskHover(function(prev){return prev?Object.assign({},prev,{x:e.clientX,y:e.clientY}):compactTaskHoverPayload(e,iv,zone,_m);});}}
                                onMouseLeave={function(){setTaskHover(null);}}
                                onClick={function(e){e.stopPropagation();setTaskHover(null);onOpenDetail(iv.id);}}
                                style={{borderRadius:3,padding:'2px 3px',marginBottom:1,cursor:'pointer',
                                  background:_c.bg,borderLeft:'2px solid '+_c.b,overflow:'hidden'}}>
                                <div style={{display:'flex',alignItems:'center',gap:2}}>
                                  <span style={{fontSize:weeks===2?7:6.5,fontWeight:700,color:_c.t,
                                    overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',
                                    lineHeight:1.3,flex:1}}>{iv.company}</span>
                                  <span style={{width:4,height:4,borderRadius:'50%',
                                    background:_m.dot,flexShrink:0}}></span>
                                </div>
                                {weeks===2&&<div style={{fontSize:6.5,color:_c.t,opacity:.7,
                                  lineHeight:1.2,overflow:'hidden',whiteSpace:'nowrap',
                                  textOverflow:'ellipsis'}}>{iv.task}</div>}
                              </div>
                            );
                          }
                          return (
                            <div key={iv.id}
                              onMouseEnter={function(e){setTaskHover(compactTaskHoverPayload(e, iv, zone, STATUS_META[iv.status]||STATUS_META.arealis));}}
                              onMouseMove={function(e){setTaskHover(function(prev){return prev?Object.assign({},prev,{x:e.clientX,y:e.clientY}):compactTaskHoverPayload(e,iv,zone,STATUS_META[iv.status]||STATUS_META.arealis);});}}
                              onMouseLeave={function(){setTaskHover(null);}}>
                              <TaskCard iv={iv} trades={trades} isDark={isDark}
                                onClick={function(e){e.stopPropagation();setTaskHover(null);onOpenDetail(iv.id);}} />
                            </div>
                          );
                        })}
                      </td>
                    );
                  })}

                  {/* FIN cell */}
                  <DeadlineCell zone={zone} isMulti={isMulti} isAdmin={isAdmin} setZones={setZones} />
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {taskHover && (
        <div style={{
          position:'fixed',
          left:Math.min(taskHover.x + 14, Math.max(12, window.innerWidth - 300)),
          top:Math.min(taskHover.y + 14, Math.max(12, window.innerHeight - 220)),
          zIndex:9999,
          width:280,
          maxWidth:'calc(100vw - 24px)',
          background:'var(--surface)',
          color:'var(--text)',
          border:'1px solid var(--border-s)',
          borderRadius:'var(--r-sm)',
          boxShadow:'var(--shadow-lg)',
          padding:'10px 12px',
          pointerEvents:'none',
          fontSize:11,
          lineHeight:1.35
        }}>
          <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'flex-start',marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:800,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis'}}>
              {taskHover.company}
            </div>
            {taskHover.taskNumber && (
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                {taskHover.taskNumber}
              </div>
            )}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text)',marginBottom:6}}>
            {taskHover.task}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'64px 1fr',gap:'3px 8px',color:'var(--muted)'}}>
            <span>Statut</span><b style={{color:'var(--text)'}}>{taskHover.status}</b>
            <span>Zone</span><b style={{color:'var(--text)'}}>{taskHover.zone}</b>
            <span>Dates</span><b style={{color:'var(--text)',fontFamily:"'DM Mono',monospace"}}>{taskHover.dates}</b>
          </div>
          {taskHover.prereq && (
            <div style={{marginTop:7,padding:'5px 7px',borderLeft:'3px solid var(--danger)',
              background:'var(--danger-l)',color:'var(--danger)',borderRadius:'0 4px 4px 0'}}>
              <b>Prérequis</b> · {taskHover.prereq}
            </div>
          )}
          {taskHover.notes && !String(taskHover.notes).startsWith('Etage') && !String(taskHover.notes).startsWith('Étage') && (
            <div style={{marginTop:7,color:'var(--muted)',fontStyle:'italic'}}>
              {taskHover.notes}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   LIST SCREEN
═══════════════════════════════════════════════════════════ */
function ListScreen({ data, zones, trades, companies, weekOffset, filter, session, onOpenDetail, onStatusChange, canChangeStatus = true }) {
  const isAdmin = session?.role === 'admin';
  const myName = session?.company?.name || '';
  const baseData = isAdmin ? data : data.filter(function(i){ return i.company === myName; });
  const shownData = filter === 'all' ? baseData : baseData.filter(function(i){ return i.trade === filter; });
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = dateStr(today);
  const days = weekDays(weekOffset, true);
  const weekItems = shownData.filter(function(i){ return days.some(function(d){ return isTaskActiveOn(i,d); }); });
  const todayItems = shownData.filter(function(i){ return isTaskActiveOn(i,today); });
  const urgentItems = shownData.filter(function(i){ return isTaskLate(i) || i.status === 'bloque' || (i.prereq && i.prereq.trim()); });
  const allOrdered = [...shownData].sort(function(a,b){
    var rank = function(iv){ if (iv.status==='bloque') return 0; if (isTaskLate(iv)) return 1; if (iv.status==='encours') return 2; if (iv.status==='arealis') return 3; if (iv.status==='termine') return 5; return 9; };
    var ra=rank(a), rb=rank(b); if (ra!==rb) return ra-rb;
    return (a.start||'').localeCompare(b.start||'');
  });

  function pctDone(items) { return items.length ? Math.round(items.filter(function(i){return i.status==='termine';}).length / items.length * 100) : 0; }

  if (isAdmin) {
    const filtered = shownData
      .filter(i=>days.some(d=>isTaskActiveOn(i,d)))
      .sort((a,b)=>a.start!==b.start?a.start.localeCompare(b.start):(a.priority||3)-(b.priority||3));
    if (!filtered.length) return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--muted)',gap:8}}>
        <div style={{fontSize:36,opacity:.3}}>📋</div>
        <div style={{fontSize:15,fontWeight:600}}>Aucune intervention cette semaine</div>
        <div style={{fontSize:13}}>Changez la semaine ou le filtre</div>
      </div>
    );
    const grouped = {};
    filtered.forEach(iv => { if (!grouped[iv.start]) grouped[iv.start] = []; grouped[iv.start].push(iv); });
    return (
      <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
        {Object.entries(grouped).map(([date, ivs]) => (
          <div key={date} style={{marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8,paddingBottom:5,borderBottom:'1px solid var(--border)'}}>
              {fmtDate(date)} — {new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long'})}
            </div>
            {ivs.map(iv=><TaskRowAdmin key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} />)}
          </div>
        ))}
      </div>
    );
  }

  const mainTrade = getCompanyMainTrade(myName, data, companies, trades);
  const accent = getTC(mainTrade ? mainTrade.color : 'blue');
  const total = baseData.length;
  const done = baseData.filter(function(i){ return i.status === 'termine'; }).length;
  const enc = baseData.filter(function(i){ return i.status === 'encours' && !isTaskFrozenToday(i); }).length;
  const bloc = baseData.filter(function(i){ return i.status === 'bloque'; }).length;
  const late = baseData.filter(function(i){ return isTaskLate(i); }).length;
  const progress = pctDone(baseData);
  const reliability = calcReliability(baseData);
  const [reliabilityOpen, setReliabilityOpen] = useState(false);

  function MiniStat({label,value,color}) {
    return <div style={{flex:'1 1 72px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'9px 8px',textAlign:'center'}}>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginTop:3}}>{label}</div>
    </div>;
  }
  function TaskSection({title,subtitle,items,empty,accentColor}) {
    return <SectionCard title={title} accent={accentColor}>
      {subtitle && <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.4}}>{subtitle}</div>}
      {items.length ? items.map(function(iv){ return <EnterpriseTaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} onStatusChange={onStatusChange} canChangeStatus={canChangeStatus} />; }) :
        <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>{empty || 'Aucune tâche.'}</div>}
    </SectionCard>;
  }

  function ReliabilityDetailEntreprise() {
    var missed = reliability.missedItems || [];
    var doneDue = reliability.doneItems || [];
    var notDue = reliability.notDueItems || [];
    var accentColor = reliability.value>=85 ? '#16A34A' : reliability.value>=60 ? '#F59E0B' : '#DC2626';

    return (
      <SectionCard title={`Détail fiabilité — ${reliability.label}`} accent={accentColor}>
        <div style={{background:'var(--surface-2)',border:'1px solid var(--border)',
          borderRadius:'var(--r-sm)',padding:'12px',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:'var(--text)',marginBottom:6}}>
            Comment est calculée ma fiabilité ?
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--muted)',lineHeight:1.55}}>
            {reliability.total > 0
              ? <>{reliability.done} tâche{reliability.done>1?'s':''} due{reliability.done>1?'s':''} terminée{reliability.done>1?'s':''} / {reliability.total} tâche{reliability.total>1?'s':''} due{reliability.total>1?'s':''} à date = <b style={{color:'var(--text)'}}>{reliability.label}</b></>
              : <>Aucune tâche due à date. La fiabilité est donc affichée à <b style={{color:'var(--text)'}}>100%</b>.</>
            }
          </div>
          {reliability.total > 0 && (
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:reliability.lostPoints?'#EA580C':'#16A34A',marginTop:6,fontWeight:800}}>
              {reliability.lostPoints
                ? `Écart à expliquer : -${reliability.lostPoints} pt${reliability.lostPoints>1?'s':''}.`
                : 'Aucun écart : toutes les tâches dues sont terminées.'}
            </div>
          )}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:12}}>
          <div style={{background:'var(--success-l)',border:'1px solid rgba(22,163,74,.25)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:'#16A34A'}}>{doneDue.length}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Dues terminées</div>
          </div>
          <div style={{background:'rgba(234,88,12,.08)',border:'1px solid rgba(234,88,12,.25)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:'#EA580C'}}>{missed.length}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Dues non terminées</div>
          </div>

      {reliabilityOpen && <ReliabilityDetailEntreprise />}

      <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:12}}>

      </div>

      <TaskSection title={`Aujourd’hui — ${todayItems.length}`} accentColor={accent.b}

function SettingsScreen({ zones, trades, companies, setZones, setTrades, setCompanies, calendarOverrides, onSetHolidayWorked }) {
  const [tab, setTab] = useState('zones');
  const [editingZone, setEditingZone] = useState(null);
  const [editingTrade, setEditingTrade] = useState(null);
  const [editingCompany, setEditingCompany] = useState(null);
  const [newZone, setNewZone] = useState(null);
  const [newTrade, setNewTrade] = useState(null);
  const [newCompany, setNewCompany] = useState(null);
  const PALETTE = Object.keys(TRADE_COLORS);
  const holidayDates = Array.from(_HOLIDAYS).sort();
  function overrideFor(ds) {
    return (calendarOverrides||[]).find(function(o){return o.date===ds;});
  }
  function holidayIsWorked(ds) {
    var o = overrideFor(ds);
    return !!(o && o.is_worked);
  }
  const floorList = [...new Set((zones||[]).map(function(z){return z.floor;}).filter(Boolean))].sort();
  function setFloorDeadline(floor, deadline) {
    setZones(function(prev){
      return prev.map(function(z){
        return z.floor===floor ? Object.assign({}, z, {deadline:deadline}) : z;
      });
    });
    (zones||[]).filter(function(z){return z.floor===floor;}).forEach(function(z){
      supaWrite('PATCH','zones',{deadline:deadline||null},'id=eq.'+z.id);
    });
  }
  function setZoneDeadline(zoneId, deadline) {
    setZones(function(prev){
      return prev.map(function(z){
        return z.id===zoneId ? Object.assign({}, z, {deadline:deadline}) : z;
      });
    });
    supaWrite('PATCH','zones',{deadline:deadline||null},'id=eq.'+zoneId);
  }
  function floorDeadlineValue(floor) {
    var list = (zones||[]).filter(function(z){return z.floor===floor;});
    if (!list.length) return '';
    var first = list[0].deadline || '';
    return list.every(function(z){return (z.deadline||'')===first;}) ? first : '';
  }

  function slugCompanyId(name) {
    return String(name||'entreprise')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase().replace(/[^a-z0-9]+/g,'_')
      .replace(/^_+|_+$/g,'') || ('co_'+Date.now().toString(36));
  }
  function normalizeCompany(c) {
    return {
      id:c.id || slugCompanyId(c.name),
      name:(c.name||'').trim(),
      contact:(c.contact||'').trim(),
      code:String(c.code||'').trim(),
      tradeId:c.tradeId || c.trade_id || ''
    };
  }
  function companyRow(c) {
    return {id:c.id,name:c.name,contact:c.contact||'',code:c.code||'',trade_id:c.tradeId||null};
  }
  function saveZone(z) {
    setZones(prev => prev.map(x => x.id===z.id ? z : x));
    setEditingZone(null);
    supaWrite('PATCH','zones',{name:z.name,short:z.short,floor:z.floor,deadline:z.deadline||null},'id=eq.'+z.id);
  }
  function saveTrade(t) {
    setTrades(prev => prev.map(x => x.id===t.id ? t : x));
    setEditingTrade(null);
    supaWrite('PATCH','trades',{name:t.name,short:t.short,color:t.color},'id=eq.'+t.id);
  }
  function saveCompany(c) {
    var co = normalizeCompany(c);
    if (!co.name || !co.code) { alert('Nom entreprise et code PIN sont requis.'); return; }
    setCompanies(prev => prev.map(x => x.id===co.id ? co : x));
    setEditingCompany(null);
    supaWrite('PATCH','companies',companyRow(co),'id=eq.'+co.id);
  }
  function addZone() {
    if (!newZone?.name||!newZone?.short) return;
    setZones(prev=>[...prev,{id:'z_'+genId(),name:newZone.name,short:newZone.short}]);
    setNewZone(null);
  }
  function addTrade() {
    if (!newTrade?.name||!newTrade?.short) return;
    setTrades(prev=>[...prev,{id:'tr_'+genId(),name:newTrade.name,short:newTrade.short,color:newTrade.color||'blue'}]);
    setNewTrade(null);
  }
  function addCompany() {
    var co = normalizeCompany(newCompany||{});
    if (!co.name || !co.code) { alert('Nom entreprise et code PIN sont requis.'); return; }
    var exists = companies.some(function(c){return c.id===co.id || c.name.toLowerCase()===co.name.toLowerCase();});
    if (exists) { alert('Cette entreprise existe déjà. Modifiez-la dans la liste.'); return; }
    setCompanies(prev=>[...prev, co]);
    setNewCompany(null);
    supaWrite('POST','companies',companyRow(co));
  }

  return (

function StatusWithNote({ iv, session, onStatusChange }) {
  var [pendingStatus, setPendingStatus] = React.useState(null);
  var [noteText, setNoteText] = React.useState('');
  var [saved, setSaved] = React.useState(false);
  var [saving, setSaving] = React.useState(false);
  var [error, setError] = React.useState('');
  var m2 = pendingStatus ? (STATUS_META[pendingStatus]||STATUS_META.arealis) : null;

  async function confirm() {
    if (saving || !pendingStatus) return;
    setSaving(true);
    setError('');
    try {
      await onStatusChange(iv.id, pendingStatus, noteText.trim());
      setSaved(true);
      setTimeout(function(){ setSaved(false); setPendingStatus(null); setNoteText(''); }, 1600);
    } catch(e) {
      setError(e&&e.message?e.message:'Erreur de sauvegarde. Actualisez puis réessayez.');
    } finally {
      setSaving(false);
    }
  }
  function cancel() { if (!saving) { setPendingStatus(null); setNoteText(''); setError(''); } }

  return (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
        textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>
        Mettre à jour le statut
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
        {Object.entries(STATUS_META).map(function(entry){
          var k=entry[0], m=entry[1];
          return (
            <button key={k} disabled={saving} onClick={function(){ setPendingStatus(k); setNoteText(''); setSaved(false); setError(''); }}
              style={{padding:'9px 6px',borderRadius:'var(--r-sm)',
                border:'1.5px solid '+(iv.status===k?m.dot:'var(--border)'),
                background:iv.status===k?m.bg:'var(--surface)',
                cursor:saving?'wait':'pointer',fontSize:12,fontWeight:500,
                color:iv.status===k?m.text:'var(--text)',opacity:saving ? .65 : 1,
                display:'flex',alignItems:'center',justifyContent:'center',
                gap:6,transition:'all .15s',fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
              {m.label}
            </button>
          );
        })}
      </div>
      {pendingStatus && !saved && (
        <div style={{marginTop:10,padding:'12px',background:'var(--surface-2)',
          border:'1.5px solid '+(m2?m2.dot:'var(--border)'),borderRadius:'var(--r-sm)'}}>
          <div style={{fontSize:11,fontWeight:700,color:m2?m2.dot:'var(--muted)',
            marginBottom:8,fontFamily:"'DM Mono',monospace"}}>
            {m2?m2.label:'?'} — note optionnelle
          </div>
          <textarea
            value={noteText}
            disabled={saving}
            onChange={function(e){ setNoteText(e.target.value); }}
            placeholder="Ajouter un commentaire..."
            style={{width:'100%',padding:'9px 11px',border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)',fontSize:13,fontFamily:"'DM Sans',sans-serif",
              color:'var(--text)',background:'var(--surface)',resize:'vertical',
              minHeight:64,marginBottom:10,opacity:saving ? .7 : 1}}
          />
          {error && <div style={{fontSize:12,color:'var(--danger)',fontWeight:600,marginBottom:8,
            lineHeight:1.4}}>{error}</div>}
          <div style={{display:'flex',gap:8}}>
            <button onClick={confirm} disabled={saving}
              style={{flex:1,padding:'10px',borderRadius:'var(--r-sm)',border:'none',
                background:m2?m2.dot:'var(--primary)',color:'#fff',fontSize:13,fontWeight:700,
                cursor:saving?'wait':'pointer',opacity:saving ? .7 : 1,fontFamily:"'DM Sans',sans-serif"}}>
              {saving?'Enregistrement…':'Confirmer'}
            </button>
            <button onClick={cancel} disabled={saving}
              style={{padding:'10px 14px',borderRadius:'var(--r-sm)',
                border:'1px solid var(--border)',background:'var(--surface)',
                color:'var(--muted)',fontSize:13,cursor:saving?'wait':'pointer',opacity:saving ? .6 : 1,
                fontFamily:"'DM Sans',sans-serif"}}>
              Annuler
            </button>
          </div>
        </div>
      )}
      {saved && (
        <div style={{marginTop:8,padding:'8px 12px',background:'var(--success-l)',
          borderRadius:'var(--r-sm)',fontSize:12,color:'var(--success)',fontWeight:600,
          textAlign:'center'}}>Statut sauvegardé ✓</div>
      )}
    </div>
  );
}

function FrozenDaysField({ form, set }) {
  // Build list of all dates in the intervention range, including weekends.
  // Weekends can be automatically frozen when they are inside a long task range.
  var start = form.start, end = form.end||form.start;
  if (!start) return (
    <div style={{fontSize:11,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",padding:'8px 0'}}>
      Saisissez d’abord une date de début
    </div>
  );

  var dates = [];
  var cur = new Date(start+'T00:00:00');
  var endD = new Date((end||start)+'T00:00:00');
  var safety = 0;
  while (cur <= endD && safety < 180) {
    var ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    dates.push(ds);
    cur.setDate(cur.getDate()+1);
    safety++;
  }

  if (!dates.length) return null;

  var offs = form.off_days || [];
  var autoWeekendOffs = form._auto_weekend_off_days || [];
  var DAY_SHORT = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  var MONTHS_SHORT = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

  function toggle(ds) {
    var active = offs.includes(ds);
    if (active) {
      set('off_days', offs.filter(function(x){return x!==ds;}));
      if (autoWeekendOffs.includes(ds)) {
        set('_auto_weekend_off_days', autoWeekendOffs.filter(function(x){return x!==ds;}));
      }
    } else {
      set('off_days', [...offs, ds]);
    }
  }

  return (
    <div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
        {dates.map(function(ds) {
          var d = new Date(ds+'T00:00:00');
          var dow = d.getDay();
          var weekend = dow === 0 || dow === 6;
          var active = offs.includes(ds);
          var auto = autoWeekendOffs.includes(ds);
          return (
            <button key={ds} type="button" onClick={function(){toggle(ds);}}
              title={auto?'Week-end gelé automatiquement par défaut':''}
              style={{display:'flex',flexDirection:'column',alignItems:'center',
                padding:'6px 8px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',
                border:'1.5px solid '+(active?'var(--danger)':weekend?'rgba(245,158,11,.55)':'var(--border)'),
                background:active?'var(--danger-l)':weekend?'rgba(245,158,11,.08)':'var(--surface)',
                color:active?'var(--danger)':weekend?'#B45309':'var(--muted)',
                minWidth:36,fontFamily:"'DM Sans',sans-serif",transition:'all .15s'}}>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{DAY_SHORT[d.getDay()]}</span>
              <span>{d.getDate()}</span>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{MONTHS_SHORT[d.getMonth()]}</span>
              {auto&&<span style={{fontSize:7,marginTop:1,fontFamily:"'DM Mono',monospace"}}>auto</span>}
            </button>
          );
        })}
      </div>
      {offs.length > 0 && (
        <div style={{fontSize:10,color:'var(--danger)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
          {offs.length} jour{offs.length>1?'s':''} gelé{offs.length>1?'s':''}
          {autoWeekendOffs.length>0&&<span style={{color:'var(--xmuted)'}}> · week-end gelé par défaut</span>}
          {' — '}
          <span style={{cursor:'pointer',textDecoration:'underline'}}
            onClick={function(){set('off_days',[]);set('_auto_weekend_off_days',[]);}}>tout effacer</span>
        </div>
      )}
      {offs.length === 0 && (
        <div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>
          Cliquez les jours à exclure du planning. Les week-ends traversés par une tâche longue sont gelés par défaut.
        </div>
      )}
    </div>
  );
}
