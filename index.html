function daysUntil(dateStr) {
  const d = new Date(dateStr+'T00:00:00'), now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}
function deadlineColor(dateStr) {
  const d = daysUntil(dateStr);
  if (d < 0)  return '#DC2626';   // past
  if (d < 14) return '#DC2626';   // danger
  if (d < 21) return '#EA580C';   // warning
  return '#16A34A';               // ok
}

// ─── UTILITIES ──────────────────────────────────────────────────
function getMonday(offset = 0) {
  const t = new Date(); const d = t.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const m = new Date(t); m.setDate(t.getDate() + diff + offset * 7); m.setHours(0,0,0,0);
  return m;
}
function weekDays(offset = 0, includeWeekends = false) {
  const m = getMonday(offset);
  const length = includeWeekends ? 7 : 5;
  return Array.from({length:length}, (_,i) => { const d = new Date(m); d.setDate(m.getDate()+i); return d; });
}
function multiWeekDays(offset = 0, weeks = 1, includeWeekends = false) {
  return Array.from({length: weeks}, (_, w) => weekDays(offset + w, includeWeekends)).flat();
}
function dateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateFR(d)    { return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function fmtDate(s)   { if(!s) return ''; const p=s.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }

function inDay(iv,day){ const s=new Date(iv.start+'T00:00:00'),e=new Date((iv.end||iv.start)+'T00:00:00'),dd=new Date(day); dd.setHours(0,0,0,0); return dd>=s&&dd<=e; }
function isTaskFrozenOn(iv, day) {
  if (!iv) return false;
  const ds = typeof day === 'string' ? day : dateStr(day);
  const explicitStart = iv.start === ds;
  const explicitEnd = (iv.end || iv.start) === ds;

  // Un jour gelé exclut la tâche uniquement si la tâche n'est pas explicitement affectée ce jour-là.
  // Exemple :

function workingDaysUntil(ds) {
  if (!ds) return 9999;
  const target = new Date(ds+'T00:00:00');

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel" data-presets="env,react">// planify-components.jsx — Shared UI components

// hooks via screens script

/* ── CONFIRM DIALOG ───────────────────────────────────────── */

        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={btnSecStyle}>Annuler</button>
          <button onClick={onConfirm} style={btnDangerStyle}>Supprimer</button>
        </div>
      </div>

}

/* ── TASK CARD (planning grid) ────────────────────────────── */
function TaskCard({ iv, trades, data = [], isDark, onClick, criticalPath = null, criticalVisible = true, dimmed = false, focused = false }) {
  const tr = trades.find(t => t.id === iv.trade);
  const c  = getTC(tr?.color || 'blue');
  const m  = STATUS_META[iv.status] || STATUS_META.arealis;
  const bg = isDark ? c.bgD : c.bg;
  const bdr= isDark ? `${c.b}60` : `${c.b}35`;
  const hasCritical = !!(criticalVisible && criticalPath && criticalPath.linked);
  const ccColor = hasCritical ? (criticalPath.color || '#EA580C') : c.b;
  const ccBg = hasCritical ? ('linear-gradient(0deg, '+rgbaCss(ccColor,.11)+', '+rgbaCss(ccColor,.11)+'), '+bg) : bg;
  const ccBorder = hasCritical ? ('1px solid '+rgbaCss(ccColor,.82)) : ('1px solid '+bdr);
  const ccShadow = hasCritical
    ? ('0 0 0 2px '+rgbaCss(ccColor,.30)+', 0 0 0 5px '+rgbaCss(ccColor,.08)+', 0 3px 12px '+rgbaCss(ccColor,.12))
    : 'none';
  return (
    <div onClick={onClick} style={{borderRadius:8,padding:'5px 7px 5px 9px',marginBottom:3,cursor:'pointer',
      background:ccBg,borderLeft:`4px solid ${hasCritical ? ccColor : c.b}`,border:ccBorder,
      boxShadow:ccShadow,
      transition:'opacity .12s, box-shadow .15s, border-color .15s, background .15s',userSelect:'none',position:'relative',
      opacity:dimmed ? .34 : 1,filter:dimmed?'saturate(.65)':'none'}}
      onMouseEnter={e=>{e.currentTarget.style.opacity=dimmed?'.5':'.90';}}
      onMouseLeave={e=>{e.currentTarget.style.opacity=dimmed?'.34':'1';}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8.5px',color:c.t,opacity:.7,fontWeight:600}}>
          {iv.task_number}
        </span>
        <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 6px',borderRadius:999,
          background:m.bg,color:m.text,border:`1px solid ${m.dot}66`,fontSize:8.5,fontWeight:900,
          fontFamily:"'DM Mono',monospace",lineHeight:1,whiteSpace:'nowrap',flexShrink:0}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:m.dot,flexShrink:0,display:'block'}}></span>
          {m.label}
        </span>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:c.t,marginBottom:1,lineHeight:1.2}}>{iv.company}</div>
      <div style={{fontSize:10,color:c.t,opacity:.8,lineHeight:1.35,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{iv.task}</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:3}}>
        <TaskDependencyBadges iv={iv} data={data} compact />
        {hasCritical ? <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'1px 6px',borderRadius:20,background:rgbaCss(ccColor,.16),color:ccColor,border:'1px solid '+rgbaCss(ccColor,.45),fontSize:8.5,fontWeight:900,fontFamily:"'DM Mono',monospace"}}>{criticalPath.chainLabel || 'CC'} · chemin critique</span> : null}
      </div>
      {iv.prereq && <div style={{fontSize:'8.5px',marginTop:2,color:'#DC2626',opacity:.85,display:'flex',gap:3,alignItems:'flex-start'}}>
        <span>⚠</span><span style={{overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{iv.prereq.slice(0,40)}</span>

      {taskCanFinishLater(iv) && (
        <div style={{marginTop:3}}>
          <TaskFinishLaterBadge iv={iv} compact />

}

/* ── STAT CHIP ────────────────────────────────────────────── */

/* ── FILTER CHIPS ─────────────────────────────────────────── */
function FilterChips({ trades, filter, onFilter }) {

      {[{id:'all',short:'Tous',color:''},...trades].map(tr => {

              opacity:active?1:0.7}}></span>}
            {tr.short}
          </button>
        );

/* ── APP HEADER ───────────────────────────────────────────── */
function AppHeader({ session, weekOffset, onWeekChange, onSettings, onUserMenu, filter, trades, onFilter, zones, data, notifications = [], viewMode, onViewMode, onToday, onRefresh, onExport, onHistory, onToggleLock, onValidatePlanning, onReindexPlanning, planningLocked, planningValidated, planningValidUntil, syncing, busyActions = {}, showWeekends = false, onToggleWeekends }) {
  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var nowHdr = new Date(); nowHdr.setHours(0,0,0,0);
    zones.forEach(function(z){
      if(z.deadline){
        var d = new Date(z.deadline+'T00:00:00');
        var w = Math.ceil((d - nowHdr)/(7*24*3600*1000)) + 1;
        if(w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16));
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const fullDaysForWeekend = multiWeekDays(weekOffset, weeks, true);
  const weekendTaskVisible = (data||[]).some(function(iv){
    return fullDaysForWeekend.some(function(d){
      var dow = d.getDay();
      return (dow === 0 || dow === 6) && inDay(iv,d) && !(iv.off_days||[]).includes(dateStr(d));
    });
  });
  const headerIncludeWeekends = !!showWeekends || weekendTaskVisible;
  const days  = multiWeekDays(weekOffset, weeks, headerIncludeWeekends);
  const start = days[0], end = days[days.length - 1];

  // Dominant trade per zone (most interventions)
  function dominantColor(zone) {
    const counts = {};
    data.filter(i=>i.zone===zone.id).forEach(i=>{counts[i.trade]=(counts[i.trade]||0)+1;});
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    if (!top) return '#9CA3AF';
    const tr = trades.find(t=>t.id===top[0]);
    return tr ? getTC(tr.color).b : '#9CA3AF';
  }

  const [exportOpen, setExportOpen] = React.useState(false);
  const exportRef = React.useRef(null);
  const defaultExportStartDate = start ? dateStr(start) : dateStr(getMonday(weekOffset));

  function exportDateFromStr(value, fallback) {
    var d = value ? new Date(value + 'T00:00:00') : null;
    if (!d || Number.isNaN(d.getTime())) d = fallback ? new Date(fallback + 'T00:00:00') : getMonday(weekOffset);
    d.setHours(0,0,0,0);
    return d;
  }
  function exportAddDays(value, count) {
    var d = exportDateFromStr(value, defaultExportStartDate);
    d.setDate(d.getDate() + count);
    d.setHours(0,0,0,0);
    return dateStr(d);
  }
  function exportWeekRangeLabel(offset) {
    var startD = exportDateFromStr(exportStartDate || defaultExportStartDate, defaultExportStartDate);
    startD.setDate(startD.getDate() + offset * 7);
    var endD = new Date(startD);
    endD.setDate(endD.getDate() + 4);
    return fmtDate(dateStr(startD)) + ' → ' + fmtDate(dateStr(endD));
  }

  const [exportStartDate, setExportStartDate] = React.useState(defaultExportStartDate);
  const [exportEndDate, setExportEndDate] = React.useState(exportAddDays(defaultExportStartDate, 25));
  const [selectedExportWeeks, setSelectedExportWeeks] = React.useState([0]);
  React.useEffect(() => {
    setExportStartDate(defaultExportStartDate);
    setExportEndDate(exportAddDays(defaultExportStartDate, 25));
    setSelectedExportWeeks([0]);
  }, [defaultExportStartDate]);
  React.useEffect(() => {
    if (!exportOpen) return;
    const close = (e) => {
      if (exportRef.current && !exportRef.current.contains(e.target)) setExportOpen(false);
    };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [exportOpen]);
  const exportWeekOptions = React.useMemo(function(){
    var maxOffset = 11;
    var base = exportDateFromStr(exportStartDate || defaultExportStartDate, defaultExportStartDate);
    (zones || []).forEach(function(z){
      if (!z.deadline) return;
      var d = new Date(z.deadline + 'T00:00:00');
      if (Number.isNaN(d.getTime())) return;
      var off = Math.ceil((d - base) / (7 * 24 * 3600 * 1000));
      if (off > maxOffset) maxOffset = off;
    });
    maxOffset = Math.max(0, Math.min(maxOffset, 20));
    return Array.from({length:maxOffset + 1}, function(_, offset){
      return {offset:offset, label:exportWeekRangeLabel(offset)};
    });
  }, [exportStartDate, defaultExportStartDate, zones]);
  function toggleExportWeek(offset) {
    setSelectedExportWeeks(function(prev){
      var list = Array.isArray(prev) ? prev.slice() : [];
      if (list.includes(offset)) list = list.filter(function(x){ return x !== offset; });
      else list.push(offset);
      list = Array.from(new Set(list)).sort(function(a,b){ return a-b; });
      return list.length ? list : [offset];
    });
  }
  function runExport(format, mode, extra) {
    setExportOpen(false);
    onExport && onExport(format, mode, Object.assign({
      startDate:exportStartDate || defaultExportStartDate,
      endDate:exportEndDate || exportAddDays(exportStartDate || defaultExportStartDate, 25),
      weekOffsets:selectedExportWeeks
    }, extra || {}));
  }
  const statusLabel = planningValidated
    ? 'Validé' + (planningValidUntil ? ' jusqu’au ' + fmtDate(planningValidUntil) : '')
    : planningLocked ? 'Verrouillé' : '';

  const unreadPrereqMentionCount = (notifications || []).filter(function(n){
    return !n.read && /prérequis|pré-requis|point bloquant/i.test(String(n.message || ''));
  }).length;
  const activePrereqAssignments = (data || []).filter(function(iv){
    if (!iv || iv.status === 'termine') return false;
    if (!iv.prereq || !String(iv.prereq).trim() || !iv.prereq_company) return false;
    if (session && session.role === 'company') return iv.prereq_company === session.company?.name;
    return true;
  }).length;
  const showPrereqHeaderBanner = unreadPrereqMentionCount > 0 || activePrereqAssignments > 0;

  return (
    <header style={{background:'var(--hdr)',color:'var(--hdr-text)',padding:'10px 14px 0',flexShrink:0,
      boxShadow:'0 2px 12px rgba(0,0,0,.25)'}}>
      {/* Top row */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
        <div style={{minWidth:0,flex:1,marginRight:8}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,.45)',
            letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}}>Chantier actif</div>
          <div style={{fontSize:15,fontWeight:700,letterSpacing:'-.01em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>HSF — Av. Marceau</div>
          {session && <div style={{fontSize:10,color:'rgba(255,255,255,.5)',fontFamily:"'DM Mono',monospace",marginTop:1,whiteSpace:'nowrap'}}>
            {session.role==='admin'?'Administrateur':session.company?.name}
          </div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {/* View toggle */}
          <div style={{display:'flex',background:'rgba(255,255,255,.1)',borderRadius:6,padding:2,border:'1px solid rgba(255,255,255,.14)'}}>
            {['1s','2s','3s','tout'].map(v=>(
              <button key={v} onClick={()=>onViewMode(v)}
                style={{padding:'3px 8px',borderRadius:4,border:'none',fontSize:10,fontWeight:700,
                  cursor:'pointer',fontFamily:"'DM Mono',monospace",letterSpacing:'.04em',
                  background:viewMode===v?'rgba(255,255,255,.9)':'transparent',
                  color:viewMode===v?'var(--hdr)':'rgba(255,255,255,.65)',transition:'all .15s'}}>
                {v.toUpperCase()}
              </button>
            ))}
          </div>
          {/* Week nav */}
          <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.08)',
            border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'4px 6px'}}>
            <button onClick={()=>onWeekChange(-1)} style={hdrBtnStyle}>‹</button>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,.7)',
              whiteSpace:'nowrap',minWidth:90,textAlign:'center'}}>
              {dateFR(start)} – {dateFR(end)}
            </span>
            <button onClick={()=>onWeekChange(1)} style={hdrBtnStyle}>›</button>
          </div>
          <button onClick={onToday} title="Aujourd'hui"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,width:26,height:26,fontSize:11}}>◎</button>
          {session?.role==='admin' && (
            <button onClick={onToggleWeekends} title={showWeekends?'Masquer les samedis / dimanches':'Afficher les samedis / dimanches'}
              style={{...hdrBtnStyle,background:showWeekends?'rgba(96,165,250,.22)':'rgba(255,255,255,.08)',
                border:'1px solid '+(showWeekends?'rgba(147,197,253,.55)':'rgba(255,255,255,.14)'),
                borderRadius:6,minWidth:34,height:26,fontSize:10,fontWeight:800,
                fontFamily:"'DM Mono',monospace",color:showWeekends?'#BFDBFE':'rgba(255,255,255,.7)'}}>
              {showWeekends?'7J':'5J'}
            </button>
          )}
          <button onClick={onRefresh} disabled={!!syncing} title="Rafraîchir les données"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,minWidth:42,height:26,
              fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace",opacity:syncing ? .65 : 1}}>
            {syncing?'…':'↻'}
          </button>
          <button onClick={onHistory} title="Historique détaillé"
            style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',
              border:'1px solid rgba(255,255,255,.14)',borderRadius:6,minWidth:40,height:26,
              fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>Hist.</button>
          {session?.role==='admin' && !planningValidated && (
            <button onClick={onToggleLock} disabled={!!busyActions.planning_lock} title={planningLocked?'Déverrouiller le planning':'Verrouiller le planning'}

function taskCanFinishLater(iv) {

  var currentEnd = iv.end || iv.start || '';
  return !!currentEnd && String(iv.company_edit_end_max) > String(currentEnd);
}

function taskLatestFinishText(iv) {

    </span>

function normalizeTaskLinkIds(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value.filter(Boolean).map(String);
  if (typeof value === 'string') {
    var trimmed = value.trim();
    if (!trimmed) return [];
    try {
      var parsed = JSON.parse(trimmed);
      if (Array.isArray(parsed)) return parsed.filter(Boolean).map(String);
    } catch(e) {}
    return trimmed.split(',').map(function(x){ return x.trim(); }).filter(Boolean);
  }
  return [];
}
function uniqueTaskIds(ids) {
  var seen = new Set();
  return (ids || []).filter(function(id){ if(!id || seen.has(id)) return false; seen.add(id); return true; });
}
function taskCodesForIds(ids, data) {
  return normalizeTaskLinkIds(ids).map(function(id){
    var t = (data || []).find(function(x){ return x.id === id; });
    return t ? (t.task_number || t.task || id) : id;
  }).filter(Boolean);
}
function taskDependencyIds(iv, data, type) {
  if (!iv) return [];
  var direct = type === 'predecessor'
    ? normalizeTaskLinkIds(iv.predecessor_ids || iv.predecessor_id)
    : normalizeTaskLinkIds(iv.successor_ids);
  var derived = (data || []).filter(function(other){
    if (!other || other.id === iv.id) return false;
    if (type === 'predecessor') return normalizeTaskLinkIds(other.successor_ids).includes(iv.id);
    return normalizeTaskLinkIds(other.predecessor_ids || other.predecessor_id).includes(iv.id);
  }).map(function(other){ return other.id; });
  return uniqueTaskIds(direct.concat(derived));
}
function TaskDependencyBadges({ iv, data, compact = false }) {
  var predCodes = taskCodesForIds(taskDependencyIds(iv, data, 'predecessor'), data);
  var succCodes = taskCodesForIds(taskDependencyIds(iv, data, 'successor'), data);
  if (!predCodes.length && !succCodes.length) return null;
  var style = {display:'inline-flex',alignItems:'center',gap:4,padding:compact?'1px 5px':'2px 7px',borderRadius:20,background:'rgba(202,138,4,.10)',color:'#92400E',border:'1px solid rgba(202,138,4,.25)',fontSize:compact?8.5:10,fontWeight:800,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis'};
  return (<>{predCodes.length > 0 && <span style={style}>Pred. {predCodes.join(', ')}</span>}{succCodes.length > 0 && <span style={style}>Succ. {succCodes.join(', ')}</span>}</>);
}

const CRITICAL_CHAIN_COLORS = ['#EA580C','#0F766E','#7C3AED','#2563EB','#BE185D','#65A30D','#B45309','#0891B2','#DC2626','#4F46E5'];
function criticalChainColor(index) {
  return CRITICAL_CHAIN_COLORS[index % CRITICAL_CHAIN_COLORS.length];
}
function hexToRgbCss(hex) {
  var clean = String(hex || '').replace('#','').trim();
  if (clean.length === 3) clean = clean.split('').map(function(ch){ return ch + ch; }).join('');
  if (clean.length !== 6) return { r:234, g:88, b:12 };
  return { r:parseInt(clean.slice(0,2),16), g:parseInt(clean.slice(2,4),16), b:parseInt(clean.slice(4,6),16) };
}
function rgbaCss(hex, alpha) {
  var rgb = hexToRgbCss(hex);
  return 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
}
function buildZoneCriticalPathMeta(items) {
  var rows = items || [];
  var byId = new Map(rows.map(function(iv){ return [iv.id, iv]; }));
  var seen = new Set();
  var links = [];
  var roles = {};
  var adjacency = {};
  rows.forEach(function(iv){ adjacency[iv.id] = adjacency[iv.id] || new Set(); });
  rows.forEach(function(target){
    if (!target) return;
    normalizeTaskLinkIds(target.predecessor_ids || target.predecessor_id).forEach(function(predId){
      var source = byId.get(predId);
      if (!source || source.id === target.id) return;
      var key = source.id + '>' + target.id;
      if (seen.has(key)) return;
      seen.add(key);
      var from = source.end || source.start || '';
      var to = target.start || target.end || '';
      var rangeStart = from && to ? (from <= to ? from : to) : (from || to || '');
      var rangeEnd = from && to ? (from <= to ? to : from) : (from || to || '');
      var direction = !from || !to || from <= to ? 'forward' : 'reverse';
      links.push({
        key:key, sourceId:source.id, targetId:target.id,
        sourceZone:source.zone || '', targetZone:target.zone || '',
        sourceCode:source.task_number || source.id, targetCode:target.task_number || target.id,
        from:from, to:to, rangeStart:rangeStart, rangeEnd:rangeEnd, direction:direction,
        crossZone:!!(source.zone && target.zone && source.zone !== target.zone)
      });
      adjacency[source.id].add(target.id);
      adjacency[target.id].add(source.id);
      if (!roles[source.id]) roles[source.id] = { linked:false, source:false, target:false, count:0 };
      if (!roles[target.id]) roles[target.id] = { linked:false, source:false, target:false, count:0 };
      roles[source.id].linked = true; roles[source.id].source = true; roles[source.id].count += 1;
      roles[target.id].linked = true; roles[target.id].target = true; roles[target.id].count += 1;
    });
  });
  var visited = new Set();
  var chainByTask = {};
  var chains = [];
  Object.keys(adjacency).forEach(function(taskId){
    if (visited.has(taskId) || !adjacency[taskId] || adjacency[taskId].size === 0) return;
    var stack = [taskId];
    var comp = [];
    visited.add(taskId);
    while (stack.length) {
      var current = stack.pop();
      comp.push(current);
      adjacency[current].forEach(function(nextId){
        if (!visited.has(nextId)) { visited.add(nextId); stack.push(nextId); }
      });
    }
    comp.sort(function(a,b){
      var ta = byId.get(a), tb = byId.get(b);
      var da = ta ? (ta.start || ta.end || '') : '';
      var db = tb ? (tb.start || tb.end || '') : '';
      if (da !== db) return da.localeCompare(db);
      return String(a).localeCompare(String(b));
    });
    var chainIndex = chains.length;
    var color = criticalChainColor(chainIndex);
    var chainId = 'cc_' + (chainIndex + 1);
    var label = 'CC-' + String(chainIndex + 1).padStart(2, '0');
    var codes = comp.map(function(id){ var task = byId.get(id); return task ? (task.task_number || task.id) : id; });
    var zoneIds = Array.from(new Set(comp.map(function(id){ var task = byId.get(id); return task ? task.zone : ''; }).filter(Boolean)));
    comp.forEach(function(id){
      chainByTask[id] = chainId;
      roles[id] = Object.assign({ linked:true, source:false, target:false, count:0 }, roles[id] || {}, {
        linked:true, chainId:chainId, chainLabel:label, color:color, taskCodes:codes
      });
    });
    chains.push({ id:chainId, label:label, color:color, taskIds:comp.slice(), taskCodes:codes.slice(), zoneIds:zoneIds.slice(), links:[] });
  });
  links = links.map(function(link){
    var chainId = chainByTask[link.sourceId] || chainByTask[link.targetId] || null;
    var chain = chains.find(function(item){ return item.id === chainId; });
    return Object.assign({}, link, { chainId:chainId, chainLabel:chain ? chain.label : 'CC', color:chain ? chain.color : '#EA580C' });
  });
  chains.forEach(function(chain){
    chain.links = links.filter(function(link){ return link.chainId === chain.id; });
    chain.linkCount = chain.links.length;
    chain.taskCount = chain.taskIds.length;
  });
  return { links:links, roles:roles, chains:chains, chainByTask:chainByTask };
}
function criticalPathLinksForDay(links, dayStr) {
  return (links || []).filter(function(link){
    if (!link || !link.rangeStart || !link.rangeEnd) return false;
    return dayStr >= link.rangeStart && dayStr <= link.rangeEnd;
  });
}
function planningTaskVisibleOnDay(iv, day, zoneId) {
  if (!iv || iv.zone !== zoneId) return false;
  if (isHoliday(day)) return false;
  if (!inDay(iv, day)) return false;
  var ds = dateStr(day);
  if ((iv.off_days || []).includes(ds)) return false;
  return true;
}
function planningTaskSort(a, b) {
  var ap = a ? (a.priority || 3) : 3;
  var bp = b ? (b.priority || 3) : 3;
  if (ap !== bp) return ap - bp;
  var as = a ? (a.start || '') : '';
  var bs = b ? (b.start || '') : '';
  if (as !== bs) return as.localeCompare(bs);
  var ae = a ? (a.end || a.start || '') : '';
  var be = b ? (b.end || b.start || '') : '';
  if (ae !== be) return ae.localeCompare(be);
  return String((a && (a.task_number || a.id)) || '').localeCompare(String((b && (b.task_number || b.id)) || ''));
}
function planningSlotHeight(isMulti, weeks) {
  if (isMulti) return weeks === 2 ? 30 : 23;
  return 47;
}
function buildVisibleAlignedCriticalChains(zoneCritical, days, sourceItems, zoneId, activeCriticalChainId) {
  var meta = zoneCritical || { chains:[] };
  var byId = new Map((sourceItems || []).map(function(iv){ return [iv.id, iv]; }));
  var dayStrs = (days || []).map(function(day){ return dateStr(day); });
  return (meta.chains || []).filter(function(chain){
    if (activeCriticalChainId && chain.id !== activeCriticalChainId) return false;
    var hasTaskInWindow = (chain.taskIds || []).some(function(id){
      var iv = byId.get(id);
      return !!iv && (days || []).some(function(day){ return planningTaskVisibleOnDay(iv, day, zoneId); });
    });
    if (hasTaskInWindow) return true;
    return (chain.links || []).some(function(link){
      if (!link || !link.rangeStart || !link.rangeEnd) return false;
      return dayStrs.some(function(ds){ return ds >= link.rangeStart && ds <= link.rangeEnd; });
    });
  });
}
function buildAlignedTaskSlots(cards, zoneCritical, alignedChains, showCriticalPath) {
  var list = (cards || []).slice().sort(planningTaskSort);
  if (!showCriticalPath || !(alignedChains || []).length) {
    return list.map(function(iv){ return { type:'task', key:'task_' + iv.id, tasks:[iv] }; });
  }
  var roles = (zoneCritical && zoneCritical.roles) || {};
  var used = new Set();
  var slots = (alignedChains || []).map(function(chain, laneIndex){
    var tasks = list.filter(function(iv){
      var role = roles[iv.id] || null;
      return role && role.chainId === chain.id;
    }).sort(planningTaskSort);
    tasks.forEach(function(iv){ used.add(iv.id); });
    return { type:'chain', key:'chain_' + chain.id + '_' + laneIndex, chain:chain, laneIndex:laneIndex, tasks:tasks };
  });
  list.forEach(function(iv){
    if (!used.has(iv.id)) slots.push({ type:'task', key:'task_' + iv.id, tasks:[iv] });
  });
  return slots;

function AttachmentZone({ files, setFiles }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const accept = (fileList) => {
    const valid = [...fileList].filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
    setFiles(prev => [...prev, ...valid.map(f => ({id:genId(), file:f, name:f.name,

  };
  return (
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);accept(e.dataTransfer.files);}}
        onClick={()=>inputRef.current.click()}
        style={{border:`2px dashed ${dragging?'var(--primary)':'var(--border)'}`,borderRadius:'var(--r-sm)',

/* ── ZONE PROGRESS BAR ────────────────────────────────────── */
function ZoneProgressBar({ zone, interventions }) {
  const zivs = interventions.filter(i => i.zone === zone.id);
  const total = zivs.length;
  const done  = zivs.filter(i => i.status === 'termine').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const blocked = zivs.some(i => i.status === 'bloque');
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>

      </div>
    </div>
  );
}

  if (!tradeId) {

    (data || []).filter(function(i){ return i.company === companyName; }).forEach(function(i){ counts[i.trade] = (counts[i.trade] || 0) + 1; });

function isTaskLate(iv) {
  if (!iv || iv.status === 'termine') return false;
  const rawDate = iv.end || iv.start;
  if (!rawDate) return false;
  const due = new Date(rawDate + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return due < today;
}

function isTaskTodoToday(iv) {
  return !!iv && iv.status === 'arealis' && isTaskActiveToday(iv);
}

function ZoneTaskList({ items, zones, trades, onOpenDetail, isAdmin, title, emptyLabel }) {

    const rank = function(iv) {
      if (iv.status === 'bloque') return 0;
      if (isTaskLate(iv)) return 1;
      if (iv.status === 'encours') return 2;
      if (iv.status === 'arealis') return 3;
      if (iv.status === 'termine') return 4;
      return 9;
    };
    const ra = rank(a);
    const rb = rank(b);
    if (ra !== rb) return ra - rb;
    return (a.start || '').localeCompare(b.start || '');
  });

  const counts = ordered.reduce(function(acc, iv) {
    if (!(iv.status === 'encours' && isTaskFrozenToday(iv))) {
      acc[iv.status] = (acc[iv.status] || 0) + 1;

    if (isTaskLate(iv)) acc.retard += 1;
    acc.total += 1;

  }, { total: 0, termine: 0, encours: 0, bloque: 0, arealis: 0, retard: 0 });

function taskActiveDatesInRange(iv) {
  if (!iv || !iv.start) return [];
  var start = new Date(iv.start + 'T00:00:00');
  var end = new Date((iv.end || iv.start) + 'T00:00:00');
  if (end < start) return [];
  var out = [];
  var cur = new Date(start);
  var safety = 0;
  while (cur <= end && safety < 180) {
    if (isTaskActiveOn(iv, cur)) out.push(dateStr(cur));
    cur.setDate(cur.getDate() + 1);
    safety++;
  }
  return out;
}

function effectiveDueDate(iv) {
  var activeDates = taskActiveDatesInRange(iv);
  if (activeDates.length) return activeDates[activeDates.length - 1];
  return iv && (iv.end || iv.start) ? (iv.end || iv.start) : '';
}

function calcReliability(items) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var todayStr = dateStr(today);

  var enriched = (items || []).map(function(iv){
    return Object.assign({}, iv, {
      _effective_due_date: effectiveDueDate(iv),
      _active_dates_count: taskActiveDatesInRange(iv).length
    });
  });

  var due = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date <= todayStr;
  });

  var notDue = enriched.filter(function(iv){
    return iv._effective_due_date && iv._effective_due_date > todayStr;
  });

  var doneItems = due.filter(function(iv){ return iv.status === 'termine'; });
  var missedItems = due.filter(function(iv){ return iv.status !== 'termine'; });
  var kept = doneItems.length;
  var value = due.length ? Math.round(kept / due.length * 100) : 100;

  var byStatus = due.reduce(function(acc, iv){
    var k = iv.status || 'arealis';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});

  return {
    value: value,
    label: value + '%',
    done: kept,
    total: due.length,
    lostPoints: due.length ? 100 - value : 0,
    missed: missedItems.length,
    notDue: notDue.length,
    dueItems: due,
    doneItems: doneItems,
    missedItems: missedItems,
    notDueItems: notDue,
    byStatus: byStatus
  };
}

  const overdue = myData.filter(i => isTaskLate(i));
