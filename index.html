function StatusWithNote({ iv, session, onStatusChange }) {
  var [pendingStatus, setPendingStatus] = React.useState(null);
  var [noteText, setNoteText] = React.useState('');
  var [saved, setSaved] = React.useState(false);
  var [saving, setSaving] = React.useState(false);
  var [error, setError] = React.useState('');
  var m2 = pendingStatus ? (STATUS_META[pendingStatus]||STATUS_META.arealis) : null;

  async function confirm() {
    if (saving || !pendingStatus) return;
    setSaving(true);
    setError('');
    try {
      await onStatusChange(iv.id, pendingStatus, noteText.trim());
      setSaved(true);
      setTimeout(function(){ setSaved(false); setPendingStatus(null); setNoteText(''); }, 1600);
    } catch(e) {
      setError(e&&e.message?e.message:'Erreur de sauvegarde. Actualisez puis réessayez.');
    } finally {
      setSaving(false);
    }
  }
  function cancel() { if (!saving) { setPendingStatus(null); setNoteText(''); setError(''); } }

  return (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
        textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>
        Mettre à jour le statut
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
        {Object.entries(STATUS_META).map(function(entry){
          var k=entry[0], m=entry[1];
          return (
            <button key={k} disabled={saving} onClick={function(){ setPendingStatus(k); setNoteText(''); setSaved(false); setError(''); }}
              style={{padding:'9px 6px',borderRadius:'var(--r-sm)',
                border:'1.5px solid '+(iv.status===k?m.dot:'var(--border)'),
                background:iv.status===k?m.bg:'var(--surface)',
                cursor:saving?'wait':'pointer',fontSize:12,fontWeight:500,
                color:iv.status===k?m.text:'var(--text)',opacity:saving ? .65 : 1,
                display:'flex',alignItems:'center',justifyContent:'center',
                gap:6,transition:'all .15s',fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
              {m.label}
            </button>
          );
        })}
      </div>
      {pendingStatus && !saved && (
        <div style={{marginTop:10,padding:'12px',background:'var(--surface-2)',
          border:'1.5px solid '+(m2?m2.dot:'var(--border)'),borderRadius:'var(--r-sm)'}}>
          <div style={{fontSize:11,fontWeight:700,color:m2?m2.dot:'var(--muted)',
            marginBottom:8,fontFamily:"'DM Mono',monospace"}}>
            {m2?m2.label:'?'} — note optionnelle
          </div>
          <textarea
            value={noteText}
            disabled={saving}
            onChange={function(e){ setNoteText(e.target.value); }}
            placeholder="Ajouter un commentaire..."
            style={{width:'100%',padding:'9px 11px',border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)',fontSize:13,fontFamily:"'DM Sans',sans-serif",
              color:'var(--text)',background:'var(--surface)',resize:'vertical',
              minHeight:64,marginBottom:10,opacity:saving ? .7 : 1}}
          />
          {error && <div style={{fontSize:12,color:'var(--danger)',fontWeight:600,marginBottom:8,
            lineHeight:1.4}}>{error}</div>}
          <div style={{display:'flex',gap:8}}>
            <button onClick={confirm} disabled={saving}
              style={{flex:1,padding:'10px',borderRadius:'var(--r-sm)',border:'none',
                background:m2?m2.dot:'var(--primary)',color:'#fff',fontSize:13,fontWeight:700,
                cursor:saving?'wait':'pointer',opacity:saving ? .7 : 1,fontFamily:"'DM Sans',sans-serif"}}>
              {saving?'Enregistrement…':'Confirmer'}
            </button>
            <button onClick={cancel} disabled={saving}
              style={{padding:'10px 14px',borderRadius:'var(--r-sm)',
                border:'1px solid var(--border)',background:'var(--surface)',
                color:'var(--muted)',fontSize:13,cursor:saving?'wait':'pointer',opacity:saving ? .6 : 1,
                fontFamily:"'DM Sans',sans-serif"}}>
              Annuler
            </button>
          </div>
        </div>
      )}
      {saved && (
        <div style={{marginTop:8,padding:'8px 12px',background:'var(--success-l)',
          borderRadius:'var(--r-sm)',fontSize:12,color:'var(--success)',fontWeight:600,
          textAlign:'center'}}>Statut sauvegardé ✓</div>
      )}
    </div>
  );
}

function changeRequestValueText(field, value) {
  if (value == null || value === '') return '—';
  if (field && field.type === 'date') return fmtDate(String(value));
  return String(value);
}

function getChangeRequestValue(req, field, mode) {
  if (!req || !field) return '';
  if (mode === 'old') return req[field.oldKey] || '';
  if (mode === 'final') return req[field.finalKey] || req[field.newKey] || '';
  return req[field.newKey] || '';
}

function valuesDiffer(a, b) {
  return String(a == null ? '' : a).trim() !== String(b == null ? '' : b).trim();
}

function getRequestChangedFields(req) {
  return TASK_CHANGE_FIELDS.filter(function(f){
    return valuesDiffer(req[f.oldKey], req[f.newKey]);
  });
}

function buildRequestFormFromTask(iv) {
  return {
    start: iv.start || '',
    end: iv.end || iv.start || '',
    task: iv.task || '',
    prereq: iv.prereq || '',
    notes: iv.notes || ''
  };
}

function buildRequestFormFromRequest(req) {
  return {
    start: req.final_start_date || req.new_start_date || '',
    end: req.final_end_date || req.new_end_date || req.new_start_date || '',
    task: req.final_task || req.new_task || '',
    prereq: req.final_prereq || req.new_prereq || '',
    notes: req.final_notes || req.new_notes || ''
  };
}

function taskChangeWindowText(iv) {
  if (!iv) return '';
  var min = iv.company_edit_start_min || '';
  var max = iv.company_edit_end_max || '';
  if (min && max) return 'Date au plus tôt pour démarrer la tâche : '+fmtDate(min)+'. Date au plus tard pour finir la tâche : '+fmtDate(max)+'.';
  if (min) return 'Date au plus tôt pour démarrer la tâche : '+fmtDate(min)+'.';
  if (max) return 'Date au plus tard pour finir la tâche : '+fmtDate(max)+'.';
  return 'Aucune borne de date définie par l’admin.';
}

function isDateOutsideTaskChangeWindow(iv, ds) {
  if (!ds || !iv) return false;
  if (iv.company_edit_start_min && ds < iv.company_edit_start_min) return true;
  if (iv.company_edit_end_max && ds > iv.company_edit_end_max) return true;
  return false;
}

function validateCompanyDateProposal(iv, form) {
  if (!form) return '';
  if (form.start && form.end && form.end < form.start) {
    return 'La date de fin ne peut pas être avant la date de début.';
  }
  if (isDateOutsideTaskChangeWindow(iv, form.start)) {
    return 'La date de début proposée doit respecter la fenêtre autorisée par l’admin : '+taskChangeWindowText(iv);
  }
  if (isDateOutsideTaskChangeWindow(iv, form.end)) {
    return 'La date de fin proposée doit respecter la fenêtre autorisée par l’admin : '+taskChangeWindowText(iv);
  }
  return '';
}

function CompanyChangeRequestForm({ iv, onSubmit, busy }) {
  const [openForm, setOpenForm] = useState(false);
  const [form, setForm] = useState(buildRequestFormFromTask(iv));
  const [error, setError] = useState('');

  useEffect(function(){
    setForm(buildRequestFormFromTask(iv));
    setError('');
    setOpenForm(false);
  }, [iv.id, iv.updated_at]);

  function setField(key, value) {
    setForm(function(prev){ return Object.assign({}, prev, {[key]: value}); });
    setError('');
  }

  function changedFields() {
    return TASK_CHANGE_FIELDS.filter(function(f){
      return valuesDiffer(iv[f.key] || '', form[f.key] || '');
    });
  }

  function submit() {
    var changes = changedFields();
    if (!changes.length) {
      setError('Aucune modification détectée.');
      return;
    }
    var dateError = validateCompanyDateProposal(iv, form);
    if (dateError) {
      setError(dateError);
      return;
    }
    onSubmit(iv, form)
      .then(function(){ setOpenForm(false); })
      .catch(function(e){ setError((e && e.message) || 'Erreur lors de l’envoi.'); });
  }

  if (!openForm) {
    return (
      <button onClick={function(){setOpenForm(true);}} style={{...btnPrimaryStyle,width:'100%',marginTop:8,marginBottom:8}}>
        Demander une modification
      </button>
    );
  }

  var changes = changedFields();

  return (
    <div style={{border:'1px solid var(--border)',background:'var(--surface-2)',
      borderRadius:'var(--r-sm)',padding:12,marginTop:10,marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:4}}>
        Demande de modification entreprise
      </div>
      <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.45,marginBottom:12}}>
        Vous pouvez proposer une modification sur les dates, le descriptif, les pré-requis et les notes.
        La zone, le niveau, l’entreprise et le corps de métier restent verrouillés.
        <br/><b>{taskChangeWindowText(iv)}</b>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <Field label="Date de début">
          <Input type="date" value={form.start} min={iv.company_edit_start_min || undefined} max={iv.company_edit_end_max || undefined} onChange={function(e){setField('start', e.target.value);}} />
        </Field>
        <Field label="Date de fin">
          <Input type="date" value={form.end} min={iv.company_edit_start_min || undefined} max={iv.company_edit_end_max || undefined} onChange={function(e){setField('end', e.target.value);}} />
        </Field>
      </div>
      <Field label="Descriptif">
        <Textarea rows={3} value={form.task} onChange={function(e){setField('task', e.target.value);}} />
      </Field>
      <Field label="Pré-requis">
        <Textarea rows={2} value={form.prereq} onChange={function(e){setField('prereq', e.target.value);}} />
      </Field>
      <Field label="Notes">
        <Textarea rows={2} value={form.notes} onChange={function(e){setField('notes', e.target.value);}} />
      </Field>

      <div style={{fontSize:11,color:changes.length?'var(--primary)':'var(--xmuted)',
        fontFamily:"'DM Mono',monospace",marginBottom:8}}>
        {changes.length ? changes.length+' champ'+(changes.length>1?'s':'')+' modifié'+(changes.length>1?'s':'') : 'Aucun champ modifié'}
      </div>
      {error && <div style={{fontSize:12,color:'var(--danger)',fontWeight:700,marginBottom:8}}>{error}</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={submit} disabled={busy} style={{...btnPrimaryStyle,flex:1,opacity:busy ? .7 : 1}}>
          {busy?'Envoi…':'Envoyer à l’admin'}
        </button>
        <button onClick={function(){setOpenForm(false);setError('');setForm(buildRequestFormFromTask(iv));}}
          disabled={busy} style={{...btnSecStyle,flex:'0 0 110px'}}>
          Annuler
        </button>
      </div>
    </div>
  );
}

function ChangeRequestPanel({ iv, taskRequests, session, onSubmit, onReview, busy, canRequestTaskChange }) {
  var requests = (taskRequests || []).slice().sort(function(a,b){
    return String(b.created_at||'').localeCompare(String(a.created_at||''));
  });
  var pending = requests.find(function(r){ return r.status === 'pending_admin'; });
  var latest = requests[0] || null;
  var isOwnerCompany = session && session.role === 'company' && session.company && session.company.name === iv.company;
  var isAdmin = session && session.role === 'admin';
  var taskOpenForCompany = !!iv.company_edit_allowed;
  var effectiveCanRequest = !!canRequestTaskChange && taskOpenForCompany;

  if (!isOwnerCompany && !isAdmin && !latest) return null;

  return (
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:8}}>

        {latest && <ChangeRequestStatusBadge status={latest.status} />}

      {latest && latest.status !== 'pending_admin' && (
        <div style={{background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
          padding:'9px 11px',fontSize:12,color:'var(--muted)',lineHeight:1.45,marginBottom:8}}>

          {latest.admin_comment ? <><br/><b>Commentaire admin :</b> {latest.admin_comment}</> : null}

function fmtStatusNoteDate(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleString('fr-FR', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  } catch(e) { return s; }
}
function normalizeStatusNoteText(v) {
  return String(v == null ? '' : v).trim().replace(/\s+/g, ' ').toLowerCase();
}
function taskStatusNoteItems(iv, history, taskLogs) {
  if (!iv) return [];
  var taskId = iv.id;
  var taskNumber = iv.task_number || '';
  var eventItems = (history || []).filter(function(ev){
    return ev && ev.event_type === 'status_change'
      && ev.note && String(ev.note).trim()
      && (ev.task_id === taskId || (taskNumber && ev.task_number === taskNumber));
  }).map(function(ev){
    return {
      id: ev.id || ('event_'+ev.created_at+'_'+ev.note),
      source: 'planning_events',
      task_id: ev.task_id || taskId,
      task_number: ev.task_number || taskNumber,
      created_at: ev.created_at || '',
      author: ev.actor_name || ev.actor_company || 'Utilisateur',
      old_status: ev.old_status || '',
      new_status: ev.new_status || '',
      note: String(ev.note || '').trim()
    };
  });

  var eventNoteTexts = new Set(eventItems.map(function(x){ return normalizeStatusNoteText(x.note); }));
  var logItems = (taskLogs || []).filter(function(log){
    var msg = log && log.message ? String(log.message).trim() : '';
    return msg && log.task_id === taskId && !eventNoteTexts.has(normalizeStatusNoteText(msg));
  }).map(function(log){
    var st = STATUS_META[log.type] ? STATUS_META[log.type].label : (log.type || 'Statut');
    return {
      id: log.id || ('log_'+log.created_at+'_'+log.message),
      source: 'task_logs',
      task_id: log.task_id || taskId,
      task_number: taskNumber,
      created_at: log.created_at || '',
      author: log.author || log.company || 'Utilisateur',
      old_status: '',
      new_status: st,
      note: String(log.message || '').trim()
    };
  });

  return eventItems.concat(logItems).sort(function(a,b){
    return String(b.created_at || '').localeCompare(String(a.created_at || ''));
  }).slice(0, 12);
}

function FrozenDaysField({ form, set }) {
  // Build list of all dates in the intervention range, including weekends.
  // Weekends can be automatically frozen when they are inside a long task range.
  var start = form.start, end = form.end||form.start;
  if (!start) return (
    <div style={{fontSize:11,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",padding:'8px 0'}}>
      Saisissez d’abord une date de début
    </div>
  );

  var dates = [];
  var cur = new Date(start+'T00:00:00');
  var endD = new Date((end||start)+'T00:00:00');
  var safety = 0;
  while (cur <= endD && safety < 180) {
    var ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    dates.push(ds);
    cur.setDate(cur.getDate()+1);
    safety++;
  }

  if (!dates.length) return null;

  var offs = form.off_days || [];
  var autoWeekendOffs = form._auto_weekend_off_days || [];
  var DAY_SHORT = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  var MONTHS_SHORT = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

  function toggle(ds) {
    var active = offs.includes(ds);
    if (active) {
      set('off_days', offs.filter(function(x){return x!==ds;}));
      if (autoWeekendOffs.includes(ds)) {
        set('_auto_weekend_off_days', autoWeekendOffs.filter(function(x){return x!==ds;}));
      }
    } else {
      set('off_days', [...offs, ds]);
    }
  }

  return (
    <div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
        {dates.map(function(ds) {
          var d = new Date(ds+'T00:00:00');
          var dow = d.getDay();
          var weekend = dow === 0 || dow === 6;
          var active = offs.includes(ds);
          var auto = autoWeekendOffs.includes(ds);
          return (
            <button key={ds} type="button" onClick={function(){toggle(ds);}}
              title={auto?'Week-end gelé automatiquement par défaut':''}
              style={{display:'flex',flexDirection:'column',alignItems:'center',
                padding:'6px 8px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',
                border:'1.5px solid '+(active?'var(--danger)':weekend?'rgba(245,158,11,.55)':'var(--border)'),
                background:active?'var(--danger-l)':weekend?'rgba(245,158,11,.08)':'var(--surface)',
                color:active?'var(--danger)':weekend?'#B45309':'var(--muted)',
                minWidth:36,fontFamily:"'DM Sans',sans-serif",transition:'all .15s'}}>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{DAY_SHORT[d.getDay()]}</span>
              <span>{d.getDate()}</span>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{MONTHS_SHORT[d.getMonth()]}</span>
              {auto&&<span style={{fontSize:7,marginTop:1,fontFamily:"'DM Mono',monospace"}}>auto</span>}
            </button>
          );
        })}
      </div>
      {offs.length > 0 && (
        <div style={{fontSize:10,color:'var(--danger)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
          {offs.length} jour{offs.length>1?'s':''} gelé{offs.length>1?'s':''}
          {autoWeekendOffs.length>0&&<span style={{color:'var(--xmuted)'}}> · week-end gelé par défaut</span>}
          {' — '}
          <span style={{cursor:'pointer',textDecoration:'underline'}}
            onClick={function(){set('off_days',[]);set('_auto_weekend_off_days',[]);}}>tout effacer</span>
        </div>
      )}
      {offs.length === 0 && (
        <div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>
          Cliquez les jours à exclure du planning. Les week-ends traversés par une tâche longue sont gelés par défaut.
        </div>
      )}
    </div>
  );
}



function TaskPlanningPickerOverlay({ open, label, selectedIds, onChange, data, zones, trades, currentId, onClose }) {
  const currentTask = (data || []).find(function(t){ return t && t.id === currentId; }) || null;
  const focusDate = currentTask && (currentTask.start || currentTask.end) ? (currentTask.start || currentTask.end) : dateStr(new Date());

  function mondayOfDate(ds) {
    var d = ds ? new Date(ds + 'T00:00:00') : new Date();
    d.setHours(0,0,0,0);
    var day = d.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
  }
  function offsetForDate(ds) {
    var base = getMonday(0);
    var target = mondayOfDate(ds);
    return Math.round((target - base) / (7 * 24 * 3600 * 1000));
  }

  const [weekOffset, setWeekOffset] = React.useState(function(){ return offsetForDate(focusDate); });
  const [viewMode, setViewMode] = React.useState('1s');
  const [showWeekends, setShowWeekends] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const [draftIds, setDraftIds] = React.useState(function(){ return normalizeTaskLinkIds(selectedIds); });

  React.useEffect(function(){
    if (!open) return;
    setDraftIds(normalizeTaskLinkIds(selectedIds));
    setViewMode('1s');
    setShowWeekends(false);
    setSearch('');
    setWeekOffset(offsetForDate(focusDate));
  }, [open, currentId, focusDate]);

  if (!open) return null;

  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var startMonday = getMonday(weekOffset);
    (zones || []).forEach(function(z){
      if (z && z.deadline) {
        var d = new Date(z.deadline + 'T00:00:00');
        var w = Math.ceil((d - startMonday) / (7 * 24 * 3600 * 1000)) + 1;
        if (w > maxWeeks) maxWeeks = w;
      }
    });
    (data || []).forEach(function(iv){
      if (iv && iv.end) {
        var d = new Date(iv.end + 'T00:00:00');
        var w = Math.ceil((d - startMonday) / (7 * 24 * 3600 * 1000)) + 1;
        if (w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16));
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const days = multiWeekDays(weekOffset, weeks, !!showWeekends);
  const q = search.trim().toLowerCase();
  const ids = normalizeTaskLinkIds(draftIds);
  const visibleTasks = (data || []).filter(function(t){
    if (!t || t.id === currentId || !t.task_number) return false;
    if (!q) return true;
    return String(t.task_number||'').toLowerCase().includes(q)
      || String(t.company||'').toLowerCase().includes(q)
      || String(t.task||'').toLowerCase().includes(q)
      || String(t.prereq||'').toLowerCase().includes(q)
      || String(t.notes||'').toLowerCase().includes(q);
  });

  function toggle(id) {
    var next = ids.includes(id) ? ids.filter(function(x){ return x !== id; }) : ids.concat([id]);
    setDraftIds(uniqueTaskIds(next));
  }
  function selectedTasks() {
    return ids.map(function(id){ return (data || []).find(function(t){ return t.id === id; }); }).filter(Boolean);
  }
  function cellTasks(zone, day) {
    return visibleTasks.filter(function(iv){
      return iv.zone === zone.id && isTaskActiveOn(iv, day);
    }).sort(function(a,b){ return (a.start||'').localeCompare(b.start||'') || (a.task_number||'').localeCompare(b.task_number||''); });
  }
  function jumpToTaskDate() {
    setWeekOffset(offsetForDate(focusDate));
  }
  function goToDate(value) {
    if (!value) return;
    setWeekOffset(offsetForDate(value));
  }
  function validateSelection() {
    onChange(uniqueTaskIds(ids));
    onClose();
  }
  function cancelSelection() {
    setDraftIds(normalizeTaskLinkIds(selectedIds));
    onClose();
  }

  const periodLabel = days.length ? (dateFR(days[0]) + ' – ' + dateFR(days[days.length - 1])) : '';
  const viewButtons = [
    {key:'1s', label:'1S'},
    {key:'2s', label:'2S'},
    {key:'3s', label:'3S'},
    {key:'tout', label:'Tout'}
  ];

  return (
    <div style={{position:'fixed',inset:0,zIndex:420,background:'rgba(0,0,0,.55)',display:'flex',flexDirection:'column'}}>
      <div style={{background:'var(--hdr)',color:'var(--hdr-text)',padding:'10px 12px',boxShadow:'0 2px 16px rgba(0,0,0,.35)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <div style={{minWidth:190,flex:'1 1 260px'}}>
          <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:'.09em',textTransform:'uppercase',color:'rgba(255,255,255,.55)'}}>Sélection sur planning</div>
          <div style={{fontSize:15,fontWeight:800}}>{label}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.6)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
            Cliquer sur une tâche pour l’ajouter ou la retirer. Ouverture calée sur {currentTask ? (currentTask.task_number || 'la tâche') : 'la tâche'} · {fmtDate(focusDate)}.
          </div>
        </div>

            return <button key={v.key} type="button" onClick={function(){setViewMode(v.key);}} style={{...hdrBtnStyle,height:24,minWidth:v.key==='tout'?44:32,borderRadius:6,background:viewMode===v.key?'rgba(255,255,255,.92)':'transparent',color:viewMode===v.key?'var(--hdr)':'rgba(255,255,255,.70)',border:'1px solid '+(viewMode===v.key?'rgba(255,255,255,.9)':'transparent'),fontFamily:"'DM Mono',monospace",fontWeight:900}}>{v.label}</button>;

        <button type="button" onClick={function(){setShowWeekends(function(v){return !v;});}} title={showWeekends?'Masquer les week-ends':'Afficher les week-ends'}
          style={{...hdrBtnStyle,height:30,minWidth:42,borderRadius:7,background:showWeekends?'rgba(96,165,250,.22)':'rgba(255,255,255,.08)',border:'1px solid '+(showWeekends?'rgba(147,197,253,.55)':'rgba(255,255,255,.14)'),fontFamily:"'DM Mono',monospace",color:showWeekends?'#BFDBFE':'rgba(255,255,255,.7)'}}>
          {showWeekends?'7J':'5J'}
        </button>

        <button type="button" onClick={jumpToTaskDate} style={{...hdrBtnStyle,height:30,borderRadius:7,minWidth:84,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',fontFamily:"'DM Mono',monospace"}}>Date tâche</button>

        <label style={{display:'flex',alignItems:'center',gap:5,height:30,padding:'0 7px',borderRadius:7,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',fontSize:10,color:'rgba(255,255,255,.62)',fontFamily:"'DM Mono',monospace"}}>
          Aller au
          <input type="date" defaultValue={focusDate} onChange={function(e){goToDate(e.target.value);}} style={{height:22,border:'none',borderRadius:5,padding:'0 5px',fontSize:10,fontFamily:"'DM Mono',monospace",outline:'none'}} />
        </label>

        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Filtrer code, entreprise, tâche…" style={{height:30,flex:'1 1 210px',border:'1px solid rgba(255,255,255,.20)',borderRadius:7,background:'rgba(255,255,255,.08)',color:'#fff',padding:'0 10px',fontSize:12,outline:'none'}} />

        <button type="button" onClick={validateSelection} style={{...hdrBtnStyle,background:'rgba(255,255,255,.92)',color:'var(--hdr)',borderRadius:7,minWidth:76,height:30,fontWeight:900}}>Valider</button>
        <button type="button" onClick={cancelSelection} style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.84)',border:'1px solid rgba(255,255,255,.18)',borderRadius:7,minWidth:76,height:30,fontWeight:900}}>Annuler</button>

      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'8px 12px',display:'flex',gap:6,alignItems:'center',overflowX:'auto'}}>

          return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} title="Retirer" style={{border:'1px solid rgba(202,138,4,.30)',background:'rgba(202,138,4,.10)',color:'#92400E',borderRadius:20,padding:'4px 8px',fontSize:10,fontWeight:900,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{t.task_number || t.id} ×</button>;
        }) : <span style={{fontSize:11,color:'var(--xmuted)'}}>Aucune tâche sélectionnée.</span>}
        <button type="button" onClick={function(){setDraftIds([]);}} disabled={!ids.length} style={{marginLeft:'auto',border:'1px solid var(--border)',background:ids.length?'var(--surface-2)':'transparent',color:ids.length?'var(--muted)':'var(--xmuted)',borderRadius:7,padding:'5px 8px',fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace",cursor:ids.length?'pointer':'not-allowed',whiteSpace:'nowrap'}}>Vider la sélection</button>
      </div>

      <div style={{flex:1,overflow:'auto',background:'var(--bg)',padding:10}}>
        <div style={{minWidth:Math.max(860, 92 + days.length * 130),background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
            <colgroup><col style={{width:92}} />{days.map(function(_,i){return <col key={i} style={{width:130}} />;})}</colgroup>
            <thead>
              <tr style={{background:'var(--surface-2)',borderBottom:'2px solid var(--border)'}}>
                <th style={{padding:'8px 6px',fontSize:10,color:'var(--muted)',fontFamily:"'DM Mono',monospace",textAlign:'left',position:'sticky',left:0,zIndex:5,background:'var(--surface-2)'}}>Zone</th>
                {days.map(function(d){
                  var ds = dateStr(d);
                  var isFocus = ds === focusDate;
                  return <th key={ds} style={{padding:'7px 4px',textAlign:'center',borderLeft:'1px solid var(--border)',fontSize:10,color:isFocus?'#9A3412':isToday(d)?'var(--primary)':'var(--muted)',fontFamily:"'DM Mono',monospace",background:isFocus?'rgba(234,88,12,.12)':isToday(d)?'var(--primary-l)':'var(--surface-2)'}}>
                    {['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()]}<br/><b>{String(d.getDate()).padStart(2,'0')}/{String(d.getMonth()+1).padStart(2,'0')}</b>
                    {isFocus && <div style={{fontSize:7,marginTop:2,fontWeight:900,color:'#9A3412'}}>DATE TÂCHE</div>}
                  </th>;
                })}
              </tr>
            </thead>
            <tbody>
              {(zones || []).map(function(zone){
                var fc = FLOOR_COLORS[zone.floor] || '#9CA3AF';
                return <tr key={zone.id} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 6px',borderRight:'3px solid '+fc,background:fc+'12',verticalAlign:'top',position:'sticky',left:0,zIndex:4}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:900,color:fc}}>{zone.short}</div>
                    <div style={{fontSize:9,color:'var(--xmuted)',marginTop:2}}>{zone.floor}</div>
                  </td>
                  {days.map(function(day){
                    var ds = dateStr(day);
                    var cards = cellTasks(zone, day);
                    var isFocus = ds === focusDate;
                    return <td key={zone.id+'_'+ds} style={{height:74,verticalAlign:'top',padding:4,borderLeft:'1px solid var(--border)',background:isFocus?'rgba(234,88,12,.08)':isToday(day)?'var(--primary-l)':'transparent'}}>
                      {cards.length ? cards.map(function(iv){
                        var tr = (trades || []).find(function(t){ return t.id === iv.trade; });
                        var col = getTC(tr ? tr.color : 'blue');
                        var active = ids.includes(iv.id);
                        return <button key={iv.id} type="button" onClick={function(){toggle(iv.id);}} style={{width:'100%',display:'block',textAlign:'left',border:'1px solid '+(active?'var(--primary)':col.b+'35'),borderLeft:'4px solid '+(active?'var(--primary)':col.b),background:active?'var(--primary-l)':col.bg,borderRadius:7,padding:'5px 6px',marginBottom:4,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",boxShadow:active?'0 0 0 1px var(--primary) inset':'none'}}>
                          <div style={{display:'flex',justifyContent:'space-between',gap:4,alignItems:'center'}}>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:900,color:active?'var(--primary)':col.t}}>{iv.task_number}</span>
                            <span style={{fontSize:10,fontWeight:900,color:active?'var(--primary)':col.t}}>{active?'✓':''}</span>
                          </div>
                          <div style={{fontSize:10,fontWeight:800,color:col.t,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{iv.company}</div>
                          <div style={{fontSize:9,color:col.t,opacity:.8,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{iv.task}</div>
                          <div style={{fontSize:8,color:active?'var(--primary)':'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{fmtDate(iv.start)}{iv.end&&iv.end!==iv.start?' → '+fmtDate(iv.end):''}</div>
                        </button>;
                      }) : <div style={{fontSize:9,color:'var(--xmuted)',textAlign:'center',paddingTop:18}}>—</div>}
                    </td>;
                  })}
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TaskLinksPicker({ label, hint, selectedIds, onChange, data, zones, trades, currentId }) {
  var [open, setOpen] = React.useState(false);
  var [planningOpen, setPlanningOpen] = React.useState(false);
  var [search, setSearch] = React.useState('');
  var ids = normalizeTaskLinkIds(selectedIds);
  var selected = ids.map(function(id){ return (data || []).find(function(t){ return t.id === id; }); }).filter(Boolean);
  var candidates = (data || []).filter(function(t){ return t && t.id !== currentId && t.task_number; });
  var q = search.trim().toLowerCase();
  if (q) candidates = candidates.filter(function(t){ return String(t.task_number||'').toLowerCase().includes(q)||String(t.company||'').toLowerCase().includes(q)||String(t.task||'').toLowerCase().includes(q); });
  candidates = candidates.sort(function(a,b){ return (a.start||'').localeCompare(b.start||'') || (a.task_number||'').localeCompare(b.task_number||''); });
  function toggle(id){ var next = ids.includes(id) ? ids.filter(function(x){return x!==id;}) : ids.concat([id]); onChange(uniqueTaskIds(next)); }
  return (
    <div style={{border:'1px solid var(--border)',background:'var(--surface-2)',borderRadius:'var(--r-sm)',padding:10,marginBottom:13}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:7}}>
        <div><div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{label}</div>{hint&&<div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{hint}</div>}</div>
        <div style={{display:'flex',gap:5,flexShrink:0}}>
          <button type="button" onClick={function(){setOpen(!open);}} style={{...miniBtn,background:open?'var(--primary)':'var(--surface)',color:open?'#fff':'var(--muted)',borderColor:open?'var(--primary)':'var(--border)'}}>{open?'Fermer':'Liste'}</button>
          <button type="button" onClick={function(){setPlanningOpen(true);}} style={{...miniBtn,background:'var(--surface)',color:'var(--primary)',borderColor:'var(--primary)'}}>Vue planning</button>
        </div>
      </div>
      {selected.length>0 ? <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:open?8:0}}>{selected.map(function(t){return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} title="Retirer" style={{border:'1px solid rgba(202,138,4,.30)',background:'rgba(202,138,4,.10)',color:'#92400E',borderRadius:20,padding:'3px 8px',fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>{t.task_number||t.id} ×</button>;})}</div> : <div style={{fontSize:11,color:'var(--xmuted)',marginBottom:open?8:0}}>Aucune tâche sélectionnée.</div>}
      {open&&<div><Input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Rechercher par code, entreprise ou tâche…" style={{fontSize:12,padding:'8px 10px',marginBottom:8}} /><div style={{maxHeight:220,overflowY:'auto',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)'}}>{candidates.length===0?<div style={{padding:10,fontSize:12,color:'var(--muted)'}}>Aucune tâche disponible.</div>:candidates.map(function(t){var active=ids.includes(t.id);return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} style={{width:'100%',display:'flex',alignItems:'flex-start',gap:8,textAlign:'left',padding:'8px 10px',border:'none',borderBottom:'1px solid var(--border)',background:active?'var(--primary-l)':'transparent',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}><span style={{width:16,height:16,borderRadius:4,border:'1px solid '+(active?'var(--primary)':'var(--border-s)'),background:active?'var(--primary)':'var(--surface)',color:'#fff',fontSize:11,lineHeight:'16px',textAlign:'center',flexShrink:0}}>{active?'✓':''}</span><span style={{minWidth:0}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:900,color:active?'var(--primary)':'var(--xmuted)',marginRight:6}}>{t.task_number}</span><span style={{fontSize:11,fontWeight:800,color:'var(--text)'}}>{t.company}</span><span style={{display:'block',fontSize:11,color:'var(--muted)',lineHeight:1.35,marginTop:2,overflow:'hidden',textOverflow:'ellipsis'}}>{t.task}</span><span style={{display:'block',fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{fmtDate(t.start)}{t.end&&t.end!==t.start?' → '+fmtDate(t.end):''}</span></span></button>;})}</div></div>}
      <TaskPlanningPickerOverlay open={planningOpen} label={label} selectedIds={ids} onChange={onChange} data={data} zones={zones || []} trades={trades || []} currentId={currentId} onClose={function(){setPlanningOpen(false);}} />
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   ADD / EDIT MODAL

function AddEditModal({ open, editId, preZone, preDate, data, zones, trades, companies, history = [], taskLogs = [], onUpdateStatusNote, onDeleteStatusNote, onClose, onSave, onDelete }) {
  const existing = editId ? data.find(i=>i.id===editId) : null;
  const [form, setForm] = useState({});
  const [attachments, setAttachments] = useState([]);
  const [confirmDel, setConfirmDel] = useState(false);
  const [saving, setSaving] = useState(false);
  const [statusNoteEditId, setStatusNoteEditId] = useState(null);
  const [statusNoteDraft, setStatusNoteDraft] = useState('');
  const [statusNoteBusyId, setStatusNoteBusyId] = useState(null);
  const companyNames = [...new Set((companies&&companies.length?companies:COMPANIES).map(c=>c.name))].sort();

  useEffect(()=>{
    if (open) {
      setForm(existing ? {
        zone: existing.zone||'', start: existing.start||'', end: existing.end||'',
        trade: existing.trade||'', company: existing.company||'', task: existing.task||'',
        priority: existing.priority||3, prereq: existing.prereq||'', prereq_company: existing.prereq_company||'', impact: existing.impact||'', notes: existing.notes||'',
        predecessor_id: existing.predecessor_id||'', predecessor_ids: normalizeTaskLinkIds(existing.predecessor_ids || existing.predecessor_id), successor_ids: normalizeTaskLinkIds(existing.successor_ids), status: existing.status||'arealis',
        company_edit_allowed: !!existing.company_edit_allowed,
        company_edit_start_min: existing.company_edit_start_min || '',
        company_edit_end_max: existing.company_edit_end_max || '',
        _expected_updated_at: existing.updated_at||'',
      } : {
        zone: preZone||'', start: preDate||dateStr(new Date()),
        end: preDate||dateStr(new Date()), trade:'', company:'', task:'',
        priority:3, prereq:'', prereq_company:'', impact:'', notes:'', predecessor_id:'', predecessor_ids:[], successor_ids:[], status:'arealis',
        company_edit_allowed:false, company_edit_start_min:'', company_edit_end_max:'',
      });
      setAttachments(existing?.attachments||[]);
      setStatusNoteEditId(null);
      setStatusNoteDraft('');
      setStatusNoteBusyId(null);
    }
  }, [open, editId, preZone, preDate]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function getCompanyNameForTrade(tradeId) {
    if (!tradeId) return '';
    var sourceCompanies = companies && companies.length ? companies : COMPANIES;
    var match = sourceCompanies.find(function(c){ return (c.tradeId || c.trade_id) === tradeId; });
    return match ? match.name : '';
  }

  function handleTradeChange(tradeId) {
    setForm(function(f) {
      var autoCompany = getCompanyNameForTrade(tradeId);
      return Object.assign({}, f, {
        trade: tradeId,
        company: autoCompany || ''
      });
    });
  }

  // New task default: if a task crosses a weekend, Saturday/Sunday are frozen automatically.
  // Example: Friday → Monday = Saturday + Sunday are excluded from worked days.
  useEffect(()=>{
    if (!open || editId) return;
    setForm(function(f){
      if (!f.start) return f;
      var auto = weekendOffDaysBetween(f.start, f.end||f.start);
      var previousAuto = f._auto_weekend_off_days || [];
      var currentOffs = f.off_days || [];
      var manualOffs = currentOffs.filter(function(ds){return !previousAuto.includes(ds);});
      var merged = Array.from(new Set(manualOffs.concat(auto)));
      if (JSON.stringify(merged) === JSON.stringify(currentOffs) &&
          JSON.stringify(auto) === JSON.stringify(previousAuto)) return f;
      return Object.assign({}, f, {off_days:merged, _auto_weekend_off_days:auto});
    });
  }, [open, editId, form.start, form.end]);

  const PRIOS = [{v:1,l:'Urgente',c:'#DC2626'},{v:2,l:'Haute',c:'#EA580C'},{v:3,l:'Normale',c:'#CA8A04'},{v:4,l:'Basse',c:'#6B7280'},{v:5,l:'À conf.',c:'#9CA3AF'}];

  async function handleSave() {
    if (saving) return;
    if (!form.trade||!form.company||!form.task) { alert('Corps de métier, entreprise et description sont requis.'); return; }
    if (form.company_edit_allowed && form.company_edit_start_min && form.company_edit_end_max && form.company_edit_end_max < form.company_edit_start_min) {
      alert('La date limite au plus tard ne peut pas être avant la date au plus tôt.');
      return;
    }
    const tn = existing?.task_number || genTaskNum(data, form.company, form.trade, trades);
    setSaving(true);
    try {
      var cleanForm = Object.assign({}, form);
      delete cleanForm._auto_weekend_off_days;
      cleanForm.predecessor_ids = normalizeTaskLinkIds(cleanForm.predecessor_ids || cleanForm.predecessor_id);
      cleanForm.successor_ids = normalizeTaskLinkIds(cleanForm.successor_ids);
      cleanForm.predecessor_id = cleanForm.predecessor_ids[0] || '';
      if (!String(cleanForm.prereq || '').trim()) cleanForm.prereq_company = '';
      await onSave({
        id: editId||genId(), ...cleanForm,
        priority: form.priority||3, staff:1, progress:0, delay:0,
        task_number:tn, attachments,
        off_days: form.off_days||[],
      });
    } catch(e) {
      alert((e&&e.message)||'Erreur de sauvegarde. Actualisez puis réessayez.');
    } finally {
      setSaving(false);
    }
  }

  const statusNotesForEdit = editId && existing ? taskStatusNoteItems(existing, history, taskLogs) : [];

  function startEditStatusNote(note) {
    setStatusNoteEditId(note.id);
    setStatusNoteDraft(note.note || '');
  }
  function cancelEditStatusNote() {
    setStatusNoteEditId(null);
    setStatusNoteDraft('');
  }
  async function saveStatusNote(note) {
    if (!onUpdateStatusNote || !note) return;
    var nextText = String(statusNoteDraft || '').trim();
    if (!nextText) {
      await removeStatusNote(note);
      return;
    }
    setStatusNoteBusyId(note.id);
    try {
      await onUpdateStatusNote(note, nextText);
      setStatusNoteEditId(null);
      setStatusNoteDraft('');
    } finally {
      setStatusNoteBusyId(null);
    }
  }
  async function removeStatusNote(note) {
    if (!onDeleteStatusNote || !note) return;
    if (!window.confirm('Supprimer cette note de statut ?')) return;
    setStatusNoteBusyId(note.id);
    try {
      await onDeleteStatusNote(note);
      if (statusNoteEditId === note.id) {
        setStatusNoteEditId(null);
        setStatusNoteDraft('');
      }
    } finally {
      setStatusNoteBusyId(null);
    }
  }

  const predecessorList = data.filter(i=>i.id!==editId&&i.task_number)
    .sort((a,b)=>(a.task_number||'').localeCompare(b.task_number||''));

  return (
    <>
      <SheetModal open={open} onClose={onClose} maxH="95vh">
        <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:18}}>
          {editId?'Modifier l\'intervention':'Nouvelle intervention'}
        </div>
        <Field label="Zone *">
          <Select value={form.zone||''} onChange={e=>set('zone',e.target.value)}>
            <option value="">Sélectionner une zone…</option>
            {zones.map(z=><option key={z.id} value={z.id}>{z.name}</option>)}
          </Select>
        </Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:13}}>
          <Field label="Date debut *"><Input type="date" value={form.start||''} onChange={e=>set('start',e.target.value)} /></Field>
          <Field label="Date fin"><Input type="date" value={form.end||''} onChange={e=>set('end',e.target.value)} /></Field>
        </div>
        <FrozenDaysField form={form} set={set} />
        <Field label="Corps de métier *">
          <Select value={form.trade||''} onChange={e=>handleTradeChange(e.target.value)}>
            <option value="">Sélectionner…</option>
            {trades.map(t=><option key={t.id} value={t.id}>{t.short ? t.short+' — '+t.name : t.name}</option>)}
          </Select>
        </Field>
        <Field label="Entreprise *">
          <Select value={form.company||''} onChange={e=>set('company',e.target.value)}>
            <option value="">Sélectionner…</option>
            {companyNames.map(n=><option key={n} value={n}>{n}</option>)}
          </Select>
        </Field>
        <Field label="Description *">
          <Input value={form.task||''} onChange={e=>set('task',e.target.value)} placeholder="ex : Pose cloisons R+3 plateau Est" />
        </Field>


        <Field label="Prérequis / Point bloquant" hint="optionnel">
          <Textarea value={form.prereq||''} onChange={e=>set('prereq',e.target.value)}
            placeholder="ex : Libérer le matériel de la zone" rows={2} fixed />
        </Field>
        <Field label="Entreprise concernée par ce prérequis" hint="optionnel">
          <Select value={form.prereq_company||''} onChange={e=>set('prereq_company',e.target.value)}>
            <option value="">Aucune entreprise mentionnée…</option>
            {companyNames.map(n=><option key={n} value={n}>{n}</option>)}
          </Select>
        </Field>
        {!String(form.prereq||'').trim() && form.prereq_company && (
          <div style={{fontSize:11,color:'var(--xmuted)',marginTop:-8,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>L’entreprise sélectionnée ne sera pas sauvegardée tant qu’aucune note n’est renseignée.</div>
        )}
        <div style={{fontSize:11,color:'var(--xmuted)',marginTop:-6,marginBottom:12,lineHeight:1.35}}>
          La note du prérequis s’affiche dans la fiche tâche et sur le planning uniquement si elle est renseignée.
          L’entreprise concernée est notifiée automatiquement.
        </div>
        <div style={{marginBottom:13}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:7}}>Impact / tâche ou entreprise bloquée</div>

/* ════════════════════════════════════════════════════════════
   ERROR BOUNDARY
═══════════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, info) {
    console.error('[Planify ErrorBoundary]', error, info);
  }

  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: '100vh',
          background: 'var(--bg)',
          color: 'var(--text)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: 20
        }}>
          <div style={{
            maxWidth: 520,
            width: '100%',
            background: 'var(--surface)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: 20,
            boxShadow: 'var(--shadow-md)'
          }}>
            <div style={{
              fontSize: 18,
              fontWeight: 700,
              marginBottom: 8,
              color: 'var(--danger)'
            }}>
              Une erreur est survenue
            </div>
            <div style={{
              fontSize: 13,
              color: 'var(--muted)',
              marginBottom: 14,
              lineHeight: 1.5
            }}>
              L’application a rencontré une erreur. Le DOM React reste intact.
            </div>
            <pre style={{
              background: 'var(--surface-2)',
              border: '1px solid var(--border)',
              borderRadius: 8,
              padding: 12,
              fontSize: 11,
              whiteSpace: 'pre-wrap',
              color: 'var(--danger)',
              marginBottom: 14
            }}>
              {String(this.state.error?.message || this.state.error)}
            </pre>
            <button
              onClick={() => window.location.reload()}
              style={{
                width: '100%',
                padding: 12,
                background: 'var(--primary)',
                color: '#fff',
                border: 'none',
                borderRadius: 'var(--r-sm)',
                fontSize: 14,
                fontWeight: 700,
                cursor: 'pointer',
                fontFamily: "'DM Sans', sans-serif"
              }}
            >
              Recharger l’application
            </button>
          </div>
        </div>
      );
    }

    return this.props.children;
  }
}

function HistoryModal({ open, history, session, onClose, onRefresh }) {
  function eventLabel(t) {
    return {
      status_change:'Changement de statut',
      task_created:'Tâche ajoutée',
      task_updated:'Tâche modifiée',
      task_deleted:'Tâche supprimée',
      planning_locked:'Planning verrouillé',
      planning_unlocked:'Planning déverrouillé',
      planning_validated:'Planning validé',
      planning_reindexed:'Planning réindexé'
    }[t] || t || 'Événement';
  }
  function eventColor(t) {
    if (t === 'status_change') return '#2563EB';
    if (t === 'planning_validated') return '#16A34A';
    if (t === 'planning_locked') return '#DC2626';
    if (t === 'planning_reindexed') return '#EA580C';
    return 'var(--muted)';
  }
  function fmtDT(s) {
    if (!s) return '';
    try {
      return new Date(s).toLocaleString('fr-FR', {
        day:'2-digit', month:'2-digit', year:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    } catch(e) { return s; }
  }

  function changeActionLabel(ch) {
    if (!ch) return 'Modification';
    if (ch.action) return ch.action;
    if (ch.label) return ch.label + ' modifié';
    return 'Modification';
  }

  const isAdminHistory = session?.role === 'admin';

  return (
    <SheetModal open={open} onClose={onClose} maxH="92vh">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>Historique détaillé</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
            Visible par tous les utilisateurs
          </div>
        </div>
        <button onClick={onRefresh} style={{...miniBtn,fontWeight:700}}>Rafraîchir</button>
      </div>

      {(!history || history.length === 0) ? (
        <div style={{padding:'20px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>
          Aucun événement enregistré pour le moment.
        </div>
      ) : (
        <div>
          {history.map(function(ev){
            var c = eventColor(ev.event_type);
            return (
              <div key={ev.id || ev.created_at + ev.message}
                style={{background:'var(--surface)',border:'1px solid var(--border)',
                  borderLeft:'4px solid '+c,borderRadius:'var(--r-sm)',
                  padding:'11px 12px',marginBottom:8,boxShadow:'var(--shadow)'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:5}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>
                    {eventLabel(ev.event_type)}
                  </div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                    {fmtDT(ev.created_at)}
                  </div>
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:5,lineHeight:1.4}}>
                  <b>{ev.actor_name || ev.actor_company || 'Utilisateur'}</b>
                  {ev.actor_role ? ' · '+ev.actor_role : ''}
                  {ev.actor_company && ev.actor_company !== ev.actor_name ? ' · '+ev.actor_company : ''}
                </div>
                {ev.task_number || ev.task_title ? (
                  <div style={{fontSize:12,color:'var(--text)',lineHeight:1.45,marginBottom:5}}>
                    {ev.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                      color:'var(--xmuted)',background:'var(--surface-2)',padding:'1px 5px',
                      borderRadius:3,border:'1px solid var(--border)',marginRight:6}}>{ev.task_number}</span>}
                    {ev.task_company && <b>{ev.task_company} — </b>}
                    {ev.task_title}
                  </div>
                ) : null}
                {(ev.old_status || ev.new_status) && (
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>
                    {ev.old_status || '—'} → <span style={{color:c,fontWeight:800}}>{ev.new_status || '—'}</span>
                  </div>
                )}
                {ev.note && (
                  <div style={{fontSize:12,color:'var(--text)',background:'var(--surface-2)',
                    border:'1px solid var(--border)',borderRadius:6,padding:'7px 9px',
                    marginTop:6,lineHeight:1.45}}>
                    <b>Note :</b> {ev.note}
                  </div>
                )}
                {ev.message && (
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:6,lineHeight:1.45}}>
                    {ev.message}
                  </div>
                )}
                {isAdminHistory && ev.event_type === 'task_updated' && ev.payload && Array.isArray(ev.payload.changes) && ev.payload.changes.length > 0 && (
                  <div style={{marginTop:8,padding:'9px 10px',borderRadius:8,
                    background:'rgba(37,99,235,.06)',border:'1px solid rgba(37,99,235,.18)'}}>
                    <div style={{fontSize:10,fontWeight:800,color:'#2563EB',fontFamily:"'DM Mono',monospace",
                      letterSpacing:'.05em',textTransform:'uppercase',marginBottom:7}}>
                      Détail administrateur des modifications
                    </div>
                    {ev.payload.changes.map(function(ch, idx){
                      return (
                        <div key={idx} style={{fontSize:11,color:'var(--text)',lineHeight:1.45,
                          padding:'6px 0',borderTop:idx?'1px solid var(--border)':'none'}}>
                          <div style={{fontWeight:800,color:'var(--text)',marginBottom:3}}>{changeActionLabel(ch)}</div>
                          {ch.old_value ? <div><span style={{color:'var(--muted)'}}>Avant :</span> {ch.old_value}</div> : null}
                          {ch.new_value ? <div><span style={{color:'var(--muted)'}}>Après :</span> {ch.new_value}</div> : null}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <button onClick={onClose} style={{...btnSecStyle,width:'100%',marginTop:8}}>Fermer</button>
    </SheetModal>
  );
}

          </div>

          <div style={{display:'flex',gap:8}}>
            <button onClick={function(){onConfirm(validUntil);}}

              style={{...btnPrimaryStyle,background:'var(--danger)',flex:1}}>

            </button>
            <button onClick={function(){setConfirmStep(false);}}
              style={{...btnSecStyle,flex:'0 0 auto'}}>
              Retour
            </button>
          </div>
        </div>
      )}

      <button onClick={onClose} style={{...btnSecStyle,width:'100%',marginTop:8}}>Annuler</button>
    </SheetModal>
  );
}

      .then(function(r){ if(!r.ok) throw new Error(table+' '+method+' failed: '+r.status); return r; })
      .catch(function(e){ console.error('[Planify] Supabase error:',e); notify('Erreur de sauvegarde','error'); throw e; });
  }

  // Écriture non bloquante pour historique / logs / notifications.
  // Important : une erreur sur ces tables secondaires ne doit jamais afficher
  // "Erreur de sauvegarde" si la tâche officielle a bien été enregistrée.
  function sbFetchSilent(method, table, body, query) {
    var url = SUPA_URL+'/rest/v1/'+table+(query?'?'+query:'');
    var hdrs = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'return=representation':'return=minimal'
    };
    return fetch(url,{method:method,headers:hdrs,body:body?JSON.stringify(body):undefined})
      .then(function(r){
        if(!r.ok) {
          console.warn('[Planify] Écriture secondaire non enregistrée:', table, method, r.status);
          return null;
        }
        return r;
      })
      .catch(function(e){
        console.warn('[Planify] Écriture secondaire ignorée:', table, e);
        return null;
      });
  }

  function sbFetchRows(method, table, body, query) {
    var url = SUPA_URL+'/rest/v1/'+table+(query?'?'+query:'');
    var hdrs = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'resolution=merge-duplicates,return=representation':'return=representation'
    };
    return fetch(url,{method:method,headers:hdrs,body:body?JSON.stringify(body):undefined})
      .then(function(r){
        if(!r.ok) throw new Error(table+' '+method+' failed: '+r.status);
        return r.json().catch(function(){ return []; });
      })
      .catch(function(e){ console.error('[Planify] Supabase error:',e); notify('Erreur de sauvegarde','error'); throw e; });
  }

  function valueTextForTaskField(key, value) {
    if (value == null) return '';
    if (key === 'zone') {
      var z = zones.find(function(x){ return x.id === value; });
      return z ? z.name + (z.short ? ' ('+z.short+')' : '') : String(value || '');
    }
    if (key === 'trade') {
      var tr = trades.find(function(x){ return x.id === value; });
      return tr ? tr.name : String(value || '');
    }
    if (key === 'status') {
      var st = STATUS_META[value];
      return st ? st.label : String(value || '');
    }
    if (key === 'priority') {
      return ({1:'Urgente',2:'Haute',3:'Normale',4:'Basse',5:'À confirmer'}[value]) || String(value || '');
    }
    if (key === 'start' || key === 'end' || key === 'company_edit_start_min' || key === 'company_edit_end_max') {
      return value ? fmtDate(String(value)) : '';
    }
    if (key === 'company_edit_allowed') {
      return value ? 'Oui' : 'Non';
    }
    if (key === 'off_days') {
      var arr = Array.isArray(value) ? value : [];
      return arr.length ? arr.map(function(d){ return fmtDate(d); }).join(', ') : '';
    }
    if (key === 'predecessor_ids' || key === 'successor_ids') {
      return taskCodesForIds(value, data).join(', ');
    }
    return String(value || '').trim();
  }

  function buildTaskChangeDetails(before, after) {
    if (!before || !after) return [];
    var defs = [
      {key:'task', label:'Description'},
      {key:'company', label:'Entreprise'},
      {key:'trade', label:'Corps de métier'},
      {key:'zone', label:'Zone'},
      {key:'start', label:'Date de début'},
      {key:'end', label:'Date de fin'},
      {key:'status', label:'Statut'},
      {key:'priority', label:'Priorité'},
      {key:'company_edit_allowed', label:'Modification entreprise autorisée'},
      {key:'company_edit_start_min', label:'Date modifiable au plus tôt'},
      {key:'company_edit_end_max', label:'Date modifiable au plus tard'},
      {key:'prereq', label:'Prérequis / point bloquant'},
      {key:'prereq_company', label:'Entreprise concernée par le prérequis'},
      {key:'impact', label:'Impact / dépendance'},
      {key:'predecessor_ids', label:'Prédécesseur(s)'},
      {key:'successor_ids', label:'Successeur(s)'},
      {key:'notes', label:'Note'},
      {key:'off_days', label:'Jours gelés'},
    ];
    return defs.map(function(def){
      var oldVal = valueTextForTaskField(def.key, before[def.key]);
      var newVal = valueTextForTaskField(def.key, after[def.key]);
      if (oldVal === newVal) return null;
      var action = def.label + ' modifié';
      if (def.key === 'notes') action = 'Note modifiée';
      if (def.key === 'task') action = 'Description modifiée';
      if (def.key === 'off_days') action = 'Jours gelés modifiés';
      if (!oldVal && newVal) action = def.key === 'notes' ? 'Note ajoutée' : def.label + ' ajouté';
      if (oldVal && !newVal) action = def.key === 'notes' ? 'Note supprimée' : def.label + ' supprimé';
      return {
        field:def.key,
        label:def.label,
        action:action,
        old_value:oldVal,
        new_value:newVal
      };
    }).filter(Boolean);
  }

  function addPlanningEvent(row) {
    var payload = Object.assign({
      event_type:row.event_type,
      actor_name:row.actor_name || actorName(),
      actor_role:row.actor_role || actorRole(),
      actor_company:session&&session.company?session.company.name:(session&&session.role==='admin'?'Admin':''),
      planning_version_id:planningVersion&&planningVersion.id?planningVersion.id:null,
      payload:row.payload || {}
    }, row);
    var fallback = Object.assign({
      id:'local_event_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      created_at:new Date().toISOString()
    }, payload);
    return sbFetchSilent('POST','planning_events',payload)
      .then(function(r){
        if (!r || !r.json) return fallback;
        return r.json().catch(function(){ return []; }).then(function(rows){
          return rows && rows[0] ? rows[0] : fallback;
        });
      })
      .then(function(savedEvent){
        setHistory(function(prev){
          var list = prev || [];
          if (savedEvent && savedEvent.id && list.some(function(e){ return e.id === savedEvent.id; })) return list;
          return [savedEvent].concat(list).slice(0,300);
        });
        if(historyOpen) return loadHistory().then(function(){ return savedEvent; });
        return savedEvent;
      })
      .catch(function(e){ console.warn('[Planify] event not saved:', e); return fallback; });
  }

  // ── Load all data from Supabase ──────────────────────────────────────
  function loadFromSupabase(sess) {
    var hdrs = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
    return Promise.all([
      fetch(SUPA_URL+'/rest/v1/zones?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/trades?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/companies?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/interventions?order=start_date',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/calendar_overrides?order=date',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/task_change_requests?order=created_at.desc&limit=500',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/task_logs?order=created_at.desc&limit=500',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/notifications?order=created_at.desc&limit=200'+(sess&&sess.role==='company'&&sess.company?('&company=eq.'+encodeURIComponent(sess.company.name)):''),{headers:hdrs}),
    ]).then(function(rs){ return Promise.all(rs.map(function(r){return r.ok?r.json():[];})); })
    .then(function(results){
      var zData=results[0], tData=results[1], cData=results[2], iData=results[3], calData=results[4], crData=results[5], logData=results[6], nData=results[7];
      if(zData&&zData.length) setZones(zData);
      if(tData&&tData.length) setTrades(tData.map(function(t){
        var loc=TRADES.find(function(lt){return lt.id===t.id;}) || {};
        // Supabase reste prioritaire ; le HTML sert uniquement de fallback local.
        var merged = Object.assign({}, loc, t);
        if (merged.id === 'tr_8') merged.short = '9EME';
        return merged;
      }));
      if(cData&&cData.length) setCompanies(cData.map(function(c){
        var tradeId = c.trade_id || c.tradeId || '';
        var loc = COMPANIES.find(function(lc){ return lc.id === c.id || (lc.name === c.name && (!tradeId || lc.tradeId === tradeId)); }) || {};
        return {id:c.id,name:c.name,contact:c.contact||loc.contact||'',code:c.code||loc.code||'',tradeId:tradeId||loc.tradeId||'',updated_at:c.updated_at||''};
      }));
      if(iData&&iData.length) setData(iData.map(normalizeInterventionRow));
      setCalendarOverrides((calData||[]).map(function(r){
        return {date:normalizeDateKey(r.date),label:r.label||'',is_worked:!!r.is_worked,updated_at:r.updated_at||''};
      }).filter(function(r){ return !!r.date; }));
      setChangeRequests((crData||[]).map(normalizeChangeRequestRow));
      setTaskLogs(logData || []);
      setNotifications(nData || []);
      return results;
    }).catch(function(e){ console.warn('[Planify] Load failed, using local data:',e); notify('Erreur de mise à jour','error'); throw e; });
  }

  function handleHolidayWorked(ds, label, isWorked) {
    ds = normalizeDateKey(ds);
    var row = {date:ds,label:label||'',is_worked:!!isWorked,updated_at:new Date().toISOString()};
    setCalendarOverrides(function(prev){
      var found = false;
      var next = (prev||[]).map(function(o){
        if (o.date === ds) { found = true; return Object.assign({},o,row); }
        return o;
      });
      if (!found) next.push(row);
      return next.sort(function(a,b){return a.date.localeCompare(b.date);});
    });
    sbFetchRows('POST','calendar_overrides',row,'on_conflict=date')
      .then(function(){notify(isWorked?'Jour férié rendu ouvré ✓':'Jour férié remis non ouvré ✓','success');})
      .catch(function(){notify('Erreur calendrier','error');});
  }

  // ── Status change → save to Supabase ────────────────────────────────
  async function handleStatusChange(id, status, noteText) {
    if (!canChangeStatus) {
      alert('Planning validé : les statuts ne peuvent plus être modifiés sur cette version.');
      throw new Error('Planning validé.');
    }
    var iv = data.find(function(i){return i.id===id;});
    if (!iv) throw new Error('Tâche introuvable. Actualisez puis réessayez.');
    var oldStatus = iv.status || '';
    var oldMeta = STATUS_META[oldStatus] || {label:oldStatus || '—'};
    var newMeta = STATUS_META[status] || {label:status || '—'};
    var z = zones.find(function(x){return x.id===iv.zone;}) || null;
    var newUpdatedAt = new Date().toISOString();
    var trimmedStatusNote = noteText && noteText.trim() ? noteText.trim() : '';
    setBusyKey('status_'+id, true);

    try {
      var rows = await sbFetchRows('PATCH','interventions',{
        status:status,
        updated_at:newUpdatedAt
      }, conflictQuery(id, iv.updated_at));
      if (iv.updated_at && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant de réessayer.');
      }
      var saved = rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, iv, {status:status, updated_at:newUpdatedAt});
      setData(function(prev){ return prev.map(function(i){ return i.id===id?saved:i; }); });

      var author = actorName();
      await addPlanningEvent({
        event_type:'status_change',
        task_id:id,
        task_number:iv.task_number||'',
        task_title:iv.task||'',
        task_company:iv.company||'',
        zone_id:iv.zone||'',
        zone_name:z?z.name:'',
        old_status:oldMeta.label,
        new_status:newMeta.label,
        note:trimmedStatusNote,
        message:author+' a modifié le statut de '+(iv.task_number||iv.task)+' : '+oldMeta.label+' → '+newMeta.label,
        payload:{old_status:oldStatus,new_status:status,note:trimmedStatusNote}
      });

      if(trimmedStatusNote) {
        var logRow = {task_id:id,company:author,author:author,type:status,
          message:trimmedStatusNote,photo_url:null,mentioned:['Admin']};
        sbFetchSilent('POST','task_logs',logRow)
          .then(function(r){
            if (!r || !r.json) return [];
            return r.json().catch(function(){ return []; });
          })
          .then(function(rows){
            var savedLog = rows && rows[0] ? rows[0] : Object.assign({
              id:'local_log_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
              created_at:new Date().toISOString()
            }, logRow);
            setTaskLogs(function(prev){
              var list = prev || [];
              if (savedLog && savedLog.id && list.some(function(l){ return l.id === savedLog.id; })) return list;
              return [savedLog].concat(list).slice(0,500);
            });
            var taskRef = iv?iv.task_number||iv.task.slice(0,30):'';
            var msg = author+' · '+newMeta.label+' · '+taskRef;
            return sbFetchSilent('POST','notifications',[{company:'Admin',task_id:id,message:msg,read:false}]);
          }).catch(function(){});
      }
      notify('Statut sauvegardé ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur de sauvegarde','error',4200);
      throw e;
    } finally {
      setBusyKey('status_'+id, false);
    }
  }


  function isPersistedDbId(id) {

  async function handleUpdateStatusNote(noteItem, newText) {
    var text = String(newText || '').trim();
    if (!noteItem || !noteItem.id || !text) throw new Error('Note de statut invalide.');
    var oldText = String(noteItem.note || '').trim();
    var oldNorm = normalizeStatusNoteText(oldText);
    var taskId = noteItem.task_id || '';
    setBusyKey('status_note_'+noteItem.id, true);
    try {
      if (noteItem.source === 'planning_events' && isPersistedDbId(noteItem.id)) {
        await sbFetchRows('PATCH','planning_events',{note:text},eqFilter('id', noteItem.id));
      }
      if (noteItem.source === 'task_logs' && isPersistedDbId(noteItem.id)) {
        await sbFetchRows('PATCH','task_logs',{message:text},eqFilter('id', noteItem.id));
      }
      if (taskId && oldText) {
        if (noteItem.source !== 'task_logs') {
          await sbFetchSilent('PATCH','task_logs',{message:text},eqFilter('task_id', taskId)+'&'+eqFilter('message', oldText));
        }
        if (noteItem.source !== 'planning_events') {
          await sbFetchSilent('PATCH','planning_events',{note:text},eqFilter('task_id', taskId)+'&'+eqFilter('note', oldText));
        }
      }
      setHistory(function(prev){
        return (prev || []).map(function(ev){
          var sameId = noteItem.source === 'planning_events' && ev.id === noteItem.id;
          var sameText = taskId && ev.task_id === taskId && normalizeStatusNoteText(ev.note || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, ev, {note:text, payload:Object.assign({}, ev.payload || {}, {note:text})});
          return ev;
        });
      });
      setTaskLogs(function(prev){
        return (prev || []).map(function(log){
          var sameId = noteItem.source === 'task_logs' && log.id === noteItem.id;
          var sameText = taskId && log.task_id === taskId && normalizeStatusNoteText(log.message || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, log, {message:text});
          return log;
        });

      if (noteItem.source === 'task_logs' && isPersistedDbId(noteItem.id)) {
        await sbFetchRows('PATCH','task_logs',{message:''},eqFilter('id', noteItem.id));

      if (taskId && oldText) {
        if (noteItem.source !== 'task_logs') {

        }
      }
      setHistory(function(prev){
        return (prev || []).map(function(ev){
          var sameId = noteItem.source === 'planning_events' && ev.id === noteItem.id;
          var sameText = taskId && ev.task_id === taskId && normalizeStatusNoteText(ev.note || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, ev, {note:'', payload:Object.assign({}, ev.payload || {}, {note:''})});
          return ev;
        });
      });
      setTaskLogs(function(prev){
        return (prev || []).map(function(log){
          var sameId = noteItem.source === 'task_logs' && log.id === noteItem.id;
          var sameText = taskId && log.task_id === taskId && normalizeStatusNoteText(log.message || '') === oldNorm;
          if (sameId || sameText) return Object.assign({}, log, {message:''});
          return log;
        });
      });

      return true;

      notify(e.message || 'Erreur suppression note','error',4200);
      throw e;
    } finally {
      setBusyKey('status_note_'+noteItem.id, false);
    }
  }
