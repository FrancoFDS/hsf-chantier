                  Annuler sélection
                </button>
              </div>
            </div>
          )}

        {/* TABLE-LAYOUT for guaranteed column alignment */}
        <div ref={planningGridRef} style={{position:'relative'}}>
        <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed',position:'relative',zIndex:1}}>
          <colgroup>
            <col style={{width:isMulti?'40px':'58px'}} />
            {days.map((_,i) => <col key={i} />)}
            <col style={{width:isMulti?'28px':'50px'}} />
          </colgroup>

          {/* ── STICKY HEADER ── */}
          <thead>
            <tr style={{background:'var(--surface-2)',borderBottom:'2px solid var(--border)'}}>

              {/* Zone filter */}
              <th ref={dropRef} style={{padding:'5px 3px',borderRight:'3px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,background:'var(--surface-2)',
                verticalAlign:'middle',textAlign:'center'}}>
                <button onClick={() => setDropOpen(o => !o)}
                  style={{width:'100%',padding:'4px 2px',borderRadius:'var(--r-xs)',
                    border:`1px solid ${dropOpen||activeCount?'var(--primary)':'var(--border)'}`,
                    background:activeCount?'var(--primary-l)':'transparent',
                    color:activeCount?'var(--primary)':'var(--muted)',
                    fontSize:8,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace",
                    letterSpacing:'.04em',textTransform:'uppercase',lineHeight:1.3}}>
                  {activeCount ? 'Zones' : 'Zones'}
                </button>
                {dropOpen && (
                  <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,minWidth:220,
                    background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
                    boxShadow:'var(--shadow-md)',zIndex:50,overflow:'hidden',textAlign:'left'}}>
                    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',
                      display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',
                        fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.05em'}}>Zones</span>
                      <button onClick={()=>{setZoneFilter([]);setDropOpen(false);}}
                        style={{fontSize:10,color:'var(--primary)',background:'none',border:'none',
                          cursor:'pointer',fontWeight:600}}>Toutes</button>
                    </div>
                    {zones.map(z => {
                      const checked = zoneFilter.length===0||zoneFilter.includes(z.id);
                      const fc = getZoneFloorColor(z, zones);
                      return (
                        <div key={z.id} onClick={function(e){e.preventDefault();e.stopPropagation();toggleZone(z.id);}}
                          style={{display:'flex',alignItems:'center',gap:10,
                          padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',
                          background:checked?'var(--primary-l)':'transparent',transition:'background .1s'}}>
                          <div style={{width:14,height:14,borderRadius:3,flexShrink:0,
                            border:`2px solid ${checked?'var(--primary)':'var(--border)'}`,
                            background:checked?'var(--primary)':'transparent',
                            display:'flex',alignItems:'center',justifyContent:'center'}}>
                            {checked&&<span style={{color:'#fff',fontSize:9,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0}}></span>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</div>
                            <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{z.short}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </th>

              {/* Day headers */}
              {days.map((d,i) => {
                const isFirstOfWeek = i % daysPerWeek === 0 && i > 0;
                const holiday = isHoliday(d);
                const nonWorkingDay = !isConfiguredWorkingWeekday(dateStr(d));
                const workedHoliday = isWorkedHoliday(d);
                return (
                  <th key={i} style={{
                    padding:isMulti?'3px 0':'6px 2px',
                    textAlign:'center',
                    overflow:'hidden',
                    position:'sticky',top:0,zIndex:11,
                    borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                    background:holiday?'#D1D5DB':nonWorkingDay?'color-mix(in srgb, var(--border) 55%, var(--surface-2))':isToday(d)?'var(--primary-l)':'var(--surface-2)',
                    fontWeight:'normal',
                    verticalAlign:'middle'}}>
                    <div style={{fontSize:isMulti?(weeks>3?5.5:weeks===3?6:7):9,
                      fontWeight:800,fontFamily:UX2.sans,
                      color:(holiday||nonWorkingDay)?'#6B7280':isToday(d)?'var(--primary)':'var(--muted)',
                      lineHeight:1.05,whiteSpace:'nowrap'}}>
                      {['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()]}
                    </div>
                    <div style={{fontSize:isMulti?(weeks>3?6:weeks===3?7:8):10,
                      fontWeight:isMulti?700:400,
                      fontFamily:"'DM Mono',monospace",
                      color:(holiday||nonWorkingDay)?'#4B5563':isToday(d)?'var(--primary)':'var(--muted)',
                      lineHeight:1.05,whiteSpace:'nowrap',marginTop:isMulti?1:0}}>
                      {`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`}
                    </div>
                    {holiday && <div style={{fontSize:7,fontWeight:700,color:'#4B5563',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>JF</div>}
                    {!holiday && nonWorkingDay && <div style={{fontSize:6.5,fontWeight:700,color:'#6B7280',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>NO</div>}
                    {workedHoliday && <div style={{fontSize:6.5,fontWeight:700,color:'#16A34A',
                      fontFamily:"'DM Mono',monospace",marginTop:1}}>ouvré</div>}
                  </th>
                );
              })}

              {/* FIN header */}
              <th style={{padding:'4px 1px',textAlign:'center',
                borderLeft:'2px solid var(--border-s)',
                position:'sticky',top:0,zIndex:12,
                background:'rgba(220,38,38,.07)',
                verticalAlign:'middle'}}>
                <span style={{fontSize:7,fontWeight:800,color:'#DC2626',
                  fontFamily:"'DM Mono',monospace",
                  writingMode:'vertical-rl',transform:'rotate(180deg)',lineHeight:1}}>FIN</span>
              </th>
            </tr>
          </thead>

          {/* ── ZONE ROWS ── */}
          <tbody>
            {visibleZones.map((zone, zi) => {
              const prevZone = visibleZones[zi - 1];
              const floorChange = zi > 0 && prevZone?.floor !== zone.floor;
              const fc  = getZoneFloorColor(zone, zones);
              const dc  = deadlineColor(zone.deadline);
              const rowBg = rgbaCss(fc, .025);
              const zoneCritical = criticalPathMetaByZone[zone.id] || { links:[], roles:{}, chains:[] };

              return (
                <tr key={zone.id} style={{
                  borderTop:floorChange?`3px solid ${fc}`:'none',
                  borderBottom:'1px solid var(--border)',
                  background:rowBg}}>

                  {/* Zone label */}
                  <td style={{padding:isMulti?'4px 3px':'7px 6px',
                    borderRight:'3px solid '+fc,
                    verticalAlign:'middle',textAlign:'center',
                    minHeight:isMulti?48:66,
                    height:isMulti?'48px':'66px',
                    background:`${fc}12`}}>
                    <span style={{fontSize:isMulti?8.5:'var(--fz-zone)',fontWeight:900,color:fc,lineHeight:1.12,
                      fontFamily:UX2.sans,letterSpacing:'.01em',
                      textTransform:'uppercase',wordBreak:'normal',overflowWrap:'anywhere',display:'block'}}>
                      {zone.short}
                    </span>
                  </td>

                  {/* Day cells */}
                  {days.map((day, di) => {
                    const ds = dateStr(day);
                    const holiday = isHoliday(day);
                    const nonWorkingDay = isNonWorkingCalendarDate(ds);
                    const workedHoliday = isWorkedHoliday(day);
                    const isFirstOfWeek = di % daysPerWeek === 0 && di > 0;
                    const isDeadline = zone.deadline && ds === zone.deadline;
                    const cellBg = holiday?'#D1D5DB': nonWorkingDay?'rgba(156,163,175,.16)': isDeadline?'rgba(220,38,38,.18)': isToday(day)?'color-mix(in srgb, var(--primary) 5%, transparent)':'transparent';
                    const cards = (()=>{
                      if(nonWorkingDay) return [];
                      return filtered.filter(function(iv){ return planningTaskVisibleOnDay(iv, day, zone.id); }).sort(planningTaskSort);
                    })();
                    const shown = (!showCriticalPath ? cards : cards.filter(function(iv){
                      var role = zoneCritical.roles[iv.id] || null;
                      if (!criticalOnly) return true;
                      if (!(role && role.linked)) return false;
                      return !activeCriticalChainId || role.chainId === activeCriticalChainId;
                    }));

                    return (
                      <td key={di}
                        onClick={function(){
                          if(!isAdmin) return;
                          if(dependencyLinkActive) return;
                          if(moveSelectionActive && onMoveSelectedTasks){ onMoveSelectedTasks(selectedPlanningIds, zone.id, ds); return; }
                          if(pasteTaskActive&&onPasteTask){onPasteTask(zone.id,ds); return;}
                          if(nonWorkingDay) return;
                          onOpenAdd(zone.id,ds);
                        }}
                        title={moveSelectionActive ? 'Déplacer la sélection vers '+zone.short+' le '+fmtDate(ds) : ''}
                        style={{
                          position:'relative',
                          overflow:'hidden',
                          padding:isMulti?2:3,
                          height:isMulti?'48px':'66px',
                          verticalAlign:'top',
                          borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                          background:moveSelectionActive ? 'linear-gradient(0deg, color-mix(in srgb, var(--primary) 5%, transparent), color-mix(in srgb, var(--primary) 5%, transparent)), '+cellBg : cellBg,
                          cursor:isAdmin&&(moveSelectionActive||pasteTaskActive||!nonWorkingDay)?'pointer':'default',
                          transition:'background .12s'}}>
                        {shown.map(function(iv){ return renderPlanningTask(iv, zone, zoneCritical, ds); })}
                      </td>
                    );
                  })}

                  {/* FIN cell */}
                  <DeadlineCell zone={zone} isMulti={isMulti} isAdmin={isAdmin} setZones={setZones} />
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>

      {taskHover && (
        <div style={{
          position:'fixed',
          left:Math.min(taskHover.x + 14, Math.max(12, window.innerWidth - 300)),
          top:Math.min(taskHover.y + 14, Math.max(12, window.innerHeight - 220)),
          zIndex:9999,
          width:320,
          maxWidth:'calc(100vw - 24px)',
          background:'var(--surface)',
          color:'var(--text)',
          border:'1px solid var(--border-s)',
          borderRadius:'var(--r-sm)',
          boxShadow:'var(--shadow-lg)',
          padding:'12px 14px',
          pointerEvents:'none',
          fontSize:12.5,
          lineHeight:1.42
        }}>
          <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'flex-start',marginBottom:6}}>
            <div style={{fontSize:13.5,fontWeight:900,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis'}}>
              {taskHover.company}
            </div>
            {taskHover.taskNumber && (
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                {taskHover.taskNumber}
              </div>
            )}
          </div>
          <div style={{fontSize:12.5,fontWeight:800,color:'var(--text)',marginBottom:8,lineHeight:1.38}}>
            {taskHover.task}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'78px 1fr',gap:'4px 10px',color:'var(--muted)'}}>
            <span>Statut</span><b style={{color:'var(--text)'}}>{taskHover.status}</b>
            <span>Zone</span><b style={{color:'var(--text)'}}>{taskHover.zone}</b>
            <span>Dates</span><b style={{color:'var(--text)',fontFamily:"'DM Mono',monospace"}}>{taskHover.dates}</b>
            {taskHover.canFinishLater && <>
              <span>Modif.</span><b style={{color:'var(--primary)'}}>{taskHover.latestFinish}</b>
            </>}
            {taskHover.predCodes && taskHover.predCodes.length > 0 && <>
              <span>Pred.</span><b style={{color:'#92400E'}}>{taskHover.predCodes.join(', ')}</b>
            </>}
            {taskHover.succCodes && taskHover.succCodes.length > 0 && <>
              <span>Succ.</span><b style={{color:'#92400E'}}>{taskHover.succCodes.join(', ')}</b>
            </>}
          </div>
          {taskHover.prereq && (
            <div style={{marginTop:7,padding:'5px 7px',borderLeft:'3px solid var(--danger)',
              background:'var(--danger-l)',color:'var(--danger)',borderRadius:'0 4px 4px 0'}}>
              <b>Prérequis</b> · {taskHover.prereq}{taskHover.prereqCompany ? ' · '+taskHover.prereqCompany : ''}
            </div>
          )}
          {taskHover.notes && !String(taskHover.notes).startsWith('Etage') && !String(taskHover.notes).startsWith('Étage') && (
            <div style={{marginTop:7,color:'var(--muted)',fontStyle:'italic'}}>
              {taskHover.notes}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   LIST SCREEN
=========================================================== */
function ListScreen({ data, zones, trades, companies, weekOffset, filter, session, onOpenDetail, onStatusChange, canChangeStatus = true }) {
  const isAdmin = session?.role === 'admin';
  const myName = session?.company?.name || '';
  const baseData = isAdmin ? data : data.filter(function(i){ return i.company === myName; });
  const shownData = filter === 'all' ? baseData : baseData.filter(function(i){ return i.trade === filter; });
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = dateStr(today);
  const days = weekDays(weekOffset, true);
  const weekItems = shownData.filter(function(i){ return days.some(function(d){ return isTaskActiveOn(i,d); }); });
  const todayItems = shownData.filter(function(i){ return isTaskActiveOn(i,today); });
  const todoTodayItems = shownData.filter(function(i){ return isTaskTodoToday(i); });
  const urgentItems = shownData.filter(function(i){ return i.status !== 'termine' && (isTaskLate(i) || i.status === 'bloque'); });
  const allOrdered = [...shownData].sort(function(a,b){
    var rank = function(iv){ var es=effectiveStatus(iv); if (es==='bloque') return 0; if (es==='en_retard') return 1; if (es==='encours') return 2; if (es==='arealis') return 3; if (es==='termine') return 5; return 9; };
    var ra=rank(a), rb=rank(b); if (ra!==rb) return ra-rb;
    return (a.start||'').localeCompare(b.start||'');
  });

  function pctDone(items) { return items.length ? Math.round(items.filter(function(i){return i.status==='termine';}).length / items.length * 100) : 0; }

  if (isAdmin) {
    const filtered = shownData
      .filter(i=>days.some(d=>isTaskActiveOn(i,d)))
      .sort((a,b)=>a.start!==b.start?a.start.localeCompare(b.start):(a.priority||3)-(b.priority||3));
    if (!filtered.length) return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--muted)',gap:8}}>
        <div style={{fontSize:36,opacity:.3}}>📋</div>
        <div style={{fontSize:15,fontWeight:600}}>Aucune intervention cette semaine</div>
        <div style={{fontSize:13}}>Changez la semaine ou le filtre</div>
      </div>
    );
    const grouped = {};
    filtered.forEach(iv => { if (!grouped[iv.start]) grouped[iv.start] = []; grouped[iv.start].push(iv); });
    return (
      <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
        {Object.entries(grouped).map(([date, ivs]) => (
          <div key={date} style={{marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8,paddingBottom:5,borderBottom:'1px solid var(--border)'}}>
              {fmtDate(date)} — {new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long'})}
            </div>
            {ivs.map(iv=><TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} mode="admin-row" />)}
          </div>
        ))}
      </div>
    );
  }

  const mainTrade = getCompanyMainTrade(myName, data, companies, trades);
  const accent = getTC(mainTrade ? mainTrade.color : 'blue');
  const total = baseData.length;
  const done = baseData.filter(function(i){ return effectiveStatus(i) === 'termine'; }).length;
  const enc  = baseData.filter(function(i){ return effectiveStatus(i) === 'encours' && !isTaskFrozenToday(i); }).length;
  const bloc = baseData.filter(function(i){ return effectiveStatus(i) === 'bloque'; }).length;
  const late = baseData.filter(function(i){ return effectiveStatus(i) === 'en_retard'; }).length;
  const todoTodayCount = baseData.filter(function(i){ return isTaskTodoToday(i); }).length;
  const progress = pctDone(baseData);
  const reliability = calcReliability(baseData);
  const [reliabilityOpen, setReliabilityOpen] = useState(false);

  function MiniStat({label,value,color}) {
    return <div style={{flex:'1 1 72px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'9px 8px',textAlign:'center'}}>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:color,lineHeight:1}}>{value}</div>
      <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginTop:3}}>{label}</div>
    </div>;
  }
  function TaskSection({title,subtitle,items,empty,accentColor}) {
    return <SectionCard title={title} accent={accentColor}>
      {subtitle && <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.4}}>{subtitle}</div>}
      {items.length ? items.map(function(iv){ return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades} onOpenDetail={onOpenDetail} onStatusChange={onStatusChange} canChangeStatus={canChangeStatus} mode="enterprise" />; }) :
        <div style={{padding:'12px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>{empty || 'Aucune tâche.'}</div>}
    </SectionCard>;
  }

  function ReliabilityDetailEntreprise() {
    var missed = reliability.missedItems || [];
    var doneDue = reliability.doneItems || [];
    var notDue = reliability.notDueItems || [];
    var accentColor = reliability.value>=85 ? '#16A34A' : reliability.value>=60 ? '#F59E0B' : '#DC2626';

    return (
      <SectionCard title={`Détail fiabilité — ${reliability.label}`} accent={accentColor}>
        <div style={{background:'var(--surface-2)',border:'1px solid var(--border)',
          borderRadius:'var(--r-sm)',padding:'12px',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:'var(--text)',marginBottom:6}}>
            Comment est calculée ma fiabilité ?
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--muted)',lineHeight:1.55}}>
            {reliability.total > 0
              ? <>{reliability.done} tâche{reliability.done>1?'s':''} due{reliability.done>1?'s':''} terminée{reliability.done>1?'s':''} / {reliability.total} tâche{reliability.total>1?'s':''} due{reliability.total>1?'s':''} à date = <b style={{color:'var(--text)'}}>{reliability.label}</b></>
              : <>Aucune tâche due à date. La fiabilité est donc affichée à <b style={{color:'var(--text)'}}>100%</b>.</>
            }
          </div>
          {reliability.total > 0 && (
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:reliability.lostPoints?'#EA580C':'#16A34A',marginTop:6,fontWeight:800}}>
              {reliability.lostPoints
                ? `Écart à expliquer : -${reliability.lostPoints} pt${reliability.lostPoints>1?'s':''}.`
                : 'Aucun écart : toutes les tâches dues sont terminées.'}
            </div>
          )}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:12}}>
          <div style={{background:'var(--success-l)',border:'1px solid rgba(22,163,74,.25)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:'#16A34A'}}>{doneDue.length}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Dues terminées</div>
          </div>
          <div style={{background:'rgba(234,88,12,.08)',border:'1px solid rgba(234,88,12,.25)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:'#EA580C'}}>{missed.length}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Dues non terminées</div>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:'var(--muted)'}}>{notDue.length}</div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Pas encore dues</div>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'9px 10px'}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:900,color:reliability.lostPoints?'#EA580C':'#16A34A'}}>
              -{reliability.lostPoints || 0}
            </div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700}}>Points perdus</div>
          </div>
        </div>

        {missed.length > 0 ? (
          <div>
            <div style={{fontSize:12,fontWeight:800,color:'#EA580C',marginBottom:8}}>
              Tâches qui font baisser ma fiabilité
            </div>
            {missed.map(function(iv){
              return <TaskItem key={iv.id} iv={iv} zones={zones} trades={trades}
                onOpenDetail={onOpenDetail} onStatusChange={onStatusChange} canChangeStatus={canChangeStatus} mode="enterprise" />;
            })}
          </div>
        ) : (
          <div style={{fontSize:12,color:'var(--success)',background:'var(--success-l)',
            border:'1px solid rgba(22,163,74,.25)',borderRadius:'var(--r-sm)',padding:'10px 12px',
            fontWeight:700}}>
            Toutes les tâches dues à date sont terminées.
          </div>
        )}

        <div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:10,lineHeight:1.45}}>
          Une tâche est considérée “due” à sa dernière date active. Les jours gelés dans la tâche ne sont pas comptés comme jours travaillés.
        </div>
      </SectionCard>
    );
  }

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
      <div style={{background:'var(--hdr)',borderRadius:'var(--r)',padding:'14px 16px',marginBottom:12,color:'#fff',boxShadow:'var(--shadow-md)',borderLeft:`5px solid ${accent.b}`}}>
        <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start',marginBottom:10}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",letterSpacing:'.08em',textTransform:'uppercase',opacity:.65,marginBottom:3}}>Mon espace entreprise</div>
            <div style={{fontSize:19,fontWeight:900,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{myName}</div>
            <div style={{fontSize:11,opacity:.7,fontFamily:"'DM Mono',monospace",marginTop:2}}>{total} tâche{total!==1?'s':''} · {weekItems.length} cette semaine</div>
            <div style={{fontSize:10,opacity:.5,fontFamily:"'DM Mono',monospace",marginTop:4}}>Fiabilité = tâches dues terminées / tâches dues à date · cliquer sur le %</div>
          </div>
          <div style={{display:'flex',gap:14,alignItems:'flex-start',flexShrink:0,textAlign:'right'}}>
            <div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:900,lineHeight:1,color:progress===100?'#4ADE80':'#fff'}}>{progress}%</div>
              <div style={{fontSize:9,opacity:.55,fontFamily:"'DM Mono',monospace"}}>Avancement</div>
            </div>
            <div title="Cliquer pour voir le détail de ma fiabilité"
              onClick={function(e){e.stopPropagation();setReliabilityOpen(function(v){return !v;});}}
              style={{cursor:'pointer',padding:'2px 4px',borderRadius:6,
                outline:reliabilityOpen?'1px solid rgba(255,255,255,.35)':'1px solid transparent'}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:26,fontWeight:900,lineHeight:1,color:reliability.value>=85?'#4ADE80':reliability.value>=60?'#FBBF24':'#F87171'}}>{reliability.label}</div>
              <div style={{fontSize:9,opacity:.55,fontFamily:"'DM Mono',monospace"}}>Fiabilité</div>
            </div>
          </div>
        </div>
        <div style={{height:6,background:'rgba(255,255,255,.18)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progress}%`,background:'#60A5FA',borderRadius:4}}></div>
        </div>
      </div>

      {reliabilityOpen && <ReliabilityDetailEntreprise />}

      <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:12}}>
        <MiniStat label="À réaliser jour" value={todoTodayCount} color="#6B7280" />
        <MiniStat label="En cours" value={enc} color="#2563EB" />
        <MiniStat label="Bloquées" value={bloc} color="#DC2626" />
        <MiniStat label="Retard" value={late} color="#EA580C" />
        <MiniStat label="Terminées" value={`${done}/${total}`} color="#16A34A" />
      </div>

      <TaskSection title={`À réaliser aujourd’hui — ${todoTodayItems.length}`} accentColor="#6B7280"
        subtitle="Tâches prévues aujourd’hui qui ne sont pas encore démarrées."
        items={todoTodayItems.sort(function(a,b){ return (a.priority||3)-(b.priority||3); })}
        empty="Aucune tâche à réaliser aujourd’hui." />

      <TaskSection title={`Mes urgences — ${urgentItems.length}`} accentColor="#EA580C"
        subtitle="Retards et tâches bloquées à traiter."
        items={urgentItems}
        empty="Aucune urgence identifiée." />

      <TaskSection title={`Cette semaine — ${weekItems.length}`} accentColor="#2563EB"
        items={weekItems.sort(function(a,b){ return (a.start||'').localeCompare(b.start||''); })}
        empty="Aucune tâche planifiée cette semaine." />

      <TaskSection title={`Toutes mes tâches — ${allOrdered.length}`} accentColor="var(--muted)"
        items={allOrdered}
        empty="Aucune tâche affectée." />
    </div>
  );
}

/* ============================================================
   SETTINGS SCREEN
=========================================================== */
function SettingsScreen({ zones, trades, companies, setZones, setTrades, setCompanies, data = [], zoneClipboard = null, onCopyZone, onClearZoneClipboard, onPasteZone, onMoveZone, onDeleteZone, onDeleteTrade, onDeleteCompany, calendarOverrides, onSetHolidayWorked, workingWeekdays = DEFAULT_WORKING_WEEKDAYS, onSetWorkingWeekday }) {
  const [tab, setTab] = useState('zones');
  const [editingZone, setEditingZone] = useState(null);
  const [editingTrade, setEditingTrade] = useState(null);
  const [editingCompany, setEditingCompany] = useState(null);
  const [newZone, setNewZone] = useState(null);
  const [newTrade, setNewTrade] = useState(null);
  const [newCompany, setNewCompany] = useState(null);
  const [zonePaste, setZonePaste] = useState({targetZoneId:'', startDate:dateStr(new Date()), newName:'', newShort:'', newFloor:'', newDeadline:''});
  const PALETTE = Object.keys(TRADE_COLORS);
  const holidayDates = Array.from(_HOLIDAYS).sort();
  const workingDayLabels = [
    {idx:1,label:'Lundi',short:'Lun'},
    {idx:2,label:'Mardi',short:'Mar'},
    {idx:3,label:'Mercredi',short:'Mer'},
    {idx:4,label:'Jeudi',short:'Jeu'},
    {idx:5,label:'Vendredi',short:'Ven'},
    {idx:6,label:'Samedi',short:'Sam'},
    {idx:0,label:'Dimanche',short:'Dim'}
  ];
  function workingDayEnabled(idx) {
    return normalizeWorkingWeekdays(workingWeekdays).includes(idx);
  }
  function overrideFor(ds) {
    return (calendarOverrides||[]).find(function(o){return o.date===ds;});
  }
  function holidayIsWorked(ds) {
    var o = overrideFor(ds);
    return !!(o && o.is_worked);
  }
  const floorList = [...new Set((zones||[]).map(function(z){return z.floor;}).filter(Boolean))].sort();
  useEffect(function(){
    if (!zoneClipboard || !zoneClipboard.zone) return;
    setZonePaste(function(prev){
      return Object.assign({}, prev, {
        targetZoneId: prev.targetZoneId || ((zones || []).find(function(z){ return z.id !== zoneClipboard.zone.id; }) || {}).id || '',
        newName: prev.newName || (zoneClipboard.zone.name + ' — copie'),
        newShort: prev.newShort || ((zoneClipboard.zone.short || 'ZONE') + '-C'),
        newFloor: prev.newFloor || (zoneClipboard.zone.floor || ''),
        newDeadline: prev.newDeadline || (zoneClipboard.zone.deadline || '')
      });
    });
  }, [zoneClipboard]);
  function setZonePasteField(key, value) {
    setZonePaste(function(prev){ return Object.assign({}, prev, {[key]:value}); });
  }
  function setFloorDeadline(floor, deadline) {
    setZones(function(prev){
      return prev.map(function(z){
        return z.floor===floor ? Object.assign({}, z, {deadline:deadline}) : z;
      });
    });
    (zones||[]).filter(function(z){return z.floor===floor;}).forEach(function(z){
      supaWrite('PATCH','zones',{deadline:deadline||null},'id=eq.'+z.id);
    });
  }
  function setZoneDeadline(zoneId, deadline) {
    setZones(function(prev){
      return prev.map(function(z){
        return z.id===zoneId ? Object.assign({}, z, {deadline:deadline}) : z;
      });
    });
    supaWrite('PATCH','zones',{deadline:deadline||null},'id=eq.'+zoneId);
  }
  function floorDeadlineValue(floor) {
    var list = (zones||[]).filter(function(z){return z.floor===floor;});
    if (!list.length) return '';
    var first = list[0].deadline || '';
    return list.every(function(z){return (z.deadline||'')===first;}) ? first : '';
  }
  function floorColorValue(floor) {
    return getZoneFloorColor(floor, zones);
  }
  function setFloorColor(floor, color) {
    var nextColor = normalizeFloorColorValue(color) || '#9CA3AF';
    setZones(function(prev){
      return (prev || []).map(function(z){
        return z.floor === floor ? Object.assign({}, z, {floor_color:nextColor}) : z;
      });
    });
    (zones || []).filter(function(z){ return z.floor === floor; }).forEach(function(z){
      supaWrite('PATCH','zones',{floor_color:nextColor},'id=eq.'+z.id);
    });
  }

  function slugCompanyId(name) {
    return String(name||'entreprise')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .toLowerCase().replace(/[^a-z0-9]+/g,'_')
      .replace(/^_+|_+$/g,'') || ('co_'+Date.now().toString(36));
  }
  function normalizeCompany(c) {
    var rawContacts = c.contacts;
    var contacts = Array.isArray(rawContacts) ? rawContacts
      : (typeof rawContacts === 'string' && rawContacts ? JSON.parse(rawContacts) : []);
    return {
      id:c.id || slugCompanyId(c.name),
      name:(c.name||'').trim(),
      contact:(c.contact||'').trim(),
      phone:(c.phone||'').trim(),
      email:(c.email||'').trim(),
      code:String(c.code||'').trim(),
      tradeId:c.tradeId || c.trade_id || '',
      contacts: contacts
    };
  }
  function companyRow(c) {
    return {id:c.id,name:c.name,contact:c.contact||'',phone:c.phone||'',email:c.email||'',code:c.code||'',trade_id:c.tradeId||null,contacts:c.contacts||[]};
  }
  function saveZone(z) {
    var savedZone = Object.assign({}, z, {floor_color:normalizeFloorColorValue(z.floor_color) || floorColorValue(z.floor)});
    setZones(prev => prev.map(x => x.id===savedZone.id ? savedZone : x));
    setEditingZone(null);
    supaWrite('PATCH','zones',{name:savedZone.name,short:savedZone.short,floor:savedZone.floor,deadline:savedZone.deadline||null,floor_color:savedZone.floor_color},'id=eq.'+savedZone.id);
  }
  function saveTrade(t) {
    setTrades(prev => prev.map(x => x.id===t.id ? t : x));
    setEditingTrade(null);
    supaWrite('PATCH','trades',{name:t.name,short:t.short,color:t.color},'id=eq.'+t.id);
  }
  function saveCompany(c) {
    var co = normalizeCompany(c);
    if (!co.name || !co.code) { notify && window.PLANIFY_NOTIFY ? window.PLANIFY_NOTIFY('Nom et code PIN requis','error') : undefined; return; }
    setCompanies(prev => prev.map(x => x.id===co.id ? co : x));
    setEditingCompany(null);
    supaWrite('PATCH','companies',companyRow(co),'id=eq.'+co.id);
  }
  function addZone() {
    if (!newZone?.name || !newZone?.short) return;

    var floorValue = String(newZone.floor || '').trim();
    if (!floorValue) { alert('Le niveau de la zone est requis. Exemple : R+3, R+2, R+1.'); return; }

    var currentOrders = (zones || []).map(function(z) {
      return Number(z.display_order || 0);
    }).filter(function(n) { return !Number.isNaN(n); });

    var zone = {
      id: 'z_' + genId(),
      name: String(newZone.name || '').trim(),
      short: String(newZone.short || '').trim(),
      floor: floorValue,
      floor_color: floorColorValue(floorValue),
      deadline: newZone.deadline || null,
      display_order: currentOrders.length ? Math.max.apply(null, currentOrders) + 10 : 10
    };

    setZones(function(prev) {
      return [].concat(prev || [], [zone]);
    });
    setNewZone(null);

    supaWrite('POST', 'zones', zone);
  }
  function addTrade() {
    if (!newTrade?.name||!newTrade?.short) return;
    var currentOrders = (trades || []).map(function(t){ return Number(t.display_order || 0); }).filter(function(n){ return !Number.isNaN(n); });
    var tr = {
      id:'tr_'+genId(),
      name:String(newTrade.name || '').trim(),
      short:String(newTrade.short || '').trim(),
      color:newTrade.color||'blue',
      display_order:currentOrders.length ? Math.max.apply(null, currentOrders) + 10 : 10
    };
    setTrades(prev=>[...prev,tr]);
    setNewTrade(null);
    supaWrite('POST','trades',{id:tr.id,name:tr.name,short:tr.short,color:tr.color,display_order:tr.display_order});
  }
  function addCompany() {
    var co = normalizeCompany(newCompany||{});
    if (!co.name || !co.code) { notify && window.PLANIFY_NOTIFY ? window.PLANIFY_NOTIFY('Nom et code PIN requis','error') : undefined; return; }
    var exists = companies.some(function(c){return c.id===co.id || c.name.toLowerCase()===co.name.toLowerCase();});
    if (exists) { alert('Cette entreprise existe déjà. Modifiez-la dans la liste.'); return; }
    setCompanies(prev=>[...prev, co]);
    setNewCompany(null);
    supaWrite('POST','companies',companyRow(co));
  }

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'16px 14px 100px'}}>
      <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:16}}>Configuration</div>
      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:16}}>
        {['zones','trades','companies','calendar'].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:'9px',background:'transparent',border:'none',fontSize:13,fontWeight:600,
              cursor:'pointer',color:tab===t?'var(--primary)':'var(--muted)',fontFamily:"'DM Sans',sans-serif",
              borderBottom:tab===t?'2px solid var(--primary)':'2px solid transparent',marginBottom:-1}}>
            {t==='zones'?'Zones':t==='trades'?'Corps de métier':t==='companies'?'Entreprises':'Calendrier'}
          </button>
        ))}
      </div>

      {tab==='zones' && (
        <div>
          {floorList.length > 0 && (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)',padding:'12px 13px',marginBottom:12,boxShadow:'var(--shadow)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,fontWeight:900,color:'var(--text)'}}>Couleurs par niveau</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>La couleur choisie s’applique au texte des zones dans le planning.</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:8}}>
                {floorList.map(function(floor){
                  var fc = floorColorValue(floor);
                  var count = (zones || []).filter(function(z){ return z.floor === floor; }).length;
                  return (
                    <label key={floor} style={{display:'flex',alignItems:'center',gap:10,
                      border:'1px solid var(--border)',borderRadius:'var(--r-xs)',padding:'8px 10px',
                      background:'var(--surface-2)',cursor:'pointer'}}>
                      <input type="color" value={fc} onChange={function(e){ setFloorColor(floor, e.target.value); }}
                        style={{width:36,height:30,border:'none',background:'transparent',padding:0,cursor:'pointer'}} />
                      <div style={{minWidth:0}}>

function StatusWithNote({ iv, session, onStatusChange }) {
  var [pendingStatus, setPendingStatus] = React.useState(null);
  var [noteText,      setNoteText]      = React.useState('');
  var [saved,         setSaved]         = React.useState(false);
  var [saving,        setSaving]        = React.useState(false);
  var [error,         setError]         = React.useState('');
  var m2 = pendingStatus ? getStatusThemeMeta(pendingStatus) : null;

  async function confirm() {
    if (saving || !pendingStatus) return;
    setSaving(true); setError('');
    try {
      await onStatusChange(iv.id, pendingStatus, noteText.trim());
      setSaved(true);
      setTimeout(function(){ setSaved(false); setPendingStatus(null); setNoteText(''); }, 1600);
    } catch(e) {
      setError(e&&e.message?e.message:'Erreur. Actualisez puis réessayez.');
    } finally { setSaving(false); }
  }
  function cancel() { if (!saving) { setPendingStatus(null); setNoteText(''); setError(''); } }

  var effSt  = effectiveStatus(iv);
  var effMeta = getStatusThemeMeta(effSt);
  var isLateComputed = effSt === 'en_retard';
  var isFuture = iv.start && (function(){
    var d=new Date(iv.start+'T00:00:00'), n=new Date(); n.setHours(0,0,0,0); return d>n;
  })();
  var daysOver = 0;
  if (isLateComputed && iv.end) {
    var _due=new Date(iv.end+'T00:00:00'), _now=new Date(); _now.setHours(0,0,0,0);
    daysOver = Math.round((_now-_due)/(1000*60*60*24));
  }

  // Status buttons — ordered for UX: arealis | encours | en_retard | bloque | termine
  var STATUS_ORDER = ['arealis','encours','en_retard','bloque','termine'];

  return (
    <div style={{marginBottom:14}}>

      {/* ── Statut actuel (calculé ou manuel) ── */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,
        padding:'9px 12px',borderRadius:'var(--r-sm)',
        background:effMeta.bg,border:'1.5px solid '+effMeta.dot+'66'}}>
        <span style={{width:10,height:10,borderRadius:'50%',background:effMeta.dot,flexShrink:0,
          boxShadow:'0 0 0 3px '+effMeta.dot+'22'}}></span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:effMeta.dot}}>
            Statut actuel&nbsp;: {effMeta.label}
            {isLateComputed && daysOver>0 && (
              <span style={{fontWeight:500,color:effMeta.text,fontSize:11}}>&nbsp;— {daysOver}&nbsp;jour{daysOver>1?'s':''} de dépassement</span>
            )}
            {isFuture && (
              <span style={{fontWeight:400,color:effMeta.text,fontSize:11}}>&nbsp;— tâche à venir</span>
            )}
          </div>
          {isLateComputed && (
            <div style={{fontSize:11,color:effMeta.text,marginTop:2,lineHeight:1.4}}>
              {iv.status==='en_retard'
                ? 'Statut posé manuellement comme «\u00a0En retard\u00a0».'
                : 'Date de fin dépassée — calculé automatiquement.'}
            </div>
          )}
        </div>
      </div>

      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
        textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>
        Changer le statut
      </div>

      {/* 5 boutons en grille 2+2+1 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
        {STATUS_ORDER.map(function(k, idx){
          var m = STATUS_META[k];
          if (!m) return null;
          var isActive = pendingStatus ? pendingStatus===k : effSt===k;
          var isLast = idx === STATUS_ORDER.length - 1;
          return (
            <button key={k}
              disabled={saving}
              onClick={function(){ setPendingStatus(k); setNoteText(''); setSaved(false); setError(''); }}
              style={{
                gridColumn: isLast ? '1 / -1' : undefined,
                padding:'10px 8px',
                borderRadius:'var(--r-sm)',
                border:'1.5px solid '+(isActive?m.dot:'var(--border)'),
                background:isActive?m.bg:'var(--surface)',
                cursor:saving?'wait':'pointer',
                fontSize:12, fontWeight:isActive?700:500,
                color:isActive?m.dot:'var(--text)',
                opacity:saving?.65:1,
                display:'flex',alignItems:'center',justifyContent:'center',gap:7,
                transition:'all .15s',fontFamily:"'DM Sans',sans-serif",
                boxShadow:isActive?('0 0 0 2px '+m.dot+'28,inset 0 0 0 1px '+m.dot+'18'):'none',
                textAlign:'center',
              }}>
              <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,
                flexShrink:0,boxShadow:isActive?'0 0 0 3px '+m.dot+'22':'none'}}></span>
              {m.label}
              {k==='en_retard' && !isLateComputed && !isActive && (
                <span style={{fontSize:9,opacity:.6,fontWeight:400}}>(manuel)</span>
              )}
            </button>
          );
        })}
      </div>

      {pendingStatus && !saved && (
        <div style={{marginTop:10,padding:'12px',background:'var(--surface-2)',
          border:'1.5px solid '+(m2?m2.dot:'var(--border)'),borderRadius:'var(--r-sm)'}}>
          <div style={{fontSize:11,fontWeight:700,color:m2?m2.dot:'var(--muted)',
            marginBottom:8,fontFamily:"'DM Mono',monospace"}}>
            {m2?m2.label:'?'}&nbsp;— note optionnelle
          </div>
          <textarea value={noteText} disabled={saving}
            onChange={function(e){ setNoteText(e.target.value); }}
            placeholder="Ajouter un commentaire (cause du retard, prochaine action…)"
            style={{width:'100%',padding:'9px 11px',border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)',fontSize:13,fontFamily:"'DM Sans',sans-serif",
              color:'var(--text)',background:'var(--surface)',resize:'vertical',
              minHeight:64,marginBottom:10,opacity:saving?.7:1}}
          />
          {error&&<div style={{fontSize:12,color:'var(--danger)',fontWeight:600,
            marginBottom:8,lineHeight:1.4}}>{error}</div>}
          <div style={{display:'flex',gap:8}}>
            <button onClick={confirm} disabled={saving}
              style={{flex:1,padding:'10px',borderRadius:'var(--r-sm)',border:'none',
                background:m2?m2.dot:'var(--primary)',color:'#fff',fontSize:13,fontWeight:700,
                cursor:saving?'wait':'pointer',opacity:saving?.7:1,
                fontFamily:"'DM Sans',sans-serif"}}>
              {saving?'Enregistrement…':'Confirmer'}
            </button>
            <button onClick={cancel} disabled={saving}
              style={{padding:'10px 14px',borderRadius:'var(--r-sm)',
                border:'1px solid var(--border)',background:'var(--surface)',
                color:'var(--muted)',fontSize:13,cursor:saving?'wait':'pointer',
                opacity:saving?.6:1,fontFamily:"'DM Sans',sans-serif"}}>
              Annuler
            </button>
          </div>
        </div>
      )}
      {saved&&(
        <div style={{marginTop:8,padding:'8px 12px',background:'var(--success-l)',
          borderRadius:'var(--r-sm)',fontSize:12,color:'var(--success)',
          fontWeight:600,textAlign:'center'}}>Statut sauvegardé ✓</div>
      )}
    </div>
  );
}


function ChangeRequestStatusBadge({ status }) {

function changeRequestValueText(field, value) {
  if (value == null || value === '') return '—';
  if (field && field.type === 'date') return fmtDate(String(value));
  return String(value);
}

function getChangeRequestValue(req, field, mode) {
  if (!req || !field) return '';
  if (mode === 'old') return req[field.oldKey] || '';
  if (mode === 'final') return req[field.finalKey] || req[field.newKey] || '';
  return req[field.newKey] || '';
}

function valuesDiffer(a, b) {
  return String(a == null ? '' : a).trim() !== String(b == null ? '' : b).trim();
}

function getRequestChangedFields(req) {
  return TASK_CHANGE_FIELDS.filter(function(f){
    return valuesDiffer(req[f.oldKey], req[f.newKey]);
  });
}

function buildRequestFormFromTask(iv) {
  return {
    start: iv.start || '',
    end: iv.end || iv.start || '',
    task: iv.task || '',
    prereq: iv.prereq || '',
    notes: iv.notes || ''
  };
}

function buildRequestFormFromRequest(req) {
  return {
    start: req.final_start_date || req.new_start_date || '',
    end: req.final_end_date || req.new_end_date || req.new_start_date || '',
    task: req.final_task || req.new_task || '',
    prereq: req.final_prereq || req.new_prereq || '',
    notes: req.final_notes || req.new_notes || ''
  };
}

function taskChangeWindowText(iv) {
  if (!iv) return '';
  var min = iv.company_edit_start_min || '';
  var max = iv.company_edit_end_max || '';
  if (min && max) return 'Date au plus tôt pour démarrer la tâche : '+fmtDate(min)+'. Date au plus tard pour finir la tâche : '+fmtDate(max)+'.';
  if (min) return 'Date au plus tôt pour démarrer la tâche : '+fmtDate(min)+'.';
  if (max) return 'Date au plus tard pour finir la tâche : '+fmtDate(max)+'.';
  return 'Aucune borne de date définie par l’admin.';
}

function isDateOutsideTaskChangeWindow(iv, ds) {
  if (!ds || !iv) return false;
  if (iv.company_edit_start_min && ds < iv.company_edit_start_min) return true;
  if (iv.company_edit_end_max && ds > iv.company_edit_end_max) return true;
  return false;
}

function validateCompanyDateProposal(iv, form) {
  if (!form) return '';
  if (form.start && form.end && form.end < form.start) {
    return 'La date de fin ne peut pas être avant la date de début.';
  }
  if (isDateOutsideTaskChangeWindow(iv, form.start)) {
    return 'La date de début proposée doit respecter la fenêtre autorisée par l’admin : '+taskChangeWindowText(iv);
  }
  if (isDateOutsideTaskChangeWindow(iv, form.end)) {
    return 'La date de fin proposée doit respecter la fenêtre autorisée par l’admin : '+taskChangeWindowText(iv);
  }
  return '';
}

function CompanyChangeRequestForm({ iv, onSubmit, busy }) {
  const [openForm, setOpenForm] = useState(false);
  const [form, setForm] = useState(buildRequestFormFromTask(iv));
  const [error, setError] = useState('');

  useEffect(function(){
    setForm(buildRequestFormFromTask(iv));
    setError('');
    setOpenForm(false);
  }, [iv.id, iv.updated_at]);

  function setField(key, value) {
    setForm(function(prev){ return Object.assign({}, prev, {[key]: value}); });
    setError('');
  }

  function changedFields() {
    return TASK_CHANGE_FIELDS.filter(function(f){
      return valuesDiffer(iv[f.key] || '', form[f.key] || '');
    });
  }

  function submit() {
    var changes = changedFields();
    if (!changes.length) {
      setError('Aucune modification détectée.');
      return;
    }
    var dateError = validateCompanyDateProposal(iv, form);
    if (dateError) {
      setError(dateError);
      return;
    }
    onSubmit(iv, form)
      .then(function(){ setOpenForm(false); })
      .catch(function(e){ setError((e && e.message) || 'Erreur lors de l’envoi.'); });
  }

  if (!openForm) {
    return (
      <button onClick={function(){setOpenForm(true);}} style={{...btnPrimaryStyle,width:'100%',marginTop:8,marginBottom:8}}>
        Demander une modification
      </button>
    );
  }

  var changes = changedFields();

  return (
    <div style={{border:'1px solid var(--border)',background:'var(--surface-2)',
      borderRadius:'var(--r-sm)',padding:12,marginTop:10,marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:4}}>
        Demande de modification entreprise
      </div>
      <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.45,marginBottom:12}}>
        Vous pouvez proposer une modification sur les dates, le descriptif, les pré-requis et les notes.
        La zone, le niveau, l’entreprise et le corps de métier restent verrouillés.
        <br/><b>{taskChangeWindowText(iv)}</b>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <Field label="Date de début">
          <Input type="date" value={form.start} min={iv.company_edit_start_min || undefined} max={iv.company_edit_end_max || undefined} onChange={function(e){setField('start', e.target.value);}} />
        </Field>
        <Field label="Date de fin">
          <Input type="date" value={form.end} min={iv.company_edit_start_min || undefined} max={iv.company_edit_end_max || undefined} onChange={function(e){setField('end', e.target.value);}} />
        </Field>
      </div>
      <Field label="Descriptif">
        <Textarea rows={3} value={form.task} onChange={function(e){setField('task', e.target.value);}} />
      </Field>
      <Field label="Pré-requis">
        <Textarea rows={2} value={form.prereq} onChange={function(e){setField('prereq', e.target.value);}} />
      </Field>
      <Field label="Notes">
        <Textarea rows={2} value={form.notes} onChange={function(e){setField('notes', e.target.value);}} />
      </Field>

      <div style={{fontSize:11,color:changes.length?'var(--primary)':'var(--xmuted)',
        fontFamily:"'DM Mono',monospace",marginBottom:8}}>
        {changes.length ? changes.length+' champ'+(changes.length>1?'s':'')+' modifié'+(changes.length>1?'s':'') : 'Aucun champ modifié'}
      </div>
      {error && <div style={{fontSize:12,color:'var(--danger)',fontWeight:700,marginBottom:8}}>{error}</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={submit} disabled={busy} style={{...btnPrimaryStyle,flex:1,opacity:busy ? .7 : 1}}>
          {busy?'Envoi…':'Envoyer à l’admin'}
        </button>
        <button onClick={function(){setOpenForm(false);setError('');setForm(buildRequestFormFromTask(iv));}}
          disabled={busy} style={{...btnSecStyle,flex:'0 0 110px'}}>
          Annuler
        </button>
      </div>
    </div>
  );
}

function ChangeRequestPanel({ iv, taskRequests, session, onSubmit, onReview, busy, canRequestTaskChange }) {
  var requests = (taskRequests || []).slice().sort(function(a,b){
    return String(b.created_at||'').localeCompare(String(a.created_at||''));
  });

function fmtStatusNoteDate(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleString('fr-FR', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  } catch(e) { return s; }
}
function normalizeStatusNoteText(v) {
  return String(v == null ? '' : v).trim().replace(/\s+/g, ' ').toLowerCase();
}
function taskStatusNoteItems(iv, history, taskLogs) {
  if (!iv) return [];
  var taskId = iv.id;
  var taskNumber = iv.task_number || '';
  var eventItems = (history || []).filter(function(ev){
    return ev && ev.event_type === 'status_change'
      && ev.note && String(ev.note).trim()
      && (ev.task_id === taskId || (taskNumber && ev.task_number === taskNumber));
  }).map(function(ev){
    return {
      id: ev.id || ('event_'+ev.created_at+'_'+ev.note),
      source: 'planning_events',
      task_id: ev.task_id || taskId,
      task_number: ev.task_number || taskNumber,
      created_at: ev.created_at || '',
      author: ev.actor_name || ev.actor_company || 'Utilisateur',
      old_status: ev.old_status || '',
      new_status: ev.new_status || '',
      note: String(ev.note || '').trim()
    };
  });

  var eventNoteTexts = new Set(eventItems.map(function(x){ return normalizeStatusNoteText(x.note); }));
  var logItems = (taskLogs || []).filter(function(log){
    var msg = log && log.message ? String(log.message).trim() : '';
    return msg && log.task_id === taskId && !eventNoteTexts.has(normalizeStatusNoteText(msg));
  }).map(function(log){
    var st = STATUS_META[log.type] ? STATUS_META[log.type].label : (log.type || 'Statut');
    return {
      id: log.id || ('log_'+log.created_at+'_'+log.message),
      source: 'task_logs',
      task_id: log.task_id || taskId,
      task_number: taskNumber,
      created_at: log.created_at || '',
      author: log.author || log.company || 'Utilisateur',
      old_status: '',
      new_status: st,
      note: String(log.message || '').trim()
    };
  });

  return eventItems.concat(logItems).sort(function(a,b){
    return String(b.created_at || '').localeCompare(String(a.created_at || ''));
  }).slice(0, 12);
}

function FrozenDaysField({ form, set }) {
  // Build list of all dates in the intervention range, including weekends.
  // Weekends can be automatically frozen when they are inside a long task range.
  var start = form.start, end = form.end||form.start;
  if (!start) return (
    <div style={{fontSize:11,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",padding:'8px 0'}}>
      Saisissez d’abord une date de début
    </div>
  );

  var dates = [];
  var cur = new Date(start+'T00:00:00');
  var endD = new Date((end||start)+'T00:00:00');
  var safety = 0;
  while (cur <= endD && safety < 180) {
    var ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    dates.push(ds);
    cur.setDate(cur.getDate()+1);
    safety++;
  }

  if (!dates.length) return null;

  var offs = form.off_days || [];
  var autoWeekendOffs = form._auto_weekend_off_days || [];
  var DAY_SHORT = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
  var MONTHS_SHORT = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

  function toggle(ds) {
    var active = offs.includes(ds);
    if (active) {
      set('off_days', offs.filter(function(x){return x!==ds;}));
      if (autoWeekendOffs.includes(ds)) {
        set('_auto_weekend_off_days', autoWeekendOffs.filter(function(x){return x!==ds;}));
      }
    } else {
      set('off_days', [...offs, ds]);
    }
  }

  return (
    <div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
        {dates.map(function(ds) {
          var d = new Date(ds+'T00:00:00');
          var dow = d.getDay();
          var weekend = dow === 0 || dow === 6;
          var active = offs.includes(ds);
          var auto = autoWeekendOffs.includes(ds);
          return (
            <button key={ds} type="button" onClick={function(){toggle(ds);}}
              title={auto?'Week-end gelé automatiquement par défaut':''}
              style={{display:'flex',flexDirection:'column',alignItems:'center',
                padding:'6px 8px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',
                border:'1.5px solid '+(active?'var(--danger)':weekend?'rgba(245,158,11,.55)':'var(--border)'),
                background:active?'var(--danger-l)':weekend?'rgba(245,158,11,.08)':'var(--surface)',
                color:active?'var(--danger)':weekend?'#B45309':'var(--muted)',
                minWidth:36,fontFamily:"'DM Sans',sans-serif",transition:'all .15s'}}>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{DAY_SHORT[d.getDay()]}</span>
              <span>{d.getDate()}</span>
              <span style={{fontSize:9,opacity:.7,fontFamily:"'DM Mono',monospace"}}>{MONTHS_SHORT[d.getMonth()]}</span>
              {auto&&<span style={{fontSize:7,marginTop:1,fontFamily:"'DM Mono',monospace"}}>auto</span>}
            </button>
          );
        })}
      </div>
      {offs.length > 0 && (
        <div style={{fontSize:10,color:'var(--danger)',fontFamily:"'DM Mono',monospace",marginTop:2}}>
          {offs.length} jour{offs.length>1?'s':''} gelé{offs.length>1?'s':''}
          {autoWeekendOffs.length>0&&<span style={{color:'var(--xmuted)'}}> · week-end gelé par défaut</span>}
          {' — '}
          <span style={{cursor:'pointer',textDecoration:'underline'}}
            onClick={function(){set('off_days',[]);set('_auto_weekend_off_days',[]);}}>tout effacer</span>
        </div>
      )}
      {offs.length === 0 && (
        <div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>
          Cliquez les jours à exclure du planning. Les week-ends traversés par une tâche longue sont gelés par défaut.
        </div>
      )}
    </div>
  );
}



function TaskPlanningPickerOverlay({ open, label, selectedIds, onChange, data, zones, trades, currentId, onClose }) {
  const currentTask = (data || []).find(function(t){ return t && t.id === currentId; }) || null;
  const focusDate = currentTask && (currentTask.start || currentTask.end) ? (currentTask.start || currentTask.end) : dateStr(new Date());

  function mondayOfDate(ds) {
    var d = ds ? new Date(ds + 'T00:00:00') : new Date();
    d.setHours(0,0,0,0);
    var day = d.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
  }
  function offsetForDate(ds) {
    var base = getMonday(0);
    var target = mondayOfDate(ds);
    return Math.round((target - base) / (7 * 24 * 3600 * 1000));
  }

  const [weekOffset, setWeekOffset] = React.useState(function(){ return offsetForDate(focusDate); });
  const [viewMode, setViewMode] = React.useState('1s');
  const [showWeekends, setShowWeekends] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const [draftIds, setDraftIds] = React.useState(function(){ return normalizeTaskLinkIds(selectedIds); });

  React.useEffect(function(){
    if (!open) return;
    setDraftIds(normalizeTaskLinkIds(selectedIds));
    setViewMode('1s');
    setShowWeekends(false);
    setSearch('');
    setWeekOffset(offsetForDate(focusDate));
  }, [open, currentId, focusDate]);

  if (!open) return null;

  var maxWeeks = 1;
  if (viewMode === 'tout') {
    var startMonday = getMonday(weekOffset);
    (zones || []).forEach(function(z){
      if (z && z.deadline) {
        var d = new Date(z.deadline + 'T00:00:00');
        var w = Math.ceil((d - startMonday) / (7 * 24 * 3600 * 1000)) + 1;
        if (w > maxWeeks) maxWeeks = w;
      }
    });
    (data || []).forEach(function(iv){
      if (iv && iv.end) {
        var d = new Date(iv.end + 'T00:00:00');
        var w = Math.ceil((d - startMonday) / (7 * 24 * 3600 * 1000)) + 1;
        if (w > maxWeeks) maxWeeks = w;
      }
    });
    maxWeeks = Math.max(1, Math.min(maxWeeks, 16));
  }
  const weeks = viewMode === 'tout' ? maxWeeks : viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const days = multiWeekDays(weekOffset, weeks, !!showWeekends);
  const q = search.trim().toLowerCase();
  const ids = normalizeTaskLinkIds(draftIds);
  const visibleTasks = (data || []).filter(function(t){
    if (!t || t.id === currentId || !t.task_number) return false;
    if (!q) return true;
    return String(t.task_number||'').toLowerCase().includes(q)
      || String(t.company||'').toLowerCase().includes(q)
      || String(t.task||'').toLowerCase().includes(q)
      || String(t.prereq||'').toLowerCase().includes(q)
      || String(t.notes||'').toLowerCase().includes(q);
  });

  function toggle(id) {
    var next = ids.includes(id) ? ids.filter(function(x){ return x !== id; }) : ids.concat([id]);
    setDraftIds(uniqueTaskIds(next));
  }
  function selectedTasks() {
    return ids.map(function(id){ return (data || []).find(function(t){ return t.id === id; }); }).filter(Boolean);
  }
  function cellTasks(zone, day) {
    return visibleTasks.filter(function(iv){
      return iv.zone === zone.id && isTaskActiveOn(iv, day);
    }).sort(function(a,b){ return (a.start||'').localeCompare(b.start||'') || (a.task_number||'').localeCompare(b.task_number||''); });
  }

    if (!value) return;
    setWeekOffset(offsetForDate(value));
  }

    onClose();

    setDraftIds(normalizeTaskLinkIds(selectedIds));
    onClose();

  const viewButtons = [
    {key:'1s', label:'1S'},
    {key:'2s', label:'2S'},
    {key:'3s', label:'3S'},
    {key:'tout', label:'Tout'}

    <div style={{position:'fixed',inset:0,zIndex:420,background:'rgba(0,0,0,.55)',display:'flex',flexDirection:'column'}}>

        <div style={{minWidth:190,flex:'1 1 260px'}}>
          <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:'.09em',textTransform:'uppercase',color:'rgba(255,255,255,.55)'}}>Sélection sur planning</div>

          <div style={{fontSize:10,color:'rgba(255,255,255,.6)',fontFamily:"'DM Mono',monospace",marginTop:2}}>

        <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'4px 6px'}}>
          <button type="button" onClick={function(){setWeekOffset(function(o){return o-1;});}} style={hdrBtnStyle}>‹</button>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,.75)',minWidth:115,textAlign:'center'}}>{periodLabel}</span>
          <button type="button" onClick={function(){setWeekOffset(function(o){return o+1;});}} style={hdrBtnStyle}>›</button>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:3}}>
          {viewButtons.map(function(v){
            return <button key={v.key} type="button" onClick={function(){setViewMode(v.key);}} style={{...hdrBtnStyle,height:24,minWidth:v.key==='tout'?44:32,borderRadius:6,background:viewMode===v.key?'rgba(255,255,255,.92)':'transparent',color:viewMode===v.key?'var(--hdr)':'rgba(255,255,255,.70)',border:'1px solid '+(viewMode===v.key?'rgba(255,255,255,.9)':'transparent'),fontFamily:"'DM Mono',monospace",fontWeight:900}}>{v.label}</button>;
          })}
        </div>

        <button type="button" onClick={function(){setShowWeekends(function(v){return !v;});}} title={showWeekends?'Masquer les week-ends':'Afficher les week-ends'}
          style={{...hdrBtnStyle,height:30,minWidth:42,borderRadius:7,background:showWeekends?'rgba(96,165,250,.22)':'rgba(255,255,255,.08)',border:'1px solid '+(showWeekends?'rgba(147,197,253,.55)':'rgba(255,255,255,.14)'),fontFamily:"'DM Mono',monospace",color:showWeekends?'#BFDBFE':'rgba(255,255,255,.7)'}}>
          {showWeekends?'7J':'5J'}
        </button>

        <button type="button" onClick={jumpToTaskDate} style={{...hdrBtnStyle,height:30,borderRadius:7,minWidth:84,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',fontFamily:"'DM Mono',monospace"}}>Date tâche</button>

        <label style={{display:'flex',alignItems:'center',gap:5,height:30,padding:'0 7px',borderRadius:7,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',fontSize:10,color:'rgba(255,255,255,.62)',fontFamily:"'DM Mono',monospace"}}>
          Aller au
          <input type="date" defaultValue={focusDate} onChange={function(e){goToDate(e.target.value);}} style={{height:22,border:'none',borderRadius:5,padding:'0 5px',fontSize:10,fontFamily:"'DM Mono',monospace",outline:'none'}} />
        </label>

        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Filtrer code, entreprise, tâche…" style={{height:30,flex:'1 1 210px',border:'1px solid rgba(255,255,255,.20)',borderRadius:7,background:'rgba(255,255,255,.08)',color:'#fff',padding:'0 10px',fontSize:12,outline:'none'}} />

        <button type="button" onClick={validateSelection} style={{...hdrBtnStyle,background:'rgba(255,255,255,.92)',color:'var(--hdr)',borderRadius:7,minWidth:76,height:30,fontWeight:900}}>Valider</button>
        <button type="button" onClick={cancelSelection} style={{...hdrBtnStyle,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.84)',border:'1px solid rgba(255,255,255,.18)',borderRadius:7,minWidth:76,height:30,fontWeight:900}}>Annuler</button>

      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'8px 12px',display:'flex',gap:6,alignItems:'center',overflowX:'auto'}}>
        <span style={{fontSize:11,color:'var(--muted)',fontWeight:800,whiteSpace:'nowrap'}}>Sélection :</span>
        {selectedTasks().length ? selectedTasks().map(function(t){
          return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} title="Retirer" style={{border:'1px solid rgba(202,138,4,.30)',background:'rgba(202,138,4,.10)',color:'#92400E',borderRadius:20,padding:'4px 8px',fontSize:10,fontWeight:900,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{t.task_number || t.id} ×</button>;
        }) : <span style={{fontSize:11,color:'var(--xmuted)'}}>Aucune tâche sélectionnée.</span>}
        <button type="button" onClick={function(){setDraftIds([]);}} disabled={!ids.length} style={{marginLeft:'auto',border:'1px solid var(--border)',background:ids.length?'var(--surface-2)':'transparent',color:ids.length?'var(--muted)':'var(--xmuted)',borderRadius:7,padding:'5px 8px',fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace",cursor:ids.length?'pointer':'not-allowed',whiteSpace:'nowrap'}}>Vider la sélection</button>
      </div>

      <div style={{flex:1,overflow:'auto',background:'var(--bg)',padding:10}}>
        <div style={{minWidth:Math.max(860, 92 + days.length * 130),background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
            <colgroup><col style={{width:92}} />{days.map(function(_,i){return <col key={i} style={{width:130}} />;})}</colgroup>
            <thead>
              <tr style={{background:'var(--surface-2)',borderBottom:'2px solid var(--border)'}}>
                <th style={{padding:'8px 6px',fontSize:10,color:'var(--muted)',fontFamily:"'DM Mono',monospace",textAlign:'left',position:'sticky',left:0,zIndex:5,background:'var(--surface-2)'}}>Zone</th>
                {days.map(function(d){
                  var ds = dateStr(d);
                  var isFocus = ds === focusDate;
                  return <th key={ds} style={{padding:'7px 4px',textAlign:'center',borderLeft:'1px solid var(--border)',fontSize:10,color:isFocus?'#9A3412':isToday(d)?'var(--primary)':'var(--muted)',fontFamily:"'DM Mono',monospace",background:isFocus?'rgba(234,88,12,.12)':isToday(d)?'var(--primary-l)':'var(--surface-2)'}}>
                    {['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()]}<br/><b>{String(d.getDate()).padStart(2,'0')}/{String(d.getMonth()+1).padStart(2,'0')}</b>
                    {isFocus && <div style={{fontSize:7,marginTop:2,fontWeight:900,color:'#9A3412'}}>DATE TÂCHE</div>}
                  </th>;
                })}
              </tr>
            </thead>
            <tbody>
              {(zones || []).map(function(zone){
                var fc = getZoneFloorColor(zone, zones);
                return <tr key={zone.id} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 6px',borderRight:'3px solid '+fc,background:fc+'12',verticalAlign:'top',position:'sticky',left:0,zIndex:4}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:900,color:fc}}>{zone.short}</div>
                    <div style={{fontSize:9,color:'var(--xmuted)',marginTop:2}}>{zone.floor}</div>
                  </td>
                  {days.map(function(day){
                    var ds = dateStr(day);
                    var cards = cellTasks(zone, day);
                    var isFocus = ds === focusDate;
                    return <td key={zone.id+'_'+ds} style={{height:74,verticalAlign:'top',padding:4,borderLeft:'1px solid var(--border)',background:isFocus?'rgba(234,88,12,.08)':isToday(day)?'var(--primary-l)':'transparent'}}>
                      {cards.length ? cards.map(function(iv){
                        var tr = (trades || []).find(function(t){ return t.id === iv.trade; });
                        var col = getTC(tr ? tr.color : 'blue');
                        var active = ids.includes(iv.id);
                        return <button key={iv.id} type="button" onClick={function(){toggle(iv.id);}} style={{width:'100%',display:'block',textAlign:'left',border:'1px solid '+(active?'var(--primary)':col.b+'35'),borderLeft:'4px solid '+(active?'var(--primary)':col.b),background:active?'var(--primary-l)':col.bg,borderRadius:7,padding:'5px 6px',marginBottom:4,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",boxShadow:active?'0 0 0 1px var(--primary) inset':'none'}}>
                          <div style={{display:'flex',justifyContent:'space-between',gap:4,alignItems:'center'}}>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:900,color:active?'var(--primary)':col.t}}>{iv.task_number}</span>
                            <span style={{fontSize:10,fontWeight:900,color:active?'var(--primary)':col.t}}>{active?'✓':''}</span>
                          </div>
                          <div style={{fontSize:10,fontWeight:800,color:col.t,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{iv.company}</div>
                          <div style={{fontSize:9,color:col.t,opacity:.8,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{iv.task}</div>
                          <div style={{fontSize:8,color:active?'var(--primary)':'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{fmtDate(iv.start)}{iv.end&&iv.end!==iv.start?' → '+fmtDate(iv.end):''}</div>
                        </button>;
                      }) : <div style={{fontSize:9,color:'var(--xmuted)',textAlign:'center',paddingTop:18}}>—</div>}
                    </td>;
                  })}
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TaskLinksPicker({ label, hint, selectedIds, onChange, data, zones, trades, currentId }) {
  var [open, setOpen] = React.useState(false);
  var [planningOpen, setPlanningOpen] = React.useState(false);
  var [search, setSearch] = React.useState('');
  var ids = normalizeTaskLinkIds(selectedIds);
  var selected = ids.map(function(id){ return (data || []).find(function(t){ return t.id === id; }); }).filter(Boolean);
  var candidates = (data || []).filter(function(t){ return t && t.id !== currentId && t.task_number; });
  var q = search.trim().toLowerCase();
  if (q) candidates = candidates.filter(function(t){ return String(t.task_number||'').toLowerCase().includes(q)||String(t.company||'').toLowerCase().includes(q)||String(t.task||'').toLowerCase().includes(q); });
  candidates = candidates.sort(function(a,b){ return (a.start||'').localeCompare(b.start||'') || (a.task_number||'').localeCompare(b.task_number||''); });
  function toggle(id){ var next = ids.includes(id) ? ids.filter(function(x){return x!==id;}) : ids.concat([id]); onChange(uniqueTaskIds(next)); }
  return (
    <div style={{border:'1px solid var(--border)',background:'var(--surface-2)',borderRadius:'var(--r-sm)',padding:10,marginBottom:13}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:7}}>
        <div><div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{label}</div>{hint&&<div style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{hint}</div>}</div>
        <div style={{display:'flex',gap:5,flexShrink:0}}>
          <button type="button" onClick={function(){setOpen(!open);}} style={{...miniBtn,background:open?'var(--primary)':'var(--surface)',color:open?'#fff':'var(--muted)',borderColor:open?'var(--primary)':'var(--border)'}}>{open?'Fermer':'Liste'}</button>
          <button type="button" onClick={function(){setPlanningOpen(true);}} style={{...miniBtn,background:'var(--surface)',color:'var(--primary)',borderColor:'var(--primary)'}}>Vue planning</button>
        </div>
      </div>
      {selected.length>0 ? <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:open?8:0}}>{selected.map(function(t){return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} title="Retirer" style={{border:'1px solid rgba(202,138,4,.30)',background:'rgba(202,138,4,.10)',color:'#92400E',borderRadius:20,padding:'3px 8px',fontSize:10,fontWeight:800,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>{t.task_number||t.id} ×</button>;})}</div> : <div style={{fontSize:11,color:'var(--xmuted)',marginBottom:open?8:0}}>Aucune tâche sélectionnée.</div>}
      {open&&<div><Input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Rechercher par code, entreprise ou tâche…" style={{fontSize:12,padding:'8px 10px',marginBottom:8}} /><div style={{maxHeight:220,overflowY:'auto',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',background:'var(--surface)'}}>{candidates.length===0?<div style={{padding:10,fontSize:12,color:'var(--muted)'}}>Aucune tâche disponible.</div>:candidates.map(function(t){var active=ids.includes(t.id);return <button key={t.id} type="button" onClick={function(){toggle(t.id);}} style={{width:'100%',display:'flex',alignItems:'flex-start',gap:8,textAlign:'left',padding:'8px 10px',border:'none',borderBottom:'1px solid var(--border)',background:active?'var(--primary-l)':'transparent',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}><span style={{width:16,height:16,borderRadius:4,border:'1px solid '+(active?'var(--primary)':'var(--border-s)'),background:active?'var(--primary)':'var(--surface)',color:'#fff',fontSize:11,lineHeight:'16px',textAlign:'center',flexShrink:0}}>{active?'✓':''}</span><span style={{minWidth:0}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:900,color:active?'var(--primary)':'var(--xmuted)',marginRight:6}}>{t.task_number}</span><span style={{fontSize:11,fontWeight:800,color:'var(--text)'}}>{t.company}</span><span style={{display:'block',fontSize:11,color:'var(--muted)',lineHeight:1.35,marginTop:2,overflow:'hidden',textOverflow:'ellipsis'}}>{t.task}</span><span style={{display:'block',fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{fmtDate(t.start)}{t.end&&t.end!==t.start?' → '+fmtDate(t.end):''}</span></span></button>;})}</div></div>}
      <TaskPlanningPickerOverlay open={planningOpen} label={label} selectedIds={ids} onChange={onChange} data={data} zones={zones || []} trades={trades || []} currentId={currentId} onClose={function(){setPlanningOpen(false);}} />
    </div>
  );
}
