      await sbFetchSilent('POST','notifications',[{
        company:'Admin',
        task_id:iv.id,
        message:'Modification demandée par '+session.company.name+' · '+(iv.task_number||iv.task),
        read:false
      }]).catch(function(){});
      notify('Demande envoyée à l’admin ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur demande de modification','error',4200);
      throw e;
    } finally {
      setBusyKey('change_request_'+iv.id, false);
    }
  }

  async function handleReviewTaskChangeRequest(req, action, form, comment) {
    if (planningValidated) {
      throw new Error('Planning validé : réindexez une nouvelle version avant traitement.');
    }
    if (!session || session.role !== 'admin') {
      throw new Error('Action réservée à l’admin.');
    }
    if (!req || req.status !== 'pending_admin') {
      throw new Error('Cette demande n’est plus en attente.');
    }
    var iv = data.find(function(i){ return i.id === req.task_id; });
    if (!iv) throw new Error('Tâche introuvable. Actualisez puis réessayez.');

    var nowIso = new Date().toISOString();
    var finalForm = action === 'accept'
      ? {
          start:req.new_start_date || '',
          end:req.new_end_date || req.new_start_date || '',
          task:req.new_task || '',
          prereq:req.new_prereq || '',
          notes:req.new_notes || ''
        }
      : form;

    if (action !== 'refuse' && finalForm.start && finalForm.end && finalForm.end < finalForm.start) {
      throw new Error('La date de fin ne peut pas être avant la date de début.');
    }

    setBusyKey('change_request_'+req.task_id, true);
    try {
      var savedTask = iv;
      if (action !== 'refuse') {
        var patchRow = {
          start_date: finalForm.start || iv.start,
          end_date: finalForm.end || finalForm.start || iv.end || iv.start,
          task: finalForm.task || '',
          prereq: finalForm.prereq || '',
          notes: finalForm.notes || '',
          updated_at: nowIso
        };
        var taskRows = await sbFetchRows('PATCH','interventions',patchRow,conflictQuery(iv.id, iv.updated_at));
        if (iv.updated_at && (!taskRows || !taskRows.length)) {
          await syncAll(false).catch(function(){});
          throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant de valider.');
        }
        savedTask = taskRows && taskRows[0] ? normalizeInterventionRow(taskRows[0]) : Object.assign({}, iv, {
          start:patchRow.start_date,end:patchRow.end_date,task:patchRow.task,
          prereq:patchRow.prereq,notes:patchRow.notes,updated_at:nowIso
        });
        setData(function(prev){ return prev.map(function(i){ return i.id === savedTask.id ? savedTask : i; }); });
      }

      var status = action === 'refuse' ? 'refused' : (action === 'adjust' ? 'adjusted_accepted' : 'accepted');
      var reviewRow = {
        status: status,
        admin_decision: action,
        admin_comment: comment || '',
        reviewed_at: nowIso,
        reviewed_by: actorName(),
        updated_at: nowIso,
        final_start_date: action === 'refuse' ? null : finalForm.start,
        final_end_date: action === 'refuse' ? null : finalForm.end,
        final_task: action === 'refuse' ? null : finalForm.task,
        final_prereq: action === 'refuse' ? null : finalForm.prereq,
        final_notes: action === 'refuse' ? null : finalForm.notes
      };
      var reqRows = await sbFetchRows('PATCH','task_change_requests',reviewRow,eqFilter('id', req.id));
      var savedReq = reqRows && reqRows[0] ? normalizeChangeRequestRow(reqRows[0]) : normalizeChangeRequestRow(Object.assign({}, req, reviewRow));
      setChangeRequests(function(prev){ return (prev||[]).map(function(r){ return r.id === savedReq.id ? savedReq : r; }); });

      await addPlanningEvent({
        event_type: status === 'refused' ? 'task_change_refused' : (status === 'adjusted_accepted' ? 'task_change_adjusted' : 'task_change_accepted'),
        task_id:iv.id,
        task_number:iv.task_number||'',
        task_title:iv.task||'',
        task_company:iv.company||'',
        zone_id:iv.zone||'',
        message:(status === 'refused' ? 'Modification refusée : ' : status === 'adjusted_accepted' ? 'Modification ajustée et validée : ' : 'Modification acceptée : ')+(iv.task_number||iv.task),
        payload:{request:savedReq,intervention:savedTask}
      });
      if (req.requested_by_company) {
        await sbFetchSilent('POST','notifications',[{
          company:req.requested_by_company,
          task_id:iv.id,
          message:(status === 'refused' ? 'Modification refusée' : status === 'adjusted_accepted' ? 'Modification ajustée et validée' : 'Modification acceptée')+' · '+(iv.task_number||iv.task),
          read:false
        }]).catch(function(){});
      }
      if (status !== 'refused' && savedTask && savedTask.prereq && savedTask.prereq_company && String(savedTask.prereq || '') !== String(iv.prereq || '')) {
        var reviewPrereqNotif = {company:savedTask.prereq_company,task_id:savedTask.id,message:'Prérequis / point bloquant mis à jour · '+(savedTask.task_number||savedTask.task)+' · '+savedTask.prereq,read:false};
        await sbFetchSilent('POST','notifications',[reviewPrereqNotif]).catch(function(){});
        setNotifications(function(prev){
          if (session && session.role === 'company' && session.company?.name !== savedTask.prereq_company) return prev;
          return [Object.assign({id:'local_'+Date.now(),created_at:new Date().toISOString()}, reviewPrereqNotif)].concat(prev || []);
        });
      }
      notify(status === 'refused' ? 'Demande refusée ✓' : 'Tâche mise à jour ✓','success');
      return {request:savedReq,intervention:savedTask};
    } catch(e) {
      notify(e.message || 'Erreur traitement demande','error',4200);
      throw e;
    } finally {
      setBusyKey('change_request_'+req.task_id, false);
    }
  }

  function buildDependencyPatchForTask(taskId, beforeTask, savedTask, allTasks) {
    var beforePred = beforeTask ? taskDependencyIds(beforeTask, allTasks, 'predecessor') : [];
    var beforeSucc = beforeTask ? taskDependencyIds(beforeTask, allTasks, 'successor') : [];
    var afterPred = normalizeTaskLinkIds(savedTask.predecessor_ids || savedTask.predecessor_id);
    var afterSucc = normalizeTaskLinkIds(savedTask.successor_ids);
    var touched = uniqueTaskIds(beforePred.concat(beforeSucc).concat(afterPred).concat(afterSucc));
    return touched.filter(function(id){ return id !== savedTask.id; }).map(function(id){
      var t = allTasks.find(function(x){ return x.id === id; }); if (!t) return null;
      var predIds = normalizeTaskLinkIds(t.predecessor_ids || t.predecessor_id);
      var succIds = normalizeTaskLinkIds(t.successor_ids);
      if (afterPred.includes(id)) succIds = uniqueTaskIds(succIds.concat([savedTask.id])); else succIds = succIds.filter(function(x){ return x !== savedTask.id; });
      if (afterSucc.includes(id)) predIds = uniqueTaskIds(predIds.concat([savedTask.id])); else predIds = predIds.filter(function(x){ return x !== savedTask.id; });
      return Object.assign({}, t, {predecessor_ids:predIds, successor_ids:succIds, predecessor_id:predIds[0] || null});
    }).filter(Boolean);
  }

  async function syncTaskDependencyLinks(beforeTask, savedTask) {
    var allTasks = data.map(function(t){ return t.id === savedTask.id ? savedTask : t; });
    if (!allTasks.find(function(t){ return t.id === savedTask.id; })) allTasks = allTasks.concat([savedTask]);
    var patches = buildDependencyPatchForTask(savedTask.id, beforeTask, savedTask, allTasks);
    if (!patches.length) return;
    setData(function(prev){ return prev.map(function(t){ var p = patches.find(function(x){ return x.id === t.id; }); return p ? Object.assign({}, t, {predecessor_ids:p.predecessor_ids, successor_ids:p.successor_ids, predecessor_id:p.predecessor_id}) : t; }); });
    await Promise.all(patches.map(function(t){ return sbFetchSilent('PATCH','interventions',{predecessor_id:t.predecessor_id || null,predecessor_ids:t.predecessor_ids || [],successor_ids:t.successor_ids || [],updated_at:new Date().toISOString()},eqFilter('id', t.id)).catch(function(e){ console.warn('[Planify] dependency sync skipped:', e); }); }));
  }

  // ── Save new/edited task → Supabase ─────────────────────────────────
  async function handleSave(iv) {
    if (!canEditPlanning) {
      var msg = planningValidated ? 'Planning validé : réindexez une nouvelle version pour modifier les tâches.' : 'Planning verrouillé : seules les modifications de statut sont autorisées.';
      alert(msg); throw new Error(msg);
    }
    var existing = data.find(function(i){return i.id===iv.id;});
    var expectedUpdatedAt = iv._expected_updated_at || (existing&&existing.updated_at) || '';
    var cleanIv = Object.assign({}, iv);
    delete cleanIv._expected_updated_at;
    var newUpdatedAt = new Date().toISOString();
    var row = interventionToSupabaseRow(cleanIv, newUpdatedAt);

    setBusyKey('task_save', true);
    try {
      var rows = existing
        ? await sbFetchRows('PATCH','interventions',row,conflictQuery(cleanIv.id, expectedUpdatedAt))
        : await sbFetchRows('POST','interventions',row);
      if (existing && expectedUpdatedAt && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant d’enregistrer.');
      }
      var saved = rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, cleanIv, {updated_at:newUpdatedAt});
      setData(function(prev){
        var idx = prev.findIndex(function(i){return i.id===saved.id;});
        if(idx>=0){ var n=[].concat(prev); n[idx]=saved; return n; }
        return prev.concat([saved]);
      });
      await syncTaskDependencyLinks(existing, saved).catch(function(e){ console.warn('[Planify] dependency links not fully synced:', e); });
      closeModal();
      var z = zones.find(function(x){return x.id===cleanIv.zone;});
      var taskChanges = existing ? buildTaskChangeDetails(existing, saved) : [];
      await addPlanningEvent({
        event_type:existing?'task_updated':'task_created',
        task_id:cleanIv.id,
        task_number:cleanIv.task_number||'',
        task_title:cleanIv.task||'',
        task_company:cleanIv.company||'',
        zone_id:cleanIv.zone||'',
        zone_name:z?z.name:'',
        message:(existing?'Tâche modifiée : ':'Tâche ajoutée : ')+(cleanIv.task_number||cleanIv.task)+(existing&&taskChanges.length?' · '+taskChanges.length+' champ'+(taskChanges.length>1?'s':'')+' modifié'+(taskChanges.length>1?'s':''):''),
        payload:{intervention:saved,changes:taskChanges}
      });
      if (saved.prereq && saved.prereq_company) {
        var previousMention = existing && existing.prereq_company === saved.prereq_company && String(existing.prereq || '') === String(saved.prereq || '');
        if (!previousMention) {
          var prereqNotif = {company:saved.prereq_company,task_id:saved.id,message:'Prérequis / point bloquant assigné · '+(saved.task_number||saved.task)+' · '+saved.prereq,read:false};
          await sbFetchSilent('POST','notifications',[prereqNotif]).catch(function(){});
          setNotifications(function(prev){
            if (session && session.role === 'company' && session.company?.name !== saved.prereq_company) return prev;
            return [Object.assign({id:'local_'+Date.now(),created_at:new Date().toISOString()}, prereqNotif)].concat(prev || []);
          });
        }
      }
      notify('Tâche sauvegardée ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur de sauvegarde','error',4200);
      throw e;
    } finally {
      setBusyKey('task_save', false);
    }
  }

  // ── Delete task → Supabase ───────────────────────────────────────────
  async function handleDelete(id, expectedUpdatedAt) {
    if (!canEditPlanning) {
      var msg = planningValidated ? 'Planning validé : réindexez une nouvelle version pour supprimer une tâche.' : 'Planning verrouillé : suppression désactivée.';
      alert(msg); throw new Error(msg);
    }
    var iv = data.find(function(i){return i.id===id;});
    if (!iv) throw new Error('Tâche introuvable. Actualisez puis réessayez.');
    setBusyKey('task_delete', true);
    try {
      var rows = await sbFetchRows('DELETE','interventions',null,conflictQuery(id, expectedUpdatedAt || iv.updated_at));
      if ((expectedUpdatedAt || iv.updated_at) && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant de supprimer.');
      }
      setData(function(prev){ return prev.filter(function(i){return i.id!==id;}); });
      closeModal();
      await addPlanningEvent({
        event_type:'task_deleted',
        task_id:id,
        task_number:iv.task_number||'',
        task_title:iv.task||'',
        task_company:iv.company||'',
        message:'Tâche supprimée : '+(iv.task_number||iv.task),
        payload:{intervention:iv}
      });
      notify('Tâche supprimée ✓','success');
    } catch(e) {
      notify(e.message || 'Erreur de suppression','error',4200);
      throw e;
    } finally {
      setBusyKey('task_delete', false);
    }
  }

  async function handleReindexPlanning() {
    if (!isAdmin || isBusy('planning_reindex')) return;
    if (!planningValidated) return;
    if (!confirm('Créer une nouvelle version du planning à partir de la version validée/caduque ?')) return;

    var oldVersion = planningVersion || {};
    var nextVersionNumber = (oldVersion.version_number || 1) + 1;
    var snap = currentSnapshot({type:'reindex',source_version_id:oldVersion.id||null});
    setBusyKey('planning_reindex', true);

    try {
      if (oldVersion.id) {
        await sbFetch('PATCH','planning_versions',{
          is_active:false,
          status:'caduc',
          locked:true,
          reindexed_by:actorName(),
          reindexed_at:new Date().toISOString(),
          updated_at:new Date().toISOString()
        },'id=eq.'+oldVersion.id);
      }
      await sbFetch('POST','planning_versions',{
        version_number:nextVersionNumber,
        status:'draft',
        is_active:true,
        locked:false,
        valid_until:null,
        source_version_id:oldVersion.id||null,
        created_by:actorName(),
        snapshot:snap
      });
      await addPlanningEvent({
        event_type:'planning_reindexed',
        message:'Nouvelle version V'+nextVersionNumber+' créée à partir du planning validé/caduque.',
        payload:{source_version_id:oldVersion.id||null,new_version_number:nextVersionNumber,snapshot:snap}
      });
      setPlanningLocked(false);
      setPlanningValidated(false);
      await loadPlanningMeta();
      notify('Nouvelle version créée ✓','success');
    } catch(e) {
      notify('Erreur de réindexation','error');
      throw e;
    } finally {
      setBusyKey('planning_reindex', false);
    }
  }

  // ── Download planning as PDF / XLSX ───────────────────────────────────
  function getExportStartDate(startDate) {
    var fallback = getMonday(weekOffset);
    if (!startDate) return fallback;
    var d = new Date(startDate + 'T00:00:00');
    if (Number.isNaN(d.getTime())) return fallback;
    d.setHours(0,0,0,0);
    return d;
  }

  function addExportDays(date, count) {
    var d = new Date(date);
    d.setDate(d.getDate() + count);
    d.setHours(0,0,0,0);
    return d;
  }

  function uniqSortedOffsets(values) {
    var list = Array.isArray(values) ? values : [0];
    list = list.map(function(x){ return parseInt(x, 10); })
      .filter(function(x){ return !Number.isNaN(x) && x >= 0 && x <= 80; });
    list = Array.from(new Set(list)).sort(function(a,b){ return a-b; });
    return list.length ? list : [0];
  }

  function exportWeekDaysFrom(startDate, weekIndex) {
    var first = addExportDays(getExportStartDate(startDate), weekIndex * 7);
    return Array.from({length:5}, function(_, i){ return addExportDays(first, i); });
  }

  function normalizeExportOptions(rawOptions) {
    var opts = rawOptions && typeof rawOptions === 'object'
      ? Object.assign({}, rawOptions)
      : {startDate:rawOptions};

    var start = getExportStartDate(opts.startDate);
    opts.startDate = dateStr(start);

    var end = opts.endDate ? new Date(opts.endDate + 'T00:00:00') : null;
    if (!end || Number.isNaN(end.getTime())) end = addExportDays(start, 25);
    end.setHours(0,0,0,0);
    if (end < start) end = addExportDays(start, 4);
    opts.endDate = dateStr(end);

    opts.weekOffsets = uniqSortedOffsets(opts.weekOffsets);
    return opts;
  }

  function daysForWeekOffsets(startDate, offsets) {
    return uniqSortedOffsets(offsets).map(function(offset){
      return exportWeekDaysFrom(startDate, offset);
    });
  }

  function daysForCompactWeeks(startDate, weeksPerPage, offsets) {
    var selected = uniqSortedOffsets(offsets);
    var pages = [];
    for (var i = 0; i < selected.length; i += weeksPerPage) {
      var group = selected.slice(i, i + weeksPerPage);
      var days = group.map(function(offset){
        return exportWeekDaysFrom(startDate, offset);
      }).flat();
      if (days.length) pages.push(days);
    }
    return pages.length ? pages : [exportWeekDaysFrom(startDate, 0)];
  }

  function exportDayHasWeekendTask(day) {
    var dow = day.getDay();
    if (dow !== 0 && dow !== 6) return false;
    var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
    return source.some(function(iv){
      return inDay(iv, day) && !(iv.off_days || []).includes(dateStr(day));
    });
  }

  function shouldIncludeOverviewDay(day) {
    var dow = day.getDay();
    if (showWeekends) return true;
    if (dow !== 0 && dow !== 6) return true;
    return exportDayHasWeekendTask(day);
  }

  function daysUntilExportDate(startDate, endDate) {
    var start = getExportStartDate(startDate);
    var end = new Date(endDate + 'T00:00:00');
    if (Number.isNaN(end.getTime()) || end < start) end = addExportDays(start, 4);
    end.setHours(0,0,0,0);

    var days = [];
    var cur = new Date(start);
    var guard = 0;

    while (cur <= end && guard < 180) {
      if (shouldIncludeOverviewDay(cur)) days.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
      cur.setHours(0,0,0,0);
      guard++;
    }

    return [days.length ? days : exportWeekDaysFrom(startDate, 0)];
  }

  function getExportDayPages(mode, rawOptions) {
    var opts = normalizeExportOptions(rawOptions);

    if (mode === 'selected_weeks' || mode === '1s') {
      return daysForWeekOffsets(opts.startDate, opts.weekOffsets);
    }

    if (mode === '2s_page' || mode === '2s') {
      return daysForCompactWeeks(opts.startDate, 2, opts.weekOffsets);
    }

    if (mode === '3s_page' || mode === '3s') {
      return daysForCompactWeeks(opts.startDate, 3, opts.weekOffsets);
    }

    if (mode === 'until_date' || mode === 'tout') {
      return daysUntilExportDate(opts.startDate, opts.endDate);
    }

    return daysForWeekOffsets(opts.startDate, [0]);
  }

  function getExportLabel(mode, rawOptions) {
    var opts = normalizeExportOptions(rawOptions);
    var count = opts.weekOffsets.length;

    if (mode === 'selected_weeks' || mode === '1s') return '1S/page · ' + count + ' sem.';
    if (mode === '2s_page' || mode === '2s') return '2S/page · semaines cochées';
    if (mode === '3s_page' || mode === '3s') return '3S/page · semaines cochées';
    if (mode === 'until_date' || mode === 'tout') return 'Vue globale jusqu’au ' + fmtDate(opts.endDate);

    return String(mode || 'planning').toUpperCase();
  }

  function exportCompanyCode(iv) {
    var tr = trades.find(function(t){ return t.id === iv.trade; });
    if (tr && tr.short) return tr.short;
    if (iv.company) {
      return String(iv.company)
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^A-Za-z0-9]/g,'')
        .slice(0,8)
        .toUpperCase();
    }
    return 'ENT';
  }

  function getPlanningExportRows(mode, rawOptions) {
    var pages = getExportDayPages(mode, rawOptions);
    var days = pages.flat();
    var first = days[0];
    var last = days[days.length - 1];
    var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });

    var rows = source.filter(function(iv){
      return days.some(function(d){ return isTaskActiveOn(iv, d) && !isHoliday(d); });
    }).sort(function(a,b){
      return (a.start||'').localeCompare(b.start||'') ||
             (a.zone||'').localeCompare(b.zone||'') ||
             (a.company||'').localeCompare(b.company||'');
    }).map(function(iv){
      var z = zones.find(function(x){ return x.id === iv.zone; });
      var tr = trades.find(function(x){ return x.id === iv.trade; });
      var st = getStatusThemeMeta(effectiveStatus(iv));

      return {
        zone: z ? z.name : iv.zone,
        zoneShort: z ? z.short : iv.zone,
        floor: z ? z.floor : '',
        trade: tr ? tr.name : iv.trade,
        tradeShort: tr ? tr.short : exportCompanyCode(iv),
        company: iv.company || '',
        companyCode: exportCompanyCode(iv),
        taskNumber: iv.task_number || '',
        task: iv.task || '',
        status: st.label,
        start: fmtDate(iv.start),
        end: fmtDate(iv.end || iv.start),
        prereq: iv.prereq || '',
        impact: iv.impact || '',
        notes: iv.notes || '',
        offDays: (iv.off_days || []).map(fmtDate).join(', '),
      };
    });

    return {rows: rows, first: first, last: last, pages: pages};
  }

  function exportPlanning(format, mode, exportOptions) {
    var pack = getPlanningExportRows(mode, exportOptions);
    var rows = pack.rows;

    if (!rows.length) {
      alert('Aucune tâche à exporter sur cette période.');
      return;
    }

    var period = dateStr(pack.first).replaceAll('-','') + '_' + dateStr(pack.last).replaceAll('-','');
    var label = getExportLabel(mode, exportOptions);
    var safeLabel = String(label)
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^A-Za-z0-9_-]+/g,'_')
      .replace(/^_+|_+$/g,'') || 'planning';

    var fileBase = 'planify_hsf_planning_' + safeLabel + '_' + period;

    var headers = ['Zone','Étage','Code entreprise','Entreprise','Lot','N° tâche','Tâche','Statut','Début','Fin','Prérequis / blocage','Impact','Notes','Jours gelés'];
    var body = rows.map(function(r){ return [
      r.zone, r.floor, r.companyCode, r.company, r.trade, r.taskNumber, r.task, r.status,
      r.start, r.end, r.prereq, r.impact || '', r.notes, r.offDays
    ]; });

    if (format === 'xlsx') {
      if (!window.XLSX) {
        alert('La librairie XLSX n’est pas chargée. Vérifiez la connexion internet puis rechargez la page.');
        return;
      }

      var aoa = [
        ['Planify — HSF 66 Av. Marceau'],
        ['Vue', label, 'Période', fmtDate(dateStr(pack.first)) + ' au ' + fmtDate(dateStr(pack.last))],
        [],
        headers
      ].concat(body);

      var ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [
        {wch:26},{wch:8},{wch:16},{wch:18},{wch:18},{wch:12},{wch:52},
        {wch:14},{wch:12},{wch:12},{wch:32},{wch:32},{wch:32},{wch:20}
      ];

      var wb = XLSX.utils.book_new();
      var sheetName = ('Planning ' + safeLabel).replace(/[^A-Za-z0-9 _-]+/g,'_').slice(0,31) || 'Planning';
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, fileBase + '.xlsx');
      return;
    }

    if (format !== 'pdf') return;

    var JSPDF = window.jspdf && window.jspdf.jsPDF;
    if (!JSPDF) {
      alert('La librairie PDF n’est pas chargée. Vérifiez la connexion internet puis rechargez la page.');
      return;
    }

    var overviewMode = mode === 'until_date' || mode === 'tout';

    function hexToRgb(hex) {
      var h = String(hex || '#999999').replace('#','');
      if (h.length === 3) h = h.split('').map(function(x){ return x + x; }).join('');
      var n = parseInt(h, 16);
      return Number.isNaN(n) ? [153,153,153] : [(n>>16)&255,(n>>8)&255,n&255];
    }

    function mixWhite(rgb, amount) {
      return [
        Math.round(rgb[0] + (255 - rgb[0]) * amount),
        Math.round(rgb[1] + (255 - rgb[1]) * amount),
        Math.round(rgb[2] + (255 - rgb[2]) * amount)
      ];
    }

    function clean(v) {
      return String(v == null ? '' : v).replace(/\s+/g, ' ').trim();
    }

    function ellipsize(text, maxChars) {
      var raw = clean(text);
      if (!maxChars || raw.length <= maxChars) return raw;
      return raw.slice(0, Math.max(0, maxChars - 1)).replace(/\s+$/,'') + '…';
    }

    function statusShort(status) {
      if (status === 'en_retard') return 'En retard';
      if (status === 'encours') return 'En cours';
      if (status === 'termine') return 'Terminé';
      if (status === 'bloque') return 'Bloqué';
      return 'À réaliser';
    }

    function drawWrapped(doc, text, x, y, maxW, maxLines, lineH) {
      var raw = clean(text);
      if (!raw) return 0;
      var lines = doc.splitTextToSize(raw, maxW);
      if (maxLines && lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        lines[lines.length - 1] = lines[lines.length - 1].replace(/\s+$/,'') + '…';
      }
      lines.forEach(function(line, i){
        doc.text(line, x, y + i * lineH);
      });
      return lines.length * lineH;
    }

    function visibleInDay(iv, day) {
      if (!inDay(iv, day)) return false;
      var ds = dateStr(day);
      if ((iv.off_days || []).includes(ds)) return false;
      if (isHoliday(day)) return false;
      return true;
    }

    function tasksForDays(days) {
      var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
      return source.filter(function(iv){ return days.some(function(d){ return visibleInDay(iv, d); }); });
    }

    function deadlineTxt(zone) {
      if (!zone.deadline) return ['—',''];
      var wd = workingDaysUntil(zone.deadline);
      return [wd < 0 ? '▲' : 'J-' + wd, fmtDate(zone.deadline).slice(0,5)];
    }

    function legendItems(days) {
      var source = tasksForDays(days);
      var map = {};
      source.forEach(function(iv){
        var tr = trades.find(function(t){ return t.id === iv.trade; });
        var code = exportCompanyCode(iv);
        var key = code + '|' + (tr ? tr.id : iv.trade);
        if (map[key]) return;
        var col = getTC(tr ? tr.color : 'blue');
        map[key] = { code:code, company:iv.company || '', trade:tr ? tr.name : '', color:col.b };
      });
      return Object.values(map).sort(function(a,b){ return a.code.localeCompare(b.code); });
    }

    function drawLegend(doc, items, x, y, maxW) {
      doc.setFont('helvetica','bold');
      doc.setFontSize(7);
      doc.setTextColor(35,35,35);
      doc.text('LÉGENDE ENTREPRISES', x, y);

      var cx = x;
      var cy = y + 12;
      var rowH = 10;

      items.forEach(function(item) {
        var rgb = hexToRgb(item.color);
        var labelTxt = item.code + ' — ' + item.company + (item.trade ? ' / ' + item.trade : '');
        var w = Math.min(maxW, Math.max(72, doc.getTextWidth(labelTxt) + 18));

        if (cx + w > x + maxW) { cx = x; cy += rowH; }

        doc.setFillColor(rgb[0], rgb[1], rgb[2]);
        doc.roundedRect(cx, cy - 6, 7, 7, 1, 1, 'F');

        doc.setFont('helvetica','normal');
        doc.setFontSize(5.8);
        doc.setTextColor(55,55,55);
        doc.text(labelTxt, cx + 10, cy);

        cx += w + 8;
      });

      cy += rowH + 1;

      doc.setFont('helvetica','normal');
      doc.setFontSize(6);
      doc.setTextColor(90,90,90);
      doc.text('Statuts : badge gris = à réaliser · badge bleu = en cours · badge vert = terminé · badge rouge = bloqué · JF = jour férié.', x, cy);

      return cy + 8;
    }

    var pages = pack.pages && pack.pages.length ? pack.pages : getExportDayPages(mode, exportOptions);
    var maxDayCount = Math.max.apply(null, pages.map(function(p){ return p.length; }));
    var oneWeekMode = !overviewMode && maxDayCount <= 5;
    var twoWeekMode = !overviewMode && maxDayCount > 5 && maxDayCount <= 10;
    var readableMode = oneWeekMode || twoWeekMode;
    var compactMode = !overviewMode && !readableMode;

    function desiredCardHeight() {
      if (overviewMode) return 8.2;
      if (oneWeekMode) return 44;
      if (twoWeekMode) return 38;
      return 13;
    }

    function minZoneRowHeight() {
      if (overviewMode) return 30;
      if (oneWeekMode) return 58;
      if (twoWeekMode) return 50;
      return 28;
    }

    function computePageNeeds(days) {
      var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
      var cardH0 = desiredCardHeight();
      var minRowH0 = minZoneRowHeight();
      var gap0 = overviewMode ? 0.7 : readableMode ? 3 : 1;
      var pad0 = overviewMode ? 8 : readableMode ? 12 : 8;

      var needs = zones.map(function(zone){
        var maxCards = 0;
        days.forEach(function(day){
          if (isHoliday(day)) return;
          var count = source.filter(function(iv){ return iv.zone === zone.id && visibleInDay(iv, day); }).length;
          if (count > maxCards) maxCards = count;
        });
        return Math.max(minRowH0, maxCards ? (maxCards * cardH0 + Math.max(0, maxCards - 1) * gap0 + pad0) : minRowH0);
      });
      return {needs:needs, sum:needs.reduce(function(a,b){ return a + b; }, 0)};
    }

    var pageNeeds = pages.map(computePageNeeds);
    var largestNeedSum = Math.max.apply(null, pageNeeds.map(function(p){ return p.sum; }));

    var baseW = 842;
    var baseH = 595;
    var headerTop = overviewMode ? 48 : readableMode ? 60 : 42;
    var legendH = overviewMode ? 72 : 18;
    var tableHeaderH = overviewMode ? 22 : readableMode ? 32 : 24;

    var customW = overviewMode
      ? Math.max(baseW, 118 + maxDayCount * 38 + 44)
      : oneWeekMode ? 940 : twoWeekMode ? 1120 : baseW;

    var customH = overviewMode
      ? Math.max(baseH, 110 + zones.length * 48 + 92)
      : readableMode ? Math.max(baseH, headerTop + tableHeaderH + largestNeedSum + legendH + 22) : baseH;

    var orientation = customW >= customH ? 'landscape' : 'portrait';
    var doc = new JSPDF({ orientation:orientation, unit:'pt', format:[customW, customH] });

    var dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    var exported = 0;

    pages.forEach(function(days, wi) {
      if (wi > 0) doc.addPage([customW, customH], orientation);

      var pageW = doc.internal.pageSize.getWidth();
      var pageH = doc.internal.pageSize.getHeight();

      var margin = overviewMode ? 14 : readableMode ? 16 : 12;
      var headerH = overviewMode ? 34 : readableMode ? 40 : 30;
      var top = overviewMode ? 48 : readableMode ? 60 : 42;
      var bottom = overviewMode ? legendH : 18;
      var tableW = pageW - margin * 2;
      var zoneW = overviewMode ? 60 : oneWeekMode ? 84 : twoWeekMode ? 76 : 50;
      var finW = overviewMode ? 38 : readableMode ? 48 : 34;
      var th = tableHeaderH;
      var dayCount = Math.max(1, days.length);
      var dayW = (tableW - zoneW - finW) / dayCount;

      var tasksForPage = tasksForDays(days);
      exported += tasksForPage.length;

      var periodLabel = fmtDate(dateStr(days[0])) + ' au ' + fmtDate(dateStr(days[days.length - 1]));
      var sourceForPage = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });

      var maxTableH = pageH - top - bottom;
      var availableRowsH = maxTableH - th;
      var needs = (pageNeeds[wi] && pageNeeds[wi].needs) ? pageNeeds[wi].needs : computePageNeeds(days).needs;
      var needSum = needs.reduce(function(a,b){ return a + b; }, 0) || 1;
      var scale = (!readableMode && needSum > availableRowsH) ? availableRowsH / needSum : 1;
      var rowHeights = needs.map(function(h){ return Math.max(overviewMode ? 22 : compactMode ? 24 : minZoneRowHeight(), h * scale); });
      var tableH = th + rowHeights.reduce(function(a,b){ return a + b; }, 0);

      doc.setFillColor(244,242,238);
      doc.rect(0, 0, pageW, pageH, 'F');

      doc.setFillColor(26,26,26);
      doc.roundedRect(margin, 8, tableW, headerH, 7, 7, 'F');

      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(overviewMode ? 12 : readableMode ? 14 : 11.5);
      doc.text('Planify — HSF 66 Av. Marceau', margin + 10, 24);

      doc.setFont('helvetica','normal');
      doc.setFontSize(overviewMode ? 7 : readableMode ? 9 : 6.7);
      doc.setTextColor(225,225,225);
      doc.text('Période : ' + periodLabel + ' · ' + tasksForPage.length + ' tâche(s)', margin + 10, readableMode ? 40 : 37);

      var x0 = margin;
      var y0 = top;

      doc.setFillColor(255,255,255);
      doc.setDrawColor(150,145,136);
      doc.setLineWidth(1);
      doc.roundedRect(x0, y0, tableW, tableH, 6, 6, 'FD');

      doc.setFillColor(249,248,245);
      doc.rect(x0, y0, zoneW, th, 'F');
      doc.rect(x0 + zoneW + dayCount * dayW, y0, finW, th, 'F');

      doc.setTextColor(70,70,70);
      doc.setFont('helvetica','bold');
      doc.setFontSize(overviewMode ? 7 : readableMode ? 9 : 7.5);
      doc.text('ZONE', x0 + 8, y0 + (readableMode ? 20 : 15));
      doc.text('FIN', x0 + zoneW + dayCount * dayW + 10, y0 + (readableMode ? 20 : 15));

      days.forEach(function(day, di) {
        var x = x0 + zoneW + di * dayW;
        var holiday = isHoliday(day);
        var today = isToday(day);

        if (holiday) doc.setFillColor(209,213,219);
        else if (today) doc.setFillColor(238,242,252);
        else doc.setFillColor(249,248,245);
        doc.rect(x, y0, dayW, th, 'F');

        doc.setFont('helvetica','bold');
        doc.setFontSize(overviewMode ? 5.5 : readableMode ? 8.2 : 7.5);
        doc.setTextColor(today ? 33 : 70, today ? 82 : 70, today ? 200 : 70);
        doc.text(dayNames[day.getDay()].toUpperCase(), x + 5, y0 + (readableMode ? 12 : 9));

        doc.setFont('helvetica','normal');
        doc.setFontSize(overviewMode ? 5.2 : readableMode ? 8 : 7);
        doc.text(String(day.getDate()).padStart(2,'0') + '/' + String(day.getMonth()+1).padStart(2,'0'), x + 5, y0 + (readableMode ? 25 : 18));

        if (holiday) {
          doc.setFont('helvetica','bold');
          doc.setTextColor(70,70,70);
          doc.setFontSize(overviewMode ? 5 : readableMode ? 7 : 6);
          doc.text('JF', x + dayW - 15, y0 + (readableMode ? 19 : 14));
        }
      });

      var currentY = y0 + th;
      var rowBoundaries = [y0, y0 + th];

      zones.forEach(function(zone, zi) {
        var rowH = rowHeights[zi];
        var y = currentY;
        currentY += rowH;
        rowBoundaries.push(currentY);

        var fc = getZoneFloorColor(zone, zones);
        var fcRgb = hexToRgb(fc);
        var rowBg = mixWhite(fcRgb, overviewMode ? 0.95 : 0.96);

        doc.setFillColor(rowBg[0], rowBg[1], rowBg[2]);
        doc.rect(x0, y, tableW, rowH, 'F');

        var zoneBg = mixWhite(fcRgb, 0.88);
        doc.setFillColor(zoneBg[0], zoneBg[1], zoneBg[2]);
        doc.rect(x0, y, zoneW, rowH, 'F');

        doc.setDrawColor(fcRgb[0], fcRgb[1], fcRgb[2]);
        doc.setLineWidth(readableMode ? 3 : 2);
        doc.line(x0 + zoneW - 2, y, x0 + zoneW - 2, y + rowH);

        doc.setTextColor(fcRgb[0], fcRgb[1], fcRgb[2]);
        doc.setFont('helvetica','bold');
        doc.setFontSize(overviewMode ? 6.2 : readableMode ? 8.2 : 7);
        drawWrapped(doc, zone.short || zone.name, x0 + 7, y + (readableMode ? 18 : 14), zoneW - 14, readableMode ? 2 : 2, readableMode ? 9 : 7);

        doc.setFont('helvetica','normal');
        doc.setFontSize(overviewMode ? 5.2 : readableMode ? 7 : 6);
        doc.setTextColor(80,80,80);
        drawWrapped(doc, zone.floor || '', x0 + 7, y + rowH - 9, zoneW - 14, 1, 7);

        days.forEach(function(day, di) {
          var x = x0 + zoneW + di * dayW;
          var ds = dateStr(day);
          var holiday = isHoliday(day);
          var isDeadline = zone.deadline && ds === zone.deadline;

          if (holiday) {
            doc.setFillColor(209,213,219);
            doc.rect(x, y, dayW, rowH, 'F');
          } else if (isDeadline) {
            doc.setFillColor(254,226,226);
            doc.rect(x, y, dayW, rowH, 'F');
          }

          var cards = holiday ? [] : sourceForPage.filter(function(iv){
            return iv.zone === zone.id && visibleInDay(iv, day);
          }).sort(function(a,b){ return (a.priority||3)-(b.priority||3); });

          var cardX = x + (readableMode ? 3 : 1.6);
          var cardY = y + (readableMode ? 5 : 2.4);
          var cardW = dayW - (readableMode ? 6 : 3.2);
          var gap = overviewMode ? 0.7 : readableMode ? 3 : cards.length > 5 ? 0.6 : 1.1;
          var availableH = Math.max(8, rowH - (readableMode ? 10 : 4.5));
          var maxCardH = overviewMode ? 10 : oneWeekMode ? 46 : twoWeekMode ? 40 : 22;
          var minCardH = overviewMode ? 6.8 : oneWeekMode ? 34 : twoWeekMode ? 30 : 8.8;
          var cardH = cards.length ? Math.min(maxCardH, (availableH - Math.max(0, cards.length - 1) * gap) / cards.length) : 0;
          cardH = Math.max(minCardH, cardH);

          cards.forEach(function(iv) {
            var tr = trades.find(function(t){ return t.id === iv.trade; });
            var col = getTC(tr ? tr.color : 'blue');
            var rgb = hexToRgb(col.b);
            var fill = mixWhite(rgb, overviewMode ? 0.90 : 0.88);
            var st = getStatusThemeMeta(effectiveStatus(iv));
            var stRgb = hexToRgb(st.dot);
            var stFill = mixWhite(stRgb, 0.86);

            doc.setFillColor(fill[0], fill[1], fill[2]);
            doc.setDrawColor(rgb[0], rgb[1], rgb[2]);
            doc.setLineWidth(readableMode ? 0.9 : 0.4);
            doc.roundedRect(cardX, cardY, cardW, cardH, readableMode ? 3 : 2, readableMode ? 3 : 2, 'FD');

            doc.setFillColor(rgb[0], rgb[1], rgb[2]);
            doc.rect(cardX, cardY, readableMode ? 4 : 2, cardH, 'F');

            if (overviewMode) {
              doc.setTextColor(rgb[0], rgb[1], rgb[2]);
              doc.setFont('helvetica','bold');
              doc.setFontSize(Math.max(3.8, Math.min(5.2, cardH - 2.2)));
              drawWrapped(doc, exportCompanyCode(iv), cardX + 4, cardY + cardH - 2.2, cardW - 9, 1, 4.8);
              doc.setFillColor(stRgb[0], stRgb[1], stRgb[2]);
              doc.circle(cardX + cardW - 4.8, cardY + 3.6, 1.1, 'F');
            } else {
              var statusLabel = statusShort(effectiveStatus(iv));
              var statusW = readableMode ? 34 : 24;
              var statusH = readableMode ? 10 : 7;

              doc.setFillColor(stFill[0], stFill[1], stFill[2]);
              doc.setDrawColor(stRgb[0], stRgb[1], stRgb[2]);
              doc.setLineWidth(readableMode ? 0.6 : 0.35);
              doc.roundedRect(cardX + cardW - statusW - 4, cardY + 3, statusW, statusH, 2, 2, 'FD');
              doc.setTextColor(stRgb[0], stRgb[1], stRgb[2]);
              doc.setFont('helvetica','bold');
              doc.setFontSize(readableMode ? 5.6 : 4.4);
              doc.text(statusLabel, cardX + cardW - statusW - 2.5, cardY + (readableMode ? 10.2 : 8.3));

              doc.setTextColor(rgb[0], rgb[1], rgb[2]);
              doc.setFont('helvetica','bold');
              doc.setFontSize(oneWeekMode ? 8 : twoWeekMode ? 7 : 5.6);
              var title = clean((iv.company || '') + (iv.task_number ? ' · ' + iv.task_number : ''));
              drawWrapped(doc, title, cardX + 7, cardY + (readableMode ? 11 : 5.8), Math.max(20, cardW - statusW - 16), 1, readableMode ? 8 : 5.8);

              doc.setTextColor(35,35,35);
              doc.setFont('helvetica','normal');
              doc.setFontSize(oneWeekMode ? 7.1 : twoWeekMode ? 6.4 : 5.0);
              var taskLines = oneWeekMode ? 3 : twoWeekMode ? 2 : 1;
              var taskY = cardY + (readableMode ? 22 : 11.2);
              drawWrapped(doc, iv.task || '', cardX + 7, taskY, cardW - 12, taskLines, oneWeekMode ? 7.9 : twoWeekMode ? 7.1 : 5.7);

              if (readableMode && iv.prereq && cardH >= 41) {
                doc.setTextColor(185,28,28);
                doc.setFont('helvetica','bold');
                doc.setFontSize(oneWeekMode ? 5.6 : 5.2);
                drawWrapped(doc, '⚠ ' + ellipsize(iv.prereq, oneWeekMode ? 52 : 42), cardX + 7, cardY + cardH - 6, cardW - 12, 1, 5.8);
              } else if (readableMode && iv.impact && cardH >= 41) {
                doc.setTextColor(146,64,14);
                doc.setFont('helvetica','bold');
                doc.setFontSize(oneWeekMode ? 5.6 : 5.2);
                drawWrapped(doc, '↪ ' + ellipsize(iv.impact, oneWeekMode ? 52 : 42), cardX + 7, cardY + cardH - 6, cardW - 12, 1, 5.8);
              }
            }

            cardY += cardH + gap;
          });
        });

        var dx = x0 + zoneW + dayCount * dayW;
        var dc = hexToRgb(deadlineColor(zone.deadline));
        var dlBg = mixWhite(dc, 0.90);

        doc.setFillColor(dlBg[0], dlBg[1], dlBg[2]);
        doc.rect(dx, y, finW, rowH, 'F');

        doc.setTextColor(dc[0], dc[1], dc[2]);
        doc.setFont('helvetica','bold');
        doc.setFontSize(overviewMode ? 6 : readableMode ? 8 : 7);

        var dl = deadlineTxt(zone);
        doc.text(dl[0], dx + 7, y + Math.min(readableMode ? 22 : 17, rowH - 9));

        doc.setFont('helvetica','normal');
        doc.setFontSize(overviewMode ? 5 : readableMode ? 7 : 6);
        if (dl[1]) doc.text(dl[1], dx + 7, y + Math.min(readableMode ? 36 : 28, rowH - 3));
      });

      // Grille renforcée : lignes verticales + horizontales bien visibles
      doc.setDrawColor(readableMode ? 135 : 160, readableMode ? 130 : 155, readableMode ? 122 : 148);
      doc.setLineWidth(readableMode ? 0.95 : 0.7);
      doc.line(x0, y0 + th, x0 + tableW, y0 + th);
      rowBoundaries.forEach(function(gy){ doc.line(x0, gy, x0 + tableW, gy); });
      doc.line(x0 + zoneW, y0, x0 + zoneW, y0 + tableH);
      for (var gi = 0; gi <= dayCount; gi++) {
        var gx = x0 + zoneW + gi * dayW;
        doc.line(gx, y0, gx, y0 + tableH);
      }
      doc.line(x0 + zoneW + dayCount * dayW, y0, x0 + zoneW + dayCount * dayW, y0 + tableH);
      doc.line(x0 + tableW, y0, x0 + tableW, y0 + tableH);

      if (overviewMode) {
        drawLegend(doc, legendItems(days), margin, pageH - legendH + 8, tableW);
      } else {
        doc.setTextColor(80,80,80);
        doc.setFont('helvetica','normal');
        doc.setFontSize(readableMode ? 7 : 6.5);
        doc.text('Badge statut visible sur chaque tâche · JF = jour férié · Les descriptions sont limitées pour rester dans le jour et la zone.', margin, pageH - 12);
        doc.text('Page ' + (wi + 1) + '/' + pages.length, pageW - margin - 48, pageH - 12);
      }
    });

    if (!exported) {
      alert('Aucune tâche à exporter sur cette période.');
      return;
    }

    doc.save(fileBase + '.pdf');
  }

  return (
    <>
      <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

        {/* ── ROLE-BASED HEADER ── */}
        {isAdmin ? (
          <AdminHeader
            session={session}
            onUserMenu={()=>setUserMenu(true)}
            onRefresh={()=>syncAll(true)}
            syncing={isBusy('sync')}
            theme={appTheme}
            onToggleTheme={toggleDarkMode}
            notifCount={notifBadgeCount}
            onOpenNotifs={()=>setNotifOpen(true)}
            onOpenExport={()=>setExportModalOpen(true)}
            onHistory={openHistory}
            onSettings={()=>setScreen('settings')}
            planningLocked={planningLocked}
            planningValidated={planningValidated}
            onToggleLock={handleToggleLock}
            onValidatePlanning={()=>setValidateModal(true)}
            onReindexPlanning={handleReindexPlanning}
            busyActions={busy}
          />
        ) : (
          <CompanyHeader
            session={session}
            onUserMenu={()=>setUserMenu(true)}
            onRefresh={()=>syncAll(true)}
            syncing={isBusy('sync')}
            theme={appTheme}
            onToggleTheme={toggleDarkMode}
            notifCount={notifBadgeCount}
            onOpenNotifs={()=>setNotifOpen(true)}
          />
        )}

        {/* ── CONTEXTUAL TOOLBAR (Planning + List only) ── */}
        {screen !== 'settings' && screen !== 'briefings' && screen !== 'company_dashboard' && screen !== 'dashboard' && (
          <ContextualToolbar
            screen={screen}
            isAdmin={isAdmin}
            weekOffset={weekOffset}
            onWeekChange={d=>setWeekOffset(o=>o+d)}
            onToday={()=>setWeekOffset(0)}
            viewMode={viewMode}
            onViewMode={setViewMode}
            showWeekends={showWeekends}
            onToggleWeekends={()=>setShowWeekends(v=>!v)}
            filter={filter}
            trades={trades}
            onFilter={setFilter}
            planningLocked={planningLocked}
            planningValidated={planningValidated}
          />
        )}

        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {mainContent()}
        </div>

        {/* ── ROLE-BASED BOTTOM NAV ── */}
        {isAdmin ? (
          <AdminBottomNav
            screen={screen}
            onNav={setScreen}
            onAdd={()=>openAdd()}
            canAdd={canEditPlanning}
          />
        ) : (
          <CompanyBottomNav
            screen={screen}
            onNav={setScreen}
          />
        )}
      </div>

      {/* ── MODALS ── */}
      <DetailModal open={modal?.type==='detail'} ivId={modal?.id}
        data={data} zones={zones} trades={trades} session={session}
        onClose={closeModal} onStatusChange={handleStatusChange} onEdit={openEdit} onCopyTask={copyTaskToClipboard}
        canEditPlanning={canEditPlanning} canChangeStatus={canChangeStatus}
        changeRequests={changeRequests} history={history} taskLogs={taskLogs}
        onSubmitChangeRequest={handleSubmitTaskChangeRequest}
        onReviewChangeRequest={handleReviewTaskChangeRequest}
        changeRequestBusy={modal?.id ? isBusy('change_request_'+modal.id) : false}
        canRequestTaskChange={!planningValidated} />
      <AddEditModal open={modal?.type==='add'||modal?.type==='edit'}
        editId={modal?.type==='edit'?modal?.id:null}
        preZone={modal?.zone} preDate={modal?.date}
        data={data} zones={zones} trades={trades} companies={companies}
        history={history} taskLogs={taskLogs}
        onUpdateStatusNote={handleUpdateStatusNote}
        onDeleteStatusNote={handleDeleteStatusNote}
        onClose={closeModal} onSave={handleSave} onDelete={handleDelete} />
      <UserMenuModal open={userMenu} session={session}
        onClose={()=>setUserMenu(false)} onLogout={handleLogout} />
      <HistoryModal open={historyOpen} history={history} session={session}
        onClose={()=>setHistoryOpen(false)} onRefresh={loadHistory} />
      <ValidatePlanningModal open={validateModal}
        onClose={()=>setValidateModal(false)} onConfirm={handleValidatePlanning} />

      {/* Notification center */}
      <NotificationCenter
        open={notifOpen}
        onClose={()=>setNotifOpen(false)}
        data={data}
        notifications={notifications}
        session={session}
        zones={zones}
        trades={trades}
        onOpenDetail={openDetail}
      />

      {/* Export modal */}
      <ExportModal
        open={exportModalOpen}
        onClose={()=>setExportModalOpen(false)}
        onExport={exportPlanning}
        weekOffset={weekOffset}
        zones={zones}
        viewMode={viewMode}
      />

      {/* Quick Status Popover */}
      {quickStatus && (
        <QuickStatusPopover
          iv={quickStatus.iv}
          x={quickStatus.x}
          y={quickStatus.y}
          onStatusChange={handleStatusChange}
          onClose={function(){ setQuickStatus(null); }}
          canChangeStatus={canChangeStatus}
        />
      )}

      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',left:'50%',bottom:80,transform:'translateX(-50%)',zIndex:9999,
          background:toast.type==='error'?'#991B1B':toast.type==='info'?'#1E3A8A':'#14532D',
          color:'#fff',padding:'10px 18px',borderRadius:12,boxShadow:'0 8px 32px rgba(0,0,0,.3)',
          fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",maxWidth:'calc(100vw - 32px)',
          textAlign:'center',animation:'fadeIn .18s'}}>
          {toast.message}
        </div>
      )}
    </>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ErrorBoundary>
      <PlanifyApp />
    </ErrorBoundary>
  );
</script>
</body>
</html>
