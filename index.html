/* ════════════════════════════════════════════════════════════
   NOTIFICATIONS PANEL
═══════════════════════════════════════════════════════════ */
function NotificationsPanel({ notifs, onClose, taskLogs, data, onOpenDetail }) {
  const LOG_ICONS = {note:'📝',encours:'🔵',signalement:'⚠️',bloque:'🔴',termine:'✅',undefined:'🔔'};
  function fmtDt(s) {
    if (!s) return '';
    const d = new Date(s);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) + ' ' +
           d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:300,
      display:'flex',alignItems:'flex-end',animation:'fadeIn .15s'}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:'var(--surface)',borderRadius:'20px 20px 0 0',width:'100%',
          maxHeight:'75vh',overflowY:'auto',padding:'0 16px 40px',
          animation:'slideUp .22s cubic-bezier(.32,.72,0,1)'}}>
        <div style={{width:40,height:4,background:'var(--border)',borderRadius:2,margin:'12px auto 16px'}}></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <span style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>Notifications</span>
          {notifs.filter(n=>!n.read).length > 0 &&
            <span style={{fontSize:11,color:'var(--muted)'}}>{notifs.filter(n=>!n.read).length} non lues</span>}
        </div>
        {notifs.length === 0 && (
          <div style={{textAlign:'center',padding:'32px 0',color:'var(--xmuted)',fontSize:13}}>
            Aucune notification
          </div>
        )}
        {notifs.map(n => {
          const iv = data?.find(i => i.id === n.task_id);
          return (
            <div key={n.id}
              onClick={()=>{ onClose(); if(iv) setTimeout(()=>onOpenDetail(n.task_id),120); }}
              style={{display:'flex',gap:12,padding:'11px 0',borderBottom:'1px solid var(--border)',
                cursor:'pointer',
                opacity:n.read?0.6:1,transition:'opacity .15s'}}
              onMouseEnter={e=>{if(iv)e.currentTarget.style.opacity='.7';}}
              onMouseLeave={e=>{e.currentTarget.style.opacity=n.read?'0.6':'1';}}>
              <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,
                background:n.read?'var(--surface-2)':
                  n.type==='bloque'?'rgba(220,38,38,.12)':
                  n.type==='signalement'?'rgba(217,119,6,.12)':
                  n.type==='termine'?'rgba(22,163,74,.12)':'var(--primary-l)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>
                {LOG_ICONS[n.type] || '🔔'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:n.read?400:600,color:'var(--text)',
                  marginBottom:2,lineHeight:1.4}}>{n.message}</div>
                <div style={{fontSize:11,marginBottom:2}}>
                  {iv ? (
                    <span style={{color:'var(--primary)',fontWeight:600}}>
                      {iv.task_number && <span style={{fontFamily:"'DM Mono',monospace",marginRight:5}}>{iv.task_number}</span>}
                      {iv.task?.slice(0,45)}{iv.task?.length>45?'…':''}
                    </span>
                  ) : (
                    <span style={{color:'var(--xmuted)',fontSize:10}}>Appuyer pour voir la tâche</span>
                  )}
                </div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)'}}>
                  {fmtDt(n.created_at)}
                  {!n.read && <span style={{marginLeft:8,color:'var(--primary)',fontWeight:700}}>● nouveau</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


function PlanifyApp() {
  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "theme": "terrain",
    "density": "normal"
  }/*EDITMODE-END*/);

  const [session,    setSession]    = useState(null);
  const [screen,     setScreen]     = useState('planning');
  const [weekOffset, setWeekOffset] = useState(0);
  const [filter,     setFilter]     = useState('all');
  const [data,       setData]       = useState([...INTERVENTIONS]);
  const [zones,      setZones]      = useState([...ZONES]);
  const [trades,     setTrades]     = useState([...TRADES]);
  const [loading,    setLoading]    = useState(true);
  const [modal,      setModal]      = useState(null); // {type, id?, zone?, date?}
  const [userMenu,   setUserMenu]   = useState(false);
  const [viewMode,   setViewMode]   = useState('1s');
  const [notifs,     setNotifs]     = useState([]);
  const [notifPanel, setNotifPanel] = useState(false);
  const [taskLogs,   setTaskLogs]   = useState({});
  const unreadCount = notifs.filter(n=>!n.read).length;

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  const SUPA_URL = 'https://xrfqlbhaxhraneflrfez.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyZnFsYmhheGhyYW5lZmxyZmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjE3MTEsImV4cCI6MjA5MjE5NzcxMX0.pi1iytlLCQmtT0Vl4DfWmAj3YhRukICPDnvGIstDcaA';

  async function loadFromSupabase(sessionArg) {
    setLoading(true);
    const sess = sessionArg || session;
    const company = sess?.role === 'admin' ? 'Admin' : (sess?.company?.name || '');
    try {
      const headers = {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
      };
      const base = SUPA_URL + '/rest/v1';
      const [zRes, tRes, iRes, logsRes, notifsRes] = await Promise.all([
        fetch(base + '/zones?order=display_order', {headers}),
        fetch(base + '/trades?order=display_order', {headers}),
        fetch(base + '/interventions?order=start_date', {headers}),
        fetch(base + '/task_logs?order=created_at.desc&limit=500', {headers}),
        company ? fetch(base + '/notifications?company=eq.' + encodeURIComponent(company) + '&order=created_at.desc&limit=50', {headers}) : Promise.resolve({ok:true, json:()=>Promise.resolve([])}),
      ]);
      const [zData, tData, iData, logsData, notifsData] = await Promise.all([
        zRes.json(), tRes.json(), iRes.json(),
        logsRes.ok ? logsRes.json() : Promise.resolve([]),
        notifsRes.ok ? notifsRes.json() : Promise.resolve([]),
      ]);
      if (zData.length) setZones(zData);
      if (tData.length) setTrades(tData.map(t => {
        const local = TRADES.find(lt => lt.id === t.id);
        return local ? {...t, color: local.color} : t;
      }));
      if (iData.length) setData(iData.map(r => ({
        ...r, start: r.start_date, end: r.end_date,
        predecessor_id: r.predecessor_id || null,
        attachments: [],
      })));
      // Group logs by task_id
      if (logsData.length) {
        const grouped = {};
        logsData.forEach(log => {
          if (!grouped[log.task_id]) grouped[log.task_id] = [];
          grouped[log.task_id].push(log);
        });
        setTaskLogs(grouped);
      }
      if (notifsData.length) setNotifs(notifsData);
    } catch(e) {
      console.warn('[Planify] Supabase load failed, using local data:', e);
    }
    setLoading(false);
  }

  // Expose supa globally so child components (SettingsScreen) can use it
  window._supaWrite = async (method, table, body, match) => supa(method, table, body, match);

  async function supa(method, table, body, match) {
    const headers = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal',
    };
    let url = SUPA_URL + '/rest/v1/' + table;
    if (match) url += '?' + match;
    try {
      await fetch(url, {method, headers, body: body ? JSON.stringify(body) : undefined});
    } catch(e) { console.warn('[Planify] Supabase write failed:', e); }
  }

  function handleLogin(s) {
    setSession(s);
    loadFromSupabase(s);
    // Request browser notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    // Subscribe to realtime notifications
    subscribeNotifications(s);
  }
  function handleLogout()  { setSession(null); setUserMenu(false); }

  function openDetail(id)          { setModal({type:'detail', id}); }
  function openAdd(zone='',date='') { setModal({type:'add', zone, date}); }
  function openEdit(id)            { setModal({type:'edit', id}); }
  function closeModal()            { setModal(null); }

  function handleStatusChange(id, status) {
    setData(prev => prev.map(i => i.id===id ? {...i, status} : i));
    supa('PATCH', 'interventions', {status, updated_at: new Date().toISOString()}, 'id=eq.' + id);
  }
  // ── Realtime notification subscription ──────────────────────────────
  function subscribeNotifications(sess) {
    const s = sess || session;
    if (!s) return;
    const company = s.role === 'admin' ? 'Admin' : (s.company?.name || '');
    if (!company) return;
    // Clear previous poll
    if (window._planifyNotifPoll) clearInterval(window._planifyNotifPoll);

    // Supabase Realtime
    try {
      const { createClient } = window.supabase;
      if (createClient) {
        const sbRT = createClient(SUPA_URL, SUPA_KEY);
        sbRT.channel('notifs-' + company)
          .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'notifications',
            filter: `company=eq.${company}`
          }, payload => {
            const n = payload.new;
            setNotifs(prev => prev.find(x => x.id === n.id) ? prev : [n, ...prev]);
            triggerBrowserNotif(n.message, n.task_id);
          })
          .subscribe();
      }
    } catch(e) { console.warn('[Planify] Realtime error:', e); }

    // Reliable poll every 15s
    window._planifyNotifPoll = setInterval(() => pollNotifs(company), 15000);
  }

  async function pollNotifs(company) {
    try {
      const hdrs = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };
      const res = await fetch(
        SUPA_URL + '/rest/v1/notifications?company=eq.' + encodeURIComponent(company) +
        '&order=created_at.desc&limit=50', { headers: hdrs });
      const fresh = await res.json();
      if (Array.isArray(fresh)) setNotifs(fresh);
    } catch(e) {}
  }

  function triggerBrowserNotif(msg, taskId) {
    if ('Notification' in window && Notification.permission === 'granted') {
      const n = new Notification('Planify — HSF Marceau', {
        body: msg,
        icon: 'https://francofds.github.io/hsf-chantier/icon-192.png',
        tag: taskId,
        requireInteraction: false,
      });
      // Click on browser notif → focus app + open task
      n.onclick = () => {
        window.focus();
        if (taskId) openDetail(taskId);
        n.close();
      };
    }
  }

  
  async function handleSubmitLog(ivId, logEntry) {
    const iv     = data.find(i => i.id === ivId);
    const author = logEntry.author;
    const hdrs   = {
      'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation',
    };

    // 1. Save log
    const logRow = {
      task_id: ivId, company: author, author,
      type: logEntry.type, message: logEntry.message,
      photo_url: logEntry.photo || null,
      mentioned: logEntry.mentions || [],
    };
    let savedLogId = null;
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/task_logs', {
        method: 'POST', headers: hdrs, body: JSON.stringify(logRow),
      });
      const [saved] = await res.json();
      savedLogId = saved?.id;
    } catch(e) { console.warn('[Planify] Log save error:', e); }

    // Update local taskLogs
    const localLog = { ...logEntry, id: savedLogId || logEntry.id, created_at: new Date().toISOString() };
    setTaskLogs(prev => ({ ...prev, [ivId]: [localLog, ...(prev[ivId] || [])] }));

    // 2. Build notification rows
    // Always include Admin + explicitly mentioned companies, deduplicated
    const LOG_LABELS = { note:'Note', encours:'En cours', signalement:'Signalement', bloque:'Blocage', termine:'Terminé' };
    const taskRef  = iv?.task_number || (iv?.task?.slice(0, 35) + '…') || ivId;
    const notifMsg = `${author} · ${LOG_LABELS[logEntry.type] || logEntry.type} · ${taskRef}`;
    const recipients = [...new Set([...(logEntry.mentions || []), 'Admin'])].filter(Boolean);
    const now2     = new Date().toISOString();
    const notifRows = recipients.map(co => ({
      company: co, task_id: ivId, log_id: savedLogId,
      type: logEntry.type, message: notifMsg, read: false, created_at: now2,
    }));

    // 3. Insert notifications in Supabase
    try {
      await fetch(SUPA_URL + '/rest/v1/notifications', {
        method: 'POST',
        headers: { ...hdrs, Prefer: 'return=minimal' },
        body: JSON.stringify(notifRows),
      });
    } catch(e) { console.warn('[Planify] Notif create error:', e); }

    // 4. Immediately refresh notifs for current user (no wait for poll)
    const myCompany = session?.role === 'admin' ? 'Admin' : (session?.company?.name || '');
    if (myCompany) {
      await pollNotifs(myCompany);
      // Browser notif if someone else triggered this and we are a recipient
      if (author !== myCompany && recipients.includes(myCompany)) {
        triggerBrowserNotif(notifMsg, ivId);
      }
    }
  }

  
  function handleSave(iv) {
    setData(prev => {
      const idx = prev.findIndex(i=>i.id===iv.id);
      if (idx>=0) { const n=[...prev]; n[idx]=iv; return n; }
      return [...prev, iv];
    });
    closeModal();
    // Persist to Supabase
    const row = {
      id: iv.id, trade: iv.trade, company: iv.company, task: iv.task,
      zone: iv.zone, start_date: iv.start, end_date: iv.end || iv.start,
      status: iv.status || 'arealis', priority: iv.priority || 3,
      prereq: iv.prereq || '', notes: iv.notes || '',
      task_number: iv.task_number || null,
      predecessor_id: iv.predecessor_id || null,
      updated_at: new Date().toISOString(),
    };
    const existing = data.find(i => i.id === iv.id);
    if (existing) {
      supa('PATCH', 'interventions', row, 'id=eq.' + iv.id);
    } else {
      supa('POST', 'interventions', row);
    }
  }
  function handleDelete(id) {
    setData(prev => prev.filter(i=>i.id!==id));
    closeModal();
    supa('DELETE', 'interventions', null, 'id=eq.' + id);
  }

  const isAdmin = session?.role === 'admin';

  if (loading && session) return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',gap:16,background:'var(--bg)'}}>
      <div style={{width:36,height:36,border:'3px solid var(--border)',
        borderTopColor:'var(--primary)',borderRadius:'50%',
        animation:'spin 0.8s linear infinite'}}></div>
      <div style={{fontSize:13,color:'var(--muted)',fontFamily:"'DM Mono',monospace"}}>
        Chargement depuis Supabase…
      </div>
    </div>
  );

  if (!session) return (
    <>
      <LoginScreen onLogin={handleLogin} />
      <TweaksPanel>
        <TweakSection label="Apparence" />
        <TweakRadio label="Thème" value={tweaks.theme}
          options={['terrain','studio','nuit']}
          onChange={v => setTweak('theme', v)} />
      </TweaksPanel>
    </>
  );

  const mainContent = () => {
    switch (screen) {
      case 'dashboard': return <DashboardScreen data={data} zones={zones} trades={trades}
        weekOffset={weekOffset} session={session} onOpenDetail={openDetail} />;
      case 'planning':  return <PlanningScreen  data={data} zones={zones} trades={trades}
        weekOffset={weekOffset} filter={filter} session={session}
        onOpenDetail={openDetail} onOpenAdd={openAdd} viewMode={viewMode}
        setZones={setZones} />;
      case 'list':      return <ListScreen      data={data} zones={zones} trades={trades}
        weekOffset={weekOffset} filter={filter} onOpenDetail={openDetail} />;
      case 'settings':  return <SettingsScreen  zones={zones} trades={trades}
        setZones={setZones} setTrades={setTrades} />;
      default:          return null;
    }
  };

  return (
    <>
      <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
        <AppHeader session={session} weekOffset={weekOffset}
          onWeekChange={d=>setWeekOffset(o=>o+d)}
          onSettings={()=>setScreen('settings')}
          onUserMenu={()=>setUserMenu(true)}
          filter={filter} trades={trades} onFilter={setFilter}
          zones={zones} data={data}
          viewMode={viewMode} onViewMode={setViewMode}
          unreadCount={unreadCount}
          onBell={()=>{ setNotifPanel(p=>!p); if(!notifPanel) markNotifsRead(); }} />
        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {mainContent()}
        </div>
        <BottomNav screen={screen} onNav={setScreen}
          onAdd={()=>openAdd()} isAdmin={isAdmin} />
      </div>

      {/* Modals */}
      <DetailModal open={modal?.type==='detail'} ivId={modal?.id}
        data={data} zones={zones} trades={trades} session={session}
        onClose={closeModal} onStatusChange={handleStatusChange} onEdit={openEdit}
        taskLogs={taskLogs} onSubmitLog={handleSubmitLog} />
      {notifPanel && (
        <NotificationsPanel notifs={notifs} data={data}
          taskLogs={taskLogs}
          onClose={()=>setNotifPanel(false)}
          onOpenDetail={id=>{ setNotifPanel(false); openDetail(id); }} />
      )}
      <AddEditModal open={modal?.type==='add'||modal?.type==='edit'}
        editId={modal?.type==='edit'?modal?.id:null}
        preZone={modal?.zone} preDate={modal?.date}
        data={data} zones={zones} trades={trades}
        onClose={closeModal} onSave={handleSave} onDelete={handleDelete} />
      <UserMenuModal open={userMenu} session={session}
        onClose={()=>setUserMenu(false)} onLogout={handleLogout} />

      <TweaksPanel>
        <TweakSection label="Apparence" />
        <TweakRadio label="Thème" value={tweaks.theme}
          options={['terrain','studio','nuit']}
          onChange={v => setTweak('theme', v)} />
      </TweaksPanel>
    </>
  );
}


</script>

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<PlanifyApp />);
