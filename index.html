        <div style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:2}}>Accès chantier</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>
          {step==='pick'?'Sélectionnez votre profil':'Entrez votre code PIN'}
        </div>

        {step === 'pick' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {allEntries.map(co => (
              <button key={co.id} onClick={()=>pickCompany(co)}
                style={{padding:'10px 8px',background:'var(--surface-2)',border:'1px solid var(--border)',
                  borderRadius:'var(--r-sm)',cursor:'pointer',textAlign:'left',transition:'all .15s',
                  fontFamily:"'DM Sans',sans-serif"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.background='var(--primary-l)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface-2)';}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:2}}>{co.name}</div>
                <div style={{fontSize:10,color:'var(--muted)',lineHeight:1.3}}>{co.contact}</div>
              </button>
            ))}
          </div>
        )}

        {step === 'pin' && (
          <div>
            <button onClick={()=>{setStep('pick');setError('');}}
              style={{background:'none',border:'none',color:'var(--primary)',fontSize:13,cursor:'pointer',
                padding:0,marginBottom:16,fontFamily:"'DM Sans',sans-serif",display:'flex',alignItems:'center',gap:4}}>
              ← {selected?.name}
            </button>
            {/* PIN dots */}
            <div style={{display:'flex',justifyContent:'center',gap:14,marginBottom:20}}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{width:14,height:14,borderRadius:'50%',
                  background:pin.length>i?'var(--primary)':'var(--border)',transition:'background .15s'}}></div>
              ))}
            </div>
            {error && <div style={{background:'rgba(220,38,38,.1)',color:'#DC2626',borderRadius:8,
              padding:'8px 12px',fontSize:13,textAlign:'center',marginBottom:12}}>{error}</div>}
            {/* Numpad */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i)=>(
                <button key={i} onClick={()=>d==='⌫'?tapBack():d?tapDigit(d):null}
                  disabled={!d && d!=='0'}
                  style={{height:54,borderRadius:'var(--r-sm)',border:'1px solid var(--border)',
                    background:d?'var(--surface-2)':'transparent',fontSize:d==='⌫'?18:20,
                    fontWeight:600,cursor:d||d==='0'?'pointer':'default',color:'var(--text)',
                    fontFamily:"'DM Mono',monospace",transition:'all .1s',opacity:(!d&&d!=='0')?0:1}}
                  onMouseEnter={e=>{if(d||d==='0')e.currentTarget.style.background='var(--primary-l)';}}
                  onMouseLeave={e=>{if(d||d==='0')e.currentTarget.style.background='var(--surface-2)';}}>
                  {d}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   DASHBOARD SCREEN
═══════════════════════════════════════════════════════════ */
function DashboardScreen({ data, zones, trades, weekOffset, session, onOpenDetail }) {
  const isAdmin = session?.role === 'admin';
  const company = session?.company;

  // Filter data per role
  const myData = isAdmin ? data : data.filter(i => i.company === company?.name);

  // Stats (global for admin, filtered for company)
  const total    = myData.length;
  const blocked  = myData.filter(i => i.status === 'bloque');
  const encours  = myData.filter(i => i.status === 'encours');
  const prereqs  = myData.filter(i => i.prereq && i.prereq.trim() !== '' && i.status !== 'termine');
  const termine  = myData.filter(i => i.status === 'termine');
  const pctDone  = total ? Math.round(termine.length / total * 100) : 0;

  // Drawer state: which stat is expanded
  const [drawer, setDrawer] = React.useState(null); // 'bloque'|'encours'|'prereq'|'avance'

  function toggleDrawer(key) { setDrawer(d => d === key ? null : key); }

  // Task row helper
  function TaskRow({ iv }) {
    const z  = zones.find(x => x.id === iv.zone);
    const tr = trades.find(x => x.id === iv.trade);
    const c  = getTC(tr?.color || 'navy');
    return (
      <div onClick={() => onOpenDetail(iv.id)}
        style={{display:'flex',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',
          cursor:'pointer',alignItems:'flex-start',transition:'opacity .12s'}}
        onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
        onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
        <div style={{width:3,alignSelf:'stretch',borderRadius:2,background:c.b,flexShrink:0}}></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{iv.company}</span>
            {iv.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,
              color:'var(--xmuted)',background:'var(--surface-2)',padding:'1px 4px',
              borderRadius:3,border:'1px solid var(--border)'}}>{iv.task_number}</span>}
            <StatusBadge status={iv.status} size="sm" style={{marginLeft:'auto'}} />
          </div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:iv.prereq?3:0,
            overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
            {iv.task}
          </div>
          {iv.prereq && iv.prereq.trim() && (
            <div style={{fontSize:10,color:'#DC2626',background:'#FEF2F2',
              padding:'3px 7px',borderRadius:3,borderLeft:'2px solid #DC2626',marginTop:3}}>
              ⚠ {iv.prereq}
            </div>
          )}
          <div style={{display:'flex',gap:8,marginTop:4,alignItems:'center'}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)'}}>
              {fmtDate(iv.start)}{iv.end && iv.end !== iv.start ? ' → '+fmtDate(iv.end) : ''}
            </span>
            {z && <span style={{fontSize:10,color:'var(--xmuted)',background:'var(--surface-2)',
              padding:'1px 5px',borderRadius:3,border:'1px solid var(--border)'}}>{z.short}</span>}
          </div>
        </div>
      </div>
    );
  }

  // Collapsible drawer
  function StatDrawer({ items, color, label }) {
    if (!items.length) return <div style={{padding:'12px 0',fontSize:12,color:'var(--muted)',textAlign:'center'}}>
      Aucune tâche
    </div>;
    return (
      <div style={{marginTop:4}}>
        {items.map(iv => <TaskRow key={iv.id} iv={iv} />)}
      </div>
    );
  }

  // ── ADMIN VIEW ─────────────────────────────────────────────────────────
  if (isAdmin) {
    // Per-company stats
    const companies = [...new Set(data.map(i => i.company))].sort();
    const companyStats = companies.map(co => ({
      name: co,
      total:   data.filter(i => i.company === co).length,
      encours: data.filter(i => i.company === co && i.status === 'encours').length,
      bloque:  data.filter(i => i.company === co && i.status === 'bloque').length,
      termine: data.filter(i => i.company === co && i.status === 'termine').length,
    }));

    // Next 5 working days tasks
    const soon = data.filter(i => {
      const s = new Date(i.start+'T00:00:00'), now = new Date();
      const diff = (s - now) / (1000*60*60*24);
      return diff >= 0 && diff <= 7 && i.status === 'arealis';
    }).sort((a,b) => a.start.localeCompare(b.start)).slice(0, 8);

    return (
      <div style={{padding:'14px 12px 100px',overflowY:'auto',height:'100%'}}>

        {/* ── 4 stat chips ── */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:14}}>
          <StatChip value={blocked.length}  label="Bloquées"  color="#DC2626"
            onClick={() => toggleDrawer('bloque')} />
          <StatChip value={encours.length}  label="En cours"  color="#2563EB"
            onClick={() => toggleDrawer('encours')} />
          <StatChip value={prereqs.length}  label="Prérequis" color="#D97706"
            onClick={() => toggleDrawer('prereq')} />
          <StatChip value={`${pctDone}%`}   label="Avancement" color="#16A34A"
            onClick={() => toggleDrawer('avance')} />
        </div>

        {/* ── Stat drawer ── */}
        {drawer && (
          <SectionCard
            title={drawer==='bloque'?`Bloquées (${blocked.length})`:
                   drawer==='encours'?`En cours (${encours.length})`:
                   drawer==='prereq'?`Avec prérequis (${prereqs.length})`:
                   `Terminées (${termine.length})`}
            accent={drawer==='bloque'?'#DC2626':drawer==='encours'?'#2563EB':
                    drawer==='prereq'?'#D97706':'#16A34A'}>
            <StatDrawer
              items={drawer==='bloque'?blocked:drawer==='encours'?encours:
                     drawer==='prereq'?prereqs:termine}
              color={drawer==='bloque'?'#DC2626':drawer==='encours'?'#2563EB':
                     drawer==='prereq'?'#D97706':'#16A34A'} />
          </SectionCard>
        )}

        {/* ── Avancement par zone ── */}
        <SectionCard title="Avancement par zone">
          {zones.map(z => {
            const zivs = data.filter(i => i.zone === z.id);
            const done = zivs.filter(i => i.status === 'termine').length;
            const bloc = zivs.filter(i => i.status === 'bloque').length;
            const pct  = zivs.length ? Math.round(done / zivs.length * 100) : 0;
            const wd   = workingDaysUntil(z.deadline);
            const dc   = deadlineColor(z.deadline);
            return (
              <div key={z.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:FLOOR_COLORS[z.floor]||'#9CA3AF',flexShrink:0,display:'inline-block'}}></span>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</span>
                    {bloc > 0 && <span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ {bloc} bloquée{bloc>1?'s':''}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{done}/{zivs.length}</span>
                    {z.deadline && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:700,color:dc}}>
                      J-{wd < 0 ? '▲' : wd}
                    </span>}
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,
                      color:pct===100?'#16A34A':bloc>0?'#DC2626':'var(--muted)'}}>{pct}%</span>
                  </div>
                </div>
                <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct}%`,
                    background:pct===100?'#16A34A':bloc>0?'#DC2626':'#2563EB',
                    borderRadius:3,transition:'width .4s ease'}}></div>
                </div>
              </div>
            );
          })}
        </SectionCard>

        {/* ── Avancement par entreprise ── */}
        <SectionCard title="Avancement par entreprise">
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--border)'}}>
                  {['Entreprise','Total','✓ Term.','▶ En cours','⚠ Bloqué','○ À réal.','%'].map(h => (
                    <th key={h} style={{padding:'4px 6px',textAlign:h==='Entreprise'?'left':'center',
                      fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--muted)',
                      letterSpacing:'.04em',fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {companyStats.map((co,i) => {
                  const arealis = co.total - co.encours - co.bloque - co.termine;
                  const pct = co.total ? Math.round(co.termine / co.total * 100) : 0;
                  const tr = trades.find(t => data.find(d => d.company===co.name && d.trade===t.id));
                  const c = getTC(tr?.color || 'navy');
                  return (
                    <tr key={co.name} style={{borderBottom:'1px solid var(--border)',
                      background:i%2===0?'transparent':'var(--surface-2)'}}>
                      <td style={{padding:'7px 6px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{width:8,height:8,borderRadius:'50%',background:c.b,flexShrink:0,display:'inline-block'}}></span>
                          <span style={{fontWeight:600,color:'var(--text)',fontSize:12}}>{co.name}</span>
                        </div>
                      </td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{co.total}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'#16A34A',fontWeight:co.termine?700:400}}>{co.termine||'—'}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'#2563EB',fontWeight:co.encours?700:400}}>{co.encours||'—'}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'#DC2626',fontWeight:co.bloque?700:400}}>{co.bloque||'—'}</td>
                      <td style={{textAlign:'center',fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{arealis||'—'}</td>
                      <td style={{textAlign:'center',padding:'7px 6px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <div style={{flex:1,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${pct}%`,background:pct===100?'#16A34A':'#2563EB',borderRadius:2}}></div>
                          </div>
                          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--muted)',minWidth:28,textAlign:'right'}}>{pct}%</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </SectionCard>

        {/* ── Prochaines tâches à démarrer ── */}
        {soon.length > 0 && (
          <SectionCard title="Prochaines échéances (à réaliser)">
            {soon.map(iv => <TaskRow key={iv.id} iv={iv} />)}
          </SectionCard>
        )}
      </div>
    );
  }

  // ── COMPANY VIEW ───────────────────────────────────────────────────────
  const days = weekDays(weekOffset);
  const weekIvs = myData.filter(i => days.some(d => inDay(i, d)));
  const byStatus = {
    bloque:  myData.filter(i => i.status === 'bloque'),
    encours: myData.filter(i => i.status === 'encours'),
    arealis: myData.filter(i => i.status === 'arealis'),
    termine: myData.filter(i => i.status === 'termine'),
  };

  // 3-week timeline for this company
  const timelineDays = multiWeekDays(weekOffset, 3);
  const timelineIvs  = myData.filter(i =>
    timelineDays.some(d => inDay(i, d)) && i.status !== 'termine'
  );

  return (
    <div style={{padding:'14px 12px 100px',overflowY:'auto',height:'100%'}}>

      {/* ── 4 stat chips ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:14}}>
        <StatChip value={byStatus.bloque.length}  label="Bloquées"  color="#DC2626"
          onClick={() => toggleDrawer('bloque')} />
        <StatChip value={byStatus.encours.length} label="En cours"  color="#2563EB"
          onClick={() => toggleDrawer('encours')} />
        <StatChip value={prereqs.length}          label="Prérequis" color="#D97706"
          onClick={() => toggleDrawer('prereq')} />
        <StatChip value={`${pctDone}%`}           label="Avancement" color="#16A34A"
          onClick={() => toggleDrawer('avance')} />
      </div>

      {/* ── Stat drawer ── */}
      {drawer && (
        <SectionCard
          title={drawer==='bloque'?`Mes tâches bloquées (${byStatus.bloque.length})`:
                 drawer==='encours'?`En cours (${byStatus.encours.length})`:
                 drawer==='prereq'?`Prérequis actifs (${prereqs.length})`:
                 `Terminées (${byStatus.termine.length})`}
          accent={drawer==='bloque'?'#DC2626':drawer==='encours'?'#2563EB':
                  drawer==='prereq'?'#D97706':'#16A34A'}>
          <StatDrawer items={drawer==='bloque'?byStatus.bloque:drawer==='encours'?byStatus.encours:
                             drawer==='prereq'?prereqs:byStatus.termine} />
        </SectionCard>
      )}

      {/* ── Tâches cette semaine ── */}
      {weekIvs.length > 0 && (
        <SectionCard title={`Cette semaine — ${weekIvs.length} tâche${weekIvs.length>1?'s':''}`}>
          {weekIvs.sort((a,b) => a.start.localeCompare(b.start))
                  .map(iv => <TaskRow key={iv.id} iv={iv} />)}
        </SectionCard>
      )}
      {weekIvs.length === 0 && (
        <SectionCard title="Cette semaine">
          <div style={{padding:'16px 0',textAlign:'center',fontSize:12,color:'var(--muted)'}}>
            Aucune tâche planifiée cette semaine
          </div>
        </SectionCard>
      )}

      {/* ── Planning 3 semaines ── */}
      {timelineIvs.length > 0 && (
        <SectionCard title="Planning — 3 prochaines semaines">
          {timelineIvs
            .sort((a,b) => a.start.localeCompare(b.start))
            .map(iv => {
              const z = zones.find(x => x.id === iv.zone);
              const tr = trades.find(x => x.id === iv.trade);
              const c = getTC(tr?.color || 'navy');
              return (
                <div key={iv.id} onClick={() => onOpenDetail(iv.id)}
                  style={{display:'flex',gap:10,padding:'9px 0',
                    borderBottom:'1px solid var(--border)',cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                  <div style={{flexShrink:0,textAlign:'center',minWidth:36}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,color:c.b}}>
                      {fmtDate(iv.start).slice(0,5)}
                    </div>
                    {iv.end && iv.end !== iv.start && <div style={{fontFamily:"'DM Mono',monospace",
                      fontSize:9,color:'var(--xmuted)'}}>→ {fmtDate(iv.end).slice(0,5)}</div>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:1,
                      overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
                      {iv.task}
                    </div>
                    {z && <span style={{fontSize:10,color:'var(--xmuted)'}}>{z.name}</span>}
                  </div>
                  <StatusBadge status={iv.status} size="sm" />
                </div>
              );
            })}
        </SectionCard>
      )}

      {/* ── Toutes mes tâches par statut ── */}
      {['bloque','encours','arealis','termine'].map(st => {
        const items = byStatus[st];
        if (!items.length) return null;
        const labels = {bloque:'Bloquées',encours:'En cours',arealis:'À réaliser',termine:'Terminées'};
        const colors = {bloque:'#DC2626',encours:'#2563EB',arealis:'var(--muted)',termine:'#16A34A'};
        return (
          <SectionCard key={st} title={`${labels[st]} (${items.length})`} accent={colors[st]}>
            {items.sort((a,b) => a.start.localeCompare(b.start))
                  .map(iv => <TaskRow key={iv.id} iv={iv} />)}
          </SectionCard>
        );
      })}
    </div>
  );
}

function SectionCard({ title, children, accent }) {
  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',
      padding:'14px',marginBottom:12,boxShadow:'var(--shadow)'}}>
      <div style={{fontSize:11,fontWeight:700,color:accent||'var(--muted)',letterSpacing:'.05em',
        textTransform:'uppercase',marginBottom:12,fontFamily:"'DM Mono',monospace"}}>{title}</div>
      {children}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   PLANNING SCREEN (weekly grid)
═══════════════════════════════════════════════════════════ */
function PlanningScreen({ data, zones, trades, weekOffset, filter, session, onOpenDetail, onOpenAdd, viewMode, setZones }) {
  const weeks = viewMode === '3s' ? 3 : viewMode === '2s' ? 2 : 1;
  const isMulti = weeks > 1;
  const days = multiWeekDays(weekOffset, weeks);
  const isDark = document.documentElement.getAttribute('data-theme') === 'nuit';
  const filtered = filter === 'all' ? data : data.filter(i => i.trade === filter);
  const isAdmin = session?.role === 'admin';
  const zoneColW = isMulti ? '44px' : '54px';
  const deadlineColW = '34px';
  const dayColW = '1fr';
  const gridCols = `${zoneColW} repeat(${days.length}, ${dayColW}) ${deadlineColW}`;

  const [zoneFilter, setZoneFilter] = useState([]);
  const [dropOpen, setDropOpen] = useState(false);
  const dropRef = useRef();

  useEffect(() => {
    if (!dropOpen) return;
    const handler = e => { if (dropRef.current && !dropRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [dropOpen]);

  function toggleZone(id) {
    setZoneFilter(prev => {
      if (prev.length === 0) return zones.filter(z => z.id !== id).map(z => z.id);
      if (prev.includes(id)) { const next = prev.filter(x => x !== id); return next.length === zones.length ? [] : next; }
      const next = [...prev, id];
      return next.length === zones.length ? [] : next;
    });
  }
  const visibleZones = zoneFilter.length === 0 ? zones : zones.filter(z => zoneFilter.includes(z.id));
  const activeCount = zoneFilter.length;

  // Floor group boundaries for visual separation
  const floorOf = id => zones.find(z=>z.id===id)?.floor||'';

  return (
    <div style={{overflowY:'auto',height:'100%',padding:isMulti?0:'10px 0 100px',paddingBottom:100}}>
      <div style={{background:'var(--surface)',
        border:isMulti?'none':'1px solid var(--border)',
        margin:isMulti?0:'0 8px',
        borderRadius:isMulti?0:'var(--r)',
        boxShadow:isMulti?'none':'var(--shadow)',
        overflowX:'hidden'}}>
        <div style={{width:'100%'}}>

          {/* Header row */}
          <div style={{display:'grid',gridTemplateColumns:gridCols,background:'var(--surface-2)',
            borderBottom:'2px solid var(--border)',position:'sticky',top:0,zIndex:10}}>

            {/* Zone filter cell */}
            <div ref={dropRef} style={{padding:'5px 3px',borderRight:'1px solid var(--border)',
              display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <button onClick={() => setDropOpen(o => !o)}
                style={{width:'100%',padding:'4px 2px',borderRadius:'var(--r-xs)',
                  border:`1px solid ${dropOpen||activeCount?'var(--primary)':'var(--border)'}`,
                  background:activeCount?'var(--primary-l)':'transparent',
                  color:activeCount?'var(--primary)':'var(--muted)',
                  fontSize:8,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace",
                  letterSpacing:'.04em',textTransform:'uppercase',lineHeight:1.3}}>
                {activeCount ? `Zones\n(${activeCount})` : 'Zones ▾'}
              </button>
              {dropOpen && (
                <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,minWidth:220,
                  background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
                  boxShadow:'var(--shadow-md)',zIndex:50,overflow:'hidden'}}>
                  <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:'.05em'}}>Zones</span>
                    <button onClick={()=>{setZoneFilter([]);setDropOpen(false);}}
                      style={{fontSize:10,color:'var(--primary)',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Toutes</button>
                  </div>
                  {zones.map(z => {
                    const checked = zoneFilter.length===0||zoneFilter.includes(z.id);
                    const fc = FLOOR_COLORS[z.floor]||'#9CA3AF';
                    return (
                      <label key={z.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                        cursor:'pointer',borderBottom:'1px solid var(--border)',
                        background:checked?'var(--primary-l)':'transparent',transition:'background .1s'}}>
                        <input type="checkbox" checked={checked} onChange={()=>toggleZone(z.id)}
                          style={{width:14,height:14,accentColor:'var(--primary)',cursor:'pointer',flexShrink:0}} />
                        <span style={{width:8,height:8,borderRadius:'50%',background:fc,flexShrink:0}}></span>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{z.name}</div>
                          <div style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'var(--muted)'}}>{z.short}</div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Day headers */}
            {days.map((d,i) => {
              const isFirstOfWeek = i % 5 === 0 && i > 0;
              const holiday = isHoliday(d);
              const tcol = holiday?'#666':isToday(d)?'var(--primary)':'var(--muted)';
              return (
                <div key={i} style={{padding:isMulti?'4px 1px':'6px 2px',textAlign:'center',
                  borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                  background:holiday?'#D0D3D8':isToday(d)?'var(--primary-l)':'transparent',
                  overflow:'hidden'}}>
                  {!isMulti && <div style={{fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",
                    color:tcol,letterSpacing:'.02em'}}>
                    {DAYS_FR[d.getDay()-1]}
                  </div>}
                  <div style={{fontSize:isMulti?8:10,fontWeight:isMulti?700:400,color:tcol,lineHeight:1.2,
                    fontFamily:isMulti?"'DM Mono',monospace":undefined}}>
                    {isMulti ? d.getDate() : `${d.getDate()}/${d.getMonth()+1}`}
                  </div>
                  {holiday && <div style={{fontSize:6.5,color:'#555',fontWeight:700,fontFamily:"'DM Mono',monospace",marginTop:1,lineHeight:1}}>JF</div>}
                  {isMulti && isFirstOfWeek && <div style={{fontSize:6,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",marginTop:1}}>
                    S{Math.floor(d.getDate()/7)+1}
                  </div>}
                </div>
              );
            })}

            {/* Deadline header */}
            <div style={{padding:'4px 1px',textAlign:'center',borderLeft:'2px solid var(--border-s)',
              background:'rgba(220,38,38,.07)',display:'flex',alignItems:'center',justifyContent:'center',minHeight:30}}>
              <span style={{fontSize:7,fontWeight:800,color:'#DC2626',fontFamily:"'DM Mono',monospace",
                letterSpacing:'.06em',writingMode:'vertical-rl',transform:'rotate(180deg)',lineHeight:1}}>FIN</span>
            </div>
          </div>

          {/* Zone rows */}
          {visibleZones.map((zone, zi) => {
            const prevZone = visibleZones[zi - 1];
            const floorChange = zi > 0 && prevZone?.floor !== zone.floor;
            const fc  = FLOOR_COLORS[zone.floor] || '#9CA3AF';
            const dc  = deadlineColor(zone.deadline);
            const du  = daysUntil(zone.deadline);
            // Alternating row tint per floor
            const rowBg = zone.floor==='R+3' ? 'rgba(33,82,200,.025)' :
                          zone.floor==='R+2' ? 'rgba(13,148,136,.025)' : 'rgba(139,92,246,.025)';

            return (
              <div key={zone.id} style={{display:'grid',gridTemplateColumns:gridCols,
                borderTop:floorChange?`3px solid ${fc}`:`1px solid ${fc}40`,
                borderBottom:'none',background:rowBg}}>

                {/* Zone label */}
                <div style={{padding:isMulti?'3px 1px':'5px 3px',borderRight:'3px solid '+fc,
                  display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',
                  minHeight:isMulti?44:64,background:`${fc}12`}}>
                  <span style={{fontSize:isMulti?5.5:8,fontWeight:800,color:fc,lineHeight:1.2,
                    fontFamily:"'DM Mono',monospace",letterSpacing:'.03em',textTransform:'uppercase',
                    wordBreak:'break-all'}}>{zone.short}</span>
                </div>

                {/* Day cells */}
                {days.map((day,di)=>{
                  const ds = dateStr(day);
                  const isFirstOfWeek = di%5===0 && di>0;
                  const holiday = isHoliday(day);
                  const isDeadline = ds === zone.deadline;
                  const cards = holiday ? [] : filtered.filter(i=>i.zone===zone.id&&inDay(i,day))
                    .sort((a,b)=>(a.priority||3)-(b.priority||3));
                  const shown = cards; // show all, no truncation
                  const isPastDeadline = zone.deadline && ds > zone.deadline;
                  const cellBg = holiday?'#D0D3D8'
                    : isPastDeadline ? 'rgba(220,38,38,.09)'
                    : isDeadline ? 'rgba(220,38,38,.18)'
                    : isToday(day) ? 'color-mix(in srgb, var(--primary) 5%, transparent)'
                    : 'transparent';
                  return (
                    <div key={di} onClick={()=>isAdmin&&!holiday&&onOpenAdd(zone.id,ds)}
                      style={{padding:isMulti?1:2,minHeight:isMulti?44:64,
                        borderLeft:`${isFirstOfWeek?2:1}px solid ${isFirstOfWeek?'var(--border-s)':'var(--border)'}`,
                        background:cellBg,
                        borderLeftColor:isDeadline?'rgba(220,38,38,.6)':undefined,
                        borderLeftWidth:isDeadline?2:undefined,
                        cursor:isAdmin&&!holiday?'pointer':'default',transition:'background .1s'}}
                      onMouseEnter={e=>{if(isAdmin&&!holiday)e.currentTarget.style.background='var(--surface-2)';}}
                      onMouseLeave={e=>{e.currentTarget.style.background=cellBg;}}>
                      {isDeadline && (
                        <div style={{fontSize:7,fontWeight:800,color:'#DC2626',
                          fontFamily:"'DM Mono',monospace",padding:'1px 3px',
                          background:'rgba(220,38,38,.15)',textAlign:'center',
                          borderRadius:2,marginBottom:2,letterSpacing:'.04em'}}>
                          ⚑ JALON
                        </div>
                      )}
                      {shown.map(iv=>{
                        if (isMulti) {
                          const _tr=trades.find(t=>t.id===iv.trade);
                          const _c=getTC(_tr?.color||'blue');
                          const _m=STATUS_META[iv.status]||STATUS_META.arealis;
                          return (
                            <div key={iv.id} onClick={e=>{e.stopPropagation();onOpenDetail(iv.id);}}
                              style={{borderRadius:3,padding:'2px 3px',marginBottom:1,cursor:'pointer',
                                background:_c.bg,borderLeft:`2px solid ${_c.b}`,overflow:'hidden',
                                border:`0.5px solid ${_c.b}25`,borderLeftWidth:2,borderLeftColor:_c.b}}>
                              <div style={{display:'flex',alignItems:'center',gap:2,justifyContent:'space-between'}}>
                                <span style={{fontSize:weeks===2?7.5:7,fontWeight:700,color:_c.t,
                                  overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',lineHeight:1.2,flex:1}}>
                                  {iv.company}
                                </span>
                                <span style={{width:4,height:4,borderRadius:'50%',background:_m.dot,flexShrink:0}}></span>
                              </div>
                              {weeks===2 && <div style={{fontSize:7,color:_c.t,opacity:.7,lineHeight:1.2,
                                overflow:'hidden',display:'-webkit-box',WebkitLineClamp:1,WebkitBoxOrient:'vertical'}}>
                                {iv.task}
                              </div>}
                            </div>
                          );
                        }
                        return (
                          <TaskCard key={iv.id} iv={iv} trades={trades} isDark={isDark}
                            onClick={e=>{e.stopPropagation();onOpenDetail(iv.id);}} />
                        );
                      })}

                    </div>
                  );
                })}

                {/* Deadline cell — click to edit deadline */}
                {(()=>{
                  const wd = workingDaysUntil(zone.deadline);
                  const lbl = wd < 0 ? '▲' : `J-${wd}`;
                  const ds2 = zone.deadline?.slice(5,10).replace('-','/');
                  const [editing, setEditing] = React.useState(false);
                  return editing ? (
                    <div style={{borderLeft:'2px solid var(--border-s)',display:'flex',flexDirection:'column',
                      alignItems:'center',justifyContent:'center',padding:'3px 2px',
                      background:`${dc}18`,minHeight:isMulti?44:56}}>
                      <input
                        type="date"
                        defaultValue={zone.deadline||''}
                        autoFocus
                        onBlur={e => {
                          const val = e.target.value;
                          if (val && val !== zone.deadline) {
                            const updated = {...zone, deadline: val};
                            setZones(prev => prev.map(z => z.id===zone.id ? updated : z));
                            if (window._supaWrite) window._supaWrite('PATCH','zones',{deadline:val},'id=eq.'+zone.id);
                          }
                          setEditing(false);
                        }}
                        onKeyDown={e => { if(e.key==='Escape') setEditing(false); }}
                        style={{width:'100%',border:'none',background:'transparent',
                          fontSize:7,fontFamily:"'DM Mono',monospace",color:dc,
                          textAlign:'center',cursor:'pointer',outline:'none',padding:'1px'}}
                      />
                      <span style={{fontSize:6,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",lineHeight:1}}>
                        ↵ valider
                      </span>
                    </div>
                  ) : (
                    <div
                      onClick={isAdmin ? ()=>setEditing(true) : undefined}
                      title={isAdmin ? 'Cliquer pour modifier la date de fin' : undefined}
                      style={{borderLeft:'2px solid var(--border-s)',display:'flex',flexDirection:'column',
                        alignItems:'center',justifyContent:'center',padding:'2px 1px',
                        background:`${dc}12`,minHeight:isMulti?44:56,
                        cursor:isAdmin?'pointer':'default',
                        transition:'background .15s'}}
                      onMouseEnter={e=>{if(isAdmin)e.currentTarget.style.background=`${dc}25`;}}
                      onMouseLeave={e=>{e.currentTarget.style.background=`${dc}12`;}}>
                      <span style={{fontSize:isMulti?7.5:8.5,fontWeight:800,color:dc,
                        fontFamily:"'DM Mono',monospace",textAlign:'center',lineHeight:1.15,
                        whiteSpace:'nowrap',letterSpacing:'-.01em'}}>
                        {zone.deadline ? lbl : '—'}
                      </span>
                      <span style={{fontSize:6.5,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace",
                        marginTop:2,textAlign:'center',lineHeight:1,whiteSpace:'nowrap'}}>
                        {ds2||'ajouter'}
                      </span>
                      {isAdmin && <span style={{fontSize:5.5,color:dc,opacity:.5,marginTop:1,
                        fontFamily:"'DM Mono',monospace",lineHeight:1}}>✎</span>}
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   LIST SCREEN
═══════════════════════════════════════════════════════════ */
function ListScreen({ data, zones, trades, weekOffset, filter, onOpenDetail }) {
  const days = weekDays(weekOffset);
  const filtered = (filter==='all'?data:data.filter(i=>i.trade===filter))
    .filter(i=>days.some(d=>inDay(i,d)))
    .sort((a,b)=>a.start!==b.start?a.start.localeCompare(b.start):(a.priority||3)-(b.priority||3));

  if (!filtered.length) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      height:'100%',color:'var(--muted)',gap:8}}>
      <div style={{fontSize:36,opacity:.3}}>📋</div>
      <div style={{fontSize:15,fontWeight:600}}>Aucune intervention cette semaine</div>
      <div style={{fontSize:13}}>Changez la semaine ou le filtre</div>
    </div>
  );

  // Group by date
  const grouped = {};
  filtered.forEach(iv => {
    if (!grouped[iv.start]) grouped[iv.start] = [];
    grouped[iv.start].push(iv);
  });

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'12px 12px 100px'}}>
      {Object.entries(grouped).map(([date, ivs]) => (
        <div key={date} style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.06em',
            textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8,
            paddingBottom:5,borderBottom:'1px solid var(--border)'}}>
            {fmtDate(date)} — {new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long'})}
          </div>
          {ivs.map(iv=>{
            const z=zones.find(x=>x.id===iv.zone);
            const tr=trades.find(t=>t.id===iv.trade);
            const c=getTC(tr?.color||'blue');
            return (
              <div key={iv.id} onClick={()=>onOpenDetail(iv.id)}
                style={{background:'var(--surface)',border:'1px solid var(--border)',
                  borderLeft:`3px solid ${c.b}`,borderRadius:'var(--r-sm)',padding:'11px 13px',
                  marginBottom:7,cursor:'pointer',boxShadow:'var(--shadow)',transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translateX(2px)';e.currentTarget.style.borderColor=c.b;}}
                onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='var(--border)';}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{iv.company}</div>
                    {iv.task_number&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--muted)',marginTop:1}}>{iv.task_number}</div>}
                  </div>
                  <StatusBadge status={iv.status} size="sm" />
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:4,lineHeight:1.4}}>{iv.task}</div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {z&&<span style={{fontSize:11,color:'var(--xmuted)'}}>{z.name}</span>}
                  <TradeBadge tradeId={iv.trade} trades={trades} />
                  {iv.end&&iv.end!==iv.start&&<span style={{fontSize:10,color:'var(--xmuted)',fontFamily:"'DM Mono',monospace"}}>→ {fmtDate(iv.end)}</span>}
                </div>
                {iv.prereq&&<div style={{marginTop:6,fontSize:11,color:'#DC2626',background:'rgba(220,38,38,.08)',
                  borderLeft:'2px solid #DC2626',padding:'4px 7px',borderRadius:'0 4px 4px 0'}}>⚠ {iv.prereq}</div>}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   SETTINGS SCREEN
═══════════════════════════════════════════════════════════ */
function SettingsScreen({ zones, trades, setZones, setTrades }) {
  const [tab, setTab] = useState('zones');
  const [editingZone, setEditingZone] = useState(null);
  const [editingTrade, setEditingTrade] = useState(null);
  const [newZone, setNewZone] = useState(null);
  const [newTrade, setNewTrade] = useState(null);
  const PALETTE = Object.keys(TRADE_COLORS);

  function saveZone(z) {
    setZones(prev => prev.map(x => x.id===z.id ? z : x));
    setEditingZone(null);
    if (window._supaWrite) window._supaWrite('PATCH', 'zones',
      {name:z.name, short:z.short, floor:z.floor, deadline:z.deadline}, 'id=eq.'+z.id);
  }
  function saveTrade(t) {
    setTrades(prev => prev.map(x => x.id===t.id ? t : x));
    setEditingTrade(null);
    if (window._supaWrite) window._supaWrite('PATCH', 'trades',
      {name:t.name, short:t.short, color:t.color}, 'id=eq.'+t.id);
  }
  function addZone() {
    if (!newZone?.name||!newZone?.short) return;
    const z = {id:'z_'+genId(), name:newZone.name, short:newZone.short,
      floor:newZone.floor||'', deadline:newZone.deadline||null, display_order:zones.length};
    setZones(prev=>[...prev, z]);
    setNewZone(null);
    if (window._supaWrite) window._supaWrite('POST', 'zones', z);
  }
  function addTrade() {
    if (!newTrade?.name||!newTrade?.short) return;
    const t = {id:'tr_'+genId(), name:newTrade.name, short:newTrade.short,
      color:newTrade.color||'blue', display_order:trades.length};
    setTrades(prev=>[...prev, t]);
    setNewTrade(null);
    if (window._supaWrite) window._supaWrite('POST', 'trades', t);
  }

  return (
    <div style={{overflowY:'auto',height:'100%',padding:'16px 14px 100px'}}>
      <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:16}}>Configuration</div>
      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:16}}>
        {['zones','trades'].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:'9px',background:'transparent',border:'none',fontSize:13,fontWeight:600,
              cursor:'pointer',color:tab===t?'var(--primary)':'var(--muted)',fontFamily:"'DM Sans',sans-serif",
              borderBottom:tab===t?'2px solid var(--primary)':'2px solid transparent',marginBottom:-1}}>
            {t==='zones'?'Zones':'Corps de métier'}
          </button>
        ))}
      </div>

      {tab==='zones' && (
        <div>
          {zones.map((z,i)=>(
            <div key={z.id} style={{background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:'var(--r-sm)',padding:'11px 13px',marginBottom:7,boxShadow:'var(--shadow)'}}>
              {editingZone?.id===z.id ? (
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  <div style={{display:'flex',flexWrap:'wrap',gap:7,alignItems:'center'}}>
                    <input value={editingZone.name} onChange={e=>setEditingZone({...editingZone,name:e.target.value})}
                      style={{flex:1,minWidth:120,...inputSt}} placeholder="Nom complet" />
                    <input value={editingZone.short} onChange={e=>setEditingZone({...editingZone,short:e.target.value})}
                      style={{width:80,...inputSt}} placeholder="Court" />
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <label style={{fontSize:11,fontWeight:600,color:'var(--muted)',whiteSpace:'nowrap',fontFamily:"'DM Sans',sans-serif"}}>Date de fin :</label>
                    <input type="date" value={editingZone.deadline||''} onChange={e=>setEditingZone({...editingZone,deadline:e.target.value})}
                      style={{flex:1,...inputSt}} />
                  </div>
                  <div style={{display:'flex',gap:7}}>
                    <button onClick={()=>saveZone(editingZone)} style={{...miniBtn,flex:1,background:'var(--primary)',color:'#fff',border:'none'}}>Enregistrer</button>
                    <button onClick={()=>setEditingZone(null)} style={miniBtn}>Annuler</button>
                  </div>
                </div>
              ) : (
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:FLOOR_COLORS[z.floor]||'#9CA3AF',flexShrink:0}}></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{z.name}</div>
                    <div style={{display:'flex',gap:8,alignItems:'center',marginTop:2}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--muted)'}}>{z.short}</span>
                      {z.deadline && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                        color:deadlineColor(z.deadline),fontWeight:700}}>
                        J-{workingDaysUntil(z.deadline)} · {z.deadline?.slice(5).replace('-','/')}
                      </span>}
                    </div>
                  </div>
                  <button onClick={()=>setEditingZone(z)} style={miniBtn}>✎</button>
                </div>
              )}
            </div>
          ))}
          {newZone ? (
            <div style={{background:'var(--surface)',border:'1px solid var(--primary)',borderRadius:'var(--r-sm)',
              padding:'11px 13px',marginBottom:7,display:'flex',flexWrap:'wrap',gap:7,alignItems:'center'}}>
              <input value={newZone.name||''} onChange={e=>setNewZone({...newZone,name:e.target.value})}
                style={{flex:1,minWidth:120,...inputSt}} placeholder="Nom complet" autoFocus />
              <input value={newZone.short||''} onChange={e=>setNewZone({...newZone,short:e.target.value})}
                style={{width:80,...inputSt}} placeholder="Court (ex: R3-TIS)" />
              <button onClick={addZone} style={{...miniBtn,background:'var(--primary)',color:'#fff',border:'none'}}>Ajouter</button>
              <button onClick={()=>setNewZone(null)} style={miniBtn}>✕</button>
            </div>
          ) : (
            <button onClick={()=>setNewZone({})}
              style={{display:'flex',alignItems:'center',gap:6,color:'var(--primary)',fontSize:13,
                fontWeight:600,background:'transparent',border:'none',cursor:'pointer',padding:'8px 0',
                fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{fontSize:18,lineHeight:1}}>+</span> Ajouter une zone
            </button>
          )}
        </div>
      )}

      {tab==='trades' && (
        <div>
          {trades.map(tr=>{
            const c=getTC(tr.color);
            return (
              <div key={tr.id} style={{background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:'var(--r-sm)',padding:'11px 13px',marginBottom:7,boxShadow:'var(--shadow)'}}>
                {editingTrade?.id===tr.id ? (
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    <div style={{display:'flex',gap:7}}>
                      <input value={editingTrade.name} onChange={e=>setEditingTrade({...editingTrade,name:e.target.value})}
                        style={{flex:1,...inputSt}} placeholder="Nom" />
                      <input value={editingTrade.short} onChange={e=>setEditingTrade({...editingTrade,short:e.target.value})}
                        style={{width:70,...inputSt}} placeholder="Court" />
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {PALETTE.map(cl=>{const cc=getTC(cl);return(
                        <div key={cl} onClick={()=>setEditingTrade({...editingTrade,color:cl})}
                          style={{width:22,height:22,borderRadius:'50%',background:cc.b,cursor:'pointer',
                            border:editingTrade.color===cl?'3px solid var(--text)':'2px solid transparent',
                            transition:'transform .1s',transform:editingTrade.color===cl?'scale(1.2)':'scale(1)'}}></div>
                      );})}
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>saveTrade(editingTrade)} style={{...miniBtn,flex:1}}>Enregistrer</button>
                      <button onClick={()=>setEditingTrade(null)} style={miniBtn}>Annuler</button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{width:12,height:12,borderRadius:'50%',background:c.b,flexShrink:0,
                      border:`2px solid ${c.b}40`}}></span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{tr.name}</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--muted)',marginTop:1}}>{tr.short}</div>
                    </div>
                    <button onClick={()=>setEditingTrade(tr)} style={miniBtn}>✎</button>
                  </div>
                )}
              </div>
            );
          })}
          {newTrade ? (
            <div style={{background:'var(--surface)',border:'1px solid var(--primary)',borderRadius:'var(--r-sm)',
              padding:'12px 13px',marginBottom:7}}>
              <div style={{display:'flex',gap:7,marginBottom:8}}>
                <input value={newTrade.name||''} onChange={e=>setNewTrade({...newTrade,name:e.target.value})}
                  style={{flex:1,...inputSt}} placeholder="Nom du lot" autoFocus />
                <input value={newTrade.short||''} onChange={e=>setNewTrade({...newTrade,short:e.target.value})}
                  style={{width:70,...inputSt}} placeholder="Court" />
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                {PALETTE.map(cl=>{const cc=getTC(cl);return(
                  <div key={cl} onClick={()=>setNewTrade({...newTrade,color:cl})}
                    style={{width:22,height:22,borderRadius:'50%',background:cc.b,cursor:'pointer',
                      border:(newTrade.color||'blue')===cl?'3px solid var(--text)':'2px solid transparent'}}></div>
                );})}
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={addTrade} style={{...miniBtn,background:'var(--primary)',color:'#fff',border:'none',flex:1}}>Ajouter</button>
                <button onClick={()=>setNewTrade(null)} style={miniBtn}>Annuler</button>
              </div>
            </div>
          ) : (
            <button onClick={()=>setNewTrade({color:'blue'})}
              style={{display:'flex',alignItems:'center',gap:6,color:'var(--primary)',fontSize:13,
                fontWeight:600,background:'transparent',border:'none',cursor:'pointer',padding:'8px 0',
                fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{fontSize:18,lineHeight:1}}>+</span> Ajouter un corps de métier
            </button>
          )}
        </div>
      )}
    </div>
  );
}
const inputSt = {padding:'7px 9px',border:'1px solid var(--border)',borderRadius:'var(--r-xs)',
  fontSize:12,fontFamily:"'DM Sans',sans-serif",color:'var(--text)',background:'var(--surface)',outline:'none'};
const miniBtn = {padding:'5px 10px',borderRadius:'var(--r-xs)',border:'1px solid var(--border)',
  background:'var(--surface-2)',color:'var(--text)',fontSize:12,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"};

/* ════════════════════════════════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════════════════════════════ */
function DetailModal({ open, ivId, data, zones, trades, session, onClose, onStatusChange, onEdit, taskLogs, onSubmitLog }) {
  const iv = data.find(x=>x.id===ivId);
  const [tab, setTab] = React.useState('detail');
  // Logs: use passed taskLogs (Supabase) + local pending
  const [localLogs, setLocalLogs] = React.useState({});
  const [logType, setLogType] = React.useState('note');
  const [logMsg, setLogMsg]   = React.useState('');
  const [logPhoto, setLogPhoto] = React.useState(null); // base64
  const [mentions, setMentions] = React.useState(['Admin']);
  const [photoExpanded, setPhotoExpanded] = React.useState(null);
  const fileRef = React.useRef();
  const cameraRef = React.useRef();

  React.useEffect(() => { setTab('detail'); setLogMsg(''); setLogPhoto(null); }, [ivId]);

  if (!iv) return null;
  const z   = zones.find(x=>x.id===iv.zone);
  const tr  = trades.find(t=>t.id===iv.trade);
  const c   = getTC(tr?.color||'blue');
  const pred = iv.predecessor_id ? data.find(x=>x.id===iv.predecessor_id) : null;

  const isAdmin   = session?.role === 'admin';
  const myCompany = session?.company?.name || '';
  const isOwner   = isAdmin || iv.company === myCompany;

  // All unique company names for mention picker
  const allCompanies = ['Admin', ...new Set(COMPANIES.map(c=>c.name))].filter(Boolean);

  // Log types config
  const LOG_TYPES = {
    note:        { icon:'📝', label:'Note',        color:'#6B7280', bg:'var(--surface-2)',     hasMention:true },
    encours:     { icon:'🔵', label:'En cours',   color:'#2563EB', bg:'rgba(37,99,235,.08)',  hasMention:true },
    signalement: { icon:'⚠️', label:'Signalement', color:'#D97706', bg:'rgba(217,119,6,.08)',  hasMention:true },
    bloque:      { icon:'🔴', label:'Blocage',     color:'#DC2626', bg:'rgba(220,38,38,.08)',  hasMention:true },
    termine:     { icon:'✅', label:'Terminé',     color:'#16A34A', bg:'rgba(22,163,74,.08)',  hasMention:true },
  };

  const serverLogs = (taskLogs||{})[iv?.id] || [];
  const pendingLogs = (localLogs||{})[iv?.id] || [];
  const ivLogs = [...pendingLogs.filter(l=>!serverLogs.find(s=>s.id===l.id)), ...serverLogs];

  function handlePhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setLogPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }

  function submitLog() {
    if (!logMsg.trim() && !logPhoto) return;
    const now = new Date();
    const author = isAdmin ? 'Admin' : myCompany;
    const entry = {
      id: 'pending_' + Date.now(),
      task_id: iv.id,
      type: logType,
      message: logMsg.trim(),
      photo_url: logPhoto,
      photo: logPhoto, // compat
      mentioned: LOG_TYPES[logType].hasMention ? mentions : [],
      mentions: LOG_TYPES[logType].hasMention ? mentions : [],
      author,
      created_at: now.toISOString(),
      dateLabel: now.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'}),
      timeLabel: now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}),
    };
    // Add to local pending immediately for instant UI feedback
    setLocalLogs(prev => ({ ...prev, [iv.id]: [entry, ...(prev[iv.id]||[])] }));
    // Auto-change status
    if (logType === 'bloque')  onStatusChange(iv.id, 'bloque');
    if (logType === 'termine') onStatusChange(iv.id, 'termine');
    if (logType === 'encours') onStatusChange(iv.id, 'encours');
    // Persist to Supabase
    if (onSubmitLog) onSubmitLog(iv.id, entry);
    setLogMsg(''); setLogPhoto(null); setMentions(['Admin']);
  }

  function toggleMention(name) {
    if (name === 'Admin') return; // always keep admin
    setMentions(m => m.includes(name) ? m.filter(x=>x!==name) : [...m, name]);
  }

  const cfg = LOG_TYPES[logType];

  return (
    <SheetModal open={open} onClose={onClose}>
      {/* Color accent strip */}
      <div style={{height:4,background:c.b,margin:'-18px -18px 18px',borderRadius:'4px 4px 0 0'}}></div>

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div>
          <div style={{fontSize:19,fontWeight:700,color:'var(--text)',marginBottom:3}}>{iv.company}</div>
          {iv.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--muted)'}}>{iv.task_number}</span>}
        </div>
        <StatusBadge status={iv.status} />
      </div>
      <TradeBadge tradeId={iv.trade} trades={trades} size="md" />

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'2px solid var(--border)',margin:'14px 0 16px',gap:2}}>
        {[{k:'detail',l:'Détail'},{k:'suivi',l:`Suivi${ivLogs.length?` (${ivLogs.length})`:''}`}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{flex:1,padding:'9px 4px',background:'transparent',border:'none',cursor:'pointer',
              fontSize:13,fontWeight:600,
              color:tab===t.k?'var(--primary)':' var(--muted)',
              borderBottom:`2px solid ${tab===t.k?'var(--primary)':`transparent`}`,
              marginBottom:-2,fontFamily:"'DM Sans',sans-serif",transition:'color .15s'}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── TAB: DETAIL ─────────────────────────────────────── */}
      {tab==='detail' && <>
        <div style={{background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
          padding:'11px 13px',marginBottom:12,fontSize:14,color:'var(--text)',lineHeight:1.5}}>{iv.task}</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:12}}>
          {[
            {l:'Zone',  v:z?.name||iv.zone},
            {l:'Dates', v:fmtDate(iv.start)+(iv.end&&iv.end!==iv.start?' → '+fmtDate(iv.end):''),mono:true},
          ].map(kv=>(
            <div key={kv.l} style={{background:'var(--surface-2)',borderRadius:'var(--r-sm)',
              padding:'9px 11px',border:'1px solid var(--border)'}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:3,fontFamily:"'DM Mono',monospace"}}>{kv.l}</div>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text)',
                fontFamily:kv.mono?"'DM Mono',monospace":undefined}}>{kv.v}</div>
            </div>
          ))}
        </div>

        {pred && <div style={{background:'rgba(202,138,4,.1)',borderLeft:'3px solid #CA8A04',
          borderRadius:'0 6px 6px 0',padding:'8px 12px',marginBottom:10,fontSize:12}}>
          <b>Prédécesseur : {pred.task_number}</b><br/>
          <span style={{color:'var(--muted)'}}>{pred.company} — {pred.task}</span>
        </div>}
        {iv.prereq && <div style={{background:'rgba(220,38,38,.1)',borderLeft:'3px solid #DC2626',
          borderRadius:'0 6px 6px 0',padding:'8px 12px',marginBottom:10,fontSize:12,color:'#991B1B'}}>
          <b>⚠ Prérequis</b><br/>{iv.prereq}
        </div>}
        {iv.notes && <div style={{background:'rgba(22,163,74,.08)',borderLeft:'3px solid #16A34A',
          borderRadius:'0 6px 6px 0',padding:'8px 12px',marginBottom:10,fontSize:12}}>
          <b>Notes</b><br/>{iv.notes}
        </div>}

        {/* Attachments */}
        {iv.attachments&&iv.attachments.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
              textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>Pièces jointes</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {iv.attachments.map(f=>(
                <a key={f.id} href={f.url} target="_blank" rel="noopener noreferrer"
                  style={{display:'flex',alignItems:'center',gap:5,padding:'5px 9px',
                    background:'var(--surface-2)',border:'1px solid var(--border)',
                    borderRadius:'var(--r-xs)',fontSize:12,color:'var(--text)',textDecoration:'none'}}>
                  <span>{f.type==='application/pdf'?'📄':'🖼'}</span>
                  <span style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                </a>
              ))}
            </div>
          </div>
        )}

        {/* Status update */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
          textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>
          Mettre à jour le statut
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:14}}>
          {Object.entries(STATUS_META).map(([k,m])=>(
            <button key={k} onClick={()=>onStatusChange(iv.id,k)}
              style={{padding:'9px 6px',borderRadius:'var(--r-sm)',
                border:`1.5px solid ${iv.status===k?m.dot:'var(--border)'}`,
                background:iv.status===k?m.bg:'var(--surface)',cursor:'pointer',
                fontSize:12,fontWeight:500,color:iv.status===k?m.text:'var(--text)',
                display:'flex',alignItems:'center',justifyContent:'center',
                gap:6,transition:'all .15s',fontFamily:"'DM Sans',sans-serif"}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:m.dot,flexShrink:0}}></span>
              {m.label}
            </button>
          ))}
        </div>

        {isAdmin && <button onClick={()=>onEdit(iv.id)} style={{...btnPrimaryStyle,marginBottom:8}}>Modifier l'intervention</button>}
        <button onClick={onClose} style={btnSecStyle}>Fermer</button>
      </>}

      {/* ── TAB: SUIVI ──────────────────────────────────────── */}
      {tab==='suivi' && <>

        {/* Log type selector — only if owner or admin */}
        {isOwner && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
              textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:8}}>
              Type d'entrée
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
              {Object.entries(LOG_TYPES).map(([k,t])=>(
                <button key={k} onClick={()=>setLogType(k)}
                  style={{padding:'7px 11px',borderRadius:20,border:`1.5px solid ${logType===k?t.color:'var(--border)'}`,
                    background:logType===k?t.bg:'var(--surface)',cursor:'pointer',
                    fontSize:12,fontWeight:600,color:logType===k?t.color:'var(--muted)',
                    display:'flex',alignItems:'center',gap:5,transition:'all .15s',
                    fontFamily:"'DM Sans',sans-serif"}}>
                  <span>{t.icon}</span>{t.label}
                </button>
              ))}
            </div>

            {/* Message */}
            <textarea
              value={logMsg}
              onChange={e=>setLogMsg(e.target.value)}
              placeholder={`${cfg.icon} ${cfg.label} — votre message...`}
              style={{width:'100%',padding:'11px 12px',border:'1.5px solid var(--border)',
                borderRadius:'var(--r-sm)',fontSize:14,fontFamily:"'DM Sans',sans-serif",
                color:'var(--text)',background:'var(--surface)',resize:'vertical',
                minHeight:80,marginBottom:10,transition:'border-color .15s'}}
              onFocus={e=>e.target.style.borderColor=cfg.color}
              onBlur={e=>e.target.style.borderColor='var(--border)'}
            />

            {/* Photo preview */}
            {logPhoto && (
              <div style={{marginBottom:10,position:'relative',display:'inline-block'}}>
                <img src={logPhoto} alt="photo" onClick={()=>setPhotoExpanded(logPhoto)}
                  style={{height:80,borderRadius:'var(--r-sm)',border:'1px solid var(--border)',
                    cursor:'zoom-in',objectFit:'cover'}} />
                <button onClick={()=>setLogPhoto(null)}
                  style={{position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',
                    background:'#DC2626',color:'#fff',border:'none',cursor:'pointer',
                    fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
              </div>
            )}

            {/* Photo / Camera buttons */}
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              <input ref={fileRef} type="file" accept="image/*"
                style={{display:'none'}} onChange={handlePhoto} />
              <input ref={cameraRef} type="file" accept="image/*" capture="environment"
                style={{display:'none'}} onChange={handlePhoto} />
              <button onClick={()=>cameraRef.current?.click()}
                style={{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',
                  border:'1.5px solid var(--border)',borderRadius:'var(--r-sm)',
                  background:'var(--surface)',cursor:'pointer',fontSize:12,
                  fontWeight:500,color:'var(--text)',fontFamily:"'DM Sans',sans-serif"}}>
                📷 Appareil photo
              </button>
              <button onClick={()=>fileRef.current?.click()}
                style={{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',
                  border:'1.5px solid var(--border)',borderRadius:'var(--r-sm)',
                  background:'var(--surface)',cursor:'pointer',fontSize:12,
                  fontWeight:500,color:'var(--text)',fontFamily:"'DM Sans',sans-serif"}}>
                🖼 Choisir image
              </button>
            </div>

            {/* Mention picker */}
            {cfg.hasMention && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
                  textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:7}}>
                  Notifier
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {allCompanies.map(name => {
                    const selected = mentions.includes(name);
                    const isFixed  = name === 'Admin';
                    return (
                      <button key={name} onClick={()=>toggleMention(name)}
                        style={{padding:'5px 10px',borderRadius:20,fontSize:11,fontWeight:600,
                          border:`1.5px solid ${selected?'var(--primary)':' var(--border)'}`,
                          background:selected?'var(--primary-l)':' var(--surface)',
                          color:selected?'var(--primary)':' var(--muted)',
                          cursor:isFixed?'default':'pointer',
                          opacity:isFixed?1:1,fontFamily:"'DM Sans',sans-serif"}}>
                        {isFixed ? '🔒 Admin' : name}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Submit */}
            <button onClick={submitLog}
              disabled={!logMsg.trim() && !logPhoto}
              style={{width:'100%',padding:'12px',borderRadius:'var(--r-sm)',border:'none',
                background:(!logMsg.trim()&&!logPhoto)?'var(--border)':cfg.color,
                color:'#fff',fontSize:14,fontWeight:700,cursor:(!logMsg.trim()&&!logPhoto)?'not-allowed':'pointer',
                fontFamily:"'DM Sans',sans-serif",display:'flex',alignItems:'center',
                justifyContent:'center',gap:8,transition:'background .15s'}}>
              {cfg.icon} Enregistrer
            </button>
          </div>
        )}

        {/* ── Historique ── */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.05em',
          textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginBottom:10}}>
          Historique {ivLogs.length > 0 ? `(${ivLogs.length})` : ''}
        </div>

        {ivLogs.length === 0 && (
          <div style={{textAlign:'center',padding:'28px 0',color:'var(--xmuted)',fontSize:12}}>
            Aucune entrée pour l'instant
          </div>
        )}

        {ivLogs.map(log => {
          const lt = LOG_TYPES[log.type] || LOG_TYPES.note;
          return (
            <div key={log.id}
              style={{borderLeft:`3px solid ${lt.color}`,paddingLeft:12,
                marginBottom:14,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              {/* Log header */}
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
                <span style={{fontSize:14}}>{lt.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:lt.color}}>{lt.label}</span>
                <span style={{fontSize:11,fontWeight:600,color:'var(--text)'}}>{log.author}</span>
                <span style={{marginLeft:'auto',fontFamily:"'DM Mono',monospace",fontSize:10,
                  color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                  {log.dateLabel} {log.timeLabel}
                </span>
              </div>
              {/* Message */}
              {log.message && <div style={{fontSize:13,color:'var(--text)',lineHeight:1.5,marginBottom:log.photo?6:0}}>
                {log.message}
              </div>}
              {/* Photo */}
              {log.photo && (
                <img src={log.photo} alt="photo" onClick={()=>setPhotoExpanded(log.photo)}
                  style={{marginTop:6,maxHeight:140,maxWidth:'100%',borderRadius:'var(--r-sm)',
                    border:'1px solid var(--border)',cursor:'zoom-in',objectFit:'cover',display:'block'}} />
              )}
              {/* Mentions */}
              {log.mentions?.length > 0 && (
                <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
                  {log.mentions.map(m=>(
                    <span key={m} style={{fontSize:10,padding:'2px 7px',borderRadius:20,
                      background:'var(--primary-l)',color:'var(--primary)',fontWeight:600}}>
                      @{m}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}

        <button onClick={onClose} style={{...btnSecStyle,marginTop:4}}>Fermer</button>
      </>}

      {/* ── Photo fullscreen viewer ── */}
      {photoExpanded && (
        <div onClick={()=>setPhotoExpanded(null)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:999,
            display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <img src={photoExpanded} alt="fullscreen"
            style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:8}} />
          <button onClick={()=>setPhotoExpanded(null)}
            style={{position:'absolute',top:20,right:20,width:36,height:36,borderRadius:'50%',
              background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:18,
              cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      )}
    </SheetModal>
  );
}

/* ════════════════════════════════════════════════════════════
   ADD / EDIT MODAL
═══════════════════════════════════════════════════════════ */
function AddEditModal({ open, editId, preZone, preDate, data, zones, trades, onClose, onSave, onDelete }) {
  const existing = editId ? data.find(i=>i.id===editId) : null;
  const [form, setForm] = useState({});
  const [attachments, setAttachments] = useState([]);
  const [confirmDel, setConfirmDel] = useState(false);
  const companyNames = [...new Set(COMPANIES.map(c=>c.name))].sort();

  useEffect(()=>{
    if (open) {
      setForm(existing ? {
        zone: existing.zone||'', start: existing.start||'', end: existing.end||'',
        trade: existing.trade||'', company: existing.company||'', task: existing.task||'',
        priority: existing.priority||3, prereq: existing.prereq||'', notes: existing.notes||'',
        predecessor_id: existing.predecessor_id||'', status: existing.status||'arealis',
      } : {
        zone: preZone||'', start: preDate||dateStr(new Date()),
        end: preDate||dateStr(new Date()), trade:'', company:'', task:'',
        priority:3, prereq:'', notes:'', predecessor_id:'', status:'arealis',
      });
      setAttachments(existing?.attachments||[]);
    }
  }, [open, editId, preZone, preDate]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const PRIOS = [{v:1,l:'Urgente',c:'#DC2626'},{v:2,l:'Haute',c:'#EA580C'},{v:3,l:'Normale',c:'#CA8A04'},{v:4,l:'Basse',c:'#6B7280'},{v:5,l:'À conf.',c:'#9CA3AF'}];

  function handleSave() {
    if (!form.trade||!form.company||!form.task) { alert('Corps de métier, entreprise et description sont requis.'); return; }
    const tn = existing?.task_number || genTaskNum(data, form.company);
    onSave({
      id: editId||genId(), ...form,
      priority: form.priority||3, staff:1, progress:0, delay:0,
      task_number:tn, attachments,
    });
  }

  const predecessorList = data.filter(i=>i.id!==editId&&i.task_number)
    .sort((a,b)=>(a.task_number||'').localeCompare(b.task_number||''));

  return (
    <>
      <SheetModal open={open} onClose={onClose} maxH="95vh">
        <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginBottom:18}}>
          {editId?'Modifier l\'intervention':'Nouvelle intervention'}
        </div>
        <Field label="Zone *">
          <Select value={form.zone||''} onChange={e=>set('zone',e.target.value)}>
            <option value="">Sélectionner une zone…</option>
            {zones.map(z=><option key={z.id} value={z.id}>{z.name}</option>)}
          </Select>
        </Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:13}}>
          <Field label="Date début *"><Input type="date" value={form.start||''} onChange={e=>set('start',e.target.value)} /></Field>
          <Field label="Date fin"><Input type="date" value={form.end||''} onChange={e=>set('end',e.target.value)} /></Field>
        </div>
        <Field label="Corps de métier *">
          <Select value={form.trade||''} onChange={e=>set('trade',e.target.value)}>
            <option value="">Sélectionner…</option>
            {trades.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </Select>
        </Field>
        <Field label="Entreprise *">
          <Select value={form.company||''} onChange={e=>set('company',e.target.value)}>
            <option value="">Sélectionner…</option>
            {companyNames.map(n=><option key={n} value={n}>{n}</option>)}
          </Select>
        </Field>
        <Field label="Description *">
          <Input value={form.task||''} onChange={e=>set('task',e.target.value)} placeholder="ex : Pose cloisons R+3 plateau Est" />
        </Field>

        <Field label="Prédécesseur" hint="(optionnel)">
          <Select value={form.predecessor_id||''} onChange={e=>set('predecessor_id',e.target.value)}>
            <option value="">Aucun</option>
            {predecessorList.map(i=>{
              const z=zones.find(x=>x.id===i.zone);
              return <option key={i.id} value={i.id}>{i.task_number} — {i.company} — {i.task.slice(0,30)}{z?` (${z.short})`:''}</option>;
            })}
          </Select>
        </Field>
        <Field label="Prérequis / Point bloquant">
          <Textarea value={form.prereq||''} onChange={e=>set('prereq',e.target.value)}
            placeholder="ex : Zone libérée avant intervention…" rows={2} />
        </Field>
        <Field label="Notes / Consignes">
          <Textarea value={form.notes||''} onChange={e=>set('notes',e.target.value)}
            placeholder="Informations complémentaires…" rows={2} />
        </Field>
        <Field label="Pièces jointes" hint="PDF ou image">
          <AttachmentZone files={attachments} setFiles={setAttachments} />
        </Field>

        <button onClick={handleSave} style={btnPrimaryStyle}>Enregistrer</button>
        {editId&&<button onClick={()=>setConfirmDel(true)}
          style={{...btnSecStyle,width:'100%',marginTop:8,color:'var(--danger)',borderColor:'var(--danger)'}}>
          Supprimer cette intervention
        </button>}
        <button onClick={onClose} style={{...btnSecStyle,width:'100%',marginTop:8}}>Annuler</button>
      </SheetModal>
      <ConfirmDialog open={confirmDel} message="Supprimer définitivement cette intervention ?"
        onConfirm={()=>{setConfirmDel(false);onDelete(editId);}}
        onCancel={()=>setConfirmDel(false)} />
    </>
  );
}
