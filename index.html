function AddEditModal({ open, editId, preZone, preDate, data, zones, trades, companies, onClose, onSave, onDelete }) {
  const existing = editId ? data.find(i=>i.id===editId) : null;
  const [form, setForm] = useState({});
  const [attachments, setAttachments] = useState([]);
  const [confirmDel, setConfirmDel] = useState(false);
  const [saving, setSaving] = useState(false);
  const companyNames = [...new Set((companies&&companies.length?companies:COMPANIES).map(c=>c.name))].sort();

  useEffect(()=>{
    if (open) {
      setForm(existing ? {
        zone: existing.zone||'', start: existing.start||'', end: existing.end||'',
        trade: existing.trade||'', company: existing.company||'', task: existing.task||'',
        priority: existing.priority||3, prereq: existing.prereq||'', impact: existing.impact||'', notes: existing.notes||'',
        predecessor_id: existing.predecessor_id||'', status: existing.status||'arealis',
        _expected_updated_at: existing.updated_at||'',
      } : {
        zone: preZone||'', start: preDate||dateStr(new Date()),
        end: preDate||dateStr(new Date()), trade:'', company:'', task:'',
        priority:3, prereq:'', impact:'', notes:'', predecessor_id:'', status:'arealis',
      });
      setAttachments(existing?.attachments||[]);
    }
  }, [open, editId, preZone, preDate]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // New task default: if a task crosses a weekend, Saturday/Sunday are frozen automatically.
  // Example: Friday → Monday = Saturday + Sunday are excluded from worked days.
  useEffect(()=>{
    if (!open || editId) return;
    setForm(function(f){
      if (!f.start) return f;
      var auto = weekendOffDaysBetween(f.start, f.end||f.start);
      var previousAuto = f._auto_weekend_off_days || [];
      var currentOffs = f.off_days || [];
      var manualOffs = currentOffs.filter(function(ds){return !previousAuto.includes(ds);});
      var merged = Array.from(new Set(manualOffs.concat(auto)));
      if (JSON.stringify(merged) === JSON.stringify(currentOffs) &&
          JSON.stringify(auto) === JSON.stringify(previousAuto)) return f;
      return Object.assign({}, f, {off_days:merged, _auto_weekend_off_days:auto});
    });
  }, [open, editId, form.start, form.end]);

  const PRIOS = [{v:1,l:'Urgente',c:'#DC2626'},{v:2,l:'Haute',c:'#EA580C'},{v:3,l:'Normale',c:'#CA8A04'},{v:4,l:'Basse',c:'#6B7280'},{v:5,l:'À conf.',c:'#9CA3AF'}];

  async function handleSave() {
    if (saving) return;
    if (!form.trade||!form.company||!form.task) { alert('Corps de métier, entreprise et description sont requis.'); return; }
    const tn = existing?.task_number || genTaskNum(data, form.company);
    setSaving(true);
    try {
      var cleanForm = Object.assign({}, form);
      delete cleanForm._auto_weekend_off_days;
      await onSave({
        id: editId||genId(), ...cleanForm,
        priority: form.priority||3, staff:1, progress:0, delay:0,
        task_number:tn, attachments,

/* ════════════════════════════════════════════════════════════
   ERROR BOUNDARY
═══════════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, info) {
    console.error('[Planify ErrorBoundary]', error, info);
  }

  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          minHeight: '100vh',
          background: 'var(--bg)',
          color: 'var(--text)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: 20
        }}>
          <div style={{
            maxWidth: 520,
            width: '100%',
            background: 'var(--surface)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: 20,
            boxShadow: 'var(--shadow-md)'
          }}>
            <div style={{
              fontSize: 18,
              fontWeight: 700,
              marginBottom: 8,
              color: 'var(--danger)'
            }}>
              Une erreur est survenue
            </div>
            <div style={{
              fontSize: 13,
              color: 'var(--muted)',
              marginBottom: 14,
              lineHeight: 1.5
            }}>
              L’application a rencontré une erreur. Le DOM React reste intact.
            </div>
            <pre style={{
              background: 'var(--surface-2)',
              border: '1px solid var(--border)',
              borderRadius: 8,
              padding: 12,
              fontSize: 11,
              whiteSpace: 'pre-wrap',
              color: 'var(--danger)',
              marginBottom: 14
            }}>
              {String(this.state.error?.message || this.state.error)}
            </pre>
            <button
              onClick={() => window.location.reload()}
              style={{
                width: '100%',
                padding: 12,
                background: 'var(--primary)',
                color: '#fff',
                border: 'none',
                borderRadius: 'var(--r-sm)',
                fontSize: 14,
                fontWeight: 700,
                cursor: 'pointer',
                fontFamily: "'DM Sans', sans-serif"
              }}
            >
              Recharger l’application
            </button>
          </div>
        </div>
      );
    }

    return this.props.children;
  }
}

function HistoryModal({ open, history, session, onClose, onRefresh }) {
  function eventLabel(t) {
    return {
      status_change:'Changement de statut',
      task_created:'Tâche ajoutée',
      task_updated:'Tâche modifiée',
      task_deleted:'Tâche supprimée',
      planning_locked:'Planning verrouillé',
      planning_unlocked:'Planning déverrouillé',
      planning_validated:'Planning validé',
      planning_reindexed:'Planning réindexé'
    }[t] || t || 'Événement';
  }
  function eventColor(t) {
    if (t === 'status_change') return '#2563EB';
    if (t === 'planning_validated') return '#16A34A';
    if (t === 'planning_locked') return '#DC2626';
    if (t === 'planning_reindexed') return '#EA580C';
    return 'var(--muted)';
  }
  function fmtDT(s) {
    if (!s) return '';
    try {
      return new Date(s).toLocaleString('fr-FR', {
        day:'2-digit', month:'2-digit', year:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    } catch(e) { return s; }
  }

  function changeActionLabel(ch) {
    if (!ch) return 'Modification';
    if (ch.action) return ch.action;
    if (ch.label) return ch.label + ' modifié';
    return 'Modification';
  }

  const isAdminHistory = session?.role === 'admin';

  return (
    <SheetModal open={open} onClose={onClose} maxH="92vh">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>

          <div style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>Historique détaillé</div>

            Visible par tous les utilisateurs

        </div>

      </div>

      {(!history || history.length === 0) ? (
        <div style={{padding:'20px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>
          Aucun événement enregistré pour le moment.
        </div>
      ) : (
        <div>
          {history.map(function(ev){
            var c = eventColor(ev.event_type);
            return (
              <div key={ev.id || ev.created_at + ev.message}
                style={{background:'var(--surface)',border:'1px solid var(--border)',
                  borderLeft:'4px solid '+c,borderRadius:'var(--r-sm)',
                  padding:'11px 12px',marginBottom:8,boxShadow:'var(--shadow)'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:5}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>
                    {eventLabel(ev.event_type)}
                  </div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--xmuted)',whiteSpace:'nowrap'}}>
                    {fmtDT(ev.created_at)}
                  </div>
                </div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:5,lineHeight:1.4}}>
                  <b>{ev.actor_name || ev.actor_company || 'Utilisateur'}</b>
                  {ev.actor_role ? ' · '+ev.actor_role : ''}
                  {ev.actor_company && ev.actor_company !== ev.actor_name ? ' · '+ev.actor_company : ''}
                </div>
                {ev.task_number || ev.task_title ? (
                  <div style={{fontSize:12,color:'var(--text)',lineHeight:1.45,marginBottom:5}}>
                    {ev.task_number && <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,
                      color:'var(--xmuted)',background:'var(--surface-2)',padding:'1px 5px',
                      borderRadius:3,border:'1px solid var(--border)',marginRight:6}}>{ev.task_number}</span>}
                    {ev.task_company && <b>{ev.task_company} — </b>}
                    {ev.task_title}
                  </div>
                ) : null}
                {(ev.old_status || ev.new_status) && (
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>
                    {ev.old_status || '—'} → <span style={{color:c,fontWeight:800}}>{ev.new_status || '—'}</span>
                  </div>

                {ev.note && (

  function sbFetch(method, table, body, query) {

  function sbFetchRows(method, table, body, query) {

    var hdrs = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,

    };
    return fetch(url,{method:method,headers:hdrs,body:body?JSON.stringify(body):undefined})
      .then(function(r){

  function eqFilter(field, value) {

    var q = eqFilter('id', id);
    if (expectedUpdatedAt) q += '&' + eqFilter('updated_at', expectedUpdatedAt);
    return q;
  }
  function normalizeInterventionRow(r) {
    return Object.assign({}, r, {
      start: r.start_date,
      end: r.end_date,
      impact: r.impact || '',
      attachments: [],
      off_days: r.off_days || []
    });
  }

  function supaHeaders() {
    return {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  }
  function actorName() {
    return session&&session.role==='admin'?'Admin':(session&&session.company?session.company.name:'Utilisateur');
  }
  function actorRole() {
    return session&&session.role==='admin'?'admin':'company';
  }

  function valueTextForTaskField(key, value) {
    if (value == null) return '';
    if (key === 'zone') {
      var z = zones.find(function(x){ return x.id === value; });
      return z ? z.name + (z.short ? ' ('+z.short+')' : '') : String(value || '');
    }
    if (key === 'trade') {
      var tr = trades.find(function(x){ return x.id === value; });
      return tr ? tr.name : String(value || '');
    }
    if (key === 'status') {
      var st = STATUS_META[value];
      return st ? st.label : String(value || '');
    }
    if (key === 'priority') {
      return ({1:'Urgente',2:'Haute',3:'Normale',4:'Basse',5:'À confirmer'}[value]) || String(value || '');
    }
    if (key === 'start' || key === 'end') {
      return value ? fmtDate(String(value)) : '';
    }
    if (key === 'off_days') {
      var arr = Array.isArray(value) ? value : [];
      return arr.length ? arr.map(function(d){ return fmtDate(d); }).join(', ') : '';
    }
    return String(value || '').trim();
  }

  function buildTaskChangeDetails(before, after) {
    if (!before || !after) return [];
    var defs = [
      {key:'task', label:'Description'},
      {key:'company', label:'Entreprise'},
      {key:'trade', label:'Corps de métier'},
      {key:'zone', label:'Zone'},
      {key:'start', label:'Date de début'},
      {key:'end', label:'Date de fin'},
      {key:'status', label:'Statut'},
      {key:'priority', label:'Priorité'},
      {key:'prereq', label:'Prérequis / point bloquant'},
      {key:'impact', label:'Impact / dépendance'},
      {key:'notes', label:'Note'},
      {key:'off_days', label:'Jours gelés'},
    ];
    return defs.map(function(def){
      var oldVal = valueTextForTaskField(def.key, before[def.key]);
      var newVal = valueTextForTaskField(def.key, after[def.key]);
      if (oldVal === newVal) return null;
      var action = def.label + ' modifié';
      if (def.key === 'notes') action = 'Note modifiée';
      if (def.key === 'task') action = 'Description modifiée';
      if (def.key === 'off_days') action = 'Jours gelés modifiés';
      if (!oldVal && newVal) action = def.key === 'notes' ? 'Note ajoutée' : def.label + ' ajouté';
      if (oldVal && !newVal) action = def.key === 'notes' ? 'Note supprimée' : def.label + ' supprimé';
      return {
        field:def.key,

        action:action,
        old_value:oldVal,
        new_value:newVal
      };

  // ── Load all data from Supabase ──────────────────────────────────────
  function loadFromSupabase(sess) {
    var hdrs = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
    return Promise.all([
      fetch(SUPA_URL+'/rest/v1/zones?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/trades?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/companies?order=display_order',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/interventions?order=start_date',{headers:hdrs}),
      fetch(SUPA_URL+'/rest/v1/calendar_overrides?order=date',{headers:hdrs}),
    ]).then(function(rs){ return Promise.all(rs.map(function(r){return r.ok?r.json():[];})); })
    .then(function(results){
      var zData=results[0], tData=results[1], cData=results[2], iData=results[3], calData=results[4];
      if(zData&&zData.length) setZones(zData);
      if(tData&&tData.length) setTrades(tData.map(function(t){
        var loc=TRADES.find(function(lt){return lt.id===t.id;});
        return loc?Object.assign({},t,{color:loc.color}):t;
      }));
      if(cData&&cData.length) setCompanies(cData.map(function(c){
        return {id:c.id,name:c.name,contact:c.contact||'',code:c.code||'',tradeId:c.trade_id||c.tradeId||'',updated_at:c.updated_at||''};
      }));
      if(iData&&iData.length) setData(iData.map(normalizeInterventionRow));
      setCalendarOverrides((calData||[]).map(function(r){
        return {date:r.date,label:r.label||'',is_worked:!!r.is_worked,updated_at:r.updated_at||''};
      }));
      return results;
    }).catch(function(e){ console.warn('[Planify] Load failed, using local data:',e); notify('Erreur de mise à jour','error'); throw e; });
  }

  function handleHolidayWorked(ds, label, isWorked) {
    var row = {date:ds,label:label||'',is_worked:!!isWorked,updated_at:new Date().toISOString()};

      var found = false;
      var next = (prev||[]).map(function(o){

  useEffect(function(){
    if (!session || !window.supabase || !window.supabase.createClient) return;
    var client = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    var channel = client.channel('planify-live-'+Date.now())
      .on('postgres_changes', {event:'*', schema:'public', table:'interventions'}, scheduleRealtimeActualiser)
      .on('postgres_changes', {event:'*', schema:'public', table:'planning_versions'}, scheduleRealtimeActualiser)
      .on('postgres_changes', {event:'*', schema:'public', table:'planning_events'}, scheduleRealtimeActualiser)

    realtimeRef.current = {client:client, channel:channel};

  // ── Status change → save to Supabase ────────────────────────────────
  async function handleStatusChange(id, status, noteText) {
    if (!canChangeStatus) {
      alert('Planning validé : les statuts ne peuvent plus être modifiés sur cette version.');
      throw new Error('Planning validé.');
    }
    var iv = data.find(function(i){return i.id===id;});
    if (!iv) throw new Error('Tâche introuvable. Actualisez puis réessayez.');
    var oldStatus = iv.status || '';
    var oldMeta = STATUS_META[oldStatus] || {label:oldStatus || '—'};
    var newMeta = STATUS_META[status] || {label:status || '—'};
    var z = zones.find(function(x){return x.id===iv.zone;}) || null;
    var newUpdatedAt = new Date().toISOString();
    setBusyKey('status_'+id, true);

    try {
      var rows = await sbFetchRows('PATCH','interventions',{
        status:status,
        updated_at:newUpdatedAt
      }, conflictQuery(id, iv.updated_at));
      if (iv.updated_at && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant de réessayer.');
      }
      var saved = rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, iv, {status:status, updated_at:newUpdatedAt});
      setData(function(prev){ return prev.map(function(i){ return i.id===id?saved:i; }); });

      var author = actorName();
      await addPlanningEvent({
        event_type:'status_change',
        task_id:id,
        task_number:iv.task_number||'',
        task_title:iv.task||'',
        task_company:iv.company||'',
        zone_id:iv.zone||'',
        zone_name:z?z.name:'',
        old_status:oldMeta.label,
        new_status:newMeta.label,
        note:noteText&&noteText.trim()?noteText.trim():'',
        message:author+' a modifié le statut de '+(iv.task_number||iv.task)+' : '+oldMeta.label+' → '+newMeta.label,
        payload:{old_status:oldStatus,new_status:status}
      });

      if(noteText&&noteText.trim()) {
        var logRow = {task_id:id,company:author,author:author,type:status,
          message:noteText.trim(),photo_url:null,mentioned:['Admin']};
        sbFetch('POST','task_logs',logRow)
          .then(function(){
            var taskRef = iv?iv.task_number||iv.task.slice(0,30):'';
            var msg = author+' · '+status+' · '+taskRef;
            sbFetch('POST','notifications',[{company:'Admin',task_id:id,message:msg,read:false}]);
          }).catch(function(){});
      }
      notify('Statut sauvegardé ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur de sauvegarde','error',4200);
      throw e;
    } finally {
      setBusyKey('status_'+id, false);
    }
  }

  // ── Save new/edited task → Supabase ─────────────────────────────────
  async function handleSave(iv) {
    if (!canEditPlanning) {
      var msg = planningValidated ? 'Planning validé : réindexez une nouvelle version pour modifier les tâches.' : 'Planning verrouillé : seules les modifications de statut sont autorisées.';
      alert(msg); throw new Error(msg);
    }
    var existing = data.find(function(i){return i.id===iv.id;});
    var expectedUpdatedAt = iv._expected_updated_at || (existing&&existing.updated_at) || '';
    var cleanIv = Object.assign({}, iv);
    delete cleanIv._expected_updated_at;
    var newUpdatedAt = new Date().toISOString();
    var row = {
      id:cleanIv.id, trade:cleanIv.trade, company:cleanIv.company, task:cleanIv.task,
      zone:cleanIv.zone, start_date:cleanIv.start, end_date:cleanIv.end||cleanIv.start,
      status:cleanIv.status||'arealis', priority:cleanIv.priority||3,
      prereq:cleanIv.prereq||'', impact:cleanIv.impact||'', notes:cleanIv.notes||'',
      task_number:cleanIv.task_number||null, predecessor_id:null,
      off_days:cleanIv.off_days||[], updated_at:newUpdatedAt
    };

    setBusyKey('task_save', true);
    try {
      var rows = existing
        ? await sbFetchRows('PATCH','interventions',row,conflictQuery(cleanIv.id, expectedUpdatedAt))
        : await sbFetchRows('POST','interventions',row);
      if (existing && expectedUpdatedAt && (!rows || !rows.length)) {
        await syncAll(false).catch(function(){});
        throw new Error('Cette tâche a été modifiée par un autre utilisateur. Actualisez avant d’enregistrer.');
      }
      var saved = rows && rows[0] ? normalizeInterventionRow(rows[0]) : Object.assign({}, cleanIv, {updated_at:newUpdatedAt});
      setData(function(prev){
        var idx = prev.findIndex(function(i){return i.id===saved.id;});
        if(idx>=0){ var n=[].concat(prev); n[idx]=saved; return n; }
        return prev.concat([saved]);
      });
      closeModal();
      var z = zones.find(function(x){return x.id===cleanIv.zone;});
      var taskChanges = existing ? buildTaskChangeDetails(existing, saved) : [];
      await addPlanningEvent({
        event_type:existing?'task_updated':'task_created',
        task_id:cleanIv.id,
        task_number:cleanIv.task_number||'',
        task_title:cleanIv.task||'',
        task_company:cleanIv.company||'',
        zone_id:cleanIv.zone||'',
        zone_name:z?z.name:'',
        message:(existing?'Tâche modifiée : ':'Tâche ajoutée : ')+(cleanIv.task_number||cleanIv.task)+(existing&&taskChanges.length?' · '+taskChanges.length+' champ'+(taskChanges.length>1?'s':'')+' modifié'+(taskChanges.length>1?'s':''):''),
        payload:{intervention:saved,changes:taskChanges}
      });
      notify('Tâche sauvegardée ✓','success');
      return saved;
    } catch(e) {
      notify(e.message || 'Erreur de sauvegarde','error',4200);
      throw e;
    } finally {
      setBusyKey('task_save', false);
    }
  }

  // ── Download planning as PDF / XLSX ───────────────────────────────────
  function getExportWeeks(mode) {
    if (mode === 'tout') {
      var now = new Date(); now.setHours(0,0,0,0);
      var maxWeeks = 1;
      zones.forEach(function(z){
        if (z.deadline) {
          var d = new Date(z.deadline+'T00:00:00');
          var w = Math.ceil((d - now)/(7*24*3600*1000)) + 1;
          if (w > maxWeeks) maxWeeks = w;
        }
      });
      return Math.max(1, Math.min(maxWeeks, 16));
    }
    return mode === '3s' ? 3 : mode === '2s' ? 2 : 1;
  }

  function getPlanningExportRows(mode) {
    var weeks = getExportWeeks(mode);
    var days = multiWeekDays(weekOffset, weeks);
    var first = days[0];
    var last = days[days.length - 1];
    var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
    var rows = source.filter(function(iv){
      return days.some(function(d){ return isTaskActiveOn(iv, d); });
    }).sort(function(a,b){
      return (a.start||'').localeCompare(b.start||'') ||
             (a.zone||'').localeCompare(b.zone||'') ||
             (a.company||'').localeCompare(b.company||'');
    }).map(function(iv){
      var z = zones.find(function(x){ return x.id === iv.zone; });
      var tr = trades.find(function(x){ return x.id === iv.trade; });
      var st = STATUS_META[iv.status] || STATUS_META.arealis;
      return {
        zone: z ? z.name : iv.zone,
        zoneShort: z ? z.short : iv.zone,
        floor: z ? z.floor : '',
        trade: tr ? tr.name : iv.trade,
        company: iv.company || '',
        taskNumber: iv.task_number || '',
        task: iv.task || '',
        status: st.label,
        start: fmtDate(iv.start),
        end: fmtDate(iv.end || iv.start),
        prereq: iv.prereq || '',
        impact: iv.impact || '',
        notes: iv.notes || '',
        offDays: (iv.off_days || []).map(fmtDate).join(', '),
      };
    });
    return {rows: rows, first: first, last: last, weeks: weeks};
  }

  function exportPlanning(format, mode) {
    var pack = getPlanningExportRows(mode);
    var rows = pack.rows;
    var period = dateStr(pack.first).replaceAll('-','') + '_' + dateStr(pack.last).replaceAll('-','');
    var label = mode.toUpperCase();
    var fileBase = 'planify_hsf_planning_' + label + '_' + period;
    var headers = ['Zone','Étage','Entreprise','Lot','N° tâche','Tâche','Statut','Début','Fin','Prérequis / blocage','Impact','Notes','Jours gelés'];
    var body = rows.map(function(r){ return [
      r.zone, r.floor, r.company, r.trade, r.taskNumber, r.task, r.status,
      r.start, r.end, r.prereq, r.impact || '', r.notes, r.offDays
    ]; });

    if (!rows.length) {
      alert('Aucune tâche à exporter sur cette période.');
      return;
    }

    if (format === 'xlsx') {
      if (!window.XLSX) {
        alert('La librairie XLSX n’est pas chargée. Vérifiez la connexion internet puis rechargez la page.');
        return;
      }
      var aoa = [
        ['Planify — HSF 66 Av. Marceau'],
        ['Vue', label, 'Période', fmtDate(dateStr(pack.first)) + ' au ' + fmtDate(dateStr(pack.last))],
        [],
        headers
      ].concat(body);
      var ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [
        {wch:26},{wch:8},{wch:18},{wch:16},{wch:12},{wch:52},
        {wch:14},{wch:12},{wch:12},{wch:32},{wch:32},{wch:32},{wch:20}
      ];
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Planning '+label);
      XLSX.writeFile(wb, fileBase + '.xlsx');
      return;
    }

    if (format === 'pdf') {
      var JSPDF = window.jspdf && window.jspdf.jsPDF;
      if (!JSPDF) {
        alert('La librairie PDF n’est pas chargée. Vérifiez la connexion internet puis rechargez la page.');
        return;
      }

      function hexToRgb(hex) {
        var h = String(hex || '#999999').replace('#','');
        if (h.length === 3) h = h.split('').map(function(x){ return x + x; }).join('');
        var n = parseInt(h, 16);
        return Number.isNaN(n) ? [153,153,153] : [(n >> 16) & 255, (n >> 8) & 255, n & 255];
      }
      function mixWhite(rgb, ratio) {
        return rgb.map(function(v){ return Math.round(v + (255 - v) * ratio); });
      }
      function clean(v) {
        return String(v == null ? '' : v).replace(/\s+/g, ' ').trim();
      }
      function drawWrapped(doc, text, x, y, w, maxLines, lh) {
        var raw = clean(text);
        if (!raw) return y;
        var lines = doc.splitTextToSize(raw, w);
        if (lines.length > maxLines) {
          lines = lines.slice(0, maxLines);
          lines[lines.length - 1] = lines[lines.length - 1].replace(/\s+$/,'') + '…';
        }
        lines.forEach(function(line, idx){ doc.text(line, x, y + idx * lh); });
        return y + lines.length * lh;
      }
      function visibleInDay(iv, day) {
        if (!inDay(iv, day)) return false;
        var ds = dateStr(day);
        if ((iv.off_days || []).includes(ds)) return false;
        if (isHoliday(day)) return false;
        return true;
      }
      function weekTasks(days) {
        var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
        return source.filter(function(iv){ return days.some(function(d){ return visibleInDay(iv, d); }); });
      }
      function deadlineTxt(zone) {
        if (!zone.deadline) return ['—',''];
        var wd = workingDaysUntil(zone.deadline);
        return [wd < 0 ? '▲' : 'J-' + wd, fmtDate(zone.deadline).slice(0,5)];
      }

      var totalWeeks = getExportWeeks(mode);
      var doc = new JSPDF({orientation:'landscape', unit:'pt', format:'a4'});
      var pageW = doc.internal.pageSize.getWidth();
      var pageH = doc.internal.pageSize.getHeight();
      var margin = 12;
      var headerH = 30;
      var top = 42;
      var bottom = 8;
      var tableW = pageW - margin * 2;
      var zoneW = 50;
      var finW = 34;
      var dayW = (tableW - zoneW - finW) / 5;
      var th = 24;
      var dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
      var exported = 0;

      for (var wi = 0; wi < totalWeeks; wi++) {
        if (wi > 0) doc.addPage('a4', 'landscape');

        var days = weekDays(weekOffset + wi);
        var tasksForWeek = weekTasks(days);
        exported += tasksForWeek.length;
        var periodLabel = fmtDate(dateStr(days[0])) + ' au ' + fmtDate(dateStr(days[days.length - 1]));
        var sourceForWeek = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
        var maxTableH = pageH - top - bottom;
        var availableRowsH = maxTableH - th;
        var minCardH = 10.5;
        var minRowH = 28;
        var needs = zones.map(function(zone){
          var maxCards = 0;
          days.forEach(function(day){
            if (isHoliday(day)) return;
            var count = sourceForWeek.filter(function(iv){ return iv.zone === zone.id && visibleInDay(iv, day); }).length;
            if (count > maxCards) maxCards = count;
          });
          return Math.max(minRowH, maxCards ? (maxCards * minCardH + Math.max(0, maxCards - 1) * 1 + 8) : minRowH);
        });
        var needSum = needs.reduce(function(a,b){ return a + b; }, 0) || 1;
        var scale = needSum > availableRowsH ? availableRowsH / needSum : 1;
        var rowHeights = needs.map(function(n){ return Math.max(22, Math.floor(n * scale)); });
        var usedRowsH = rowHeights.reduce(function(a,b){ return a + b; }, 0);
        if (usedRowsH < availableRowsH) {
          var bonus = Math.floor((availableRowsH - usedRowsH) / Math.max(1, zones.length));
          rowHeights = rowHeights.map(function(h){ return h + bonus; });
        }
        var tableH = th + rowHeights.reduce(function(a,b){ return a + b; }, 0);

        // Fond + header sombre type application
        doc.setFillColor(244,242,238);
        doc.rect(0, 0, pageW, pageH, 'F');
        doc.setFillColor(26,26,26);
        doc.roundedRect(margin, 8, tableW, headerH, 7, 7, 'F');
        doc.setTextColor(255,255,255);
        doc.setFont('helvetica','bold');
        doc.setFontSize(11.5);
        doc.text('Planify — HSF 66 Av. Marceau', margin + 10, 23);
        doc.setFont('helvetica','normal');
        doc.setFontSize(6.7);
        doc.setTextColor(215,215,215);
        doc.text('Planning ' + label + ' · Semaine ' + (wi + 1) + '/' + totalWeeks + ' · ' + periodLabel, margin + 10, 37);
        doc.text(tasksForWeek.length + ' tâche(s) · export ' + new Date().toLocaleDateString('fr-FR'), pageW - margin - 125, 37);

        var x0 = margin;
        var y0 = top;

        // Cadre global
        doc.setFillColor(255,255,255);
        doc.setDrawColor(200,196,188);
        doc.roundedRect(x0, y0, tableW, tableH, 6, 6, 'FD');

        // En-tête tableau
        doc.setFillColor(249,248,245);
        doc.rect(x0, y0, zoneW, th, 'F');
        doc.rect(x0 + zoneW + 5 * dayW, y0, finW, th, 'F');
        doc.setTextColor(90,90,90);
        doc.setFont('helvetica','bold');
        doc.setFontSize(7.5);
        doc.text('ZONE', x0 + 8, y0 + 16);
        doc.text('FIN', x0 + zoneW + 5 * dayW + 13, y0 + 16);

        days.forEach(function(day, di) {
          var x = x0 + zoneW + di * dayW;
          var holiday = isHoliday(day);
          var today = isToday(day);
          if (holiday) doc.setFillColor(209,213,219);
          else if (today) doc.setFillColor(238,242,252);
          else doc.setFillColor(249,248,245);
          doc.rect(x, y0, dayW, th, 'F');
          doc.setFont('helvetica','bold');
          doc.setFontSize(7.5);
          doc.setTextColor(today ? 33 : 90, today ? 82 : 90, today ? 200 : 90);
          doc.text(dayNames[day.getDay()].toUpperCase(), x + 8, y0 + 10);
          doc.setFont('helvetica','normal');
          doc.setFontSize(7);
          doc.text(String(day.getDate()).padStart(2,'0') + '/' + String(day.getMonth()+1).padStart(2,'0'), x + 8, y0 + 20);
          if (holiday) {
            doc.setFont('helvetica','bold');
            doc.setTextColor(70,70,70);
            doc.text('JF', x + dayW - 18, y0 + 16);
          }
        });

        // Lignes zones + cellules
        var currentY = y0 + th;
        zones.forEach(function(zone, zi) {
          var rowH = rowHeights[zi];
          var y = currentY;
          currentY += rowH;
          var fc = FLOOR_COLORS[zone.floor] || '#9CA3AF';
          var fcRgb = hexToRgb(fc);
          var rowBg = mixWhite(fcRgb, 0.95);
          doc.setFillColor(rowBg[0], rowBg[1], rowBg[2]);
          doc.rect(x0, y, tableW, rowH, 'F');
          doc.setDrawColor(228,224,216);
          doc.setLineWidth(0.5);
          doc.line(x0, y, x0 + tableW, y);

          // Zone
          var zoneBg = mixWhite(fcRgb, 0.88);
          doc.setFillColor(zoneBg[0], zoneBg[1], zoneBg[2]);
          doc.rect(x0, y, zoneW, rowH, 'F');
          doc.setDrawColor(fcRgb[0], fcRgb[1], fcRgb[2]);
          doc.setLineWidth(2);
          doc.line(x0 + zoneW - 2, y, x0 + zoneW - 2, y + rowH);
          doc.setTextColor(fcRgb[0], fcRgb[1], fcRgb[2]);
          doc.setFont('helvetica','bold');
          doc.setFontSize(7);
          drawWrapped(doc, zone.short || zone.name, x0 + 6, y + 15, zoneW - 12, 2, 8);
          doc.setFont('helvetica','normal');
          doc.setFontSize(6);
          doc.setTextColor(90,90,90);
          drawWrapped(doc, zone.floor || '', x0 + 6, y + rowH - 9, zoneW - 12, 1, 7);

          days.forEach(function(day, di) {
            var x = x0 + zoneW + di * dayW;
            var ds = dateStr(day);
            var holiday = isHoliday(day);
            var isDeadline = zone.deadline && ds === zone.deadline;
            var isPast = zone.deadline && ds > zone.deadline;
            if (holiday) {
              doc.setFillColor(209,213,219);
              doc.rect(x, y, dayW, rowH, 'F');
            } else if (isDeadline) {
              doc.setFillColor(254,226,226);
              doc.rect(x, y, dayW, rowH, 'F');
            } else if (isPast) {
              doc.setFillColor(254,242,242);
              doc.rect(x, y, dayW, rowH, 'F');
            }
            doc.setDrawColor(228,224,216);
            doc.setLineWidth(0.4);
            doc.line(x, y, x, y + rowH);

            var source = filter === 'all' ? data : data.filter(function(i){ return i.trade === filter; });
            var cards = holiday ? [] : source.filter(function(iv){
              return iv.zone === zone.id && visibleInDay(iv, day);
            }).sort(function(a,b){ return (a.priority||3)-(b.priority||3); });

            var cardX = x + 2;
            var cardY = y + 3;
            var cardW = dayW - 4;
            var gap = cards.length > 5 ? 0.6 : 1.1;
            var availableH = Math.max(10, rowH - 5);
            var cardH = cards.length ? Math.min(22, (availableH - Math.max(0, cards.length - 1) * gap) / cards.length) : 0;
            cardH = Math.max(8.8, cardH);
            var compact = cardH < 13;
            var ultraCompact = cardH < 10.5;
            var titleFs = ultraCompact ? 4.2 : compact ? 4.8 : 5.6;
            var taskFs = ultraCompact ? 3.8 : compact ? 4.3 : 5.0;
            var lh = ultraCompact ? 4.2 : compact ? 4.8 : 5.8;

            cards.forEach(function(iv) {
              var tr = trades.find(function(t){ return t.id === iv.trade; });
              var col = getTC(tr ? tr.color : 'blue');
              var rgb = hexToRgb(col.b);
              var fill = mixWhite(rgb, 0.90);
              var st = STATUS_META[iv.status] || STATUS_META.arealis;
              var stRgb = hexToRgb(st.dot);

              doc.setFillColor(fill[0], fill[1], fill[2]);
              doc.setDrawColor(rgb[0], rgb[1], rgb[2]);
              doc.setLineWidth(0.45);
              doc.roundedRect(cardX, cardY, cardW, cardH, 2, 2, 'FD');
              doc.setFillColor(rgb[0], rgb[1], rgb[2]);
              doc.rect(cardX, cardY, 2, cardH, 'F');

              doc.setTextColor(rgb[0], rgb[1], rgb[2]);
              doc.setFont('helvetica','bold');
              doc.setFontSize(titleFs);
              var title = (iv.company || '') + (iv.task_number ? ' · ' + iv.task_number : '');
              drawWrapped(doc, title, cardX + 4, cardY + (ultraCompact ? 4.4 : 5.8), cardW - 16, 1, lh);
              doc.setFillColor(stRgb[0], stRgb[1], stRgb[2]);
              doc.circle(cardX + cardW - 5, cardY + (ultraCompact ? 3.8 : 5.2), ultraCompact ? 1.2 : 1.7, 'F');

              doc.setTextColor(45,45,45);
              doc.setFont('helvetica','normal');
              doc.setFontSize(taskFs);
              if (ultraCompact) {
                drawWrapped(doc, iv.task || '', cardX + 4, cardY + cardH - 2.2, cardW - 8, 1, lh);
              } else {
                drawWrapped(doc, iv.task || '', cardX + 4, cardY + 11.2, cardW - 8, compact ? 1 : 2, lh);
              }

              if (!compact && iv.prereq && cardH >= 16) {
                doc.setTextColor(185,28,28);
                doc.setFontSize(4.2);
                drawWrapped(doc, '⚠ ' + iv.prereq, cardX + 4, cardY + cardH - 3, cardW - 8, 1, 4.5);
              } else if (!compact && iv.impact && cardH >= 16) {
                doc.setTextColor(146,64,14);
                doc.setFontSize(4.2);
                drawWrapped(doc, '↪ ' + iv.impact, cardX + 4, cardY + cardH - 3, cardW - 8, 1, 4.5);
              }

              cardY += cardH + gap;
            });
          });

          // Jalon
          var dx = x0 + zoneW + 5 * dayW;
          var dc = hexToRgb(deadlineColor(zone.deadline));
          var dlBg = mixWhite(dc, 0.90);
          doc.setFillColor(dlBg[0], dlBg[1], dlBg[2]);
          doc.rect(dx, y, finW, rowH, 'F');
          doc.setTextColor(dc[0], dc[1], dc[2]);
          doc.setFont('helvetica','bold');
          doc.setFontSize(7);
          var dl = deadlineTxt(zone);
          doc.text(dl[0], dx + 8, y + 18);
          doc.setFont('helvetica','normal');
          doc.setFontSize(6);
          if (dl[1]) doc.text(dl[1], dx + 8, y + 29);
        });

        // Bordures principales et footer
        doc.setDrawColor(200,196,188);
        doc.setLineWidth(0.7);
        doc.line(x0 + zoneW, y0, x0 + zoneW, y0 + tableH);
        for (var gi = 1; gi <= 5; gi++) {
          var gx = x0 + zoneW + gi * dayW;
          doc.line(gx, y0, gx, y0 + tableH);
        }

        doc.setTextColor(90,90,90);
        doc.setFont('helvetica','normal');
        doc.setFontSize(6.5);
        doc.text('1 page = 1 semaine · hauteur des zones adaptée au nombre de tâches · point couleur = statut · JF = jour férié.', margin, pageH - 12);
        doc.text('Page ' + (wi + 1) + '/' + totalWeeks, pageW - margin - 48, pageH - 12);
      }

      if (!exported) {
        alert('Aucune tâche à exporter sur cette période.');
        return;
      }
      doc.save(fileBase + '.pdf');
    }
  }

  return (
    <>
      <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
        <AppHeader session={session} weekOffset={weekOffset}
          onWeekChange={d=>setWeekOffset(o=>o+d)}
          onSettings={()=>setScreen('settings')}
          onUserMenu={()=>setUserMenu(true)}
          filter={filter} trades={trades} onFilter={setFilter}
          zones={zones} data={data}
          viewMode={viewMode} onViewMode={setViewMode}
          onToday={()=>setWeekOffset(0)}
          showWeekends={showWeekends}
          onToggleWeekends={()=>setShowWeekends(v=>!v)}
          onExport={exportPlanning}
          onHistory={openHistory}
          onToggleLock={handleToggleLock}
          onValidatePlanning={()=>setValidateModal(true)}
          onReindexPlanning={handleReindexPlanning}
          planningLocked={planningLocked}
          planningValidated={planningValidated}
          planningValidUntil={planningVersion?.valid_until}
          onRefresh={()=>syncAll(true)}
          syncing={isBusy('sync')}
          busyActions={busy} />
        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {mainContent()}
        </div>
        <BottomNav screen={screen} onNav={setScreen}
          onAdd={()=>openAdd()} isAdmin={isAdmin} canAdd={canEditPlanning} />
      </div>

      {/* Modals */}
      <DetailModal open={modal?.type==='detail'} ivId={modal?.id}
        data={data} zones={zones} trades={trades} session={session}
        onClose={closeModal} onStatusChange={handleStatusChange} onEdit={openEdit}
        canEditPlanning={canEditPlanning} canChangeStatus={canChangeStatus} />
      <AddEditModal open={modal?.type==='add'||modal?.type==='edit'}
        editId={modal?.type==='edit'?modal?.id:null}
        preZone={modal?.zone} preDate={modal?.date}
        data={data} zones={zones} trades={trades} companies={companies}
        onClose={closeModal} onSave={handleSave} onDelete={handleDelete} />
      <UserMenuModal open={userMenu} session={session}
        onClose={()=>setUserMenu(false)} onLogout={handleLogout} />
      <HistoryModal open={historyOpen} history={history} session={session}
        onClose={()=>setHistoryOpen(false)} onRefresh={loadHistory} />
      <ValidatePlanningModal open={validateModal}
        onClose={()=>setValidateModal(false)} onConfirm={handleValidatePlanning} />

      {toast && (
        <div style={{position:'fixed',left:'50%',bottom:82,transform:'translateX(-50%)',zIndex:9999,
          background:toast.type==='error'?'#991B1B':toast.type==='info'?'#1E3A8A':'#14532D',
          color:'#fff',padding:'10px 14px',borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,.25)',
          fontSize:13,fontWeight:800,fontFamily:"'DM Sans',sans-serif",maxWidth:'calc(100vw - 32px)',
          textAlign:'center'}}>
          {toast.message}
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Apparence" />
        <TweakRadio label="Thème" value={tweaks.theme}
          options={['terrain','studio','nuit']}
          onChange={v => setTweak('theme', v)} />
      </TweaksPanel>
    </>
  );
}
</script>
<script type="text/babel" data-presets="env,react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ErrorBoundary>
      <PlanifyApp />
    </ErrorBoundary>
  );
</script>
</body>
</html>
